body:
  text: 卷三頭目眩眩者頭旋眼黑也傷寒頭眩多因汗吐下虛其上焦元氣之所致也傷寒邪在半表半裡表中陽虛故時時頭目眩葛根湯風家多頭目眩亦當解肌葛根湯傷寒論曰少陽口苦咽乾目眩小柴胡湯加天麻川芎傷寒論曰陽明病但頭眩不惡寒故能食而咳其人必咽痛能食為陽明中風四逆散加天麻桔梗傷寒論曰太陽傷寒誤吐誤下後心下逆滿氣上衝胸裡虛氣上逆也起則頭眩表虛陽不足也脈沉緊邪在裡不可汗發汗則動經身為振振搖者汗則外動經絡傷損陽氣則不能主持諸脈也桂苓甘術湯以溫經益陽或真武湯以實衛止汗按針經云上虛則眩下虛則厥頭目眩皆屬虛宜溫經補陽之劑吳氏治傷寒汗出過多頭眩身搖發熱脈虛數人參養榮湯倍人參加天麻少佐酒炒黃柏二服而愈易老云頭旋眼黑非天麻不能定少佐黃柏以滋腎水也若血虛頭眩四物湯加人參天麻氣虛頭眩四君子湯加天麻川芎伏痰頭眩二陳湯加南星白朮天麻川芎內兼痰火上攻再加酒炒黃芩竹瀝薑汁若元氣虛脫者人參養榮湯大建中湯俱加天麻川芎內傷勞役者補中益氣湯加天麻川芎惟溫病頭目眩及頭脹頭痛頭汗並目赤目黃目不明目直視目反折與傷寒治法不同俱系雜氣伏郁中焦邪熱亢閉上攻頭目乃胃家實也通宜升降散加味涼膈散清利之頭眩疼量加大黃目眩赤等證量加龍膽草酒炒咳嗽咳謂有聲無痰嗽謂有痰無聲咳嗽則有聲有痰也肺主氣形寒飲冷則傷之使氣逆而不散衝擊咽膈令喉中淫淫如癢習習如梗而咳嗽也有寒者有熱者有停飲者有在表者有在裡者有在半表半裡者病各不同治亦有異如傷寒停飲與表寒相合而咳嗽者小青龍湯或金沸草散停飲與裡寒相合而咳嗽者真武湯邪熱在半表半裡而咳嗽者小柴胡湯加貝母知母天花粉肺熱去人參加沙參凡陰證手足厥逆而咳嗽者四逆湯加五味子若溫病伏熱內郁咳嗽白虎湯合升降散小清涼散加竹葉若煩悶則加味涼膈散增損三黃石膏湯並加桔梗夫咳為肺疾必待發散而後已然又有不可發散者傷寒論曰咳而小便利不可發汗發汗則四肢厥逆又曰咳而發汗蜷而苦滿腹中復堅此為逆也不知發汗尤為溫病所大忌者豈止小便利一節乎又咳而脈數者為心火刑肺金則死口燥咽乾引飲曰渴不引飲曰燥干凡傷寒少陽邪在中焦口苦舌乾不甚渴脈弦者小柴胡湯少陽脈弦往來寒熱而嘔口燥咽乾者小柴胡湯口乾少津液脈浮緊微數者白虎加人參湯陽明無大熱背惡寒口燥咽乾者白虎加人參湯少陰病得之二三日口燥咽乾急下之以存津液大承氣湯此熱在下焦爍枯腎水下不可緩也若溫病怫熱內郁未有不口燥咽乾者小清涼散增損三黃石膏湯再看兼證消息之凡傷寒汗吐下後津液少口燥咽乾及虛人水衰火旺口燥咽乾以補陰益氣煎加麥冬黃柏知母天花粉以滋其水若脈沉足冷者多難治溫病下後須酌之不可驟補脈沉足冷宜大下之不可以傷寒例拘也咽痛凡傷寒咽痛有多般務宜詳辨不可一例以為熱也太陽病誤下脈若浮緊必咽痛此熱邪仍在上膈也小建中湯加桔梗誤汗亡陽漏風而咽痛此陽虛而陰氣上乘也乾薑附子湯陽明病六七日不大便熱蒸頭痛而咽痛者調胃承氣湯熱傳少陰而咽痛者以其經上循喉嚨故也脈必數而有力證必燥渴引飲小便祕澀短赤急當下奪以泄其熱也大承氣湯少陰咽痛四逆瀉利下重者四逆散加薤白桔梗少陰病一二日咽痛者與甘草桔梗湯即瘥此湯為陰陽通用之劑少陰病下利清穀裡寒外熱脈微欲絶面赤咽痛此陰盛格陽也通脈四逆湯加桔梗有直中陰經而咽喉驟痛不腫不渴始病無發熱頭痛脈來沉緊而細或疾數無倫或嘔吐清水或瀉利清穀或燥極悶亂渴不能飲此寒氣客於少陰之經虛陽上逆之候附子湯乾薑附子湯加人參急溫之或可救療大抵陽邪上逆而咽痛宜甘寒以解其熱陰寒邪塞而咽痛宜辛溫以解其結此大較也若夫腎氣本虛龍火勢盛必挾痰飲於上而腫痛閉塞也當砭破出血湧泄痰涎後用六味地黃丸料加牛膝麥冬五味子頻服又有真陰虧損腎水枯涸陰寒直中而咽痛者附子理陰煎大劑濃煎飲之若溫病怫鬱中焦流布上下即見少陰經口燥舌乾咽喉腫痛不利之證以其脈貫腎絡於肺系舌本故也增損雙解散加元參牛蒡子或增損普濟消毒飲倍桔梗加荊芥穗升降散尤為對證之藥渴凡傷寒發渴或因熱耗津液或因汗下太過當分六經而治太陽熱在表不渴若熱入膀胱之本脈浮數小便不利微熱發渴者五苓散切不可與白虎湯陽明病脈長標熱不惡寒無汗而渴者葛根湯加黃芩知母減麻黃二錢若陽明熱傳胃中本熱惡熱濈濈汗出而渴脈洪大而數者白虎湯切不可與五苓散若陽明本熱內實或蒸蒸而熱潮熱煩渴口燥咽乾大便實者調胃承氣湯或大柴胡湯少陽脈弦數口苦咽乾發熱而渴及心煩喜嘔而渴或往來寒熱而渴並宜小柴胡湯去半夏加陳皮知母麥冬天花粉太陰自利則不渴惟少陰則口渴飲水也小便色白者此下虛有寒也脈沉附子湯厥陰渴欲飲水者少少與之愈以其傳經盡欲飲水為欲愈之候也若身寒厥逆脈滑而口渴者此里有熱也白虎加人參湯凡陰證煩躁口渴不能飲水此虛陽上迫而為假熱脈沉足冷者四逆湯加人尿豬膽汁冷飲之若溫病一發即煩渴引飲以鬱熱自內而達外也故直格曰身熱為熱在表引飲為熱在裡溫病本末身冷不渴小便不赤脈不洪數者未之有也輕則白虎湯加白殭蠶蟬蛻天花粉重則增損三黃石膏湯加大黃凡病忽欲飲水者為欲愈蓋腸胃燥不能散邪得水則和其胃氣汗出而解若不與水則乾燥無由作汗遂至悶亂也傷寒溫病大渴欲飲涼水而世醫禁用不解何故眉批但當察邪熱之輕重寧少與之若熱少與多不能滲化則停蓄為支結喘嘔下利腫滿等證要訣曰亦有下利清穀純是陰證而反見渴者此陰在下格陽於上兼因瀉泄津液既去枯燥而渴雖引飲自少而常喜溫不可投寒劑宜理中湯加附子四逆湯加人參以溫之景嶽曰水為天一之精涼能解熱甘可助陰非苦寒傷氣者之比景嶽此論發前人所未發每見鄉曲人害溫病飲涼水而汗出熱退此即助陰解熱之義也此即裡熱清而表邪自解之義也眉批如陽虛無火者其不宜水無待言也其有陰虛火旺者元氣既衰精血又涸則津液枯燥多見鼻乾唇裂舌苔黑色二便閉結使非借天一之精何以濟燃眉之急故先以冰水解其標繼以甘溫壯水之劑培其本水藥並進無不可也其有內真寒而外假熱陰盛格陽之證察其元氣非甘溫大補則不足以挽回察其喉舌則些小辛熱又不可以近口有如是者但將甘溫大補之劑煎成湯液用冷水浸冷飲之此以假冷之味解上焦之假熱而以真熱之性復下焦之真陽是非用水而實亦用水之意內經所云伏其所主而先其所因是也韓懋所謂真對真假對假者此也眉批漱水不欲咽傷寒陽明病凡內有熱者欲飲水今欲漱水而不欲咽是熱在經里無熱也陽明多血多氣經中熱極迫血妄行故知必作衄也犀角地黃湯加茅花有太陽表證者汗之麻黃湯外證無寒熱欲漱水不欲咽必發狂此蓄血停留也桃仁承氣湯下血乃愈少陰脈沉細厥逆時煩躁作渴欲漱水不欲咽四逆湯溫之又下利厥逆無脈乾嘔煩渴欲漱水不欲咽白通湯不瘥白通加人尿豬膽汁湯大抵陰證發燥煩渴不能飲冷水或勉強飲下良久仍吐出或飲水而嘔者皆內寒也蓋無根失守之火遊於咽嗌之間但欲漱水不能飲水也若飲水不吐復欲飲者熱也若溫病雜氣怫鬱三焦邪熱內熾渴欲飲水者多矣間或有嗽水不欲咽者必其人胃中濕飲過甚或伏火未散或蓄血停留俱未可知但口舌乾而不欲咽也輕則小清涼散升降散清降之重則解毒承氣湯大瀉之不可拘傷寒陽明熱在經里無熱之例也嘔吐嘔者聲物俱出吐者元聲出物傷寒太陽陽明合病下利而嘔者葛根加半夏湯少陽陽明多嘔證脈弦發熱口苦而嘔或寒熱往來而嘔並宜小柴胡湯倍半夏生薑先渴後嘔者為水停心下小半夏加茯苓湯先嘔後渴者為欲解可與水飲太陽少陽合病自利而嘔者黃芩加半夏生薑湯少陽邪甚發熱嘔不止心下急鬱郁微煩者大柴胡湯三陽發熱而嘔俱用小柴胡湯發熱不解而煩伏飲與邪熱相搏作煩悶渴欲飲水胃干希水自救水入即吐伏飲內作水不得入名曰水逆五苓散傷寒本自寒下格醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯太陽誤吐下心中溫溫嗢嗢欲吐而胸中痛大便溏腹微滿鬱郁微煩者調胃承氣湯若未曾吐下者大柴胡湯太陰腹滿或吐食不下脈沉者理中湯加厚朴陳皮半夏生薑寒甚加附子少陰脈沉遲飲食入口即吐心中溫溫嗢嗢欲吐復不能吐手足厥者四逆湯厥陰乾嘔吐涎沫者吳茱萸湯若嘔而脈弱小便復利身有微熱見厥者難治可與四逆湯救之若下利無脈乾嘔煩者白通加人尿豬膽汁湯若厥陰嘔而不渴乾薑附子湯至於溫病嘔吐者胃中伏火鬱而攻發也增損三黃石膏湯加味涼膈散加石膏清利之自止若有宿糞燥結時時嘔吐者此為下格亦宜加味涼膈散升降散通之如病愈後脈證俱平往往有下格之證所云病愈結存是也但常作哇聲上下通氣故不嘔而能食俟胃氣漸復津液流通宿糞自然潤下也斷不可攻如下格常嘔則氣閉矣通之則宿糞除而嘔吐止語云欲求南風須開北牖正謂此也大抵嘔吐清水即為寒證若胃中有熱必是涎液酸水病機曰諸嘔吐酸水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒此可見矣凡胃熱甚服藥嘔吐不納者愈吐愈服三服後火性漸消然後徐徐用藥即不吐凡過藥不可用甜物須嚼生薑為妙按傷寒本自寒下句之下字為是格字心中溫溫欲吐句溫溫二字應是嗢嗢蓋嗢嗢者乃吐飲之狀也皆當改之喘喘無善證溫病內熱怫鬱三焦如焚氣上衝胸而喘者加味涼膈散腹脅滿痛而喘者解毒承氣湯若自臍下氣海動氣而喘者不治正傷寒則宜辨六經寒熱治之太陽表有發喘者脈浮緊惡寒無汗也麻黃湯加厚朴表有風發喘者脈浮緩惡風有汗也桂枝加厚朴杏仁湯內有寒心下有水氣乾嘔汗出而喘者小青龍湯凡發汗後汗出而喘無大熱者表寒未解也麻黃杏仁甘草石膏湯太陽經病誤下之脈促者表未解也喘而汗出者葛根黃連黃芩湯陽明病內實不大便腹滿短氣發潮熱而喘者大柴胡湯加厚朴杏仁凡陰證厥逆脈沉細而微氣促而喘無汗者可治四逆湯加細辛五味子少陰病反發熱脈沉而喘麻黃附子細辛湯凡虛人脈沉手足厥逆而喘者五味子湯凡暴感風寒脈浮無汗而喘者蘇陳九寶湯凡熱甚有痰脈弦滑數而喘者不可汗不可下小柴胡湯去人參加陳皮貝母天花粉和之胸滿者加枳殼桔梗心下滿者加枳實黃連舌燥飲水者加石膏知母凡傷寒止於邪氣在表而喘者心腹必濡而不堅設或腹滿而喘則又為可下之證須酌之大抵諸喘為惡謂肺中邪勝而兼虛也所以陰證發喘尤為惡候下元虛損之人腎氣上乘而喘急以腎氣丸料引火歸源可救十之一二若兼動息搖肩戴眼直視汗出厥逆者立斃以邪氣上盛正氣欲脫必至喘滿經曰直視譫語喘滿者死又身汗如油喘不休者為命絶也短氣短氣者氣短不能相續似喘而不搖肩似呻吟而無痛處其證多端實為難辨表裡寒熱虛實稍不明切誤治者多矣一者太陽表證不解汗出不徹其人面色緣緣正赤陽氣怫鬱煩躁不安其身不知痛所在而短氣者宜微汗則愈桂枝麻黃各半湯二者太陽病發於陽而反下之陽氣內陷遂成結胸心下硬滿高起氣促而短脈沉滑而實者大陷胸湯脈浮大而虛者柴胡陷胸湯三者陽明病內實不大便腹滿潮熱而短氣者大柴胡湯四者乾嘔短氣痛引脅下汗出不惡寒者此表解里未和也十棗湯控涎丹亦可五者短氣煩躁心中懊憹者梔子豉湯六者少陰病脈沉細遲四逆面上惡寒有如刀刮口鼻之氣難以布息而短促者通脈四逆湯加人參七者因汗吐下後元氣虛弱脈來微細氣不相續而短促者大建中湯八者風濕相搏一身盡痛小便不利惡風不欲去衣被而短氣者甘草附子湯九者食少飲多水停心下煩悶短氣者茯苓甘草湯兼小便難五苓散大抵心腹脹滿按之硬痛而短氣者為裡實宜承氣輩若心腹濡軟不脹滿而短氣者為表邪宜瀉心輩若少氣不足以息脈微弱而短促者為氣虛宜理中輩此傷寒短氣之大略也若溫病鬱熱內迫氣多急促須看兼證舌上白苔如屑清化湯增損三黃石膏湯若苔黃及黑色而短氣加味涼膈散或解毒承氣湯急下之若病者屬四損之輩又當詳辨蓋短氣有類於喘但短氣則氣急而短促不似喘之搖肩而氣粗也大抵氣急而不相續多屬實少氣不足以息多屬虛以此辨之百不一失厄逆厄逆者氣上逆而厄忒也內經作噦即此字之聲也即此證也勿誤作咳逆咳逆者咳嗽之甚也非厄逆也厄逆者才及咽喉則遽止厄厄然連續數聲而短促不長也如傷寒胃熱失下內實大便硬厄逆者脈必應指有力調胃承氣湯便軟者生薑瀉心湯胃虛有熱厄逆者橘皮竹茹湯有痰飲者脈必弦滑小半夏生薑湯脈細微厄逆者胃寒也橘皮乾薑湯丁香柿蒂湯金匱要略曰其氣自臍下直上衝於胸嗌間而厄逆者此陰證也其病不在胃也乃肝腎虛寒之極而挾陰火上衝以病本下虛內已伏陰或誤服寒冷之藥遂令寒極於下逼其相火上衝率集於胃中而厄逆亦欲盡也急服腎氣丸料又病人厄逆煩躁自覺甚熱他人以手按之其肌膚則冷此為無根失守之火散亂為熱非實熱也乃水極似火陰證似陽也若不識此誤用涼藥下咽立斃大建中湯或附子湯加肉桂乾薑急溫其下真陽回陰火降厄忒乃止也如寒極厄忒不已者兼用硫黃乳香等份為末酒煎嗅之或以艾湯調服硫黃末二錢或艾灸中脘關元氣海更妙凡厄逆而二便不通者屬實熱凡厄逆而厥逆自利者屬虛寒凡厄逆不尿腹滿者不治凡久病而見厄逆者此真氣已衰不治凡舌短灰黑及頭汗不得尿與自利腹痛而厄逆者不治凡厄逆脈散者死按以上論傷寒厄逆寒熱死生之論無遺蘊矣若溫病無陰證不在此例怫熱攻發火性上炎氣逆而厄厄連聲也治法各從其本證而消息之大概不外清化升降加味涼膈以清熱導滯為主如見白虎證則投白虎見承氣證則投承氣膈間痰閉則用滌痰湯滾痰丸但治本證厄自止其餘可以類推矣按厄逆一證古無是名俗謂打擱忒是也其在內經本謂之噦因其厄厄連聲故今人以厄逆名之於義亦妥孫真人云遍尋方論無此名遂以咳逆為噦致令後世訛傳乃以咳逆嘔吐噦乾嘔噫氣之類互相淆亂紛紛聚訟自唐迄今余用析而判之曰噦者厄逆也非咳逆也咳逆者咳嗽之甚也非厄逆也乾嘔者無物之吐即嘔也非噦也噫者飯食之息即噯氣也非咳逆也嘔者有聲有物也吐者無聲出物也後人但以此為鑑則異説之疑可以盡釋矣蛔厥陶氏曰吐蛔雖有大熱忌用冷藥犯之必死胃中有寒則蛔上膈大凶之兆急服理中安蛔散待蛔定卻以小柴胡湯退熱此説謬甚陶説無理之甚誤人不淺眉批又傷寒吐蛔責於寒雜證吐蛔責於熱此説亦謬紛紛聚訟迄無定見余按傷寒七八日脈微而厥膚冷其人躁無暫安時者此為臟厥非蛔厥也四逆湯主之至於肝臟或寒或熱以致胃無穀氣蛔不安其位至咽而吐須看本證消息治之如寒則靜而復時煩宜烏梅丸理中安蛔散如熱則煩嘔不止宜黃連解毒湯白虎湯俱加川楝子使君子烏梅此大略也若治溫病而用理中烏梅正如抱薪投火輕病致重重病致危蓋溫病無陰證若至吐蛔則表裡三焦熱鬱亢極不思現在事理徒記紙上文詞因之誤人甚重胃熱如沸蛔動不安下氣不通必反於上蛔因嘔出此常事也酌用增損三黃石膏湯加味涼膈散俱加川楝子使君子烏梅則熱退而蛔自不出耳大抵胃脘忽痛忽止身上乍寒乍熱面上時赤時白脈息倏亂倏靜皆吐蛔之候也須早辨也厥逆厥逆陰陽之氣不相順接手足寒涼便為厥也凡有四逆者便當早察寒熱虛實而施治大抵病至發厥正氣已極但有陰厥陽厥之分辨之一差死生立判凡傷寒陽厥者必先因熱甚不解而後發厥也仲景曰厥深熱亦深厥微熱亦微是也切其脈雖沉而有力四肢雖涼有時而溫或手足心溫戴氏以為指甲卻暖大便燥實譫語發渴揚手擲足畏熱喜冷與之冷水則咽此乃陽厥之候仲景曰厥逆手足冷脈滑者里有熱也白虎湯主之劉河間曰肢體厥逆惟心胸有熱以涼膈散養陰退陽不宜速下大便不祕者以黃連解毒湯調之故凡厥證可速下者內有燥糞也必以手按人之臍腹上下左右或硬或痛或腹中轉氣下矢極臭者有燥糞也乃可下之宜調胃承氣湯近有陽證自腰以上常熱兩腳常冷蓋三陰脈上不至頭故陰證頭不痛三陽脈下不至足故陽證亦足冷也孫兆曰凡陰證脛冷兩臂亦冷若脛冷臂不冷則非下厥上行所以知是陽微厥也陽厥雖曰陽邪在裡甚不可下蓋傷寒以陽為主厥逆有陰進之象若復用苦寒下之則陽益虧矣是在所忌宜四逆散輕劑以和之又有邪傳厥陰誤下厥逆寸脈沉遲尺脈不至咽喉不利吐膿血泄利不止麻黃升麻湯主之凡傷寒陰厥者初病無身熱頭痛便就惡寒直至臂脛以上過乎肘膝引衣蜷臥不渴或兼腹痛吐瀉小便清白或淡黃切其脈沉遲微細無力此為陰經直中真寒證不從陽經傳入自是白通四逆一派又有初是陽證傳陽經或因復著外寒或因誤服涼藥太過或因誤下而致虛極則積陰盛於下陽氣衰於上變成陰證真武湯加人參又有病者手足厥冷言我不結胸小腹滿按之痛者此寒氣結在膀胱關元也四逆湯加吳茱萸大抵陽厥邪熱轉入轉深狂亂譫妄必然神志昏憒人事迷惑陰厥便利不渴身蜷多臥醒則人事了了神志清明此大端也若溫病厥逆無陰厥雜氣伏郁陽熱內迫格陰於外氣閉不能達於四肢甚有通身冰涼其脈多沉滑或沉伏或沉細欲絶或六脈俱閉所云體厥脈厥是也證多怪異不測之狀輕則升降散增損雙解散加味涼膈散重則加味六一順氣湯解毒承氣湯斟酌下之豈可與傷寒陽厥並論哉若數下後厥不回熱不退者死亦有下數十次利下數十行厥方回熱方退而得生者正所云急證急攻下之或可活不下必死無疑矣此則溫病厥逆治法也外有壞病多厥逆煩躁者不獨陽極陰極也當辨陽傷陰傷治之陽傷則宜滋養後天胃氣兼助下焦真陽補陰益氣煎或大溫中飲陰傷則宜滋補先天真陰兼清血中之熱左歸丸料或六味地黃丸料俱加青蒿地骨皮是在臨證活法不得如初病厥逆例治也大便自利自利者不因攻下自然溏瀉也要在辨寒熱而治之庶幾無差大抵傷寒陽熱之利與陰寒之利不同陽利渴欲引水小便色赤或深黃發熱後重糞色焦黃或為腸垢所去皆熱臭臍下必熱得涼藥則愈若陰利則不渴小便色白或淡黃厥逆脈沉遲洞下清穀或為鶩溏糞色淡黃或白臍下多寒得溫補藥而愈三陽下利身熱太陰下利手足溫少陰厥陰下利身涼無熱此其大概耳傷寒合病家皆作自利少陽陽明合病下利葛根湯太陽少陽合病下利黃芩湯少陽陽明合病下利小柴胡湯加葛根白芍合病發熱自利皆為表邪不可例以為里證也唯有陽明一證脈浮而遲浮為風遲為寒表熱裡寒內寒外熱下利清穀者胃中虛冷不能化谷四逆湯以溫中止利則裡氣和而表邪散矣自利不渴屬太陰以其臟有寒也當溫之宜四逆輩則宜用理中湯可知矣若寒甚厥逆脈沉者附子必加之若腹滿小便不利者宜五苓散合理中湯若嘔者加半夏生薑自利而渴屬少陰虛故引水自救下利脈微者與白通湯以通其陽而消其陰利仍不止厥逆無脈乾嘔煩者白通加人尿豬膽汁湯借膽汁嚮導之力以引湯藥深入服湯後脈暴出者死氣因泄脫也脈續出者生陽氣漸復也少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或嘔或小便利者真武湯去白芍加乾薑以運脾滲水為務少陰病下利清穀裡寒外熱手足厥冷脈微欲絶身反不惡寒面時色赤通脈四逆湯少陰病吐利手足厥冷煩躁欲死者吳茱萸湯少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯自利不止裡寒下脫此利在下焦赤石脂禹餘糧湯服湯後利仍不止當利其小便與豬苓湯少陰病四逆或咳或悸或小便不利或腹中痛或泄利下重者四逆散加薤白此亦陽邪傳至少陰陷入於裡而不得交通陽分故不以苦寒攻之而但以此散和之少陰病自利清水色青心下必痛口乾燥者急下之以存津液大承氣湯蓋熱邪傳入少陰逼迫津水注為自利質清而無渣穢相雜色青而無赤黃相同此正陽邪暴橫反類陰邪但陽邪傳自上焦其人心下必痛口必乾燥設系陰邪則心下滿而不痛口中和而不燥必無此枯稿之象故宜急下以救其陰也厥陰下利清穀裡寒外熱汗出而厥者通脈四逆湯下利腹脹滿身體疼痛者先溫其里四逆湯乃攻其表桂枝湯此總以溫里為急也下利脈大者虛也以強下之太早故也設脈浮革因而腸鳴者當歸四逆湯大汗出熱不去內拘急四肢痛又下利厥逆而惡寒者四逆湯惡寒脈微而復利利止亡血也蓋亡血本不宜用薑附以損陰陽虛又不當用歸芍以助陰此利後惡寒陽氣下脫已甚故必用四逆湯以復陽為急也再加人參則陽藥愈為得力陽生則陰長設用陰藥必致腹滿不食或重加泄利嘔逆轉成下脫而死矣下利譫語者有燥糞也蓋下利則熱不結胃不實何緣得有譫語此必熱反於胃內有燥糞故雖下利而結者自若也必用小承氣湯以蕩熱潤燥微攻其胃則愈熱利下重與下利欲飲水者以有熱在腸胃故也俱宜白頭翁湯下利後更煩按之心下濡者為虛煩也宜梔子豉湯若溫病怫鬱內盛發熱煩渴小便色赤大便自利升降散主之內熱甚而利不止躁悶狂亂者增損三黃石膏湯加酒大黃腹滿痛更加之挾熱下利者因其人大便素溏邪忽乘胃便作煩渴午後潮熱便作瀉泄宜升降散小承氣湯徹其餘邪而利自止熱結旁流者以胃家實邪熱壅閉大便先祕續得下利純臭水全然無糞以加味六一順氣湯下之得結糞而利立止若不得結糞仍下臭水及所進湯藥因大腸邪深失其傳送之職知邪猶在也再以前湯重下之虛甚則宜黃龍湯此內經通因通用之法也大抵下利脫氣至急五奪之中惟此為甚故不厭詳審傷寒下利日十餘行脈反實大者死傷寒發熱下利至甚厥不止者死夫厥證但發熱則不死以發熱則邪出於表而里證自除下利自止也若反下利厥逆有加則其發熱又為真陽外散之候陰陽兩絶故主死也傷寒發熱下利厥逆躁不得臥者死躁不得臥腎中陽氣越絶之象也下利手足厥逆皆為危候以四肢為諸陽之本也加以發熱躁不得臥不但虛陽發露而真陽亦爍盡無餘矣安得不死金匱要略曰六腑氣絶於外者手足寒五臟氣絶於內者利不禁氣已脫矣孰能治之大便膿血長沙著便膿血無死證世醫用溫熱之藥罔或得痊殊不知此證屬熱者十之九古人云見血無寒又云血得熱而妄行溫熱之藥豈可輕投如傷寒太陽病誤發淋家汗因便膿血宜豬苓湯由小便淋瀝所致利其小便自愈經曰淋家不可發汗發汗則便膿血是也太陽病以火熏之不得汗其人必躁到經不解必清圊也血黃連阿膠湯陽明病無表裡證發熱雖脈浮數可下下之脈數不解下利不止協熱便膿血者地榆散二證乃熱勢迫血下行折其火邪自愈其在少陰下利便膿血不腹痛與四五日腹痛小便不利便膿血者俱桃花湯主之蓋調正氣澀滑脫亦辛以散之之意也又少陰七八日一身手足盡熱以熱在膀胱必便血也此臟腑合病白頭翁湯主之厥陰先厥後熱下利必自止若不止必便膿血又厥少熱多其病當愈四五日至六七日熱不除者必清膿血又下利脈數而渴者令自愈設不瘥必清膿血又下利寸脈反浮數尺中自澀者必清膿血四證皆傳經之熱邪也悉白頭翁湯主之若溫病怫熱結滯火勢下注陽實陰虛大便膿血甚如豚肝如爛瓜肉屋漏水者大清涼散增損三黃石膏湯或當歸導滯湯加減消息治之豫用升降散治此大證而得愈者若許人真神方也小便不利不通凡傷寒小便不利當分六經施治不可與雜證同論而溫病小便不利又不可與傷寒同論也太陽病汗下後仍頭項強痛發熱無汗心滿微痛小便不利者桂枝去桂加白朮茯苓湯太陽病發熱脈浮煩渴小便不利者五苓散但有汗多者不可用也陽明病脈浮發熱渴欲飲水小便不利者豬苓湯若汗多者小便原少不可用也若脈洪大舌燥飲水小便不利者白虎湯或玉泉散合六一散亦可若大便乍難乍易小便不利而熱者此有燥糞也調胃承氣湯若頭汗出壯熱渴飲水漿小便不利者必發黃也茵陳蒿湯加木通滑石少陽病發熱口渴或嘔或心下悸小便不利脈弦數者小柴胡湯加白茯苓口乾燥去半夏加陳皮麥冬竹葉太陰病腹滿自利小便不利無熱脈沉者理中湯合五苓散加厚朴木香分利其水而大便自實也少陰病四五日小便不利四肢重沉自下利者真武湯少陰病四逆或咳或悸或瀉利下重或小便不利者四逆散加白茯苓厥陰病寒閉厥逆脈沉囊縮小便不利者四逆湯加木通白茯苓或灸氣海關元或以蔥白搗炒尉法治之大抵膀胱為津液之府氣化而能出若有汗多者津液外泄小便自少不可利之恐亡津液也待汗止小便自行矣若溫病小便不利因陽明熱鬱氣結不舒故小水澀滯而短少也以升降散通之則清氣一升而濁氣自下降矣亦有心熱小便不利者宜小復蘇飲又小便不通其因有二有熱鬱者有寒凝者溫病皆熱鬱用玄明粉芒硝亦可三錢雞子清一枚蜂蜜三匙和一處或新汲水或燈心煎湯或車前草汁調服甚則以解毒承氣湯下之利水無益也傷寒有熱鬱亦有寒凝寒則茯苓四逆湯或以鹽入臍中蒜片蓋之堆艾葉於上灸七壯自通或以炒鹽尉臍並治腹痛皆妙法也熱則以八正散通之纘論曰傷寒小便不利以脈浮者屬氣分五苓散脈沉者屬血分豬苓湯而溫病之小便不利脈浮者屬氣分豬苓湯脈沉者屬血分承氣湯蓋傷寒自氣分而傳入血分溫病由血分而發出氣分千古隻眼不可以此而礙彼也纘論氣分血分二語詮解傷寒溫病言簡意賅透骨徹髓讀醫至此如夢初覺千古疑案兩言而定眉批小便自利傷寒小便自利正因不當利而反自利也如太陽陽明自汗不應小便利而反自利者寒為膀胱不禁熱為蓄血使然是以傷寒之一證也安得不辨治乎太陽小便自利以飲水多必心下悸桂枝甘草湯身黃小便當不利今反自利其人如狂下焦蓄血也代抵當湯丸二便俱自利六脈沉遲四逆湯陽明自汗應小便不利而反自利津液內竭也糞雖硬不可攻宜蜜煎導法一法以白菜自然汁大麻仁汁生芝麻汁等份入蜂蜜三匙調服一二次自下凡大便閉小便自利知其熱在內也宜承氣輩大便通小便清白自利知其內虛寒也宜四逆輩若溫病小便自利無陰證乃邪熱干於血分蓄血尿血邪留欲出小便數急膀胱不約而自遺也升降散或桃仁承氣湯去桂加丹皮牛膝枳殼合黃連解毒湯去其邪熱自愈小便數小便數者頻來而短少也膀胱積熱熱則小便澀乃水行不快淋瀝而數起也在傷寒自外傳內五苓散豬苓湯在溫病由內達外神解散升降散又太陽傷寒脈浮大自汗腳攣急心煩微惡寒小便數者此虛寒所致桂枝加附子湯主之不可行桂枝湯得之便厥咽乾吐逆煩躁譫語與甘草乾薑湯以復其陽厥愈足溫再與芍藥甘草湯其腳即伸若陽明猶有餘風生熱胃氣不和譫語者少與調胃承氣湯和之又小便數腎與膀胱俱虛客熱乘之為虛不能制水也人參三白湯加熟地黃柏知母麥冬心悸悸者心中築築然動怔忡不安也傷寒心悸之由不過氣虛停飲兩端氣虛由陽氣內弱心下空虛正氣內動而為悸也小建中湯甚則大建中湯或人參三白湯脈沉心悸頭眩身瞤振真武湯停飲由水停心下心屬火而惡水水既內停心不自安而悸茯苓甘草湯或五苓散分利之脈結代心動悸炙甘草湯又發汗過多其人必叉手冒心心悸喜按桂枝甘草湯甚則炙甘草湯又發汗過多心液虛耗臍下悸者欲作奔豚腎乘心虛上凌而克之故動惕於臍間茯苓桂枝甘草大棗湯寒熱心悸小便不利心煩喜嘔小柴胡湯心神不寧怔忡不眠硃砂安神丸若溫病心悸鬱熱內盛火性上衝加味涼膈散增損三黃石膏湯看兼證消息之痙痙者如角弓反張也以胃為總筋筋急而縮之故由於濕生熱熱生痰痰生風風火彌甚木勝剋土筋不能榮輕則瞤惕瘛瘲手足戰掉重則鼻煽目直頭折臂反在傷寒以六一順氣湯下之在溫病以加味六一順氣湯下之蓋瀉土所以瀉木也若傷寒有不可下者以四物湯合桂枝湯加黃連吳茱萸炒黃芩防風釣藤鉤則血和風火自滅也肉瞤筋惕瞤者肌肉蠕動惕者筋脈動跳也此因發汗攻下太過邪熱未解血虛氣奪筋肉失其所養故惕惕而跳動也凡傷寒惕瞤兼肢冷者真武湯輕者桂苓甘術湯汗下後虛極而惕瞤者人參養榮湯大建中湯汗下後虛極煩而不得眠惕瞤者加味溫膽湯若不經汗下而肉瞤筋惕潮熱來尤甚大便必結小便赤澀以手按臍旁硬痛此燥糞也大柴胡湯加芒硝如初病便見肉瞤筋惕必先元氣虛損或失血房室勞役及新産崩漏致有是證人參養榮湯若誤用表藥必無生理倘不詳辨寒熱虛實而欲治之無差難矣若溫病而見惕瞤之證此陽明火毒陷入厥陰陽明主潤宗筋燔灼津液弗榮而動加味六一順氣湯解毒承氣湯消息治之設有虛而惕瞤者必入四損不可正治之條一實一虛其脈證畢竟有辨隨證變治全賴醫者活法耳舌卷囊縮扁鵲曰舌卷囊縮者死然在古人雖曰死證亦不可不盡心以救之但有因熱極而捲縮者有因寒極而捲縮者要在詳細辨之凡熱極者宜下傷寒從三陽熱證傳至厥陰而見此證者乃肺氣燔灼水受火困而不得舒縱訒庵云陽陰之熱陷入厥陰陽陰主潤宗筋宗筋為熱所攻弗榮而急引舌與睪丸為熱極危殆之候男子則囊縮婦人則乳頭縮如脈實便祕口渴煩滿之極六一順氣湯加黃連若溫病邪郁中焦流布上下以致肺肝受傷水不勝火陰不敵陽筋脈弗榮故有此證加味六一順氣湯或解毒承氣湯凡寒極者宜溫傷寒始病無熱惡寒便厥逆無脈而見此證乃厥陰虛寒內則經血失養而引急不舒外則肢體蜷曲而下部不溫乃肝氣垂絶之候急用四逆湯加人參肉桂吳茱萸溫之並灸關元氣海及蔥尉法溫病無陰證循衣摸床華他曰傷寒循衣摸床者死傷寒論曰傷寒若吐若下後不解不大便五六日至十餘日日晡潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦滑者生澀者死微者但發熱譫語大承氣湯主之若一服利止後服又曰傷寒手足躁擾捻衣摸床小便利者其人可治小便利則水出高源肺氣不逆可知也膀胱化行腎水不枯可知也故曰可治眉批可見此證非大實即大虛但參其證審其音察其脈而分治之實而便祕大承氣湯虛極熱極不下必死者黃龍湯虛而便滑獨參湯厥逆加附子若亡血者又當用生地黃連湯大抵陰陽二氣將絶者則妄言撮空也樓全善曰嘗治循衣摸床數人皆用大補氣血之劑一人兼瞤振脈代遂於補劑中加肉桂五分亦振止脈和而愈汪訒庵曰妄言撮空有因氣虛陽脫而然者皆宜用參附補劑兩説確有至理若溫病陽明邪熱亢閉上乘心肺致令神志昏憒多有撮空之證宜解毒承氣湯下之如火盛精枯用熟地一兩歸身七錢山藥五錢煮湯入前藥煎服每收奇功若久病神昏氣血陰陽四損者自當從樓汪之説而消息之按弦脈者生之弦字當是滑字弦為陰負之脈豈有必生之理惟滑脈為陽始有生理況滑者通也澀者塞也凡物之理未有不以通為生而澀為死者宜改之煩躁煩者心不安而擾擾心胸慍怒如有所觸外不見形為熱尚輕躁者身不安而憒亂手足動掉若無所措內外不寧為熱最劇凡傷寒表邪熱盛脈浮緊不得汗出而煩躁者大青龍湯大熱錯語呻吟乾嘔不眠煩躁脈數者黃連解毒湯或竹葉石膏湯內有燥糞繞臍腹痛煩躁調胃承氣湯誤汗誤下病仍不解煩躁者茯苓四逆湯脈必沉細乃可用之少陰病身微熱脈沉細手足厥而煩躁者四逆湯面赤者加蔥白若無脈乾嘔煩躁者白通加人尿豬膽汁湯少陰病吐利厥逆煩躁欲死者吳茱萸湯少陰病下之後誤下傷陰復發汗誤汗傷陽晝日煩躁陽虛生煩陰虛生躁夜而安靜可徵裡寒不嘔不渴可徵內無實熱無表證頭不痛不惡寒脈沉微沉為在裡微為陽虛身無大熱者可徵陽微乾薑附子湯凡陰極發躁欲坐井中或投泥水中臥者厥逆脈沉微一息七八至按之則無但欲飲水不得入口此陰盛格陽氣欲脫而爭譬如燈將滅而暴明矣乾薑附子湯加人參以接真陽之氣或可救療一方以艾湯調服硫黃末二錢翌時汗出乃愈若溫病表裡三焦大熱渴欲引飲煩躁不安多現奇怪不測之狀增損三黃石膏湯增損雙解散升降散三方併為對證之劑豫每隨證用之救壞病而得生者若許人真稀世之珍也其共寶之大抵不經汗下而煩躁者為實汗下後煩躁為虛內熱曰煩謂心中郁煩也乃為有根之火故大煩不躁為可治外熱曰躁謂氣外熱躁也乃為無根之火故但躁不煩為不可治經論少陰病有曰四逆惡寒脈不至不煩而躁者死煩與躁可治不可治判然矣凡結胸證悉俱煩躁者死發熱下利厥逆躁不得眠者死少陰吐利煩躁四逆者死煩躁為有常之病復有不治之證傷寒溫病皆然臨病之工當詳細辨之懊憹憹即惱字古人通用懊憹者鬱郁然不舒憒憒然無奈比之煩躁而更甚也凡傷寒發汗吐下後虛煩不得眠劇者反復顛倒心中懊憹與陽明病下之其外有熱手足溫而不結胸心中懊憹飢不能食但頭汗出二者為邪熱鬱於胸中須梔子豉湯吐之以湧其結熱也陽明病下之心中懊憹而煩胃中有燥糞與陽明病無汗小便不利心中懊憹者必發黃二者為邪熱結於胃中須大承氣湯茵陳蒿湯下之以滌其內熱也若溫病懊憹為熱毒蘊於胸中加味涼膈散或熱毒鬱於胃中解毒承氣湯識此等證候者吐下之不差湯劑之適當則無不可愈之疾矣一或當吐反下治熱以溫則變證百出斑生黃髮者比比也為醫者請精究之怫鬱怫鬱者陽氣怫鬱面色緣緣正赤也傷寒汗出不徹陽氣怫鬱在表不知痛處鬚髮汗乃愈桂枝麻黃各半湯若腹痛潮熱脈大而數者因大便不通火氣上炎而作面赤大柴胡湯時有微熱怫鬱不得眠者調胃承氣湯吐汗下後虛極胃中虛冷外氣怫鬱乃假色現於面而內寒也理中湯加蔥白冷甚加附子少陰下利清穀裡寒外熱面色赤者四逆湯加蔥白若溫病無陰證滿面色赤目紅如朱煩躁飲水者此熱毒怫鬱也增損三黃石膏湯內實潮熱不大便增損大柴胡湯或加味涼膈散大抵傷寒陰證怫鬱並汗吐下虛者自是面赤而不光彩也若傷寒陽證表不解溫病內實熱甚者赤而光盛也不可但見面赤便以為熱證也須辨之鬱冒郁為鬱結而氣不舒冒為昏冒而神不清俗謂昏迷是也皆因虛乘寒所致傷寒論曰諸虛乘寒者則為厥鬱冒不仁此正寒氣乘虛中於人也駱龍吉以附子湯加天麻川芎乾薑之類治之傷寒論曰太陽病先下之不解因復發汗以此表裡俱虛其人因冒冒家汗出自愈由表和也若不得汗不解者以人參三白湯加天麻川芎下虛脈微加附子溫經乃固本也昏冒耳聾非大劑溫補不能取效滋苗者必固其本伐下者必枯其上此之謂也陽明病小便小利大便乍難乍易時有微熱喘冒不能眠有燥糞也調胃承氣湯少陽病下利止而頭眩時時自冒者死以虛極而脫也若溫病蓄熱內逼脈道不利反致脈沉細或閉而鬱冒欲死者加味涼膈散加味六一順氣湯之類治之此事難知曰傷寒心下不痛腹中不滿大小便如常或傳至十日以來漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思形如醉人此熱傳少陰心經也因心火逼肺所以神昏蓋肺為清肅之令內有火邪故也若脈在丙者脈浮是也宜導赤散脈在丁脈沉是也大黃黃連瀉心湯丙丁俱熱者導赤瀉心各半湯在溫病火邪逼肺神昏不惺大復蘇飲主之蓋心經透出邪火與火邪之越經而傳於心及汗多亡陽者皆心神不足故也醫者不識此證便以為將死因之誤治者多矣最要忌灸灸則愈增其熱最要忌下與食則咽邪不在胃也誤下則亡其陰傷寒溫病極多此證不可不辨也活人書曰傷寒瘥後又云傷寒後不瘥或十數日或半月二十日終不惺惺常昏沉似失精神言語錯謬或無寒熱或寒熱如瘧或朝夕潮熱都是發汗不徹餘毒在心胞絡所致也宜知母麻黃湯溫覆令微汗若心煩不眠欲飲水當稍稍與之胃和即愈未汗須再服以汗為度此説亦有理愚謂須是傷寒不曾大發汗及病以來身無汗者尤為相宜或於知母麻黃湯中加酒炒黃連尤妙若治溫病清熱導滯自能汗解並無正發汗之理安得有汗出不徹之後證乎此中玄妙但可為知者道也動氣動氣乃臟氣不調肌膚間築築跳動於臍旁上下左右及左乳之下曰虛里者皆其所聯絡者也故動之微者止於臍旁若動之甚則連及虛里並心脅真若舂舂然連續而渾身振動者此天一無根故氣不蓄藏而鼓動於下誠真陰守失大虛之候也即在病者不痛不癢尚不知為何故醫家不以為意弗能詳辨誤治者多矣活人曰諸動氣者不可發汗亦不可下以邪之所湊其氣必虛即傷寒虛者不可汗下之例即有汗下之證但解肌微和胃氣可也古人治法以誤汗則傷陽陽傷則邪並於氣而氣上衝或咳嗽眩暈或心煩惡寒並宜五苓散加酸棗仁以降斂之誤下則傷陰陰傷則虛陽不禁而氣下奪或身熱蜷臥或下利汗出並宜大建中湯理中湯倍加桂苓急溫其里則虛熱不治自息此其意在脾胃虛寒困憊概可知也余治此證則惟直救真陰以培根本使氣有所歸無不獲效右腎虧損則以腎氣丸右歸丸左腎虧損則以六味丸左歸丸或作丸料煎飲傷寒論曰少陰脈不至腎氣微少精血奔氣促迫上入胸膈此奔豚之氣結動於臍間而上逆凌心也宗氣反聚心胞之宗氣反聚而不下行血結心下血結於心下而脈不通陽氣退下退陷也熱歸陰股鬱熱歸於氣街與陰相動與陰氣之脈相動令身不仁此為尸厥麻木無知其狀若尸當亦動氣證也天一無根即此可徵所云傷寒溫病四損不可正治者觀此可例其餘矣臟結臟結如結胸狀飲食如故時時下利寸脈浮關脈細小沉緊名曰臟結舌上白苔滑者難治注寸脈浮知邪結在陽也關脈細小沉緊知邪結在陰也既結於臟而舌上白苔滑又為胸寒外證上下俱病故難治也又臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也注臟結於法當攻無陽證為表無熱不往來寒熱為半表半裡無熱其人反靜為里無熱舌上苔滑者以丹田有熱胸中有寒是表裡皆寒故不可攻蘊要主灸氣海關元穴宜人參三白湯加乾薑寒甚加附子治之緒論曰舌白苔滑者以其仍邪熱內結所以生苔若內無結邪則苔不生矣只因裡氣素虛不能熏熱故無陽證發現以其本虛邪結故為難治非不治也謂不可攻者以飲食如故知邪不在胃也時時自利腸中亦無留結也邪既不在腸胃攻之無益徒伐元氣耳至於素有積痞又加誤下而邪結新舊兩邪相搏不解故死然亦不可概為死證而委之不救也調其陰陽使之相入黃連湯主之有腹痛引脅下不可按者附子瀉心湯素有積痞痛引陰筋者四逆湯加吳茱萸按蘊要治法與緒論治法略有不同而緒論較穩貴在臨病者詳證活法耳要之此皆論傷寒治法也若溫病而見臟結之證一有舌苔便知熱邪內結即酌用神解散大復蘇飲之類清解之亦可與太極丸緩下之庶幾可生狐惑病狐惑者傷寒溫病失於汗下不解所致食少胃虛蟲齧五臟故唇口生瘡蟲食其臟則上唇生瘡為惑蟲食其肛則下唇生瘡為狐謂之狐惑者如狐之猶豫不定也其候齒燥聲啞惡食面目乍赤乍白乍黑舌上苔白唇黑四肢沉重喜眠胃虛蟲食殺人甚速黃連犀角湯主之外用雄黃鋭丸納穀道中百合病百脈一宗舉身皆病無復經絡傳次故曰百合大抵病後虛勞臟腑不調所致其病似寒不寒似熱不熱欲食不食欲臥不臥默默不知苦所在服藥即吐如見鬼狀俱因病在陰則攻陽病在陽則攻陰藥劑乖違故成百合病通宜小柴胡湯加百合知母粳米血熱用百合地黃湯緒論曰百合病即痿證之暴者以肺熱葉焦氣化不行以致小便不利又肺為百脈之總司故通身經絡廢弛百脈一宗舉身皆病宜百合地黃湯蓋取百合之清肅肺氣以利水道則周身之陽火自化耳按此亦傷寒溫病之後證也主客交病凡人向有他病尪羸或久瘧瀉痢或內傷瘀血或吐血便血男子遺精白濁真陰枯涸女子崩漏帶下血枯經閉之類以致肌肉消爍邪火獨存故脈近滑數也此際一著溫病醫家病家見其穀食暴絶更加身痛發熱痞悶不眠指為原病更重誤以絶谷為脾虛以身痛為血虛不眠為神虛遂投參朮歸地茯神酸棗仁之類愈補愈危知者稍以溫病治之發熱稍減不時得醒但治法不得要領病終不解六脈滑數不去肢體時痛胸脅刺痛醫者以雜藥頻試補之則邪火愈熾瀉之則脾胃愈損滋之則邪氣愈固散之則經絡愈虛疏之則精氣愈耗日復一日久之又久伏邪與血脈合為一致彼此膠固脈數身熱不去者邪火與正氣並郁也肢體時痛者邪火與榮血相搏也胸脅刺痛者邪火上結於膈膜也主客交渾最難得解治法當乘其大肉未消真元未敗急用三甲散多有得生者更附加減隨其素而調之婦女傷寒溫病婦女六經治例與男子無異但多兼經候調治為難經行之際用藥必和中兼調血為主如傷寒自氣分傳入血分表證居多用生地四物湯合麻黃湯桂枝湯葛根湯小柴胡湯之類隨證消息之如溫病由血分發出氣分里證居多用神解散小清涼散升降散增損雙解散之類隨證消息之至於傷寒傳裡熱證治法與溫病雖異而大略同否則邪傷衝任而為熱入血室矣若胎前産後又當別論此亦大概言之神明則存乎人耳熱入血室沖為血海即血室也衝脈得熱血必妄行在男子則下血譫語在婦人則月水適來惟陽明病下血譫語兼男子言不僅謂婦人也但以婦人經氣所虛邪得乘虛而入故病熱入血室為多然婦人熱入血室有須治而愈者有不須治而愈者如傷寒論曰婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身冷邪氣內陷表證罷也胸脅下滿如結胸狀譫語者此為熱入血室當刺期門隨其實而瀉之又曰婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之二者是須治而愈者也又曰婦人傷寒發熱經水適來晝則明瞭夜則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈此不須治而愈者也夫胸脅滿如結胸譫語此言適來即斷是邪氣留結於胸脅而不去血結在裡為實證必刺期門隨其實而瀉之不善刺者以小柴胡湯加梔子丹皮歸尾桃仁紅花益母草穿山甲以消之如熱盛神昏但頭汗者加酒大黃微利之以有瘀血故頭汗出也寒熱如瘧發作有時此言經行未盡而適斷雖有結血未為全實以小柴胡湯加丹皮梔子生地歸尾益母草以清之胃不甚虛者二證並去人參二者既有留邪必須治之可也在溫病並宜增損大柴胡湯加歸尾桃仁穿山甲若發熱經水適來晝則明瞭夜則譫語此則經水既來而不斷里無留滯之邪故晝日明瞭但暮夜則譫語俟經盡熱隨血散自愈不可刺期門犯胃氣及用柴胡犯上二焦也在溫病亦宜小柴胡湯去人參加陳皮丹皮梔子黃連益母草以清其熱又婦人傷寒表虛自汗身涼四肢拘急脈沉而遲太陽標病少陰本病經水適斷桂枝加附子紅花湯又婦人傷寒汗解表除熱入血室擾其榮血經水過多不受補益宜芍藥甘草湯和之妊娠妊娠傷寒溫病六經治例皆同但要保胎為主傷寒外感風寒表證居多宜汗宜解宜和不過麻黃桂枝葛根小柴胡等湯合四物湯隨證治之自愈溫病內蘊邪熱里證居多不可發汗急用護胎之法井底泥塗臍至關元干再易之或以青黛伏龍肝為末水調塗之若大熱乾嘔錯語呻吟增損三黃石膏湯清化湯若熱甚躁急胎動不安必須下之慎勿惑於參朮安胎之説奪其裡熱庶免胎墜蓋邪火壅鬱胎自不安轉氣傳血胎胞何賴酌用升降散增損雙解散加味涼膈散或去芒硝以逐去其邪則焰熇頓為清涼氣回而胎自固反見硝黃為安胎之聖藥歷治歷效子母俱安至情至理屢經屢驗眉批若治之不早以致腹痛如椎腰痛如折服藥已無及矣古人所以有懸鐘之喻梁腐而鍾未有不落者在裡證溫病與傷寒治法大略同或曰孕婦而投硝黃設邪熱未逐胎氣先損當如之何余曰不然結糞瘀邪腸胃中事也胎附於脊腸胃之外子宮內事也大黃直入腸胃鬱結一通胎得舒養是興利除害於頃刻之間何慮之有內經曰有故無殞亦無殞也正此之謂此段議論足開後人茅塞矣眉批但毒藥治病衰去七八餘邪自散幸勿過劑凡妊娠若有四損者不可以常法正治當從其損而調之産後同法非其損而誤補必危芒硝有化胎之説不可輕投若至燥實非此不可解救有病當之全無妨礙不必去也産後産後傷寒不可輕汗溫病不可輕下蓋有産時傷力發熱去血過多發熱惡露不行發熱三日蒸乳發熱或起早動勞飲食停滯一皆發熱要在仔細辨之大抵産後氣血空虛若誤汗誤下則亡陽亡陰之禍更難解救凡有發熱且與四物湯歸芎為君最多生地白芍須用酒炒合小柴胡湯加金銀花澤蘭葉益母草少佐乾薑最妙蓋乾薑之辛熱能引血藥入血分能引氣藥入氣分且能去瘀血生新血有陽生陰長之道以熱治熱深合內經之旨如有惡露未盡者黑龍丹必兼用之如有積熱停滯者麻仁丸大柴胡湯必兼用之不可執泥丹溪之説丹溪産後以大補氣血為主雖有他證以本治之固是確論執泥之則誤人矣眉批胃虛食少者必加白朮茯苓痰飲嘔逆者必加陳皮半夏但藥中必主以四物人參乃養血務本滋陰降火之要務也即偶爾傷寒或遭溫病亦須調理血氣為主傷寒內虛外感以大溫中飲理陰煎無汗用麻黃有汗用桂枝等湯頭痛用羌活川芎之類加減治之溫病怫熱內熾用三合湯加減治之最妙如萬不能不下升降散無妨增損雙解散去芒硝黃連加生地川芎尤為對證之藥其餘脈證治法與男子同小兒溫病凡小兒感冒傷風傷寒咳嘔瘧痢等證人所易知至染溫病人多不料亦且難窺所以耽誤者良多且幼科專於痘疹疳積吐瀉驚風並諸雜證在溫病則甚略之一也古人稱幼科為啞科蓋不能盡罄所苦以告醫醫又安得悉乎問切之義所以但知不思乳食心胸膨脹疑其內傷乳食不知其為溫病熱邪在胃也但知嘔吐噁心口乾下利以小兒吐利為常事不知其為溫病協熱下利也但知發熱不知其頭痛身痛也凡此何暇致思為溫病二也小兒神氣嬌怯筋骨柔脆一染溫病延挨失治便多二目上吊不時驚搐肢體發痙甚則角弓反張必延幼科正合渠平日學習見聞之證多誤認為急慢驚風轉治轉劇或將神門眉心亂灸艾火雖微內攻甚急兩陽相搏如火加油死者不可勝紀三也觀此三段議論曲體人情盡致真小兒之福也眉批凡雜氣流行大人小兒所受之邪則一且治法藥餌亦相仿加味太極丸主之升降散亦妙四五歲以下者藥當減半三二歲以下者三分之一可也臨病之工宜酌量焉加味太極丸小兒溫病主方凡治溫病方皆可隨證酌用白殭蠶二錢酒炒全蟬蛻去土一錢廣薑黃三分川大黃四錢天竺黃一錢膽星一錢冰片一分上七味稱準為細末糯米濃湯和丸如芡實大冷黃酒和蜜泡化一丸冷服薄荷熬酒亦可本方去天竺黃膽星冰片即升降散煉蜜丸即太極丸是也用之便而且嘉看證消息治之復病凡瘥後無故復發熱者以伏邪未盡也謂之自復當問前得某證所復某證稍與前藥以撤其餘邪自然獲愈有溫病瘥後或三五六日反腹痛裡急者非前病原也此別有伏邪所發欲作滯下邪盡痢止不止者宜當歸導滯湯又有溫病瘥後脈遲細而弱或黎明或半夜後便作瀉泄此命門真陽不足也宜腎氣丸或右歸丸作湯劑服亦可傷寒論曰傷寒瘥後更發熱者小柴胡湯主之脈浮者以汗解之枳實梔子豉湯脈沉者以下解之枳實梔子豉湯加大黃又曰傷寒瘥後虛羸少氣氣逆欲吐者竹葉石膏湯主之又曰大病瘥後從腰以下有水氣者牡蠣澤瀉散主之按如氣復雖通身浮腫似水氣而不喘別無所苦與水氣不同丹溪云氣易有餘又云血者難成而易敗大病愈後氣先血而復血不足以配氣故暫浮腫靜養自愈須辨之又曰大病瘥後喜唾久不了了者胃上有寒飲也理中丸主之夫傷寒自外傳內邪在陽分居多瘥後易於復元復病尚少溫病邪熱自內達外血分大為虧損無故最善反復如到熱退身涼飲食能進時服太平圓酒三次十日之間精血漸充而病如洗何至勞復若因梳洗沐浴多言妄動遂至發熱前病復起惟脈不沉實為辨此為勞復傷寒論曰大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃少許此破結除煩散熱之妙劑也加大黃則又推蕩經滯矣余謂氣為火之舟楫今則真氣方長勞而復折真氣既虧火亦不前如人欲濟舟楫已壞其能濟乎是火也某經氣陷火隨陷於某經陷於經絡則表熱陷於臟腑則裡熱虛甚熱甚虛微熱微輕則靜養可愈重則大補氣血俟真氣一回則血脈融和表裡通暢所陷之火隨氣轉輸自然熱退而病痊矣若直用寒涼剝削之劑變證蜂起矣傷寒多傷氣宜五福飲大營煎之類溫病多傷血宜補陰益氣煎六味地黃丸料之類隨證加減之若因飲食所傷或吞酸飽悶而發熱者此為食復輕則梔子厚朴湯加神麯或小柴胡湯合梔子厚朴湯重則神昏譫語腹滿堅痛欲吐不得欲下不能此危候也以升降散大柴胡湯黃龍湯涼膈散之類酌量與服有病則病當之亦無妨也大抵復病治法溫病與傷寒大同小異貴在臨證活法耳內經帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故也若此者皆已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺也帝曰治遺奈何岐伯曰視其虛實調其逆從可使必已也帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也吳又可曰里證下後稍差而急欲食者此非得已以伏邪初散陰火乘虛擾亂故也慎勿便與粥食只宜先進稀糊次進濃者須少與之不可任意過食過食則復此一著最為緊要世多忽之至於怒氣病復房勞病復者乃度量褊淺不自貴重之輩觀其脈證隨證救之更有嬌養成性過於謹慎之輩或傷寒表證方解或溫病里證方退原不甚虛輒用參附溫補是因補而復以致不救者又不知凡幾病家醫家尤當深醒大抵治病之法不可執一總要脈證的確耳古方未有不善者偏於溫補而死與偏於清瀉而死其失等也人之一身陰陽血氣寒熱表裡虛實盡之臨證者果能望聞問切適得病情則溫清補瀉自中病情矣何得鹵莽粗疏草菅人命哉噫難矣按以上證候七十餘條俱從傷寒論中駁出溫病證治之異來令閲者瞭然於心不以溫病為傷寒不以傷寒方治溫病則患溫者自以不冤矣但有輕者有重者有最重者到底無陰證與傷寒外感不同並非六氣為病也亦雜氣中之一耳始則發熱頭痛身痛舌上白苔漸加煩躁渴飲水漿或發熱而兼凜凜或先凜凜而後發熱或晝夜純熱或潮熱或往來寒熱或眩暈或嘔吐或痰涎湧盛或嘔汁如血或口舌乾燥或咽喉腫痛或咳嗽膿血或喘厄吐蛔或心腹痞滿或胸脅脹痛或大便不通或小水自利或前後癃閉或協熱下痢或熱結旁流或下血如豚肝或如膠黏或水泄無度有舌黃苔黑苔者有舌裂者有舌生芒刺者有舌色紫赤者有唇崩者有唇黑者有鼻孔如煙煤之黑者有目暗不明目赤目黃目瞑目直視目反折者有頭汗盜汗自汗者有手足心腋下汗者有耳聾不聞聲者有頭腫大如斗者有喉痹頸腫滴水不能下咽者有發狂如癲如癇者有哭笑無常如醉如癡者有棄衣登高逾垣上屋者有厥逆身冷如冰者有譫語晝夜不眠者有昏迷不省人事者有詈罵不避親疏者有蓄血吐血衄血毛孔血目血舌血齒縫血大小便血者有發黃者有發斑者有發疹者有斑疹雜出者有發頤疙瘩瘡者有渾身火泡瘡帶白漿者有首尾能食者有絶谷一月不死者有無故最善反復者有愈後漸加飲食如常者有愈後飲食勝常二三倍者有愈後耳聾眼花者有愈後退爪脫皮落髮者至其惡狀甚有口噤不能張腿屈不能伸唇口不住牽動手足不住振戰遺尿遺糞圓睜口張咬牙嚼舌聲啞不語舌伸外攪沫如水浪項強發痙手足反張肉瞤筋惕骨痿足重舌卷囊縮循衣摸床見神見鬼凡此怪怪奇奇不可名狀等證有相兼三五條者有相兼十數條者不可枚舉總因血氣虛實之不同臟腑稟賦之有異其受邪則一而已及邪盡一任諸證如失所云知其一萬事畢知其要者一言而終不知其要者流散無窮所以溫病無多方也然而陰陽乘除寒熱倚伏表裡參錯虛實循環見之真而守之定通乎權而達乎變者蓋幾希矣又按古人謂望聞問切乃臨證之首務診治之要領也明此四者則六變具存而萬病情形俱在吾目中矣醫之為難難在不識病本而誤治耳誤則殺人天道可畏不誤則濟人陰功無窮學者欲明是道必須先察此要以定意見以為階梯然後再採群書廣其知識熟之胸中運之掌上非止為人而為己不淺也慎之寶之又按傷寒自外之內先傷氣分溫病由內達外先傷血分故傷寒初感利用發表溫病初發利用攻裡傷寒後證多補氣溫病後證多養血溫病與傷寒實出兩門自晉迄今溫病失傳無人不以溫病為傷寒無人不以傷寒方治溫病動云先解其表乃攻其里此仲景傷寒論也所以溫病一二日內遇陽明腹脹滿痛之證少陰口燥咽乾之證厥陰舌卷囊縮之證再不敢議下明知厥深熱深之陽證下之已遲萬一僥幸不過為焦頭爛額之客千餘年來孰任殺人之辜耶又按古今醫書非不有溫病之條然皆編入於傷寒之中議論無非傷寒所用之藥雖曰治溫病實治傷寒之的方也余謂此等方論但治傷寒未嘗不驗若謬以治傷寒之方而治春夏之溫病是猶抱薪投火蓋溫病自內達外雖有表證實無表邪終有得汗而解者必裡熱清而汗始出前一節治法與傷寒不同本朝陳良佐曰春分後秋分前一百八十二日半諸病皆不可發汗汗之多亡陽矣溫病尤忌凡治正傷寒發汗解表溫中散寒之藥一概禁用今特摘其尤者如麻黃桂枝羌活獨活白芷葛根細辛浮萍蒼耳蒼朮艾葉胡椒故紙茴香肉桂附子乾薑豆蔻益智等味古人亦未曾道破余深體驗而知其不可以溫病無風寒與陰證也但今醫家病家未有不以溫病為傷寒者未有不以傷寒方治溫病者此固風氣之使然亦習俗之舊染也舌敝唇促難以遍諭須知生死有命誤犯禁藥不過輕重之分苟從死後而追悔前方愚矣又按仲景傷寒論用參薑桂附者八十有奇而溫病非所論也伏邪內郁陽氣不得宣布積陽為火陰血每為熱搏未解之前麻黃桂枝不可沾唇暴解之後余焰尚在陰血未復最忌參薑桂附得之反助其壅鬱餘邪伏留不惟目下淹纏日後必變生異證或周身痛痹或四肢拘攣或流火結痰或兩腿鑽痛或勞嗽湧痰或毒氣流注或痰核穿漏皆驟補之為害也大抵溫病愈後調理之劑投之不當莫若靜養節飲食為第一而慎言語謹起居戒氣惱寡嗜欲皆病後所宜留神也聖賢養身養德之學亦不過是不意於醫學中得之眉批長沙傷寒論天苞地符為衆法之宗群方之祖雜以後人知見反為塵飯土羹莫適於用茲以自然之理引伸觸類闡發神明溫病一證另闢手眼卻不於長沙論外旁溢一辭後有作者不為冥索旁趨得以隨施輒效其利溥哉文之悲壯淋漓無論也畏齋
