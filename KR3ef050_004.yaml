body:
  text: 卷四醫方辨醫方辨引作方圓必以規矩治病證必以古方固也但古方今病焉能盡合是以羅太無曰以古方治今病正如拆舊屋湊新屋其材木非一必再經匠氏之手故用方者不貴明其所當然要貴明其所以然則或增或損或奇方或偶方或合方或以內傷方治外感或以外感方治內傷信手拈來頭頭是道許學士云讀仲景之書用仲景之法未嘗執仲景之方乃為得仲景之心也若不明其所以然而徒執其方如經生家不能搦管作文乃記誦先輩程文以計場屋題目之必中奚可哉是集諸方人所易曉者止録其方其涉疑難及理趣深奧者頗採明理論醫方考名醫方論等書以闡明之間附一得之見誠能潛心於此處方其無誤乎抑又有慮焉仲景傷寒論曰病當汗解診其尺脈澀先與黃耆建中湯補之然後汗之先賢慎於用汗藥如此則吐藥下藥可知矣故凡用方者雖方與病合又在診脈並察兼證以詳辨其虛實或汗或吐或下方為盡善若遇老人虛人血氣陰陽四損者寧可顧護元氣而不可輕用汗吐下之重劑也麻黃附子細辛湯傷寒論曰少陰病脈微細但欲寐始得之反發熱太陽表熱脈沉者少陰裡寒此方主之麻黃去節附子炮細辛各二錢水煎麻黃去沫次入附子細辛煎服病發於陰者當無熱今少陰始病何以反發熱此乃太陽少陰之兩感病也蓋太陽膀胱與少陰腎相為表裡寒邪感於少陰故里有脈沉由絡達於太陽故表有發熱有太陽之表熱故用麻黃以發汗有少陰之裡寒故用附子細辛以溫中三陰之表發與三陽不同三陰必以溫經之藥為表故麻黃附子同用方是少陰表發之正也按傷寒病兩感者亦少此即太陽少陰之兩感也麻黃附子同劑治法委實奇特學者引伸觸類可應無窮之變矣且傷寒兩感麻黃附子細辛湯主之此仲景傷寒兩感之冶法溫病兩感雙解散主之此河間補仲景溫病兩感之治法此二方者乃辨溫病與傷寒發表攻裡兩感異治之要訣也此論僅見真出人頭地矣傷寒溫病分門另治從此得解眉批世之以溫病為傷寒以傷寒方治溫病者觀此能勿悔心乎升降散溫病亦雜氣中之一也表裡三焦大熱其證治不可名狀者此方主之如頭痛眩運胸膈脹悶心腹疼痛嘔噦吐食者如內燒作渴上吐下瀉身不發熱者如憎寒壯熱一身骨節痠痛飲水無度者如四肢厥冷身涼如冰而氣噴如火煩躁不寧者如身熱如火煩渴引飲頭面猝腫其大如斗者如咽喉腫痛痰涎壅盛滴水不能下咽者如遍身紅腫發塊如瘤者如斑疹雜出有似丹毒風瘡者如胸高脅起脹痛嘔如血汁者如血從口鼻出或目出或牙縫出毛孔出者如血從大便出甚如爛瓜肉屋漏水者如小便澀淋加血滴點作疼不可忍者如小便不通大便火瀉無度腹痛腸鳴如雷者如便清瀉白足重難移者如肉瞤筋惕者如舌卷囊縮者如舌出寸許絞擾不住音聲不出者如譫語狂亂不省人事如醉如癡者如頭疼如破腰痛如折滿面紅腫目不能開者如熱盛神昏形如醉人哭笑無常目不能閉者如手舞足蹈見神見鬼似風癲狂祟者如誤服發汗之藥變為亡陽之證而發狂叫跳或昏不識人者外證不同受邪則一凡未曾服過他藥者無論十日半月一月但服此散無不輒效白殭蠶酒炒二錢全蟬蛻去土一錢廣薑黃去皮三分川大黃生四錢稱准上為細末合研勻病輕者分四次服每服重一錢八分二釐五毫用黃酒一盅蜂蜜五錢調勻冷服中病即止病重者分三次服每服重二錢四分三釐三毫黃酒盅半蜜七錢五分調勻冷服最重者分二次服每服重三錢六分五釐黃酒二盅蜜一兩調勻冷服一時無黃酒稀熬酒亦可斷不可用蒸酒胎産亦不忌煉蜜丸名太極丸服法同前輕重分服用蜜酒調勻送下按溫病總計十五方輕則清之神解散清化湯芳香飲大小清涼散大小復蘇飲增損三黃石膏湯八方重則瀉之增損大柴胡湯增損雙解散加味涼膈散加味六一順氣湯增損普濟消毒飲解毒承氣湯六方而升降散其總方也輕重皆可酌用察證切脈斟酌得宜病之變化治病之隨機應變又不可執方耳按處方必有君臣佐使而又兼引導此良工之大法也是方以殭蠶為君蟬蛻為臣薑黃為佐大黃為使米酒為引蜂蜜為導六法俱備而方乃成竊嘗考諸本草而知殭蠶味辛苦氣薄喜燥惡濕得天地清化之氣輕浮而升陽中之陽故能勝風除濕清熱解鬱從治膀胱相火引清氣上朝於口散逆濁結滯之痰也其性屬火兼土與木老得金水之化僵而不腐溫病火炎土燥焚木爍金得秋分之金氣而自衰故能闢一切怫鬱之邪氣夫蠶必三眠三起眠者病也合簿皆病而皆不食也起者愈也合簿皆愈而皆能食也用此而治閣家之溫病所謂因其氣相感而以意使之者也故為君夫蟬氣寒無毒味鹹且甘為清虛之品出糞土之中處極高之上自感風露而已吸風得清陽之真氣所以能祛風而勝濕飲露得太陰之精華所以能滌熱而解毒也蛻者退也蓋欲使人退去其病亦如蟬之蛻然無恙也亦所謂因其氣相感而以意使之者也故為臣薑黃氣味辛苦大寒無毒蠻人生啖喜其祛邪伐惡行氣散郁能入心脾二經建功闢疫故為佐大黃味苦大寒無毒上下通行蓋亢甚之陽非此莫抑苦能瀉火苦能補虛一舉而兩得之人但知建良將之大勳而不知有良相之碩德也故為使米酒性大熱味辛苦而甘令飲冷酒欲其行遲傳化以漸上行頭面下達足膝外周毛孔內通臟腑經絡驅逐邪氣無處不到如物在高巔必奮飛沖舉以取之物在遠方及深奧之處更必迅奔探索以取之且喜其和血養氣伐邪辟惡仍是華他舊法亦屠蘇之義也故為引蜂蜜甘平無毒其性大涼主治丹毒斑疹腹內留熱嘔吐便祕欲其清熱潤燥而自散溫毒也故為導蓋蠶食而不飲有大便無小便以清化而升陽蟬飲而不食有小便無大便以清虛而散火君明臣良治化出焉薑黃辟邪而靖疫大黃定亂以致治佐使同心功績建焉酒引之使上行蜜潤之使下導引導協力遠近通焉補瀉兼行無偏勝之弊寒熱並用得時中之宜所謂天有覆物之功人有代覆之能其洵然哉是方不知始自何氏二分晰義改分兩變服法名為賠賑散用治溫病服者皆愈以為當隨賑濟而賠之也豫更其名曰升降散蓋取殭蠶蟬蛻升陽中之清陽薑黃大黃降陰中之濁陰一升一降內外通和而雜氣之流毒頓消矣又名太極丸以太極本無極用治雜氣無聲無臭之病也乙亥丙子丁丑吾邑連歉溫氣盛行死者枕藉豫用此散救大證怪證壞證危證得愈者十數人余無算更將此方傳施親友貼示集市全活甚衆可與河間雙解散並駕齊驅耳名曰升降亦雙解之別名也麻黃湯太陽傷寒寒傷榮頭痛太陽脈上巔絡腦發熱表氣不通身痛腰痛寒凝血澀其脈抵腰骨節痛腎主骨而寒氣注之惡寒衛弱之故無汗榮強之故而喘寒阻氣道故喘脈浮緊者寒性堅急之故此方主之麻黃去節三錢桂枝二錢甘草炙一錢杏仁一錢八分水煎麻黃去沫次入群藥煎服覆取微汗足太陽經起目內眥循頭巔腰膕故所過痛而不利寒邪外束人身之陽不得宣越故令發熱寒邪在表不復任寒故令惡寒寒主閉塞故令無汗人身之陽既不得宣越於外則必壅遏於內故必作喘寒邪剛徑故令脈緊麻黃辛溫散寒故為君佐以桂枝取其解肌佐以杏仁取其利氣入甘草者亦辛甘發散之意抑太陽無汗麻黃之用固也若不量人品之虛實時令之寒暄則又有汗多亡陽之戒汗多者宜撲粉亡陽者宜附子湯大抵麻黃性熱惟冬月正傷寒無汗者宜之若溫病斷不可用抑不獨溫病也若傷寒脈微弱而誤用之汗出不止或將病人頭髮披水盆中再將糯米八兩炒研龍骨牡蠣藁本防風各二兩研為末合勻周身撲之此良方也汗出不止汗多也與亡陽不同桂枝湯太陽中風風傷衛頭痛發熱風邪鬱蒸汗出玄府疏也惡風衛虛不勝風也脈緩者風性柔和之故此方主之桂枝三錢白芍三錢甘草二錢生薑三錢大棗三枚水煎溫服覆取微汗不可令如水流漓病必不除風之傷人也頭先受之故令頭痛風為陽氣亦為陽同類相從則傷衛衛氣傷則無以固津液故令汗出其惡風者衛氣不能衛也其脈緩者衛氣不能鼓也桂枝味辛甘辛則能解肌甘則能實表辛甘發散為陽故用以治風為君然恐其走泄陰氣故用芍藥之酸以收之佐以甘草生薑大棗此發表而兼和里之意然桂枝本為解肌若脈浮緊發熱汗不出者不可與也與之則表益實而汗益難出也故伸之以常須識此勿令誤也大抵桂枝性熱惟冬月正傷寒有汗者宜之若溫病斷不可用酒客亦不可用抑不獨溫病酒客也凡服桂枝湯作嘔者以胃熱而服熱藥兩熱相搏故也大青龍湯太陽中風脈浮緊以中風而得緊脈知為風寒兩傷也頭痛發熱惡寒身痛皆表證也不汗出寒邪鬱於腠理而煩躁風作煩寒作躁此方主之麻黃四錢桂枝二錢甘草炙二錢杏仁泡去皮尖十枚石膏八錢生薑三錢大棗一枚水煎麻黃去沫入群藥煎服覆取汗愈若脈微弱汗出惡風者不可服青龍者東方甲乙木神也主發育萬物方以發散為義故名之仲景曰太陽傷寒治以麻黃湯太陽中風治以桂枝湯傷寒太陽證見風脈是有頭痛發熱無汗惡寒但脈來不緊而緩為傷寒且中風矣與中風脈得浮緊一也故二方並而用之邪氣外盛人身之陽郁為內熱此石膏之所以加也大青龍其發表之重劑乎而亡陽狂躁之弊筋惕肉瞤之害則用青龍之過者也急以真武湯大溫大補之又仲景救壞之良方也許學士曰大青龍一證尤難用藥須是脈證諦當然後可行故王實夫證止用桂枝麻黃各半湯蓋慎之也按亡陽惕瞤之弊原因脈微弱誤用者之過非大青龍之過也小青龍湯傷寒脈浮緩表不解風寒在表心下有水氣水飲搏膈嘔噦發熱而咳水飲上射或渴津液不行或利停飲下溜或噎水寒相擊或小便不利太陽裡氣不化小腹滿小水隔澀或喘者水飲射肺此方主之麻黃二錢桂枝二錢白芍二錢半夏二錢四分五味子一錢細辛一錢乾薑一錢甘草炙一錢水煎溫服若渴者去半夏加天花粉二錢若微利者去麻黃加蕘花茯苓如雞子大若噎者去麻黃加附子五分炮若喘者去麻黃加杏仁十枚若小便不利小腹滿去麻黃加白茯苓二錢按原文加蕘花如雞子大此必傳寫之訛考本草蕘花是芫花類也每用之攻水五分可令人下十數行豈有治停飲之微利用雞子大之蕘花者乎照原方當改加茯苓如雞子大柯韻伯曰發熱而咳知內有水氣射肺乾嘔知水氣未入於胃而在心下也心下為火位水火相射則水氣之變幻不可拘如下而不上則或渴或利上而不下則或噎或喘留於腸胃則小便不利而小腹因滿矣惟心下有水氣嘔噦發熱而咳為定證故於桂枝湯中去大棗之泥加麻黃以開腠理細辛逐水氣半夏除嘔噦五味乾薑以除咳若渴者是心火盛故去半夏之燥熱加天花粉以生津若利與噎小便不利與喘者乃病機偏於向里故去麻黃之發表加附子以除噎加芫花茯苓以利水加杏仁以定喘耳兩青龍湯皆治有表裡證皆用兩解法但大青龍證是裡熱小青龍證是裡寒故發表之藥相同而治里之藥則殊也此與五苓散同為治表不解而心下有水氣者在五苓治水之蓄而不行故大利其水而微發其汗是水鬱折之也小青龍治水之動而不拘故備舉辛溫以散水並用酸苦以安肺培其化源也細繹仲景發表利水諸論精義入神矣又曰麻黃桂枝大青龍三表證中仲景即分表裡之不同溫清之殊治麻黃湯證熱全在表桂枝湯證之自汗大青龍湯證之煩躁皆兼裡熱於表劑中便加寒藥以清裡自汗是煩之兆躁是煩之徵汗出則煩得泄故不躁桂枝湯加微寒酸苦之芍藥以和之汗不出則煩不得泄故躁大青龍湯加大寒堅重之石膏以清之芍與膏本是里藥今人見仲景於表劑中入之因疑而畏焉當用不用以致熱結陽明而斑黃狂亂紛出矣仲景於太陽經中即用石膏以清胃火是預保陽明之先著用薑棗以培中氣又慮夫轉屬太陰苦心良法有如此者又曰桂枝湯為一百一十三方之冠乃滋陰和陽調理榮衛解肌發汗之第一方也世人咸謂桂枝止汗不知先輩言無汗不得用桂枝者正以桂枝湯中有芍藥之酸寒益陰斂血能止汗故也先輩云有汗不得用麻黃是言麻黃湯也無汗不得用桂枝是言桂枝湯也非言麻黃桂枝二藥味也須知之眉批其實芍藥功在止煩煩止汗亦止故反煩更煩與心悸而煩者咸賴之要知桂枝湯治表虛能解肌以發榮中之汗而不能開皮毛之竅以發衛分之汗故汗不出脈浮緊者是麻黃湯證即不得與桂枝湯矣庸工妄謂桂枝湯專治中風不治傷寒不知此湯凡中風傷寒脈浮弱而表不解者以及自汗盜汗虛瘧虛痢柔痙瘛瘲小兒慢驚等證皆隨手而效因知仲景一方可通百病後人一證便集百方以眩人豈不陋哉黃芩湯太陽少陽合病必自下利者此方主之黃芩五錢白芍五錢甘草炙三錢大棗三枚水煎溫服太陽少陽合病者身熱頭痛脊強而又脅痛耳聾寒熱嘔而口苦也必自下利者表實裡虛邪熱漸攻於裡也若太陽與陽明合病為在表當與葛根湯發汗若陽明與少陽合病為在裡當與大柴胡湯下之此太陽少陽合病下利非汗下所宜故與黃芩湯蓋虛而不實者苦以堅之酸以收之故用黃芩白芍以堅斂腸胃弱而不實者甘以補之故用甘草大棗以補益腸胃也溫病始發即可用黃芩湯以去邪熱為妙傷寒必傳至少陽邪熱漸次入里方可用黃芩佐柴胡以和解之此辨溫病與傷寒異治之要訣也白虎湯傷寒論曰陽明傷寒脈浮滑此以表有熱里有寒熱此方主之按里有寒句之寒字當是熱字若是寒字非白虎湯證也宜改之或曰此寒字當作寒鬱為熱之寒石膏生八錢知母三錢甘草生一錢半粳米二錢竹葉三十片水煎冷服加人參一錢五分名白虎加人參湯白虎西方庚辛金神也五行之理成功者退如秋金之令行則夏火之炎息名曰白虎所以行清肅之令而除熱也按白虎湯乃溫病主方也雖為陽明解利之藥實解胃本內蒸之熱非徒治在經之熱也以邪熱傷胃所以必需若在經之熱自有葛根湯等方治法並無借於白虎也所以溫病誤用麻黃桂枝傷寒誤用白虎黃芩輕者必重重者必危設熱鬱胃裡已成燥結而徒用白虎既無逐結無能且以剛悍而伐胃氣反抑邪氣內郁致脈不行因而沉伏微細便謂陰脈益不敢議下日惟雜進白虎解毒以為穩妥愈投愈危至死不悟此承氣涼膈之所以必需也明者自知之又按以石膏一物之微入甘溫隊中則為青龍從清涼同氣則為白虎設傷寒在表之風寒未除當用青龍而反用白虎溫病在裡之熱渴已逼當用白虎而反用青龍則用者之誤不小熱結在裡白虎以匡青龍之不逮誤犯少陰真武以救青龍之妄投神乎其神矣大承氣湯陽明病痞滿燥實譫語煩渴腹痛便祕此方主之大黃酒浸四錢芒硝二錢厚朴姜炒四錢枳實麩炒二錢水煎溫服病有宜加倍者仲景原方大黃厚朴各四兩芒硝枳實各二兩分三服大黃蕩熱斬關破實於腸胃芒硝潤結軟堅化燥於肛門厚朴導滯節制硝黃之太寒枳實瀉滿輔佐厚朴之下氣小承氣湯陽明病心腹脹滿潮熱狂言而喘此方主之大黃酒浸三錢厚朴二錢枳實一錢水煎溫服調胃承氣湯陽明病不惡寒反惡熱大便祕譫語此方主之大黃酒浸三錢芒硝三錢甘草炙二錢水煎溫服王海藏曰仲景三承氣有大小調胃之殊今人不分大小上下緩急用之豈不失立方本意哉大熱大實用大承氣小熱小實用小承氣胃實燥結用調胃承氣以甘草緩其下行而祛胃熱也若病大用小則邪氣不伏病小用大則過傷元氣病在上而瀉下則上熱不清病在下而瀉上則下熱不除用方者豈可一概混施乎喻嘉言曰傷寒陽明篇總是以外證之解與不解氣之轉與不轉臍腹之痛與不痛脈之弱與不弱汗出之多與不多小便之利與不利邪熱之熾與不熾津液之干與不幹而辨腹中燥屎多與不多溏與不溏以消息微下之法故惟手足濈然汗出大便已硬者主之以大承氣湯焉其他一則曰宜用導法再則曰不可攻之再則曰少與小承氣湯再則曰明日再與一升再則曰宜大承氣湯全是商量治法聽人臨時斟酌以祈無誤所以不用主之二字此等處關係安危最大蓋熱邪入胃不以苦寒攻之則胃傷然寒藥本以救胃也不及則藥不勝邪太過則藥反傷正況不勝其邪必盡傷其正徒傷其正未心盡去其邪仲景所以諄諄於二者之間者恐傷寒里未實也按傷寒裡實方下溫病熱勝即下其治法亦無大異但傷寒其邪在表自氣分而傳入血分下不厭遲溫病其邪在裡由血分而發出氣分下不厭早溫病下不厭早一語發從來所未發眉批其證不必悉具但見舌黃嘔渴痞燥滿痛一二證便於升降增損雙解加味涼膈加味六一解毒承氣等方酌度病情上下輕重緩急下之以撤其邪毒無不獲效大凡溫病邪熱內熾貴乎早治乘人血氣未亂肌肉未消津液未耗病人不至危殆投劑不至掣肘下後亦易平復欲為萬全之策者不過知邪熱之所在早拔去病根為要耳但要量人之壯弱度邪之輕重察病之緩急然後用藥不至空投投藥無太過不及之弊此說情理兼到淋漓痛快讀至此心曠神怡眉批是以仲景治傷寒自大柴胡以下立三承氣多與少與自有上下輕重緩急之殊若溫病勿拘傷寒下不厭遲之說如應下之證見下無結糞則以為下之早或以為不應下之證紛紛聚訟殊不知仲景立三承氣本為逐邪而設非專為結糞而設也必俟其糞結而後下之則血液為邪熱所搏變證迭起是猶養虎遺患也況多有溏糞失下但蒸作極臭如敗醬如藕泥至死不結者倘酌用前方穢惡一下邪熱自此而消脈證自此而退豈徒孜孜糞結而後行哉假如久病精枯血燥之人或老人血液衰竭多主燥結或病後血氣未復亦多燥結在經所云不更衣十日無所苦有何妨害是燥結不至損人熱毒之為殞命也此辨溫病與傷寒下遲下早異治之要訣也千古不磨之論從何處得來眉批大柴胡湯傷寒陽邪入里表證未罷而里證又急者此方主之柴胡四錢半夏薑汁炒一錢半黃芩二錢白芍一錢枳實麩炒一錢大黃酒浸二錢生薑二錢大棗一枚水煎溫服表證未罷寒熱脅痛口苦而嘔尚在也里證又急大便難而燥實也有表證故用柴芩以解表有里證故用枳黃以攻裡白芍能和少陽半夏能止嘔逆薑棗又所以和中而調衛榮也少陽病六七日至十餘日大便不行脅下濈然汗出方可用大柴胡湯微利之緣膽無出入瀉土所以瀉木也如脅下無汗為膽未實設誤下之必犯少陽之本則胸滿煩驚小便不利譫語一身盡重不可轉側又宜用柴胡龍骨牡蠣湯柴胡四錢半夏三錢茯苓二錢人參一錢龍骨錢半牡蠣錢半桂枝錢半鉛丹錢半大黃二錢生薑錢半大棗一枚水煎將成方入大黃煎一二沸不欲味全而傷中氣去渣溫服薛氏去鉛丹加黃連黃芩當歸各一錢半鉛丹即黃丹也按大柴胡湯本為里證已急而表證未罷者設若用以治溫病最為穩妥雙解散荊防以解表硝黃以攻裡為雙解之重劑大柴胡柴芩以解表枳黃以和里為雙解之輕劑若內熱甚者合黃連解毒湯或白虎湯以治老弱人及氣血兩虛人之溫病尤為適宜豫去半夏加陳皮合黃連解毒湯升降散名增損大柴胡湯用之纍驗增損大柴胡湯溫病熱鬱腠理以辛涼解散不至還里而成可攻之證此方主之乃內外雙解之劑也柴胡四錢薄荷二錢陳皮一錢黃芩二錢黃連一錢黃柏一錢梔子一錢白芍一錢枳實一錢大黃二錢廣薑黃七分白殭蠶酒炒三錢全蟬蛻十個嘔加生薑二錢水煎去渣入冷黃酒一兩蜜五錢和勻冷服雙解散傷寒溫病表裡實熱此方主之此河間原方也防風荊芥薄荷麻黃當歸川芎白芍白朮土炒連翹去心梔子大黃酒浸芒硝各五分桔梗一錢黃芩一錢石膏四錢滑石三錢甘草二錢水煎溫服防風麻黃以解表薄荷荊芥以清上大黃芒硝以滌腸胃滑石梔子以利水道桔梗石膏以清肺胃之邪而連翹又所以祛諸經之遊火風熱為患肝木主之芎歸白芍和肝血以熄風熱而白朮甘草又所以建運脾土能勝濕熱御風火故也方中倍用六一者以伏氣所蒸之濕熱半從肌表而泄半從水道而利也按此乃河間舊解耳豫謂麻黃性大熱冬時正傷寒發汗之要藥也溫病乃雜氣中之一也斷無正發汗之理於法為大忌即河間亦未言及不如易殭蠶蟬蛻得天地清化之氣以滌疫氣散結行經升陽解毒且鬱熱伏於五內傷損正氣脹悶不快川芎香竄走泄真元白朮氣浮填塞胃口皆非溫病所宜不如易黃連薑黃辟邪除惡佐歸芍涼血散郁以退蒸則心肝和而風火自熄矣因名增損雙解散增損雙解散溫病主方溫毒流注無所不至上干則頭痛目眩耳聾下流則腰痛足腫注於皮膚則斑疹瘡瘍壅於腸胃則毒利膿血傷於陽明則腮臉腫痛結於太陰則腹滿嘔吐結於少陰則喉痹咽痛結於厥陰則舌卷囊縮此方解散陰陽內外之毒無所不至矣白殭蠶酒炒三錢全蟬蛻十二枚廣薑黃七分防風一錢薄荷葉一錢荊芥穗一錢當歸一錢白芍一錢黃連一錢連翹去心一錢梔子一錢黃芩二錢桔梗二錢石膏六錢滑石三錢甘草一錢大黃酒浸二錢芒硝二錢水煎去渣沖芒硝入蜜三匙黃酒半酒杯和勻冷服按溫病本末身涼不渴小便不赤脈不洪數者未之有也河間以傷寒為雜病溫病為大病特立雙解散以兩解溫病表裡之熱毒以發明溫病與傷寒異治之祕奧其見高出千古深得長沙不傳之祕且長沙以兩感為不治之證傷寒病兩感者亦少一部傷寒論僅見麻黃附子細辛湯一證惟溫病居多以溫病咸從三陰發出三陽乃邪熱亢極之證即是兩感惜長沙溫病方論散佚不傳幸存刺五十九穴一法惟河間雙解散解鬱散結清熱導滯可以救之必要以雙解為第一方信然豫加減數味以治溫病較原方尤覺大驗戊寅四月商邑貢生劉兆平年八旬患溫病表裡大熱氣噴如火舌黃口燥譫語發狂脈洪長滑數豫用原方治之大汗不止舉家驚惶急易大復蘇飲一服汗止但本證未退改制增損雙解散方兩劑而病痊因悟麻黃春夏不可輕用因悟古方今病不可過執也所以許學士有云讀仲景之書學仲景之法不可執仲景之方乃為得仲景之心也旨哉斯言河間雙解三黃俱用麻黃仍是牽引叔和舊說蓋溫病熱鬱自里達表亦宜解散但以辛涼為妙涼膈散傷寒溫病火鬱上焦大熱面赤舌黃唇焦者此方主之此河間原方也連翹二錢黃芩二錢梔子二錢薄荷二錢大黃酒浸芒硝各三錢甘草生一錢竹葉三十片水煎去渣入蜜冷服加味涼膈散溫病主方余治溫病雙解涼膈愈者不計其數若病大頭瓜瓤等溫危在旦夕數年來以二方救活者屈指以算百十餘人真神方也其共珍之白殭蠶酒炒三錢蟬蛻全十二枚廣薑黃七分黃連二錢黃芩二錢梔子二錢連翹去心薄荷大黃芒硝各三錢甘草一錢竹葉三十片水煎去渣沖芒硝入蜜酒冷服若欲下之量加硝黃胸中熱加麥冬心下痞加枳實嘔渴加石膏小便赤數加滑石滿加枳實厚朴連翹荷竹味薄而升浮瀉火於上芩連梔姜味苦而無氣瀉火於中大黃芒硝味厚而鹹寒瀉火於下殭蠶蟬蛻以清化之品滌疵癘之氣以解溫毒用甘草者取其性緩而和中也加蜜酒者取其引上而導下也三黃石青湯傷寒溫病大熱神昏兩目如火身如塗朱燥渴欲死脈洪長滑數者此方主之此河間原方也石膏四錢豆豉二錢麻黃錢半黃連一錢黃芩一錢梔子一錢黃柏一錢水煎冷服傷寒表裡大熱欲攻其里則表證未解欲發其表則里證又急庸工不識趑趄不能下手待斃而已殊不知熱在三焦閉澀經絡津液枯涸榮衛不通遂成此證用解毒石膏以清裡熱麻黃豆豉以散表熱內外之邪俱燼矣增損三黃石膏湯溫病主方表裡三焦大熱五心煩熱兩目如火鼻乾面赤舌黃唇焦身如塗朱燥渴引飲神昏譫語服之皆愈石膏八錢白殭蠶酒炒三錢蟬蛻十個薄荷二錢豆豉三錢黃連黃柏鹽水微炒黃芩梔子知母各二錢水煎去渣入米酒蜜冷服腹脹疼或燥結加大黃寒能制熱故用白虎湯苦能下熱故用解毒湯佐以荷豉蠶蟬之辛散升浮者以溫病熱毒至深表裡俱實揚之則越降之則鬱鬱則邪火猶存兼之以發揚則炎炎之勢皆燼矣此內外分消其勢猶兵之分擊者也熱鬱腠理先見表證為尤宜理中湯加炮附子一錢名附子理中湯厥逆自利不渴而嘔腹痛鴨溏此太陰有真寒也此方主之白朮土炒三錢人參一錢乾薑炮二錢甘草炙二錢水煎溫服為末煉蜜丸名理中丸日三夜一服治瘥後喜唾久不了了者此胃有寒飲停留也四逆湯大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者此方主之附子生乾薑生甘草炙各二錢水煎溫服一云冷服經曰治寒以熱涼而行之否則戴陽者反增上燥耳目口鼻出血者有之矣謹小慎微醫豈易言哉加人參即四味回陽飲此方通治三陰脈沉惡寒手足厥逆之證故用附子之生者上行頭項外徹肌表以溫經散寒乾薑亦用生者以內溫臟腑甘草獨用炙者以外溫榮衛內補中焦也瑣言曰仲景云病發熱頭痛脈反沉若不瘥身體疼痛者當救其里宜四逆湯此證出太陽篇又云少陰病始得之反發熱脈沉者麻黃附子細辛湯此證出少陰篇竊詳太陽病發熱頭痛法當脈浮今反沉少陰病脈沉法當無熱今反發熱仲景於此兩證各言反者謂反常也令人罕識其旨眉批蓋太陽病脈似少陰少陰脈病似太陽所以各謂之反而治之當異也深究其旨均是脈沉發熱以其有頭痛故為太陽病陽證當發熱脈浮今脈反沉以裡虛久寒正氣衰微所致又身體疼痛故宜救里使正氣內強逼邪外出而乾薑生附亦能出汗而解假使里不虛寒則當見脈浮而正屬太陽麻黃湯證也均是脈沉發熱以其無頭痛故為少陰病陰證當脈沉無發熱今反發熱以寒邪在表但皮膚腠理鬱閉為熱知在裡無熱故用麻黃細辛以發肌表之熱附子以溫少陰之經假使身寒無熱則當見厥逆吐利等證而正屬少陰四逆湯證也由是觀之正氣衰微脈沉之反為重表邪浮淺發熱之反為輕此四逆湯為劑不為不重於麻黃附子細辛湯也又可見熟附配麻黃發中有補生附配乾薑補中有發此實治法之神奇處方之精奧學者其致思焉神解散溫病初覺憎寒體重壯熱頭痛四肢無力遍身痠痛口苦咽乾胸腹滿悶者此方主之白殭蠶酒炒一錢蟬蛻五個神麯三錢金銀花二錢生地二錢木通車前子炒研黃芩酒炒黃連黃柏鹽水炒桔梗各一錢水煎去渣入冷黃酒半小杯蜜三匙和勻冷服此方之妙不可殫述溫病初覺但服此藥俱有奇驗外無表藥而汗液流通里無攻藥而熱毒自解有斑疹者即現而內邪悉除此其所以為神解也清化湯溫病壯熱憎寒體重舌燥口乾上氣喘吸咽喉不利頭面猝腫目不能開者此方主之白殭蠶酒炒三錢蟬蛻十個金銀花二錢澤蘭葉二錢廣皮八分黃芩二錢黃連炒梔連翹去心龍膽草酒炒元參桔梗各一錢白附子炮甘草各五分大便實加酒大黃四錢咽痛加牛蒡子炒研一錢頭面不腫去白附子水煎去渣入蜜酒冷服其方名清化者以清邪中於上焦而能化之以散其毒也芩連梔翹清心肺之火元參橘甘清氣分之火膽草清肝膽之火而且沉陰下行以瀉下焦之濕熱殭蠶蟬蛻散腫消毒定喘出音能使清陽上升銀花清熱解毒澤蘭行氣消毒白附散頭面風毒枯梗清咽利膈為藥之舟楫蜜潤臟腑酒性大熱而散能引諸涼藥至熱處以行內外上下亦火就燥之意也其中君明臣良而佐使同心引導協力自使諸證息平矣大清涼散溫病表裡三焦大熱胸滿脅痛耳聾目赤口鼻出血唇乾舌燥口苦自汗咽喉腫痛譫語狂亂者此方主之白殭蠶酒炒三錢蟬蛻全十二個全蠍去毒三個當歸生地酒洗金銀花澤蘭各二錢澤瀉木通車前子炒研黃連薑汁炒黃芩梔子炒黑五味子麥冬去心龍膽草酒炒丹皮知母各一錢甘草生五錢水煎去渣入蜜三匙冷米酒半小杯童便半小杯和勻冷服此方通瀉三焦之熱其用童便者恐不得病者小便也素問曰輪回酒綱目曰還元湯非自己小便何以謂之輪回何以謂之還元乎夫以己之熱病用己之小便入口下咽直達病所引火從小水而降甚速也此古人從治之大法惜愚夫愚婦未曾曉也甚且嘲而笑之眼見嘔血人接自己小便飲一二碗立止非其明效大驗乎小清涼散溫病壯熱煩躁頭沉面赤咽喉不利或唇口頰腮腫者此方主之白殭蠶炒三錢蟬蛻十個銀花澤蘭當歸生地各二錢石膏五錢黃連黃芩梔子酒炒牡丹皮紫草各一錢水煎去渣入蜜酒童便冷服黃連清心火亦清脾火黃芩清肺火亦清肝火石膏清胃火亦清肺火梔子清三焦之火紫草通竅和血解毒消脹銀花清熱解毒澤蘭行氣消毒當歸和血生地丹皮涼血以養陰而退陽也殭蠶蟬蛻為清化之品散腫消郁清音定喘使清升濁降則熱解而證自平矣小柴胡湯少陽病五六日邪傳半里之時往來寒熱風寒之邪出入於表裡之間胸脅苦滿下膈循脅伏飲搏聚默默不欲飲食咽乾故默木乘土故不思食心煩喜嘔伏飲作悶上逆作嘔或胸中煩而不嘔煩乃熱悶也不嘔無伏飲之甚也或渴津液不足或腹中痛血滯陰結或脅下痞硬邪熱與伏飲相搏於脅下或心下悸水停心下凌心作悸小便不利水不下行或不渴里未結實身有微熱表未全罷或咳者伏飲射肺此方主之和解半表半裡之邪加芒硝名柴胡加芒硝湯柴胡四錢黃芩二錢半夏二錢人參一錢甘草炙一錢生薑二錢大棗二枚水煎溫服若胸中煩而不嘔去半夏人參加栝樓實一枚潤下泄滿若渴者去半夏倍人參生津潤燥加天花粉二錢徹熱滋干若腹中痛去黃芩加芍藥二錢收陰緩中若脅下痞硬去大棗加牡蠣粉二錢軟堅若心下悸小便不利去黃芩加白茯苓二錢上行肺氣下過膀胱若不渴外有微熱去人參固表加桂枝一錢發散覆取微汗自愈矣若咳者去人參棗姜加五味子斂肺乾薑各一錢發肺寒濕以逐飲邪在表則惡寒邪在裡則發熱邪在半表半裡則惡寒且熱故令寒熱往來少陽之脈起目鋭眥故令目眩膽者中精之官五臟取決於膽咽為之使故令口苦咽乾脈行兩脅故令脅痛膽者肝之腑在五行屬木有垂枝之象故令脈弦柴胡辛溫辛者金之味故用之以平木溫者春之氣故就之以入少陽一云專主往來寒熱謂其能升提風木之氣也黃芩質枯味苦枯則能浮苦則能降君以柴胡則入少陽矣一云味苦不沉黃中帶青有去風熱之專功謂其能散風木之邪也然邪之傷人常乘其虛用參草欲實其中氣使邪不得復傳入里耳一云少陽氣血薄全賴土膏滋潤則木氣始得發榮即經所謂胃和則愈之說是以中氣不虛之人雖有小柴胡證而人參在可去也邪初入里以風寒外邪挾有形之痰涎結聚於少陽之本位所以裡氣逆而煩嘔故用半夏之辛以除嘔逆邪在半表則榮衛爭故用薑棗之辛甘以和榮衛亦所以佐參草以補中氣使半表之邪仍從肌表而散也獨怪後世用小柴胡湯者一概除去人參豈仲景立方之本意哉又少陽經當衝要之路關係最重小柴胡非套藥也今人不論何病但見發熱惡寒便以小柴胡湯和解之殊覺可笑本方加栝樓實四錢黃連二錢名柴胡陷胸湯本方加枳殼三錢桔梗三錢名柴胡枳桔湯六一順氣湯少陰厥陰病口燥咽乾怕熱消渴譫語神昏大便燥實胸腹滿硬或熱結旁流繞臍疼痛厥逆脈沉伏者此方主之大黃酒浸四錢芒硝二錢五分厚朴錢半枳實一錢柴胡三錢黃芩白芍甘草生各一錢水煎去渣入鐵鏽水三匙冷服加味六一順氣湯溫病主方治同前證白殭蠶酒炒三錢蟬蛻十個大黃酒浸四錢芒硝二錢五分柴胡三錢黃連黃芩白芍甘草生各一錢厚朴一錢五分枳實一錢水煎去渣沖芒硝入蜜酒和勻冷服理陰煎此理中湯之變方也凡天一無根真陰不足或素多勞倦之輩因而忽感寒邪不能解散或發熱頭痛身痛或面赤唇焦或雖渴而不喜飲冷或背心肢體畏寒但脈見無力者悉是假熱之證涼藥不可入口宜速用此煎照後加減以溫補陰分托散表邪連進數服使陰氣漸充則汗從陰達而寒邪不攻自散此最切於時用者也神效不可盡述熟地五七錢或一兩當歸或三五七錢乾薑炒一錢或二三錢甘草炙一二錢水煎熱服加附子炮一二錢名附子理陰煎治命門火衰陰中無陽張景嶽曰若風寒外感邪未深入但發熱身痛脈數不洪或凡內無火證素稟不足者但用此煎加柴胡二三錢連進二三服無不獲效若寒凝陰盛而邪有難解必加麻黃二錢放心用之或不用柴胡亦可此寒邪初感溫散第一要方惟仲景知此義但仲景之溫散首用麻黃桂枝豫之溫散即以理陰溫中為增減此雖一從陽分一從陰分其跡若異然一逐於外一托於內而用溫散則一也學者當因其所宜酌而用之又若陰勝之時寒邪深入脈沉細發熱惡寒或背惡寒乃太陽少陰證也加細辛一二錢甚則再加附子一二錢真神劑也或並加柴胡以助之或並加麻黃以發之若有陰虛火旺內熱不宜用溫而氣血俱虛邪不能散者宜去乾薑以三味酌加前藥與之或止加人參一味亦可按此正傷寒妙論也去溫病萬里學者宜詳辨焉補陰益氣煎此補中益氣湯之變方也凡屬真陰不足而寒邪外侵者用此升散之並治勞倦傷陰精不化氣或陰虛內乏以致外感不解寒熱痎瘧陰虛便結不通等證熟地三五八錢當歸二三五錢山藥酒炒二錢陳皮人參甘草炙各一錢柴胡一錢升麻五分火上浮者不用生薑二錢水煎溫服大溫中飲此可與理陰煎相參互用也凡患傷寒陽虛不足及勞倦感冒或兼嘔惡泄瀉等證身雖熾熱時猶畏寒但六脈無力邪氣不能外達者此元陽太虛正不勝邪之候若非峻補托散則寒邪日深必致不救溫中自可散寒即此方也熟地三五八錢當歸二三五錢白朮土炒二三五錢肉桂去粗皮一錢乾薑一二錢煨生薑亦可甘草炙一二錢柴胡三五錢虛加人參一二錢水煎熱服覆取微汗無汗加麻黃有汗去肉桂加桂枝白芍氣虛加黃耆寒甚陽虛加炮附子陽虛氣陷加升麻頭痛加川芎白芷泄瀉去當歸加山藥蓮子或並加防風細辛景嶽曰古來傷寒之治惟仲景知溫散如麻黃湯桂枝湯是也亦知補氣而散如小柴胡湯黃耆建中湯是也至若陽根於陰汗化於液從補血而散而云騰致雨之妙仲景亦未言及豫制理陰補陰溫中三方乃邪從榮解第一義也其功難悉所當深察按景嶽首開補血散寒邪從榮解之論得仲景不傳之祕治傷寒無剩義矣真令人衣冠焚香望拜茅山不置也但傷寒不過感冬月烈風嚴寒之常氣而溫病得天地疵癘旱潦之雜氣世之凶惡大病死生在反掌間者非傷寒乃溫病也若於溫病出一超越前人之意見以啓後人之聾聵豈不盡美又盡善乎而乃仍覆前轍曰溫病即傷寒云云羽翼叔和一樣糊塗噫若非王安道劉完素二公於治法辨別明白不幾矇昧終古耶補中益氣湯黃耆蜜炙人參白朮土炒各一錢半當歸陳皮炙甘草各一錢升麻五分柴胡七分生薑二錢大棗二個水煎溫服桃仁承氣湯太陽病不解熱結膀胱其人如狂血自下者愈其表不解者尚未可攻當先解其表宜桂枝湯表解但小腹急結者乃可攻之此方主之薛氏加丹皮枳殼桃仁連皮尖十五個桂枝三錢大黃酒浸四錢芒硝二錢甘草炙一錢水煎去渣沖芒硝溫服代抵當丸太陽表證仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹當硬滿小便自利者下血乃愈以藥下之故愈所以然者以太陽隨經瘀熱在裡故也此方主之大黃酒洗四兩芒硝穿山甲蛤粉炒夜明砂淘焙莪朮醋炒肉桂去粗當歸尾酒蒸各一兩紅花酒炒七錢桃仁不去皮尖生用七十粒另研為末煉蜜丸薑湯送下三錢按代抵當湯丸方出準繩蓋瘀蓄之血攻之為難仲景直用水蛭虻蟲有毒之物惟恐藥不峻利亦何待攻之不動而後加減乎後人不敢用此毒物故作此方以代之原方生地黃用之無理歸尾必不可減故於本方中減去生地一味倍肉桂加莪朮紅花夜明砂用之殊覺有效若溫病蓄血用此方去肉桂加牡丹皮一兩牛膝一兩或止加乾漆五錢柯韻伯曰膀胱為水府血本無所容蓄者也然太陽為諸陽主氣是氣之最多者而其經又多血少氣則知太陽在表陽分之氣多而在經血分之氣反少也少氣者膀胱之室熱結硬滿法當小便不利而反利者是太陽上焦之氣化行而下焦血海之氣化不行也必其隨經之榮血因瘀熱而結於裡矣此為小腹之裡而非膀胱之裡故小便雖利而硬滿急結蓄血仍瘀小腹也熱淫於內神魂不安故發狂血瘀不行則榮不運故脈微而沉榮不運則氣不宣故沉而結也榮氣不周於身則身黃消穀善飢者胃火熾盛也大便反易者血之濡也色黑者蓄血滲入也善忘者血不榮心智不明也此皆蓄血之徵兆非至峻之劑不足以抵其巢穴而當此重任故仲景制抵當湯以攻之若熱雖盛而未狂小腹滿而未硬宜小其制為用抵當丸以緩治之若外證已解小腹急結其人如狂是轉屬陽明用調胃承氣加桃仁桂枝之行血者於其中以利之胃和則愈矣此桃仁承氣湯又為治之緩者也宜辨之明矣茵陳蒿湯傷寒頭汗出渴飲米漿小便不利必發黃也此方主之本方再加白朮山藥赤苓木通黃芩豬苓黃柏甘草治諸黃茵陳蒿二錢梔子三錢大黃酒浸五錢水煎溫服按茵陳蒿退黃之君藥今以病較之黃因小便不利故用山梔除小腸屈曲之火熱除便利當以發黃為標小便不利為本及論小便不利乃系胃家實熱又當以小便不利為標胃實為本故宜以大黃為君梔子次之茵陳又其次也設去大黃而用梔子茵陳是忘本治標鮮有效矣參胡三白湯傷寒汗下不解脈虛少氣發熱或潮熱口乾舌燥此方主之柴胡三錢人參二錢白朮土炒三錢白茯苓三錢白芍酒炒三錢生薑三錢大棗三枚水煎溫服柯韻伯曰傷寒汗下後不愈裡氣既虛當求之於三陰而表熱仍在又當責之三陽三陽以少陽為樞其方以小柴胡湯三陰以少陰為樞其方以附子湯法當參合為治然此熱是少陽之虛不得仍作前證之實火論故於柴胡方中去黃芩口燥而不嘔故去半夏少氣而反去甘草者欲其下達少陰也於附子方中不取附子欲其上通少陽也所藉惟人參故用為君佐白朮以培太陰之母白芍以滋厥陰之血茯苓以清少陰之水生薑助柴胡散表邪大棗助人參補元氣信為大病後調理之聖劑矣若榮衛不和則去柴胡加桂枝口渴心煩加麥冬五味輔人參生津止渴心下痞加黃連枳實瀉心不得臥加竹茹泄太陰熱如無表熱並去柴胡名人參三白湯純乎調內矣黃連解毒湯大熱乾嘔煩渴譫語呻吟不眠者此方主之黃連黃芩黃柏梔子各一錢水煎冷服崔尚書曰胃有燥糞令人錯語邪熱盛極亦令人錯語大便祕而錯語者承氣湯大便通而錯語者解毒湯玉女煎治少陰不足陽明有餘水虧火旺六脈浮洪滑大乾燥煩渴頭痛牙痛吐血衄血者熟地五錢牛膝錢半石膏五錢知母錢半麥冬去心二錢水煎服按熟地牛膝補腎水之不足石膏知母瀉脾土之有餘而金則土之子水之母也麥冬甘以保肺寒以清肺所謂虛則補其母實則瀉其子也黃龍湯治胃實失下虛極熱極循衣撮空不下必死也人參錢半熟地三錢當歸二錢大黃酒浸三錢芒硝二錢枳實一錢厚朴一錢五分水煎溫服此補瀉兼施之方也千金溫脾湯中用人參附子乾薑甘草各一錢當歸二錢大黃三錢芒硝八分寒熱並用後人罕識其旨姑録之以見治療之法不一端也虛人熱結於裡攻之不行乃腸胃枯涸之故故陶氏加參歸地於大承氣湯中以助氣血建背城之功與小柴胡湯桂枝新加湯用人參佐表藥輔正匡邪之義同大復蘇飲溫病表裡大熱或誤服溫補和解藥以致神昏不語形如醉人或哭笑無常或手舞足蹈或譫語罵人不省人事目不能閉者名越經證及誤服表藥而大汗不止者名亡陽證並此方主之白殭蠶三錢蟬蛻十個當歸三錢生地二錢人參茯神麥冬天麻犀角鎊磨汁入湯和服丹皮梔子炒黑黃連酒炒黃芩酒炒知母甘草生各一錢滑石二錢水煎去渣入冷黃酒蜜犀角汁和勻冷服陳來章曰熱入於心經涼之以連梔犀角心熱移於小腸泄之以滑石甘草心熱上逼於肺清之以芩知麥冬然邪之越經而傳於心與夫汗多亡陽者皆心神不足也故又入人參茯神以補之此即導赤瀉心各半湯也豫謂應加明天麻濕紙包煨切片酒炒使之開竅以定其搐再加生地當歸丹皮和血涼血以養其陰仍用殭蠶蟬蛻以清化之品滌疵癘之氣方為的確小復蘇飲溫病大熱或誤服發汗解肌藥以致譫語發狂昏迷不省燥熱便祕或飽食而復者並此方主之白殭蠶三錢蟬蛻十個神麯三錢生地三錢木通車前子炒各二錢黃芩黃柏梔子炒黑黃連知母桔梗牡丹皮各一錢水煎去渣入蜜三匙黃酒半小杯小便半小杯和勻冷服六味地黃丸料加肉桂一錢炮附子一錢牛膝一錢車前子一錢名金匱腎氣丸料去牛車名腎氣丸熟地四錢山藥二錢山萸肉二錢白茯苓丹皮澤瀉各一錢半水煎溫服加黃柏知母名知柏地黃丸參胡溫膽湯治傷寒汗下後嘔而痞悶虛煩不眠人參柴胡白茯苓廣皮各一錢五分半夏薑製枳實麩炒各一錢甘草炙六分生薑二錢棗二個水煎溫服脾胃虛寒少陽不能行生髮之令故痰涎沃膽而不能眠參草苓棗之甘溫以補益脾氣柴胡之辛溫以升發陽氣二陳之辛散枳實之導滯以開發痰飲痰飲散而膽不寒矣然又有膽寒肝熱煩悶不寧而不能眠者則當入竹茹白芍等味也甚則入黃芩人參養榮湯治發汗過多身振脈搖汗為心液汗多則血液枯涸筋肉無以養故有此證通治脾肺氣虛榮血不足氣短食少驚悸健忘寢汗發熱身倦肌瘦色枯毛髮脫落小便赤澀內經曰脾主轉運散精行津上輸於肺此地氣上升也肺主治節通調水道下輸膀胱此天氣下降也故名泰脾肺虛則上下不交而為否榮血無所藉以化生肺虛故氣短脾虛故食少心主脈脈屬榮榮虛血少則心失養故悸忘汗熱肺主皮毛脾主肌肉血虛火旺故瘦枯毛脫肺為水之上源金不生水故小便赤澀白芍酒炒一錢五分當歸黃耆蜜炙人參白朮茯苓陳皮甘草炙各一錢熟地肉桂五味子研各七分遠志甘草湯浸去心五分水煎溫服陰虛火動加黃柏知母各一錢陽虛下寒加炮附子一錢心悸不眠加酸棗仁炒研二錢倍遠志葛根湯傷寒標熱壯熱頭額痛目痛鼻乾不眠無汗尺寸脈俱長及太陽陽明合病脈浮而長必自下利者此方主之葛根四錢麻黃三錢桂枝白芍甘草各二錢大棗二枚生薑三錢水煎麻黃葛根去沫次入諸藥煎服去麻黃名桂枝加葛根湯太陽陽明合病下利猶屬表證世人多以為漏底傷寒為不治仲景以此方主之蓋以邪氣並於陽則陽實而陰虛陰虛故下利也與此湯以散經中表邪則陽不實而陰氣平不止利而利自止也痛瀉要方治土敗木賊痛瀉不止白朮土炒三錢白芍酒炒四錢陳皮炒一錢半防風一錢水煎溫服或為末煉蜜丸服久瀉加升麻白朮補脾燥濕和中白芍瀉肝火斂逆氣緩中止痛防風散肝舒脾勝濕為理脾引經要藥陳皮利氣尤能燥濕醒脾使氣行則痛止數者皆所以瀉木而益土也桂枝麻黃各半湯太陽風寒兩感八九日如瘧狀發熱惡寒一日二三度面赤反有熱者表未解也以其不能得小汗出身必癢此方主之桂枝三錢二分麻黃白芍杏仁去皮甘草炙各二錢生薑三錢大棗二枚水煎麻黃去沫入群藥煎服覆取微汗此風寒兩感之輕劑也不比大青龍之峻險麻黃髮汗祛太陽之寒邪桂枝止汗解太陽之風邪一發一止則汗不得大泄矣人參敗毒散治傷寒三陽經合病頭痛發熱及時行感冒風寒咳嗽風濕身腫者人參羌活獨活柴胡前胡薄荷川芎茯苓枳殼桔梗各一錢甘草五分生薑一錢水煎溫服內熱口燥加黃芩一錢按羌活獨活柴前薄芎皆風藥升浮輕散開發之劑也故用之以解寒邪散風熱用枳殼者取其清膈而利氣也用參苓甘草者取其補益中氣外邪不能深入也滌其邪氣培其正氣故曰敗毒此散乃解傷寒太陽陽明少陽三經之藥全在詳證加減以盡其妙虛怯人借人參之力補正氣以驅邪氣耳若溫病雜氣鬱熱內迫流布三焦人參豈可輕投表藥豈可妄用執泥此方以治溫病恆恐誤人訒庵盛稱其妙未免溢美不可印板眼目總緣人不知溫病為雜氣沖和湯治傷寒三陽經合病一名九味羌活湯羌活一錢五分白芷黃芩蒼朮泔浸細辛川芎防風生地甘草各一錢生薑二錢蔥白一莖水煎溫服喘加杏仁夏加石膏知母此方分經而主治傷寒邪在太陽者主以羌活邪在陽明者主以白芷邪在少陽者主以黃芩邪在太陰者主以蒼朮邪在少陰厥陰者主以細辛川芎而防風者又風藥之卒徒也生地所以去血中之熱也甘草又所以和諸藥補脾胃而除氣中之熱也余謂九味合為一方然用者不可執方當視其經絡前後左右之不同從其多少大小輕重之不一增損與之乃能效矣今人視為四時套藥無論感冒傷風傷寒時氣溫病亦無論經絡臟腑概以沖和湯和之此張元素之說誤之也須知之葛根加半夏湯太陽陽明合病下利而嘔又云不利但嘔此方主之此以利嘔辨風寒之不同也寒為陰陰性下行裡氣不和故利而不嘔風為陽陽性上行裡氣逆故嘔而不利加半夏之辛散以下逆氣不利而嘔則風寒兩感也葛根三線半夏薑製麻黃去節泡去黃汁炒乾各二線桂枝白芍甘草炙各錢半生薑二錢大棗二枚水煎麻黃葛根去沫次入諸藥煎服覆取微汗增損普濟消毒飲太和年民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利口燥舌乾俗名大頭瘟東垣曰半身以上天之陽也邪氣客於心肺上攻頭面而為腫耳經謂清邪中於上焦即東垣之言益信矣元參三錢黃連二錢黃芩三錢連翹去心梔子酒炒牛蒡子炒研藍根如無以青黛代之桔梗各二錢陳皮甘草生各一錢全蟬蛻十二個白殭蠶酒炒大黃酒浸各三錢水煎去渣入蜜酒童便冷服芩連瀉心肺之熱為君元參陳皮甘草瀉火補氣為臣翹梔蒡藍蠶蟬散腫消毒定喘為佐大黃蕩熱斬關推陳致新為使桔梗為舟楫載藥上浮以開下行之路也真武湯太陽病發汗太過仍發熱汗雖出而表不除之故也心下悸心生血汗為心液多則心虛頭眩身瞤振振欲劈地振搖欲伏地不能起喻氏注云振振欲劈地五字形容亡陽之狀如繪汗多則衛氣解散振振然四顧無可置身欲劈地中而避處也猶陰證似陽欲坐井中而就冷也何得妄指詩經注劈拊心貌為解哉眉批及少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或嘔或小便利者並此方主之白朮土炒二錢白茯苓三錢白芍三錢生薑三錢附子炮一錢半水煎溫服少陰病加減法咳加乾薑細辛五味子各一錢嘔去附子倍生薑小便利去茯苓下利去白芍加乾薑二錢汗多而心下悸此心亡津液腎氣欲上而凌心也頭眩而身瞤此汗多亡陽虛邪不靖而內動也真武北方之神司水火者也今腎氣凌心虛邪內動有水火奔騰之象故名此湯以主之白朮茯苓補土利水之物也可以伐腎而療心悸附子生薑回陽益衛之物也可以壯火而制虛邪白芍酸以收陰用白芍者以小便不利則知其人不但真陽不足真陰亦已虧矣若不用白芍以固護其陰豈能勝附子之雄悍乎梔子豉湯汗吐下後虛煩不得眠邪入胸中挾飲生煩心為水凌故也若劇者反覆顛倒輾轉反側之象心中懊憹悔恨也此方主之吐無形之虛煩山梔子生研七枚淡豆豉四錢水煎溫服得吐便止不吐再作服梔子湧膈上虛熱香豉散寒熱惡毒能吐能汗為傷寒汗下後不解虛煩悶亂之聖藥若嘔則加生薑以滌飲名梔子生薑豉湯若少氣則加甘草以緩中名梔子甘草豉湯若心煩腹滿起臥不安則去香豉而加厚朴枳實名梔子厚朴湯又傷寒論曰傷寒以丸藥大下之身熱不去微煩者梔子乾薑豉湯主之又曰傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉乾薑湯主之故凡欲湧虛煩必先顧慮中氣所以病人素有微溏者有不可吐之戒按梔子乾薑湯主之當是梔子豉湯梔子豉湯主之當是梔子乾薑湯斷無煩熱用於姜結痛用香豉之理當移之柯韻伯曰傷寒太陽以心腹為里陽明以心腹為表蓋陽明之裡是胃實不特發熱惡熱目疼鼻乾汗出身重謂之表一切虛煩虛熱咽燥口苦舌苔腹滿煩躁不得臥消渴而小便不利凡在胃之外者悉屬陽明之表也仲景制汗劑是開太陽表邪之出路制吐劑是引陽明表邪之出路若太陽當汗而反吐之便見自汗出不惡寒飢不能食朝食暮吐欲飲冷水不欲近衣等證此太陽轉屬陽明之表當梔子豉湯主之陽明當吐而不吐反行汗下溫針等法以致心中憒憒怵惕懊憹煩躁舌苔等證然仍陽明之表仍當梔子豉湯吐之梔子苦能湧泄寒能勝熱其形像心又色赤通心故主治心中上下一切證豆形像腎又色黑入腎制而為豉輕浮上行能使心腹之濁邪上出於口一吐而心腹得舒表裡之煩熱悉除矣所以然者二陽之病發心脾此乃心脾熱不是胃家實即所云有熱屬臟者攻之不令發汗之義也急除胃中之熱不致胃家之實即此一湯為陽明解表裡之聖劑矣瓜蒂散吐有形之實邪病如桂枝證頭不痛項不強寸脈浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也寒者痰飲也此方主之甜瓜蒂炒黃赤小豆各等份為末熱水二盅入淡豆豉三錢煎一盅去渣和藥末一錢溫服之不吐再加得快吐即止或燒鹽熟湯調服以指探吐治霍亂宿食熱痰冷痛千金曰凡病皆宜大勝用藥炙甘草湯傷寒脈結代心動悸此方主之炙甘草二錢阿膠二錢麻仁去皮麥冬去心各四錢生地八錢桂枝二錢人參一錢生薑二錢大棗二枚水酒各半煎去渣入阿膠化服薛氏加當歸酸棗仁炒各三錢五味子炒研一錢脈結心悸由血氣虛衰不能相續也緣其人汗下不解真陰衰竭津液枯涸滋陰之藥當倍於補氣故參草桂枝薑棗補益中氣調和榮衛阿膠麻仁麥冬生地藥味既多分兩亦重所以潤經益血復脈通心也聖濟經曰津液耗散為枯五臟痿弱榮衛涸流濕劑所以潤之與水停心悸之治法不同汪訒庵曰千金翼用治虛勞寶鑑用治厄逆外臺用治肺痿愚按開後人滋陰降火無窮之法門此方是也生脈散治夏月金受火囚絶寒水生化之源以致咳嗽喘促肢體痿軟腳軟眼黑口渴汗出者人參二錢麥冬去心二錢五味子一錢水煎溫服東垣曰人參甘寒瀉火熱而益元氣麥冬苦寒滋燥金而清水源五味酸溫瀉丙火而補庚金以肺朝百脈故名曰生脈散今人因生脈之名用治脈微欲絶陽氣將脫之證誤人多矣何如獨參一味左歸丸減兩為錢大劑煎飲名為丸料治真陰腎水不足不能滋養榮衛漸至衰弱或寒熱往來自汗盜汗或神不守舍血不歸原或氣虛昏暈或眼花耳聾或口燥舌乾或腰痠腿軟或遺淋澀痛凡精髓內虧津液枯涸等證俱宜壯水之主以培左腎之元陰而精血自充矣熟地八兩山藥炒山茱萸蒸去核菟絲子酒蒸枸杞子蜜蒸鹿角膠打碎炒珠龜板膠切碎炒珠各四兩無火不必用此味牛膝酒蒸熟三兩滑精者不用為末煉蜜丸任下如真陰失守虛火上炎者宜用純陰至靜之劑去枸杞鹿膠加女貞子三兩麥冬三兩火燥灼金乾枯多嗽加百合三兩夜熱骨蒸加地骨皮三兩水不利不清加白茯苓三兩大便燥結去菟絲加肉蓯蓉三兩血虛血滯加當歸四兩腰膝痠痛加杜仲鹽水炒斷三兩臟平無火而腎氣不充者去龜板膠加破故紙炒香三兩蓮肉去心胡桃肉各四兩氣虛加人參三兩右歸丸以兩作錢大劑煎飲名為丸料治元陽不足或先天稟弱或勞傷過度以致命門火衰不能生土而為脾胃虛寒飲食少進或嘔惡膨脹或反胃噎膈或怯寒畏冷或臍腹多痛或大便不實瀉痢頻作或小水自遺虛淋寒疝或寒在溪谷而肢節痹痛或寒在下焦而水邪浮腫總之真陽不足者必神疲氣怯或心跳不寧或四肢不收或眼見邪祟或衰弱無子等證俱宜益火之源以培右腎之元陽而神氣自強矣熟地八兩山萸肉微炒三兩杜仲薑湯炒斷枸杞子微炒菟絲子酒蒸鹿膠各四兩當歸三兩肉桂去粗附子制各二兩為末煉蜜丸任下如陽虛氣衰必加人參以為之主隨人虛實增損蓋人參之功隨陽藥則入陽分隨陰藥則入陰分欲補命門之陽非加人參不能捷效陽虛精滑或滯濁便溏加故紙酒炒三兩飧泄腎泄不止加五味子三兩肉豆蔻麵煨去油三兩飲食減少或不易化或嘔惡吞酸加乾薑炒黃三兩腹痛不止加吳茱萸二兩腰膝痠痛加胡桃肉連皮四兩陽虛陽痿加巴戟肉四兩肉蓯蓉三兩或黃狗外腎二副酒煮搗入之蜜煎導法陽明病自汗若發汗小便自利者此為津液內竭便雖硬不可攻此仲景心法後人罕知當自欲大便時以此法導之乃承氣之變法也蜂蜜入銅勺內微火煎稍凝勿令焦入皂角末五分食鹽五分並手作挺子長寸許令頭鋭欲大便時入穀道中自下參歸養榮湯邪留心下令人痞滿下之痞應去今反痞者虛也以其人或稟賦嬌怯或素病虧損如失血崩帶等證因下益虛失其健運愈令痞滿再用行氣破氣之劑轉成壞病矣人參一錢半夏二錢生薑炮三錢甘草炙一錢白芍酒炒一錢半當歸二錢生地二錢熟地三錢大棗二枚水煎溫服果如前證一服痞若失若下後仍潮熱口渴脈洪大而痞者投之禍不旋踵此有虛實之分須詳辨之犀角地黃湯傷寒溫病胃火熱盛衄血吐血咳咯血衄行清道吐行濁道以喉通天氣咽通地氣也循經之血走而不守隨氣而行火氣急迫故隨經直犯清道上腦而出於鼻為衄其從肺而出於咽者則為咳咯其存胃中者為守榮之血守而不走胃虛不能攝或為火逼故嘔吐從咽而出也衄血之熱在經吐血之熱存腑傷寒衄血為表熱溫病衄血為裡熱內經曰心移熱於肺則咳嗽出血也當詳細辨而治之便血蓄血如狂漱水不欲咽傷寒便血為傳經熱邪溫病便血為裡熱蓄血在上則喜忘在下則如狂漱水不欲咽熱在經里無熱也蓄血發燥而內不渴故雖漱水而不欲咽海藏云大凡血證多不飲水惟氣證則飲水經云陽明病口燥漱水不欲咽者必衄傷寒當發汗而不發汗邪熱妄行逼血外出故見此證及陽毒發斑熱甚傷血發於皮膚見紅點者為疹如錦紋者為斑傷寒不當下而下熱毒乘虛入胃則發斑疹溫病當下而不下熱留胃中亦發斑疹或誤服熱藥太過亦發斑疹並婦人血崩赤淋以火勝故治之此方並治之懷生地六錢白芍四錢牡丹皮三錢犀角鎊二錢磨汁或末入水煎入犀汁服瘀血甚者加大黃三錢以行之或因怒致血或熱極如狂加柴胡平少陽厥陰之火黃芩瀉上中二焦之火梔子瀉三焦之火也生地甘寒涼血以滋腎水丹皮苦寒瀉血中之伏火犀角大寒解胃熱而清心火白芍酸寒和陰血而散肝火以共平諸經之潛逆也通脈四逆湯下利裡寒外熱面反赤手足厥脈微欲絶及脈不出系群陰格陽於外不能內返也此方主之附子生三錢乾薑生三錢甘草炙二錢水煎溫服一云冷服解見四逆湯下按蘊要云四逆湯一名通脈四逆湯細玩傷寒通脈四逆湯所治之證裡寒外熱其面反赤陰盛於內逼陽於外而脈不出較四逆湯所治之證為更重若通脈四逆湯即四逆湯何故多加通脈二字耶醫統及醫宗必讀俱云即四逆湯加甘草一倍然厥逆脈不出反加甘草緩味殊不近理纘論云即四逆湯加乾薑一倍然回陽通脈全賴生附子雄悍之力豈宜單加乾薑耶再按四逆湯原方甘草炙二兩乾薑一兩五錢附子一枚生用方下云強人可大附子一枚乾薑三兩此即通脈四逆湯也故通脈四逆湯方甘草炙二兩與四逆湯同乾薑三兩是為倍用附子大者一枚生用夫既云大者其為倍用可想而知細心較定通脈四逆湯即四逆湯倍附子乾薑是耶仲景加減法面色赤加蔥白二莖腹痛去蔥白加白芍二錢嘔加生薑二錢咽痛去白芍加桔梗二錢利止脈不出加人參一錢去桔梗白頭翁湯下利欲飲水亡津液而內燥以有熱故也又熱痢下重者邪熱下痢氣滯後重並此方主之白頭翁二錢秦皮三錢黃連三錢黃柏三錢水煎溫服此胃與肝腎藥也白頭翁苦寒入胃經血分而涼血止澼秦皮苦寒性澀洗肝益腎而固下焦黃連清心涼血黃柏瀉火補水並能燥濕止利而厚腸濕熱除而利自止矣桔梗杏仁煎治咳嗽吐膿痰中帶血或胸膈隱痛將成肺癰者桔梗杏仁炒研甘草各一錢枳殼麩炒一錢五分麥冬去心百合阿膠夏枯草金銀花各二錢連翹二錢五分川貝母紅藤各三錢火勝兼渴者加天花粉二錢水煎溫服腸癰祕方凡腸癰生於小肚角微腫而小腹陰痛不止者是毒氣不散漸大內攻而潰則成大患矣急以此方治之先用紅藤一兩酒二碗煎一碗午前一服醉臥之午後用紫花地丁一兩酒二碗煎一碗服之服後痛必漸止為效然後服後藥末除根當歸五錢石蠟蚆五錢蜜蠟也白殭蠶白而直者蟬蛻全各二錢天龍即蜈蚣也川大黃各一錢老蜘蛛二個捉住放新瓦上以酒盅蓋定外用炭火煅干存性上為細末每空心好酒調服一錢許日逐漸服自消連翹金貝煎治陽分癰毒或在肺膈胸乳臟腑之間者此方最佳連用數服無有不愈連翹去心紅藤各七錢金銀花蒲公英夏枯草土貝母各三錢火勝煩渴乳腫者加天花粉三錢好酒二碗煎一碗服後暖臥片時若陽毒內熱或在頭項間者水煎亦可蠟礬丸生白礬二兩白及一兩為細末用黃蠟四兩熔化去淨渣入藥末為丸白滾水送下一錢日三服護膜托裡解毒化膿之功甚大一方無白及一方有琥珀三錢附子湯少陰病口中和背惡寒者少陰病骨節痛身體痛手足厥脈沉者並此方主之人參一錢附子生白朮土炒白茯苓白芍各二錢水煎溫服傷寒以陽為主上證皆陰證幾於無陽矣辛甘皆陽也故用參附苓術以養陽辛溫之藥過多恐有偏陽之弊故又用白芍以扶陰經云火欲實水當平之此用白芍之意也若溫病陽邪怫鬱而厥逆脈沉一用辛溫之藥治之正如抱薪投火矣桂枝加附子湯太陽病中風誤汗遂漏不止惡風表虛則玄府疏小便難汗多則亡津液四肢微急四肢為諸陽之本陽虛則血滯難以屈伸筋骨不和風邪客之此方主之桂枝白芍各三錢附子生甘草炙各一錢五分生薑三錢大棗二枚水煎溫服誤汗亡陽則血滯兼有風入而徑急也故用桂枝湯疏風解肌以和榮衛加附子以助元陽而固表也此中風誤汗而見此證故以此湯救之若濕家重發汗必恍惚心亂汗為心液心無血養故神不寧小便已陰痛水道乾涸故陰痛也炙甘草湯加白茯苓四錢甘草附子湯風濕相搏骨節煩痛掣痛不能屈伸汗出短氣小便不利惡風不欲去衣身微腫者此方主之風則上先受之濕則下先受之逮兩相搏激注經絡流關節無處不到則無處不痛也風勝則衛氣不固故汗出惡風濕勝則水道不行故便澀身腫甘草炙二錢附子生二錢白朮土炒二錢桂枝四錢水煎溫服成氏曰甘草桂枝之辛甘散風邪而和衛附子白朮之辛溫解濕氣而溫經
