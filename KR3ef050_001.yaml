body:
  text: 卷一治病須知大運辨訂正天以陰陽而運六氣須知有大運有小運小則逐歲而更大則六十年而易大小有不合大運於陽歲位居陰是陽中之陰猶夏日之亥子時也大運於陰歲位居陽是陰中之陽猶冬日之巳午刻也民病之應乎運氣在大不在小不可拘小運遺其本而專事其末也譬之子平以運為主流年利鈍安能移其大局乎病而與大小俱合無論矣有於大運則合歲氣相違者自從其大而略變其間也此常理也有於小則合於大相違更有於大運歲氣俱違者偶爾之變亦當因其變而變應之如冬溫夏涼怪病百出俱不可以常理論也總以大運為主不以歲氣紛更強合乎證又不設成見於中惟證為的與司天不合而自合庶乎其近道矣若概謂必先歲氣毋伐天和似非世則之言嘗稽東垣李氏一以補中為主丹溪朱氏一以滋陰為重戴人張氏一以蕩滌為先皆能表表於世總得挈領提綱故合一本萬殊之妙否則當年豈無歲氣而必各取其一耶再以痘疹言之有抱要於保元有獨取於辛溫有得意於清瀉是亦治痘之名手何不見有逐年之分別耶要知大運之使然非三氏之偏僻也如曰偏僻則當年各操其一以應世何以得各擅其勝乎後學不明其故各效其一而不通變亦有畏其偏僻而第據證按時侈談歲氣以示高卓皆不知循環之大運者也餘留心此道年近四旬鄉闈已經七困肇於乾隆九年甲子猶及謝事寒水大運證多陰寒治多溫補縱有毒火之證亦屬強駑之末自茲已後而陽火之證漸漸多矣向溫補宜重者變而從輕清瀉宜輕者變而從重逮及甲戌乙亥所宜重瀉者雖極清極解而亦弗驗矣勢必蕩滌而元梟之勢始殺至甲申乙酉蕩滌之法向施於初病者多有首尾而難免者矣歷年已來居然成一定局間有溫補者什一千百而已是大運轉於相火矣凡時行之氣如正傷寒與冬溫風溫暑溫濕溫秋溫飧瀉痎瘧燥咳吐痢霍亂並男婦小兒一切諸證及痘疹民病火病十八九何況溫病從無陰證得天地疵癘旱潦之氣其流毒更甚於六淫又豈寒水司大運者之所可同年語哉自古運氣靡常純駁無定病故變態靡常補瀉無定今之非昔可知後之非今先聖後聖其揆一也易地則皆然矣任胸臆者斷斷不能倣佛余於當事時懷冰兢惟恐偏僻致誤庶幾屢經屢驗差可自信亦有莫挽者明知其逆不必治不過熱腸所迫耳脈義辨脈義辨引傷寒溫病不識脈如無目冥行動輒顛隕夫脈者氣血之神也邪正之鑑也呼吸微茫間死生關頭若能驗證分明指下了然豈有差錯耶傷寒脈法與雜證自是不同而溫病脈法與傷寒更是大異今將長沙內經脈法揭於前繼以陶氏浮中沉三診脈法又繼以溫病與傷寒不同診脈法誠能洞晰於此其於治也庶幾乎長沙傷寒脈義問曰脈有陰陽何謂也答曰凡脈浮大動滑數此名陽也沉澀弱弦微此名陰也陰證見陽脈者生按證之陰者陰極也脈之陽者陽生也陰證陽脈真陰證也陽生則陰長故曰生如厥陰下利手足厥逆脈數微熱汗出今自愈是也若脈不數而緊則死矣陽證見陰脈者死河間注云脈近於絶故也類經注云證之陽者假實也脈之陰者真虛也陽證陰脈即陰證也按注既曰假實知非真陽既曰真虛知為真陰此假陽證真陰脈直是陰證似陽也故注曰即陰證也若火閉而伏以致脈沉細脫此真陽證假陰脈乃是陽證似陰也非陰證也辨之不明死生反掌畏齋曰仲景陽證見陰脈一語不知糊塗了多少公得此訓話發人猛醒眉批寸口脈微名曰陽不足陰氣上入於陽中則灑淅惡寒也尺脈弱名曰陰不足陽氣下陷入陰中則發熱也陽脈浮濡陰脈弱者則血虛血虛則筋急也其脈沉弱者榮氣之微也其脈浮濡而汗出如流珠者衛氣之衰也按陽脈浮其脈浮之二浮字應是二濡字若是浮字則與衛衰汗出如流珠之義不屬其脈沉之沉字應是弱字若是沉字則與血虛榮微之義下屬悉宜改之寸口脈浮為在表沉為在裡數為在腑遲為在臟若脈浮大者氣實血虛也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮衛榮俱傷骨節煩痛當發其汗也夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰虛則發熱也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必噎按令汗大出四字與上下文義不相連貫當是衍文宜刪之諸脈浮數當發熱而反灑淅惡寒若有痛處飲食如常者當發其癰脈數不時則生惡瘡也傷寒表證欲發其汗脈浮有力者乃可汗之若浮而無力或尺脈弱澀遲細者此真氣內虛不可汗也汗之則死傷寒里證已具而欲下之切其脈沉有力或沉滑有力乃可下之若沉細無力或浮而虛者此真氣內虛不可下也下之則死仲景治少陰病始得之反發熱脈沉者麻黃附子細辛湯主之此太陽少陰之兩感也有太陽之表熱故用麻黃有少陰之脈沉故用附子細辛發表溫里並行此證治之奇脈法之奧故內經曰微妙在脈不可不察也內經脈義內經曰脈至而從按之不鼓諸陽皆然王太僕注曰言病熱而脈數按之不鼓動於指下者此陰盛格陽而致之非熱也又曰脈至而從按之鼓甚而盛也王太僕注曰言病證似寒按之而脈氣鼓動指下而盛者此陽甚格陰而致之非寒也東垣治一傷寒目赤面赤煩渴引飲脈息七八至按之不鼓此陰盛格陽於外非熱也用乾薑附子湯加人參數服得汗而愈亦治法之奇妙也大抵診脈之要全在沉脈中分虛實如輕手按之脈來得大重按則無者乃無根蒂之脈為散脈此虛極而元氣將脫也切不可發表攻裡如誤治之則死須人參大劑煎飲之以上所言乃脈證治例之妙水火徵兆之微陰陽倚伏之理要當窮究其旨趣不可輕易而切之也陶氏傷寒三診脈義浮診法以手輕按於皮膚之上切其浮脈之來以察表裡之虛實尺寸俱浮者太陽也浮而緊者為寒在表浮而數者為熱在表以脈中有力為有神可汗之浮而緩者為風在表可解之不可汗浮而無力為虛為無神不可汗凡尺脈浮寸脈浮俱有力可汗若尺脈遲弱者此真氣不足不可汗也浮大有力為實為熱可汗之浮大無力為虛為散不可汗也浮而長太陽合陽明浮而弦太陽合少陽凡脈浮主表不可攻裡也中診法以手不輕不重按至肌肉之分而切之以察陽明少陽二經之脈也尺寸俱長者陽明也浮長有力則兼太陽表未解也無汗者宜發汗長而大有力為熱當解肌長而數有力為熱甚當平熱也長洪長滑有力此胃中實熱可攻之也尺寸俱弦者少陽也宜和之浮弦有力兼太陽表未解也可發汗弦洪弦長弦數弦滑有力為熱甚宜清解之弦遲弦小弦微皆內虛有寒宜溫之也凡弦脈只可和不可汗下不可利小便也沉診法重手按至筋骨之分而切之以察里證之虛實也尺寸俱沉細者太陰也俱沉者少陰也俱沉弦者厥陰也沉疾沉滑沉實為有力有神為陽盛陰微急宜滋陰以退陽也沉遲沉細沉微為無力無神為陰盛陽微急宜生脈以回陽也大抵沉診之脈最為緊關之要以決陰陽寒熱用藥死生在毫髮之間脈中有力為有神為可治脈中無力為無神為難治用藥宜守而不宜攻宜補而不宜瀉也溫病與傷寒不同診脈義諸書未載凡溫病脈不浮不沉中按洪長滑數右手反盛於左手總由怫熱鬱滯脈結於中故也若左手脈盛或浮而緊自是感冒風寒之病非溫病也凡溫病脈怫熱在中多見於肌肉之分而不甚浮若熱鬱少陰則脈沉伏欲絶非陰脈也陽邪閉脈也凡傷寒自外之內從氣分入始病發熱惡寒一二日不作煩渴脈多浮緊不傳三陰脈不見沉溫病由內達外從血分出始病不惡寒而發熱一熱即口燥咽乾而渴脈多洪滑甚則沉伏此發表清裡之所以異也凡浮診中診浮大有力浮長有力傷寒得此脈自當發汗此麻黃桂枝證也溫病始發雖有此脈切不可發汗乃白虎瀉心證也死生關頭全於此分凡溫病內外有熱其脈沉伏不洪不數但指下沉澀而小急斷不可誤為虛寒若以辛溫之藥治之是益其熱也所以傷寒多從脈溫病多從證蓋傷寒風寒外入循經傳也溫病怫熱內熾溢於經也凡傷寒始本太陽發熱頭痛而脈反沉者雖曰太陽實見少陰之脈故用四逆湯溫之若溫病始發未嘗不發熱頭痛而見脈沉澀而小急此伏熱之毒滯於少陰不能發出陽分所以身大熱而四肢不熱者此名厥正雜氣怫鬱火邪閉脈而伏也急以鹹寒大苦之味大清大瀉之斷不可誤為傷寒太陽始病反見少陰脈沉而用四逆湯溫之溫之則壞事矣於脈中即見得異此發前人所未到之旨也眉批又不可誤為傷寒陽厥慎不可下而用四逆散和之和之則病甚矣蓋熱鬱亢閉陽氣不能交接於四肢故脈沉而澀甚至六脈俱絶此脈厥也手足逆冷甚至通身冰涼此體厥也即仲景所謂陽厥厥淺熱亦淺厥深熱亦深是也下之斷不可遲非見真守定通權達變者不足以語此此段議論乃千古特識患溫者從此不冤矣俗醫何曾夢見眉批凡溫病脈中診洪長滑數者輕重則脈沉甚則閉絶此辨溫病與傷寒脈浮脈沉異治之要訣也凡溫病脈洪長滑數兼緩者易治兼弦者難治凡溫病脈沉澀小急四肢厥逆通身如冰者危凡溫病脈兩手閉絶或一手閉絶者危凡溫病脈沉澀而微狀若屋漏者死凡溫病脈浮大而散狀若釜沸者死按傷寒溫病必須診脈施治有脈與證相應者則易於識別若脈與證不相應卻宜審察緩急或該從脈或該從證務要脈證兩得即如表證脈不浮者可汗而解里證脈不沉者可下而解以邪氣微不能牽引抑鬱正氣故脈不應下利脈實有病愈者但得證減復有實脈乃天年脈也又脈法之辨以洪滑者為陽為實以微弱者為陰為虛不待問也然仲景曰若脈浮大者氣實血虛也內經曰脈大四倍以上為關格皆為真虛陶氏曰不論浮沉大小但指下無力重按全無便是陰脈此洪滑之未必盡為陽也實也景嶽曰其脈如有如無附骨乃見沉微細脫乃陰陽潛伏閉塞之候陶氏曰凡內外有熱其脈沉伏不洪不數指下沉澀而小急是為伏熱此微弱之未必盡為陰也虛也夫脈原不可一途而取須以神氣形色聲音證候彼此相參以決死生安危方為盡善所以古人望聞問切四者缺一不可脈證兩得此治病之大關鍵也業醫者深宜留心眉批傷寒脈證辨太陽經病頭項痛腰脊強身痛發熱惡寒惡風脈浮緊以太陽經脈由脊背連風府至巔頂故為此證此三陽之表也仲景曰大汗後身熱愈甚者陰陽交而魂魄離也陽明經病身熱目痛鼻乾不眠脈洪而長以陽明主肌肉其脈挾鼻絡於目故為此證此三陽之裡也正陽明府病由表傳裡由經入府也邪氣既深故為潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發斑黃狂亂五六日不大便脈滑而實此實熱已傳於內乃可下之若脈弱無神又當詳辨少陽經病往來寒熱胸脅滿痛默默不欲食心煩喜嘔口苦目眩耳聾脈弦而數以少陽經脈循脅肋絡於耳故為此證此三陽三陰之間也由此漸入三陰故為半表半裡之證傷寒邪在三陽但有一毫表證總以發汗解肌為主太陰經病腹滿而吐食不下嗌乾手足自溫或自利腹痛不渴脈沉而細以太陰經脈布胃中絡於嗌故為此證少陰經病欲吐不吐脈注胸邪上逆心煩絡心故煩但欲寐陰主靜口燥舌乾自利而渴絡心故乾渴或咽痛吐利引衣蜷臥寒主收引故蜷臥其脈沉以少陰經脈貫腎絡於肺系舌本故為此證厥陰經病煩滿囊縮脈循陰器消渴子盛則母虛故腎水消而生渴氣上撞心心中痛熱母盛則子實故氣撞心而痛熱飢不欲食食即吐蛔木邪則土受傷下之利不止脈沉而弦以厥陰經脈循陰器絡於肝故為此證按傷寒自外之內脈證一定而傳變無常但不可拘於日數泥於次序內經次第言之者以發明其理耳大抵太陽表證居多然豈無初病徑犯陽明者豈無發於太陽即少陰受之者豈無太陽熱鬱以次而傳三陰者豈無太陽止傳陽明少陽而不傳三陰者所以仲景有云日數雖多有表證即宜汗日數雖少有里證即宜下此二句語活而義廣治傷寒之良法也溫病脈證辨傷寒論平脈篇曰寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也栗山曰此段乃溫病脈證根源也雖未明言溫病其詞意與傷寒絶不相干溫疫論以溫病得於雜氣纘論以溫病由血分出觀此益信旁批陰中於邪必內栗也栗竦縮也按經曰清邪曰濁邪明非風寒暑濕燥火六氣之邪也另為一種乃天地之雜氣也種種惡穢上溷空明清淨之氣下敗水土汙濁之氣人受之故上曰潔下曰渾中必內栗也玩篇中此四十六字全非傷寒脈證所有事乃論溫病所從入之門變證之總所謂赤文緑字開天闢地之寶符人未之識耳仍從傷寒論中看出溫病得於雜氣與傷寒外感風寒不同是讀書得間處眉批大意謂人之鼻氣通於天如毒霧煙瘴謂之清邪是雜氣之浮而上者從鼻息而上入於陽而陽分受傷經云清邪中上焦是也旁批久則發熱頭腫項強頸攣與俗稱大頭溫蝦蟆溫之説符也人之口氣通於地如水土物産化為濁邪是雜氣之沉而下者從口舌而下入於陰而陰分受傷經云濁邪中下焦是也旁批久則臍築湫痛嘔瀉腹鳴足膝厥逆便清下重與俗稱絞腸溫軟腳溫之説符也然從鼻從口所入之邪必先注中焦分布上下故中焦受邪經云陰中於邪是也旁批則清濁相干氣滯血凝不流其釀變即現中焦與俗稱瓜瓤溫疙瘩溫陽毒陰毒之説符也此三焦定位之邪也奇想天開妙有至理溫病之來歷從此復明於世矣眉批氣口脈盛屬內傷洪長滑數陰陽搏激曰緊若三焦邪溷為一則怫鬱熏蒸口爛蝕斷衛氣通者遊行經絡臟腑則為癰膿榮氣通者嚏出聲嗢咽塞熱壅不行則下血如豚肝如屋漏然以榮衛漸通猶非危候若上焦之陽下焦之陰兩不相交則脾氣於中難運斯五液注下而生氣幾絶矣纘論所謂傷寒自氣分傳入血分溫病由血分發出氣分鐵案不移傷寒得天地之常氣先行身之背次行身之前次行身之側自皮膚傳經絡受病於氣分故感而即動認真脈證治法急以發表為第一義入里則不消矣未有溫覆而當不消散者何至傳入血分變證百出哉河間以傷寒為雜病溫病為大病信然蓋溫病得天地之雜氣由口鼻入直行中道流布三焦散漫不收去而復合受病於血分故郁久而發亦有因外感或飢飽勞碌或焦思氣惱觸動而發者一發則邪氣充斥奔迫上行極而下下行極而上即脈閉體厥從無陰證皆毒火也與傷寒外感與治傷寒溫散何相干涉傷寒以脈為主溫病以證為主眉批奈何千年憒憒混為一病試折衷於經論寧不渙然冰釋哉治法急以逐穢為第一義上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒惡穢既通乘勢追拔勿使潛滋所以溫病非瀉則清非清則瀉原無多方時其輕重緩急而救之或該從證或該從脈切勿造次傷寒論曰凡治溫病可刺五十九穴此段明言溫病治法與傷寒不同旁批成注以瀉諸經之溫熱謂瀉諸陽之熱逆瀉胸中之熱瀉胃中之熱瀉四肢之熱瀉五臟之熱也按溫病脈經曰寸口脈陰陽俱緊與傷寒脈浮緊浮緩不同溫病證經曰中上焦中下焦陰中邪升降散增損雙解散主方也與傷寒證行身背行身前行身側不同溫病治法經曰刺五十九穴與傷寒治法溫覆發散不同非以溫病雖有表證實無表邪明示不可汗耶獨是河間以傷寒為雜病三百九十七法一百一十三方至詳且悉溫病為大病豈反無方論治法乎噫兵燹散亡傳寫多訛錯簡亦復不少承訛襲謬積習相沿迄今千餘年矣名手林立方書充棟未有不令發汗之説餘一人以管窺之見而欲革故洗新使之從風亦知其難然而孰得孰失何去何從必有能辨之者溫病與傷寒根源辨西漢張仲景著卒病傷寒論十六卷當世兆民賴以生全至晉代不過兩朝相隔其卒病論六卷已不可復睹即傷寒論十卷想亦劫火之餘僅得之讀者之口授其中不無殘闕失次賴有三百九十七法一百一十三方之名目可為校正而溫病失傳王叔和搜討成書附以己意指為伏寒插入異氣似近理而彌亂真其序例有曰冬時嚴寒雜厲之氣中而即病者為傷寒中而不即病寒毒藏於肌膚至春變為溫病至夏變為暑病成無己注云先夏至為病溫後夏至為暑病溫暑之病本於傷寒而得之由斯以談溫病與傷寒同一根源也又何怪乎後人治溫病皆以傷寒方論治之也殊不知溫病另為一種非寒毒藏至春夏變也自叔和即病不即病之論定而後世名家方附會之不暇誰敢辨之乎余為撥片云之翳以著白晝之光夫嚴寒中人頃刻即變輕則感冒重則傷寒非若春夏秋風暑濕燥所傷之可緩也即感冒一證之最輕者尚爾頭痛身痛發熱惡寒四肢拘急鼻塞痰喘當即為病不能容隱今為嚴寒殺厲所中反能藏伏過時而變誰其信之更問何等中而即病何等中而不即病何等中而即病者頭痛如破身痛如杖惡寒項強發熱如炙或喘或嘔煩躁不寧甚則發痙六脈如弦浮緊洪數傳變不可勝言失治乃至傷生何等中而不即病者感則一毫不覺既而挨至春夏當其已中之後未發之前神氣聲色不變飲食起居如常其已發之證勢更烈於傷寒況風寒侵入未有不由肌表而入所傷皆同榮衛所中均系嚴寒一者何其靈敏感而遂通一者何其癡呆寂然不動一本而枝殊同源而流異此必無之事歷來名家無不奉之為祖所謂千古疑城莫此難破然而孰得孰失何去何從藝夫牧豎亦能辨之人皆知仲景之法自叔和而明不知亦自叔和而晦溫病之壞始此矣後賢先傳後經附會闡發為叔和功臣非仲景功臣也茲欲溯仲景淵微必先破叔和藩籬譬諸五穀雖為食寶設不各為區別一概混種混收鮮不貽耕者食者之困矣眉批再問何等寒毒藏於肌膚夫肌為肌表膚為皮之淺者其間一毫一竅無非榮衛經行所攝之地即偶爾脫衣換帽所冒些小風寒當時而嚏尚不能稽留何況嚴寒殺厲之氣且藏於皮膚最淺之處反能容忍至春更歷春至夏發耶此固不待辨而自屈矣栗山曰豫頗明讀書之利害王安石遵信周禮何如前人蹈弊醫雖小道是乃仁術也所以辨之親切懇至乃而旁批乃又曰須知毒烈之氣留在何經而發何病前後不答非故自相矛盾其意實欲為異氣四變作開山祖師也後人孰知其為一場懵懂乎豫豈好辨哉豫不得已也此曰毒烈之氣留在何經而發何病卻是正論卻是翻自己的案可知中而不即病寒毒藏於肌膚之説於理大謬矣質之叔和何辭以對眉批凡治傷寒大法要在表裡分明未入於腑者邪在表也可汗而已已入於腑者邪在裡也可下而已若夫溫病果系寒毒藏於肌膚延至春夏猶發於表用藥不離辛溫邪氣還從汗解令後世治溫病者仍執肌膚在表之寒毒一投發散非徒無益而又害之且夫世之凶厲大病死生人在反掌間者盡屬溫病發於冬月正傷寒者千百一二而方書混同立論毫無分別總由王叔和序傷寒論於散亡之餘將溫病一門失於編入指為伏寒異氣妄立溫瘧風溫溫毒溫疫四變插入傷寒論中混而為一其證治非徒大壞而將泯焉後之學者殆自是而無所尋逐也已余於此道中已三折其肱矣兼以閲歷之久實見得根源所出南山可移此案不可動眉批傷寒得天地之常氣風寒外感自氣分而傳入血分溫病得天地之雜氣邪毒內入由血分而發出氣分常氣雜氣之説出自溫疫論氣分血分之説出自纘論皆是千古特識本此以辨溫病與傷寒異辨治溫病與治傷寒異非杜撰也旁批一彼一此乃風馬牛不相及也何以言之常氣者風寒暑濕燥火天地四時錯行之六氣也雜氣者非風非寒非暑非濕非燥非火天地間另為一種偶荒旱潦疵癘煙瘴之毒氣也故常氣受病在表淺而易雜氣受病在裡深而難溫疫論雜氣一語開溫病無窮法門纘論血分一語開溫病無窮方論鄉外人家見有發熱頭痛譫語者大家驚恐呼為雜疾此卻適中病根習而不察者吾輩也眉批就令如序例所云寒毒藏於肌膚至春夏變為溫病暑病亦寒毒之自變為溫自變為暑耳還是冬來常氣亦猶冬傷於寒春必病溫之説於雜氣何與千古流弊只緣人不知疵癘旱潦之雜氣而為溫病遂與傷寒視而為一病不分兩治余固不辭譾陋條分縷析將溫病與傷寒辨明各有病原各有脈息各有證候各有治法各有方論令醫家早為突曲徙薪之計庶不至焦頭爛額耳或問內經曰冬傷於寒春必病溫引經一語道破眉批余曰冬傷於寒謂人當冬時受寒氣也春必病溫謂人到來春必病熱也亦猶經曰人之傷於寒也則為病熱云爾東垣云其所以不病於冬而病於春者以寒水居卯之分方得其權大寒之令復行於春開發腠理少陰不藏辛苦之人陽氣外泄誰為鼓舞陰精內枯誰為滋養生化之源已絶身之所存者熱也故內經又云冬不藏精春必病溫此水衰火旺來春其病未有不發熱者於溫病何與溫病者疵癘之雜氣非冬來之常氣也腎虛人易為雜氣所侵則有之非謂傷於寒則為溫病也經何以不曰溫病而必曰病溫蓋溫者熱之始熱者溫之終也豈諸家所謂溫病者乎特辨以正前人注釋之謬辨得精細眉批溫病與傷寒治法辨讀仲景書一字一句都是精義後人之千方萬論再不能出其範圍余又何辨乎蓋仍本之仲景矣傷寒論曰凡傷寒之為病多從風寒得之風屬陽寒屬陰然風送寒來寒隨風入本為同氣故寒之淺者即為傷風風之深者即為傷寒故曰傷寒從風寒得之始因表中風寒入里則不消矣未有溫覆而當不消散者成氏注風寒初客於皮膚便投湯藥溫覆發散而當則無不消散之邪此論傷寒治法也其用藥自是麻黃桂枝大小青龍一派仍從傷寒論中看出溫病治法與傷寒不同是讀書得間處眉批傷寒論曰凡治溫病可刺五十九穴成氏注以瀉諸經之溫熱謂瀉諸陽之熱逆瀉胸中之熱瀉胃中之熱瀉四肢之熱瀉五臟之熱也此論溫病治法也若用藥當是白虎瀉心瀉心者大黃黃連瀉心湯也眉批大柴胡三承氣一派末又曰此以前是傷寒溫病證候也詳仲景兩條治法於傷寒則用溫覆消散於溫病則用刺穴瀉熱溫病與傷寒異治判若冰炭如此信乎仲景治溫病必別有方論看仲景治法溫病與傷寒原是兩門惜經兵火之餘散亡不傳耳此段接上生下眉批嗚呼歷年久遠兵燹散亡王叔和指為伏寒插入異氣後之名公尊信附會沿習耳聞遂將溫病為傷寒混同論治或以白虎承氣治傷寒或以麻黃桂枝治溫病或以為麻黃桂枝今時難用或以為溫病春用麻黃桂枝須加黃芩夏用麻黃桂枝須加石膏或於溫病知用白虎瀉心承氣而不敢用麻黃桂枝青龍者但昧於所以然之故溫病與傷寒異治處總未洞晰惟王氏溯洄著有傷寒立法考溫病熱病説其治法較若列眉千年長夜忽遇燈炬何幸如之惜其不知溫病中於雜氣而於嚴寒中而不即病至春夏變為溫暑之謬説一樣糊塗以為證治與傷寒異病原與傷寒同而未免小視輕忽之也劉氏直格以傷寒為雜病以溫病為大病特製雙解散涼隔散三黃石膏湯為治溫病主方所以然之故乃得於雜氣也自血分發出氣分也眉批其見高出千古深得長沙不傳之祕惜其不知溫病中於雜氣而於傷寒末傳陰證溫病從無陰證之治法無所發明庸工不能解其理不善用其方而猥以寒涼擯斥之也諸家混淆不清而二公亦千慮之失也王劉二公分辨溫病與傷寒異治是千古特識但不知溫病為雜氣也因此為辨明以補王劉所未及見得真守得定老吏斷獄鐵案不移二公當亦心折二公唯不知溫病為雜氣雖治分二門其實不敢盡變叔和序例伏寒暴寒之説所以三黃石膏湯雙解散內仍用麻黃披枝見根溯流窮源公於此乃點出金剛眼睛矣本平脈篇中兩次申明不厭重復正是婆心懇至處眉批余於此道中抱膝長吟細玩傷寒論平脈篇曰清邪中上焦濁邪中下焦陰中於邪等語始翻然頓悟曰此非傷寒外感常氣所有事乃雜氣由口鼻入三焦怫鬱內熾溫病之所由來也因此以辨溫病與傷寒異辨治溫病與治傷寒異為大關鍵故多采王劉二公之論並纘論緒論溫疫論尚論篇及諸前輩方論但有一條一段不悖於是者無不零星湊合以發揮仲景傷寒溫覆消散溫病刺穴瀉熱之意或去其所太過或補其所不及或衍其所未暢實多苦心云行邪伏邪辨凡邪所客有行邪有伏邪故治法有難有易取效有遲有速行邪如冬月正傷寒風寒為病自外之內有循經而傳者有越經而傳者有傳一二經而止者有傳盡六經不罷者有始終只在一經而不傳者有從陽經傳陰經為熱證者亦有變為寒證者有直中陰經為寒證者正如行人經由某地本無根蒂因其漂浮之勢病形雖亂若果在經一汗而解若果在胃一下而愈若果屬寒一於溫補若果傳變無常隨經治之有證可憑藥到便能獲效所謂得天地之常氣風寒外感自氣分傳入血分者是也先伏而後行者溫病也無形無聲者難言矣毒霧之來也無端煙瘴之出也無時溫熱熏蒸之惡穢無窮無數兼以餓殍在野胔骼之掩埋不厚甚有死尸連床魄汗之淋漓自充遂使一切不正之氣升降流行於上下之間人在氣交中無可逃避雖童男室女以無漏之體富貴豐亨以幽間之志且不能不共相殘染而辛苦之人可知矣而貧乏困頓之人又豈顧問哉雜氣侵人無論貧富強弱説得淋漓洞快令人目開心朗眉批語云大兵之後必有大荒大荒之後必有大疫此天地之氣數也誰能外之疵癘旱潦之災禽獸往往不免而況人乎所謂得天地之雜氣邪熱內郁由血分發出氣分者是也當其初病之時不唯不能即療其病而病勢日日加重病家見病反增即欲更醫醫家不解其故亦自驚疑竟不知先時蘊蓄邪微則病微邪甚則病甚病之輕重非關於醫人之死生全賴藥石故諺有之曰傷寒莫治頭勞病莫治尾若果是傷寒初受肌表不過浮邪在經一汗可解何難之有不知蓋指溫病而言也要其所以難者總因古今醫家積習相沿俱以溫病為傷寒俱以傷寒方治溫病致令溫魂疫魄含冤地下誠能分析明白看成兩樣脈證兩樣治法識得常氣雜氣表裡寒熱再詳氣分血分內外輕重自迎刃而解何至殺人耶雖曰溫病怪證奇出如飆舉蜂湧勢不可遏其實不過專主上中下焦毒火深重非若傷寒外感傳變無常用藥且無多方見效捷如影響按法治之自無殞命之理至於死而復蘇病後調理實實虛虛之間用藥卻宜斟酌妙算不能預定凡此但可為知者道也若夫久病枯稿酒色耗竭耆老風燭已入四損不可正治之條又不可同年而語證候辨或曰子辨溫病與傷寒有云壤之別今用白虎瀉心承氣抵當皆傷寒方也既同其方必同其證子何言之異也余曰傷寒初起必有感冒之因冬月烈風嚴寒雖屬天地之常氣但人或單衣風露或強力入水或臨風脫衣或當簷沐浴或道路沖寒自覺肌肉粟起既而四肢拘急頭痛發熱惡寒惡風脈緩有汗為中風脈緊無汗為傷寒或失治或誤治以致變證蜂起溫病初起原無感冒之因天地之雜氣無形無聲氣交流行由口鼻入三焦人自不覺耳不比風寒感人一著即病及其鬱久而發也忽覺凜凜以後但熱而不惡寒或因飢飽勞碌焦思氣鬱觸動其邪是促其發也不因所觸內之鬱熱自發者居多傷寒之邪自外傳內溫病之邪由內達外傷寒多表證初病發熱頭痛末即口燥咽乾溫病皆里證一發即口燥咽乾未嘗不發熱頭痛傷寒外邪一汗而解溫病伏邪雖汗不解病且加重傷寒解以發汗溫病解以戰汗傷寒汗解在前溫病汗解在後鮮薄荷連根搗取自然汁服能散一切風毒傷寒投劑可使立汗溫病下後里清表透不汗自愈終有得汗而解者傷寒感邪在經以經傳經溫病伏邪在內內溢於經傷寒感發甚暴溫病多有淹纏三五七日忽然加重亦有發之甚暴者傷寒不傳染於人溫病多傳染於人傷寒多感太陽溫病多起陽明傷寒以發表為先溫病以清裡為主各有證候種種不同其所同者傷寒溫病皆致胃實故用白虎承氣等方清熱導滯後一節治法亦無大異不得謂里證同而表證亦同耳寒熱為治病大綱領辨客有過而問之者曰聞子著寒溫條辨將發明傷寒乎抑發明溫病也特念無論傷寒溫病未有不發於寒熱者先賢之治法有以為熱者有以為寒者有以為寒熱之錯出者此為治病大綱領盍為我條分而辨論焉余曰願受教客曰內經云熱病者傷寒之類也人之傷於寒也則為病熱未入於府者可汗而已已入於府者可下而已三陽三陰五臟六腑皆受病榮衛不行臟腑不通則死矣又曰其未滿三日者可汗而已其滿三日者可下而已道常盡變説盡古今病勢人情眉批內經直言傷寒為熱而不言其有寒仲景傷寒論垂一百一十三方用桂附人參者八十有奇仲景治法與內經不同其故何也余曰上古之世恬淡渾穆精神內守即有傷寒一清熱而痊可此內經道其常也世不古若人非昔比以病有淺深則治有輕重氣稟日趨於澆薄故有鬱熱而兼有虛寒此仲景盡其變也客又曰傷寒以發表為第一義然麻黃桂枝大青龍每苦於熱而難用輕用則有狂躁斑黃衄血亡陽之失致成熱毒壞病故河間自制雙解散涼膈散三黃石膏湯雙解涼膈三黃石膏六一順氣大柴胡五方有治傷寒溫病之不同處觀藥方辨自知解毒承氣湯即大承氣湯合黃連解毒湯加白殭蠶蟬蛻去梔柏即瀉心承氣湯加栝樓半夏即陷胸承氣湯眉批若麻黃桂枝大青龍果不宜用仲景何以列於一百一十三方之首乎致使學者視仲景書欲伏焉而不敢決欲棄焉而莫之外夫仲景為醫家立法不祧之祖而其方難用其故何也余曰傷寒以病則寒以時則寒其用之固宜若用於溫病誠不免狂躁斑黃衄血亡陽之失矣辛溫發散之藥仲景蓋為冬月觸冒風寒之常氣而發之傷寒設不為感受天地疵癘旱潦之雜氣而發之溫病設仲景治溫病必別有方論今不見者其亡之也叔和搜採仲景舊論之散落者以成書功莫大矣但惜其以自己之説雜於仲景所言之中使玉石不分耳溫病與傷寒異治處惟劉河間王安道始倡其説兼余屢驗得凶厲大病死生在數日間者惟溫病為然而發於冬月之正傷寒者百不一出此河間所制雙解涼膈三黃石膏清瀉內熱之所以可用而仲景麻黃桂枝大青龍正發汗者之所以不可用也蓋冬月觸冒風寒之常氣而病謂之傷寒四時觸受疵癘之雜氣而病謂之溫病由其根源之不一故脈證不能相同治法不可相混耳此段辨溫病與傷寒之異辨治溫病與治傷寒之異坦白朋亮毫無矇混而筆力足以達之眉批客又曰人有傷寒初病直中三陰其為寒證無疑矣又有初病三陽本是熱證傳至三陰裡實可下止該用承氣抵當乃間有寒證可溫可補又用理中四逆其故何也余曰以初本是熱證或久病枯竭或暴感風寒或飲食生冷或過為寒涼之藥所攻伐遂變成陰證所云害熱未已寒證復起始為熱中末傳寒中是也且人之虛而未甚者胃氣尚能與邪搏而為實熱之證若虛之甚者亡陽於外亡陰於內上而津脫下而液脫不能勝其邪之傷因之下陷而裡寒之證作矣傷寒直中三陰是寒證若本是熱證傳至三陰熱證變為寒證者王劉亦未言及此足補之眉批熱極生寒其證多危以氣血之虛脫也客又曰寒熱互乘虛實錯出既聞命矣子之治療果何以得其宜條辨之説可聞否乎余曰證治多端難以言喻傷寒自表傳裡里證皆表證侵入於內也溫病由里達表表證即里證浮越於外也侵入浮越四字令人咀嚼不盡眉批大抵病在表證有可用麻黃桂枝葛根辛溫發汗者傷寒是也有可用神解清化升降芳香辛涼清熱者溫病是也在半表半裡證有可用小柴胡加減和解者傷寒是也有可用增損大柴胡增損三黃石腎湯內外攻發者溫病是也在裡證有可用涼膈承氣鹹寒攻伐者溫病與傷寒大略同有可用理陰補陰溫中補中調之養之者溫病與傷寒大略同但溫病無陰證宜溫補者即所云四損不可正治也若夫傷寒直中三陰之真寒證不過理中四逆附子白通一於溫補之而已至於四時交錯六氣不節以致霍亂瘧痢吐瀉咳嗽風溫暑溫濕溫秋溫冬溫等病感時行之氣而變者或熱或寒或寒熱錯出又當觀其何時何氣參酌傷寒溫病之法以意消息而治之補出寒證治法又補出時氣病治法何等緻密眉批此方治之宜大略如此而變證之異則有言不能傳者能知意在言表則知所未言者矣客又曰子之治療誠無可易矣第前輩諸名家皆以為溫暑之病本於傷寒而得之而子獨辨溫病與傷寒根源異治法異行邪伏邪異證候異六經脈證異並與時氣之病異得勿嫌於違古乎余曰吾人立法立言特患不合於理無濟於世耳果能有合於理有濟於世雖違之庸何傷客唯唯而退因櫽括其説曰寒熱為治病大綱領辨尚祈臨病之工務須辨明的確或為傷寒或為溫病再諦審其或屬熱或屬寒或屬寒熱錯出必洞悉於胸中然後診脈定方斷不可偏執己見亦不可偏信一家之謬説庶不至於差錯也發表為第一關節辨傷寒冬月感冒風寒之常氣而發之病名也溫病四時觸受天地疵癘旱潦之雜氣而發之病名也根源歧出枝分派別病態之異判若霄壤竊驗得凶厲大病死生人在數日問者盡屬溫病而發於正傷寒者未嘗多見溫病與傷寒異處不厭重復言之正是婆心懇切處從此得解是作書根本處眉批蕭萬輿軒歧救正曰其值嚴冬得正傷寒者二十年來於千人中僅見兩人故傷寒實非大病而溫病方為大病也從來傷寒諸籍能辨溫病與傷寒之異治者止見劉河間玉安道兩公而病原之所以異處亦未道出汁漿余宗其説而闡發之著為寒溫條辨若論里證或清或攻或消或補後一節治法溫病與傷寒雖曰不同亦無大異唯初病解表前一節治法大有大淵之別前一節治法大異此論發前人未發之奇眉批蓋傷寒感冒風寒之常氣自外而傳於內又在冬月非辛溫之藥何以開腠理而逐寒邪此麻黃桂枝大青龍之所以可用也若溫病得於天地之雜氣怫熱在裡由內而達於外傷寒得於常氣溫病得於雜氣本又可溫疫論王劉亦未言及論溫病無外感而內之鬱熱自發以補王劉所未及眉批故不惡寒而作渴此內之鬱熱為重外感為輕兼有無外感而內之鬱熱自發者又多發在春夏若用辛溫解表是為抱薪投火輕者必重重者必死惟用辛涼苦寒如升降雙解之劑以開導其裡熱裡熱除而表證自解矣亦有先見表證而後見里證者論溫病證有先見表而後見里者以補王劉所未及眉批蓋怫熱自內達外熱鬱腠理之時若不用辛涼解散則熱邪不得外泄遂還里而成可攻之證非如傷寒從表而傳裡也病之輕者神解散清化湯之類病之重者芳香飲加味涼隔散之類如升降散增損雙解散尤為對證之藥故傷寒不見里證一發汗而外邪即解溫病雖有表證一發汗而內邪愈熾此麻黃桂枝大青龍後人用以治傷寒未有不生者用以治溫病未有不死者此前一節治法所謂大有天淵之別也傷寒發汗溫病不發汗此著治法高出常格異處即在此眉批舉世不醒誤人甚衆故特表而出之以告天下之治溫病而等於傷寒者又溫病要得主腦譬如溫氣充心心經透出邪火橫行嫁禍乘其暇隙虧損之處現出無窮怪狀令人無處下手要其用藥只在瀉心經之邪火為君而餘邪自退每見人有腎元素虛或適逢淫欲一值溫病暴發邪陷下焦氣道不施以致便閉腹脹至夜發熱以導赤五苓全然不效一投升降雙解面小便如注又一隅之虧邪乘宿損如頭風痛腰腿痛心痛腹痛痰火喘嗽吐血便血崩帶淋瀝之類皆可作如是觀大抵邪行如水唯注者受之一著溫病舊病必發治法當先主溫病溫邪退而舊日之病不治自愈矣不得主腦徒治舊病不唯無益而壞病更烈於傷寒也此論發前人所未發醫家病家多為舊病所誤眉批若四損之人又非一隅之虧者可比傷寒要辨疑似有如狂而似發狂者有蓄血發黃而似濕熱發黃者有短氣而似發喘者有痞滿而似結胸者有並病而似合病者有少陰發熱而似太陽發熱者有太陽病脈沉而似少陰者太陽少陰俱是發熱脈沉細但以頭痛為太陽頭不痛為少陰辨之頭緒多端務須辨明如法治療若得汗吐下合度溫清攻適宜可收十全之功不至傳變而成壞病矣此篇論溫病傷寒治法各見精妙而其文亦有筆有法古致錯落忽止忽起正如斷嶺連峰出沒隱現一望無際倣佛張中丞後傳眉批傷寒論中共計壞病人十有六故傷寒本無多病俱是辨證不明錯誤所致如太陽始病當以汗解如當汗不汗則鬱熱內迫而傳經如發汗太過則經虛風襲而成痙如不當汗而汗則迫血妄行而成衄大便不可輕動動早為犯禁當汗誤下則引邪入里而為結胸痞氣協熱下利當下誤汗則為亡陽下厥上竭譫語小便不可輕利輕利為犯禁蓋自汗而渴為濕熱內盛故宜利如不當利而利必耗膀胱津液而成燥血發狂如當利不利必就陽明燥火而成蓄血發黃治傷寒大法不過所云云者妙在要認的證才下的藥不然則紙上談兵矣眉批若夫內傷類傷寒者用藥一差死生立判蓋內傷頭痛時痛時止外感頭痛日夜不休內傷之虛火上炎時時鬧熱但時發時止而夜甚於晝外感之發熱非傳裡則晝夜元休息凡若此等俱要明辨於胸中然後察色辨聲詳證診脈再定方製劑庶不至誤傷人命耳補出內傷類傷寒來治法與傷寒自是不同眉批溫病非時行之氣辨春溫夏暑秋涼冬寒此四時錯行之序即非其時有其氣亦屬天地之常而雜氣非其類也雜氣者非溫非暑非涼非寒乃夭地間另為一種疵癘旱潦之毒氣多起於兵荒之歲樂歲亦有之在方隅有盛衰在四季有多寡此溫病之所由來也叔和序例有云春應溫而反大寒夏應暑而反大涼秋應涼而反大熱冬應寒而反大溫非其時有其氣一歲之中長幼之病多相似者此則時行之氣也栗山曰余讀緒論冬月溫氣乘虛人里遂至合病而悟冬溫與風溫暑溫濕溫秋溫並瘧痢咳嘔霍亂等證皆時行之氣病也正如叔和所云而雜氣非其種耳與溫病何干旁批觀於此言嘴裡説得是時氣心裡卻當作溫病由是而天下後世之言溫病者胥準諸此而溫病之實失焉矣而時氣病之實亦失焉矣總緣人不知疵癘旱潦之雜氣而為溫病抑不知時行之氣宜熱而冷宜冷而熱雖損益於其間及其所感之病豈能外乎四時之本氣傷寒溫病時氣方書皆混而一之得此辨別明白自可免人錯誤此後人發前人未到之處者也眉批假令春分後天氣應暖偶因風雨交集不能溫暖而反大寒所感之病輕為感冒重為傷寒但春寒之氣終不若隆冬殺厲之氣投劑不無輕重之分此為應至而不至如秋分後適多風雨暴寒之氣先至所感之病大約與春寒倣佛深秋之寒亦不若隆冬殺厲之氣為重此為未應至而至即冬月嚴寒倍常是為至而太過所感乃真傷寒耳可知傷寒亦時氣之一耳與溫病原非一種眉批設溫暖倍常是為至而不及所感傷寒多合病並病耳即冬溫也假令夏月時多風雨炎威少息為至而不及時多亢旱爍石流金為至而太過不及亦病太過亦病一時霍亂吐瀉瘧痢咳嗽等項不過因暑溫而已又若春秋俱行夏令天地暴烈人感受之內外大熱舌苔口裂腹脅脹滿頭痛身痛狀類傷寒而實非傷寒狀類溫病而實非溫病此即諸家所謂風溫暑溫濕溫秋溫是也按此四證乃時行之氣所發與溫病根源不同而怫熱自內達外與溫病證治相同余每以溫病十五方時其輕重而施之屢效蓋能滌天地疵癘之氣即能化四時不節之氣古人云方貴明其所以然者即此也與冬溫差近按冬溫即傷寒合病並病也先解表而後攻裡以外束風寒故也與四證不同須明辨之凡此四時不節之時氣病即風寒暑濕燥火之六氣病所感終不離其本源正叔和序例所云云者是也於雜氣所中之溫病終何與焉誤以溫病為時氣病者又寧不渙然冰釋哉將一切時氣病説得明白坦亮與溫病毫無干涉令人目開心明眉批按內經云冬傷於寒春必病溫謂春必病熱也非溫病也霜降後雨水前風送寒來寒隨風入傷寒即冬之時氣也又云春傷於風夏生飧泄即春之時氣也夏傷於暑秋必痎瘧即夏之時氣也秋傷於濕濕土也土生金則燥冬生咳嗽即秋之時氣也何等平易何等切當豈無春夏秋冬受傷當時即發者乎不可執泥傷非藏於肌膚可知眉批知此便知溫病非時氣病乃天地之雜氣病也後人多為叔和所誤又按喻氏謂仲景獨傷寒一門立法乃四序主病之大綱也春夏秋三時雖不同其外感則一自可取傷寒之方錯綜用之此亦臆斷非確論也所傷風暑濕燥飧泄瘧痢咳嗽亦能殺人何必定以冬寒為大綱於三時不立法乎至於包含萬有百病千方不能出其範圍自是別具隻眼説得定眉批又按春傷風夏傷暑秋傷濕冬傷寒是人感節氣之變虛損家多為所傷也隨感隨病者固多過時而病或亦有之若中嚴寒殺厲之氣即至壯之人亦必病難言過時發矣諸家注釋四傷皆推求太過但只平易説去則經旨自明而無穿鑿之患溫病是雜氣非六氣辨日月星辰天之有象可觀水火上石地之有形可求昆蟲草木動植之物可見寒暑風濕四時之氣往來可覺至於山嵐瘴氣嶺南毒霧兵凶旱潦熏蒸鹹得地之濁氣猶或可察而唯天地之雜氣種種不一亦猶天之有日月星辰地之有水人士石氣交之有寒暑風濕動植之有昆蟲草木也昆蟲有龍蛇猛獸草木有桂附巴豆星辰有羅計熒惑土石有雄硫硇信萬物各有善惡雜氣亦各有優劣也第無聲無形不睹不聞其來也無時其著也無方感則一時不覺久則蓄而能通衆人有觸之者各隨其氣而為諸病焉或時衆人發頤或時衆人頭面浮腫俗名大頭溫是也或時衆人咽痛聲啞或時衆人頸筋脹大俗名蛤蟆溫是也或時衆人吐瀉腹痛或時衆人斑疹疔腫或時衆人嘔血暴下俗名攪腸溫瓜瓤溫是也或時衆人癭核紅腫俗名疙瘩溫是也或時衆人痿痹足重俗名軟腳溫是也大抵病偏於一方延門合戶當時適有某氣專人某臟腑某經絡專發為某病故衆人之病相同不關人之強弱血氣之盛衰又不可以年歲四時為拘情理宛然眉批是知氣之所來無時也或發於城市或發於村落他處安然無有是知氣之所著無方也雖有多寡輕重不同其實元處不有溫病本雜氣在六氣外來無時著無方此論發千古未發之奇啓後人無窮之智業醫者大宜留心眉批如瓜瓤溫疙瘩溫緩者三二日死急者朝發夕死在諸溫中為最重者幸而幾百年來罕有之病不可以常時並論也至於腫頭髮頤喉痹咽腫項強反張流火丹毒目赤斑疹腹痛嘔瀉頭痛身痛骨痿筋搐登高棄衣譫語狂叫不識人之類其時村市中偶有一二人患此考其證甚合某年某處衆人所患之病纖悉皆同治法無二此即當年之雜氣但目今所鐘不厚所患者稀少耳此又不可以衆人無有斷為非雜氣也況雜氣為病最多然舉世皆誤認為六氣雜氣為病甚於六氣以補河間原病式所未及眉批假如誤認為風者如大麻風鶴膝風歷節風老幼中風痛風厲風癇風之類概作風治未嘗一驗實非風也亦雜氣之一耳誤認為火者如療瘡發背癰疽毒氣流注目赤瘴翳以及斑疹之類概作火治未嘗一驗實非火也亦雜氣之一耳誤認為暑者如瘧痢吐瀉霍亂轉筋暴注腹痛以及昏迷悶亂之類概作暑治未嘗一驗實非暑也亦雜氣之一耳至誤認為濕燥寒病可以類推又有一切無名暴病頃刻即亡元因而生無識鄉愚認為鬼祟並皆雜氣所成從古未聞者何也蓋因來而不知著而不覺人唯向風寒暑濕燥火所見之氣求之而不索之於無聲無形不睹不聞之中推察既已錯認病源處方未免誤投藥餌大易所謂或繫之牛行人之得邑人之災也劉河間作原病式百病皆原於風寒暑濕燥火六氣殊不知雜氣為病更有甚於六氣者蓋六氣有限現在可測雜氣無窮茫然不可測也專務六氣不言雜氣烏能包括天下之病歟此吳又可雜氣論也余訂正之更其名曰溫病是雜氣非六氣辨雜氣所傷不同辨夫所謂雜氣雖曰天地之氣實由方土之氣也蓋其氣從地而起有是氣即有是病譬如天地生萬物亦由方土之産也但植物藉雨露而滋生動物賴飲食而頤養蓋先有是氣然後有是物推而廣之有無限之氣因有無限之物也雜氣為害甚於六氣觀物益知人矣人特習而不察耳至其沉潛理窟如話家常又非淺學所能道眉批但二五之精未免生剋制化是以萬物各有宜忌宜者益而忌者損損者制也故萬物各有所制如貓制鼠鼠制象之類既知以物制物既知以氣制物矣以氣制物者如蟹得霧則死棗得霧則桔之類此有形之氣動植之物皆為所制也至於無形之氣偏中於動物者如豬溫羊溫牛馬溫豈但人溫而已哉然豬病而羊不病牛病而馬不病人病而禽獸不病究其所傷不同因其氣各異也知其氣各異故謂之雜氣夫物者氣之化也氣者物之變也物即是氣氣即是物知氣可以制物則知物之可以制氣矣夫物之可以制氣者藥物也如蜒蛐解蜈蚣之毒山甲補蟻瘻之潰此受物氣之為病是以物之氣制物之氣猶或可測至於受無形之雜氣為病莫知何物之能制矣惟其不知何物之能制故勉用汗吐下和四法以決之耳噫果知以物制氣一病止用一藥又何煩用四法君臣佐使品味加減分兩輕重之勞並用方投證不投證見效不見效生死反掌之苦哉雜氣有盛衰辨凶年溫病盛行所患者衆最能傳染人皆驚恐呼為瘟疫蓋雜氣所鍾者盛也以故雞溫死雞豬溫死豬牛馬溫死牛馬推之於人何獨不然所以兵荒飢饉之歲民多夭折物皆疵癘大抵春夏之交為甚蓋溫暑濕熱之氣交結互蒸人在其中無隙可避病者當之魄汗淋漓一人病氣足充一室況於連床並榻沿門闔境共釀之氣益以出戶尸蟲載道腐墐燔柴掩席委壑投崖種種惡穢上溷空明清淨之氣下敗水上汙濁之氣人受之者親上親下病從其類經云清邪中上焦濁邪中下焦即親上親下病從其類二語可徵矣所謂讀書有得者是也豈傷寒外感表證所可同哉眉批如世所稱大頭溫頭面腮頤腫如瓜瓠者是也加味涼膈散所稱蛤蟆溫喉痹失音頸筋脹大者是也增損雙解散所稱瓜瓤溫胸高脅起嘔汁如血者是也加味涼膈散所稱疙瘩溫遍身紅腫發塊如瘤者是也增損雙解散玉樞丹外敷所稱絞腸溫腹鳴乾嘔水泄不通者是也增損雙解散所稱軟腳溫便清瀉白足重難移者是也增損雙解散升降散皆可升降散溫病主方也此六證可參用眉批其邪熱伏郁三焦由血分發出氣分雖有表證實無表邪與正傷寒外感之表證全無干涉人自不察耳必分溫病與瘟疫為兩病真屬不通蓋豐年閭里所患者不過幾人且不傳染並不知為溫病以致往往誤事蓋雜氣所鍾者微也余自辛未歷驗今三十餘年傷寒僅四人溫病不勝屈指樂歲之脈證與凶荒盛行之年纖悉無異至用藥取效毫無差別輕則清之重則瀉之各行所利未有不中病者若認為傷寒時氣誤投發散為禍不淺誤投溫補更成痼疾所以陳良佐曰凡發表溫中之藥一概禁用此尤不可不辨也溫病瘟疫之訛辨傷寒論曰凡治溫病可刺五十九穴只言溫病未有所謂瘟疫也後人省水加疒為瘟即溫字也省彳加疒為疫即役字也又如病證之證後人省登加正為證後又省言加疒為症即證字也古文並無瘟字疫字證字症字皆後人之變易耳不可因變易其文遂以溫病瘟疫為兩病序例以冬之伏寒至春變為溫病至夏變為暑病又以冬時有非節之暖名為瘟疫春分後秋分前天有暴寒者名為寒疫病熱云云自叔和伏寒暴寒之論定而後世諸家循沿舊聞喻氏謂一盲引衆盲相將入火炕甚是之謂歟眉批其後活人書以冬傷於寒因暑而發為熱病若三月至夏為晚發傷寒又以非其時有其氣責邪在四時專令之藏名為春溫夏溫秋溫冬溫云岐子以傷寒汗下過經不愈如見太陽證頭痛發熱惡寒名為太陽溫病見陽明證目痛鼻乾不眠名為陽明溫病見少陽證胸脅痛寒熱嘔而口苦名為少陽溫病見三陰證名為三陰溫病云云又以發斑名為溫毒汪氏以春之溫病有三種有冬傷於寒至春變為溫病者有溫病未已再遇溫氣而為瘟疫者有重感溫氣相雜而為溫毒者又以不因冬傷於寒不因更遇溫氣只於春時感春溫之氣而病可名春溫云云諸如此類敘溫者絡繹不絶議溫者紛紜各異其憑空附會重出疊見不唯膠柱鼓瑟且又罪及無辜果爾則當異證異脈不然何以知受病之原不一也設使脈證大相懸殊又當另立方論治法然則脈證何異方論治法又何立哉所謂枝節愈繁而意愈亂學者不免有多歧之惑矣見得真説得透放得倒眉批夫溫者熱之始熱者溫之終故夏曰熱病而春曰溫病也因其惡厲故名為疫癘終有得汗而解者故又名為汗病俗名為瘟疫者蓋疫者役也如徭役之役以其延門合戶衆人均等之謂也非兩病也此外又有風溫暑溫濕溫秋溫冬溫之名明明皆四序不節所謂非其時有其氣乃風火暑濕燥寒之邪天地之常氣為病也與溫病何相干涉總緣人不知天地間另為一種疵癘旱潦之雜氣而為溫病俗名雜疾是也此句凡三見非重出也正是大聲連呼喚醒世人處眉批諸家愈説愈鑿無所不至矣噫毫釐千里之謬一唱百和之失千古同悲余故不辭固陋詳為論辨以就正於知物君子溫疫論曰溫病本於雜氣四時皆有春夏較多常年不斷不比凶年之盛且甚耳序例活人汪氏悉屬支離正如頭上安頭伏寒異氣原非溫病根源云歧子則又指鹿為馬並不知傷寒溫病原是兩途未有始傷寒而終溫病者若是溫病自內達外何有傳經若果傳經自是傷寒由外之內而非溫病也又曰溫病初起雜氣熱鬱腠理亦發熱惡寒狀類傷寒後但熱而不惡寒也其脈不浮不沉中按洪長滑數甚則沉伏晝夜發熱日晡益甚雖有發熱惡寒頭痛身痛等證而怫熱在裡浮越於外不可認為傷寒表證輒用麻黃葛根之類強發其汗其邪原不在經汗之反增狂躁熱亦不減此溫病之所以異於傷寒也按又可溫疫論以溫病本於雜氣徹底澄清看到與傷寒判若雲泥諸名公學不逮此真足啓後人無窮智慧獨惜泥於邪在膜原半表半裡而創為表證九傳之説前後不答自相矛盾未免白圭之玷然不得因此而遂棄之也余多擇而從之四損不可正治辨凡人大勞大欲及大病久病或老人枯稿氣血兩虛陰陽並竭名曰四損真氣不足者氣不足以息言不足以聽或欲言而不能感邪雖重反無脹滿痞塞之證真血不足者通身痿黃兩唇刮白素或吐血衄血便血或崩漏産後失血過多感邪雖重面目反沒赤色真陽不足者或厥逆或下利肢體畏寒口鼻氣冷感邪雖重反無燥渴譫妄之狀真陰不足者肌膚甲錯五液乾枯感邪雖重應汗不汗應厥不厥辨之不明傷寒誤汗溫病誤下以致津液愈為枯涸邪氣滯澀不能轉輸也凡遇此等不可以常法正治當從其損而調之調之不愈者稍以常法正治之正治不愈者損之至也一損二損尚可救援三損四損神工亦無施矣按病有純虛純實非清則補有何乘除設有既虛且實者清補間用當詳孰先孰後從少從多可緩可急才見醫家本領余丙子在毫生員張琴斯正年過六旬素多鬱結有吐血證歲三五犯不以為事也四月間忽而發熱頭痛身痛不惡寒而作渴乃溫病也至第二日吐血倍常更覺眩暈大熱神昏手足戰掉咽喉不利飲食不進病家醫家但見吐血便以發熱眩暈神昏為陰虛頭痛身痛戰掉為血虛非大補不可救不察未吐血前已有發熱作渴頭痛身痛之證也余曰舊病固溫病發血脫為虛邪熱為實是虛中有實證也不可純補余用炙甘草湯去桂枝加歸芍熟地黃五味犀丹殭蠶蟬蛻二服血已不吐諸證減去七分舉家歸功於參均欲速迸余禁之竟不能止又進一服遂覺煩熱頓作胸腹痞悶遍體不舒終夜不寐時作譫語余曰諸證皆減初補之功也此乃本氣空虛以實填虛不與邪搏所餘三分之熱乃實邪也再補則以實填實邪氣轉熾故變證蜂起遂與升降散作丸服微利之而愈後因勞復以參柴三白湯治之而愈後又食復以梔子厚朴湯加神麯六錢而愈引而伸之觸類而長之可以應無窮之變矣六經證治辨凡傷寒足太陽膀胱經從頭頂貫腰脊故頭項強發熱惡寒然風寒常相因寒則傷榮頭痛惡寒脈浮緊無汗麻黃湯主之開發腠理以散寒得汗而愈風則傷衛頭痛惡風脈浮緩有汗桂枝湯主之充塞腠理以散風汗止而愈若風寒並受榮衛俱傷大青龍湯主之此三方者冬月天寒腠密非辛溫不能發散故宜用也若夫春夏之溫病其雜氣從口鼻而入伏郁中焦流布上下一發則炎熱熾盛表裡枯涸其陰氣不榮斷不能汗亦不可汗宜以辛涼苦寒清瀉為妙輕則清之神解清化芳香之類重則下之增損雙解加味涼膈升降之類消息治之傷寒汗後熱不退此陰陽交而魂魄離也證亦危矣其勢稍緩者宜更汗之若反劇煩躁者必有夾食夾痰或兼有宿病當尋其源而治之若發熱煩躁小便不利為熱入膀胱之本五苓散主之溫病清後熱不退脈洪滑數或沉伏表裡皆實譫妄狂越此熱在三焦也加味六一順氣湯解毒承氣湯大下之傷寒傳至陽明則身熱目痛鼻乾不得臥葛根湯表裡俱盛口渴引飲脈洪大白虎湯此在經之熱也傳至少陽為半表半裡之經往來寒熱脅滿口苦而嘔默默不欲食小柴胡湯加減和之過此不解則入陽明之府表證悉罷名為傳裡潮熱譫語唇焦舌燥大便祕脈沉實長洪如痞滿燥實四證皆具大承氣湯主之但見痞滿實三證邪在中焦調胃承氣湯不用枳朴恐傷上焦之氣但見痞滿二證邪在上焦不用芒硝恐傷下焦之血也小腹急大便黑小便自利喜忘如狂蓄血也桃仁承氣湯代抵當湯丸濕熱發黃但頭汗出茵陳蒿湯傷寒下後熱不退胸中堅滿不消脈尚數實者此為下未盡或下後一二日復發熱喘滿者並可用大柴胡湯或六一順氣湯復下之若下後仍不解宜詳虛實論治如脈虛人弱發熱口乾舌燥不可更下小柴胡湯參胡三白湯和之溫病下後厥不回熱仍盛而不退者危證也如脈虛人弱不可更下黃連解毒湯玉女煎清之不能不下黃龍湯主之若停積已盡邪熱愈盛脈微氣微法無可生至此下之死不下亦死用大復蘇飲清補兼施宣散蓄熱脈氣漸復或有得生者醫貫以六味地黃丸料大劑煎飲以滋真陰此亦有理若傷寒腹滿而嗌乾則知病在太陰也口燥咽乾而渴則知病在少陰也煩滿囊縮而厥則知病在厥陰也邪到三陰脈多見沉倘沉而有力此從三陽傳於三陰熱證也外雖有厥逆自利欲寢舌卷囊縮等證正所云陽極發厥止該清之下之自是桂枝加大黃承氣六一一派六一者六一順氣湯也加殭蠶蟬蛻黃連即加味六一順氣湯也眉批若本是陽證因汗下太過陽氣已脫遂轉為陰證夫邪在三陽其虛未甚胃氣尚能與邪搏而為實熱之證邪到三陰久而生變其虛之甚也氣血津液俱亡不能勝其邪之傷因之下陷而裡寒之證作矣此熱變為寒之至理脈必沉而無力證見四肢厥逆心悸惕瞤腹痛吐利畏寒戰栗引衣蜷臥急宜溫之補之陽虛者附子四逆陰虛者理陰補陰傷寒多有此證治溫病無陰證熱變為寒百不一出此辨溫病與傷寒六經證治異治之要訣也傷寒溫病治法各別層疊不亂足見精密然運用之妙存乎一心耳眉批蓋傷寒之邪風寒外感始中太陽者十八九溫病之邪直行中道初起陽明者十八九信乎治療之宜早而發表清裡之宜諦當也倘審之不諦而誤治之即成壞病矣壞病辨壞病者非本來壞病醫壞之也謂傷寒不當汗而汗不當下而下或汗下太早或汗下太遲或汗下無力不及於病或汗下過度虛其正氣如誤汗則有亡陽衄血斑黃譫語驚惕眩冒誤下則有煩躁嘔瀉結胸痞氣下厥上竭等證是也傷寒論曰太陽病已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之又曰若已發汗吐下溫針譫語柴胡證罷此為壞病觀其脈證知犯何逆以法治之前一段桂枝不中與謂表證已罷邪已傳變後一段柴胡證罷謂半表半裡之證已罷邪入更深仲景隨證治之一語語活而義廣以視王韓諸公專主溫補者為盡善也若溫病一壞勢雖烈於傷寒果隨證治之亦有得生者但不可鹵莽滅裂耳又溫病沸熱內郁斷無傳經之理傷寒則以七日為一候其有二候三候不解者病邪多在三陽經留戀仲景傷寒論原本內經熱論一篇並無過經再經明文唯有七日太陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陰病衰腹減如故十一日少陰病衰渴止舌潤而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病人之精神頓爽矣玩本文六衰字語意最妙蓋謂初感之邪至七日及十餘日尚未盡衰則可或汗吐下錯誤以致邪氣愈熾則可自當依壞病例治之豈有厥陰交盡於裡再出而傳太陽之事哉試質之高明兩感辨表裡俱病陰陽並傳謂之兩感乃邪熱亢極之證冬月正傷寒病兩感者亦少一部傷寒論僅見麻黃附子細辛湯一證有太陽之發熱故用麻黃有少陰之脈沉故用附子細辛發表溫里並用此長沙正傷寒太陽少陰之兩感治法也內經曰一日頭痛發熱惡寒口乾而渴太陽與少陰俱病即此而推陽明與太陰兩感自當以陽明太陰二經之藥合而治之內經曰二日身熱目痛鼻乾不眠腹滿不食陽明與太陰俱病少陽與厥陰兩感自當以少陽厥陰二經之藥合而治之內經曰三日耳聾脅痛寒熱而嘔煩滿囊縮而厥水漿不入少陽與厥陰俱病病有外內藥有標本斟酌合法未必如內經所云必死也惟溫病兩感最多蓋傷寒兩感外感之兩感也溫病兩感內傷之兩感也栗山曰余讀景嶽書得錢氏論而悟傷寒溫病兩感一感於外一傷於內確切不易也旁批傷寒兩感屬外感溫病兩感屬內傷此論精切的當發從來所未有眉批傷寒得於常氣受病在經絡如前注內經所云云者是也溫病得於雜氣受病在臟腑錢氏曰邪氣先潰於臟繼傷於腑縱情肆欲即少陰與太陽兩感勞倦竭力飲食不調即太陰與陽明兩感七情不慎疲筋敗血即厥陰與少陽兩感按錢氏雖未説出溫病實溫病確論也從此分辨溫病與傷寒異處自了然矣注解諦當眉批此所以內之鬱熱為重外感為輕甚有無外感而內之鬱熱自發者不知凡幾河間特製雙解散三黃石膏湯為兩解溫病表裡熱毒之神方即以補長沙凡治溫病可刺五十九穴之瀉法電纘論謂河間以傷寒為雜病溫病為大病其見高出千古深得長沙不傳之祕知言哉余觀張劉二公用方正以辨溫病與傷寒兩感異治之要訣也祖長沙繼河間以著書立説者何啻汗牛充棟未見有方論及此者間或有之亦挂一漏百有頭無尾余糾合前賢廣採衆論於散遺零星中湊集而暢發之而分晰之務使溫病脈證不致混人傷寒病中溫病治法不致混人傷寒方中後有識者或不以余言為謬云掃除一切省悟一切乾隆乙亥丙子丁丑戊寅吾邑連歲飢饉雜氣遍野溫病甚行余推廣河間用雙解三黃之意因定升降散神解散清化湯芳香飲大小復蘇飲大小清涼散加味涼膈散加味六一順氣湯增損大柴胡湯增損普濟消毒飲解毒承氣湯並雙解三黃亦為增損共合十五方地龍湯亦要藥也出入損益隨手輒應四年中全活甚衆有合河間心法讀纘論不禁擊節稱賞不置也地龍湯即蚯蚓搗爛入新汲水攪淨浮油飲清汁治溫病大熱諸證傷寒合病並病辨凡傷寒合病兩經三經齊病病之不傳者也並病者先見一經病一二日又加一經病前證不罷兩經俱病也若先見一經病更變他證者又為傳經矣夫三陽合病必互相下利傷寒論合病止三證眉批如太陽與少陽合病脈浮而弦自下利者黃芩湯太陽與陽明合病脈浮而長自下利者葛根湯喘而胸滿者不可下麻黃湯若心下滿腹痛宜下之調胃承氣湯陽明與少陽合病脈弦而長必下利其脈不負者順也小柴胡湯加葛根白芍若脈不長而獨弦利不止不食者名曰負負者失也土敗木賊則死也若脈兼滑而數者有宿食也宜大承氣湯急從下奪乃為解圍之善著若脈不滑數而遲弱方慮上敗垂亡尚敢下之乎宜小柴胡湯合痛瀉要方或可救之太陽與陽明並病太陽未罷面色緣緣正赤或煩躁者桂枝麻黃各半湯若太陽己罷潮熱大便實手足濈濈汗出此內實也調胃承氣湯若脈弦而長口苦胸滿壯熱者小柴胡湯加葛根白芍若脈弦洪大熱盛舌燥口渴飲水者小柴胡湯合白虎若太陽與少陽並病頭項強痛眩冒如結胸狀心下痞硬當刺大椎第一間肺俞肝俞刺大椎瀉手足三陽經也刺肺俞使肺氣下行而膀胱之氣化出也刺肝俞所以瀉膽邪也不善刺者宜小柴胡湯加栝樓黃連枳實桔梗或柴苓湯慎不可下若下之便成結胸痞氣下利不止等證傷寒論並病止二證眉批凡三陽合病身重腹滿難以轉側口不仁面垢譫語遺尿自汗者白虎湯若一發汗則津液內傷譫語益甚若一下之則陽邪內陷手足厥冷熱不得越故額上汗出也惟有白虎湯主解熱而不礙表裡在所宜用耳大抵治法某經同病必以某經之藥合而治之如人參敗毒散沖和湯乃三陽經藥麻黃湯桂枝湯大青龍湯乃太陽經藥葛根湯白虎湯乃陽明經藥小柴胡湯乃少陽經藥凡太陽經未罷當先解表若表已解而內不瘥大滿大實方可用承氣等湯攻之也按今傷寒多合病並病未見單經挨次相傳者亦未見表證悉罷止存里證者況多溫病烏能依經如式而方治相符乎緒論曰傷寒合病多由冬月過溫少陰不藏溫氣乘虛入里然後更感寒邪閉鬱於外寒熱錯雜遂至合病其邪內攻必自下利不下利即上嘔邪氣之充斥奔迫從可識矣必先解表後清裡其傷寒合病仲景自有桂枝加葛根湯葛根加半夏湯葛根湯麻黃湯等治法觀仲景治例可見矣余謂冬月溫氣乘虛入里雖曰非其時有其氣到底是天地常氣所以傷寒合病名曰冬溫即此而推所謂風溫暑溫濕溫秋溫亦皆時氣也與溫病雜氣所得根源不同按傷寒感冒風寒常氣自表傳裡故多循序而傳而合病井病為極少溫病因雜氣怫熱自里達表或飢飽勞碌或憂思氣鬱觸動其邪故暴發競起而合病並病為極多甚有全無所觸止是內郁之熱久則自然蒸動緒論之邪氣充斥奔迫六字可為傷寒合病並病傳神並可為溫病傳神故溫病但見太陽少陽證即可用增損大柴胡湯但見三陽證即可用加味涼膈散傷寒見太陽少陽合病必俟邪熱漸次入里方可用黃芩湯見三陽合病必有身重腹滿譫語自汗方可用白虎湯又何論大柴胡涼膈散乎太陽陽明並病在傷寒自是麻黃葛根之類蓋傷寒但有表證非汗不解也在溫病自是神解升降增損雙解之類不可發汗裡氣清而表氣自透汗自解矣太陽少陽並病在傷寒小柴胡湯加減治之在溫病增損大柴胡湯此辨溫病與傷寒合病並病異治之要訣也此段議論開擴萬古心胸推倒一世豪傑令長沙見之當亦無異説矣眉批溫病大頭六證辨大頭者天行疵癘之雜氣人感受之壅遏上焦直犯清道發之為大頭溫也世皆謂風寒閉塞而成是不知病之來歷者也若頭巔腦後項下及耳後赤腫者此邪毒內蘊發越於太陽也鼻頞兩目並額上面部焮赤而腫者此邪毒內蘊發越於陽明也耳上下前後並頭角赤腫者此邪毒內蘊發越於少陽也其與喉痹項腫頸筋脹大俗名蛤蟆溫正經論所云清邪中上焦是也如絞腸溫吐瀉湫痛軟腳溫骨痿足重正經論所云濁邪中下焦是也如瓜瓤溫胸高嘔血疙瘩溫紅腫發塊正經論所云陰中於邪是也古方用白殭蠶二兩酒炒全蟬蛻一兩廣薑黃去皮三錢川大黃生四兩為末以冷黃酒一盅蜜五錢調服三錢六證並主之能吐能下或下後汗出有升清降濁之義因名升降散較普濟消毒飲為尤勝外用馬齒莧入麥曲並醋少許搗敷腫硬處甚妙夫此六證乃溫病之中最重且凶者正傷寒無此證候故特揭出言之其餘大概相若七十餘條俱從傷寒內辨而治之正以明溫病之所以異於傷寒也正以明傷寒方之不可以治溫病也知此則不至誤傷人命耳引證確切鐵案不移長沙亦應三肯其首晉後名家林立方書充棟未見有發明溫病至此者妙在仍從傷寒論中看出見得真放得倒眉批喻氏曰叔和每序傷寒必插入異氣欲鳴己得也及序異氣則借意難經自作聰明漫擬四溫疑鬼疑神駸成妖妄世醫每奉叔和序例如針銘一字不敢辨別故有晉以後之談溫者皆偽學也栗山獨取經論平脈篇一段定為溫病所從出之原條分縷析別顯明微辨礙與傷寒各為一家豪無矇混不為叔和惑煽直可追宗長沙矣畏齋先生識
