body:
  text: 跋一世嘗謂傷寒家如戴復庵偏於溫補劉河間偏於寒瀉是殆循跡以求而未深嘗其味者蓋復庵以傷寒汗下失宜寒涼太過始為熱中末傳寒中誠得治傷寒壞病之要訣而非偏於溫補也河間以傷寒為雜病溫病為大病特製雙解涼膈三黃石膏表裡兩解誠得治溫病鬱熱之要訣而非偏於寒瀉也各擅其勝易地則皆然矣不得要領而動相非議又何怪人異其旨家異其學耶余才淺學疏未入閫奧惟是博考先哲議論零星輻輳詳辨溫病脈證與傷寒大異病分常氣雜氣治分氣分血分與夫陰陽寒熱表裡虛實條分縷析而理歸一貫其論證處方於先哲之隱深者明顯之詰屈者流利之以就淺近非故點金成鐵也將使因證檢書而求治方者寒溫補瀉各適其宜不至多歧而惑則幸甚戊子春慄山璇書跋二自黃帝氏作而生民之命遂懸於醫人之手其或專心致志鉤深探微如古所稱扁鵲之徒可以使病者立愈危者立安豈不快然無憾乃世之為醫者吾懼焉朝學看書暮即自誇其能其於藥性猶未深辨脈理猶未深悉虛實寒熱補瀉因應之宜猶未深解剽竊膚末持其一偏之見物焉而不化卒使疾輕增重疾重趨危可悲也夫余以辛丑秋筮仕江左適大都孫公亦官茲土因得與之交其為人也濟人之急扶人之難好善樂義光明磊落有古君子風甲辰夏其第三子適遘溫疫醫者凡數十輩竟無能名其為何疾者最後得慄山楊先生寒溫條辨編始知其誤而病已不可為矣嗣後公家復有患是疾者公乃取是編而詳味之因遵其方以治家之人無不應手而愈維時金陵染是疾者甚眾公惻然憫之曰是不可以獨愈吾家人於是懸帖通衢使病者咸來取藥公於公退之餘親問其證按證而予之劑雖費不吝雖勞不辭不取貲不受謝踵接於門歡聲載路金陵內外凡賴公而活者殆未易更僕數焉吾嘗謂人心之善可以挽天時之癘氣而使之平然不得是編則此疾無由治或得是編而不廣施而博濟之則窮獨而罹此疾者終無由治若公之仁心為質盡捐其歲俸以拯人於危殆之際恩施而不自有真可謂近世所罕覯者乃公之心猶歉然也公之言曰吾一子亡而千百人之命以全吾何憾焉所可惜者書無刊本而人苦於謄寫之難不可以行遠遂發願創刻是書捐貲而付梓人於是書之傳益廣其活人也益多而公之德亦益以無窮矣嗚呼醫豈可輕言哉苟非體天地好生之心數十年沉潛於茲鮮有臻其奧者如編中所論傷寒溫病之殊與其治法之必不可混皆鑿鑿不易發前人所未發人命至重也一藥之投失之毫釐繆以千里呼吸之間生死遂判片時偶誤雖悔何追世之人得是編而遵之又取而融會貫通之以無負我孫公之意則咸登壽域可也為醫者其慎寶之哉乾隆四十九年歲次甲辰桂月平陰朱續孜敬跋跋三大都靜川孫公官於江南與余為同僚其人敦以和直以爽慷慨好施也余與之交七載意氣勤勤懇懇久而彌摯蓋誠篤君子也甲辰夏余自淮至白下公之第三子適以是日殤相對垂泣究不辨致殞之為何疾也余時奉檄赴崑邑匆匆別去今年春旋返金陵復與公追話曩昔公始而愀然繼乃慨然曰吾今始知亡兒致殞之由乃以溫證作寒證向未有深於此者為之條分縷辨也因盛稱慄山楊先生寒溫條辨一書為發千古未發之秘且縷述以方藥治疾奇效狀並出手錄一編授余曰因兒亡而得是書因是書而吾家之患疾者咸獲無恙因一家之獲效而得以推及路人噫使是書傳兒雖亡無憾矣今將鋟以傳世乞子一言序之余不知醫者也即公亦素非以醫自見者也茲之捐廉俸選梓人汲汲若不可一日緩者夫固有所信之也嗚呼公之書楊氏之書也楊氏不暇以其書治人而公治之楊氏不暇以其書傳人而公傳之則凡因是書而得免疫癘夭札之虞者楊氏濟世之心亦公濟世之心也世之讀是書者一如公之信楊氏濟人寧有量耶至其分析寒溫如快刀破竹永斷葛藤如明鏡取形不隱毫髮即余不知醫者讀之豁然有以自明況深探之微者乎原與天下之人共寶之乾隆乙巳夏五山陰無恙邵颿拜手跋
