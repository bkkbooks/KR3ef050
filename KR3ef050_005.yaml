body:
  text: 卷五吳茱萸湯厥陰頭痛嘔而吐沫少陽犯真寒吐利手足厥煩躁欲死及寒邪入陽明食谷欲嘔者並此方主之吳茱萸揀淨三錢生薑三錢大棗三枚人參一錢水煎溫服厥陰肝也寒邪內格故嘔而吐沫厥陰與督脈會於巔故頭痛少陰腎也腎贓中寒則上格乎陽而為嘔吐經云腎主二便腎寒則不便大禁而為利下手足得陽氣而溫內有真寒故令手足厥冷煩躁者陰盛格陽故令陽煩陰躁其證多危故曰欲死吳茱萸辛熱而氣厚專司開豁胸中逆氣經曰氣為陽氣厚為陽中之陽故能走下焦而溫厥陰少陰也臣以生薑散其寒也佐以參棗補中虛也小建中湯傷寒三四日心悸而煩及少陰惡寒腹中急痛此方主之加黃耆蜜炙三錢名黃耆建中湯白芍酒炒四錢桂甘草炙各二錢生薑二錢大棗二枚飴糖三錢水煎去渣入飴糖溶化服醫方考曰小建中湯宜用肉桂枝則味薄故用之以解肌桂則味厚故用之以建中也愚按開後人補中益氣無窮之法門此方是也纘論曰桂枝湯中白芍桂枝等份用白芍佐桂枝以治衛氣小建中湯中白芍四錢桂枝二錢用桂枝佐白芍以治榮氣更加飴糖以緩其脾故名之曰建中則其功用大有不同耳當歸四逆湯手足厥寒陽邪陷內四肢逆冷脈細欲絕陰盛陽衰此方主之當歸白芍桂枝各二錢細辛通草甘草各一錢四分大棗二枚水煎溫服加吳茱萸二錢生薑二錢酒煎名當歸四逆加吳茱萸生薑湯治前證內有久寒者手足厥寒脈細欲絕似乎陰證之極蓋緣陽邪傳入厥陰榮分以本虛不能作熱故厥而脈細欲絕也此為陰陰是指厥陰經也郁陽邪故用桂枝細辛以解表白芍甘草以瀉熱當歸以和厥陰之榮血通草以通太陽之本府使陽邪得從外解原非治陰寒四逆之藥也故藥宜歸芍以濟陰不宜薑附以劫其陰也是證也自表入里雖曰傳至厥陰始終只是陽證與陰寒直中三陰不同故不用四逆湯而用桂枝湯加當歸細辛通草耳明者自知之按昔人云人有陰血虧於陽分不能勝辛熱者更宜此湯主之殊不知此唯有陽邪者宜之若無陽邪而見此證則是陰血大虧矣投之禍不旋踵蓋細辛為少陰中表藥隨桂枝湯以解肌加當歸以和榮血至於通草甘淡微寒能瀉丙丁能通水道為虛寒者禁用此湯治法本是和榮血以緩脈使陽邪得從肌表而散或從膀胱而泄也若循其名以治陰虧寒中之四逆則謬甚矣觀於傷寒論曰若其人素有久寒者宜當歸四逆湯加茱萸生薑主之正如四逆散本以散傳經之熱邪腹中痛者方加附子則當歸四逆湯非治陰寒四逆之藥也明矣更有一等固守王道之醫辨證不明遇有厥逆脈細之證不敢用四逆湯但曰用當歸四逆湯極為穩當不知此湯乃桂枝湯加當歸細辛通草耳細辛隨桂枝湯止能解表通草又為疏通最有力之藥當歸一味果足以治陰寒四逆耶藥不對證果可謂之穩當耶甚矣其不明於制方之理而以舛錯誤病也予前所云用方貴明其所以然者正謂此也乾薑附子湯少陰誤下復發汗晝日煩躁夜而安靜不嘔不渴無表證脈沉微身無大熱者此方主之又陰盛格陽目赤面赤煩渴引飲脈來七八至按之則散為無根之脈以此方加人參主之乾薑二錢附子三錢水煎溫服或云冷服此即四逆減去甘緩之甘草為回陽重劑若加增藥味反牽制其雄悍之力必致迂緩無功矣乾薑辛以潤燥散煩和表裡之誤傷附子熱以溫中固表調陰陽於既濟陽回即可用平補之藥蓋陽既安堵即宜休養其陰切勿過用辛熱轉生他患也審之慎之桂枝新加湯汗後身痛脈沉遲者此方主之以桂枝湯解汗後之風邪加參芍益不足之血脈亦兩解表裡安內攘外之一法曰新加者因發汗新虛明非桂枝湯中之舊法也桂枝三錢白芍四錢甘草二錢人參一錢生薑三錢大棗二枚水煎溫服黃連阿膠湯少陰病二三日以上心中煩不得臥此方主之少陰本欲寐今反煩不得寐者以風邪客於裡裡熱甚而不和也此扶陰散熱之良方也並治火邪內攻迫血下行者用以治痢亦取扶陰散熱之義黃連清膈消悶厚腸阿膠祛風養腎各三錢黃芩疏風泄熱白芍利脾制木各三錢生雞子黃逐風鎮膽一枚水煎成去渣入阿膠烊盡少冷入雞子黃攪勻服桂枝回陽定驚去芍藥恐其損陽加蜀漆龍骨牡蠣救逆湯太陽傷寒脈浮此風寒兩傷也醫以火迫劫之亡陽此大汗不止也驚狂神乃陽之靈陽衰則亂矣起臥不安者煩躁不寧此皆停飲上逆凌心也飲去則心神定矣此方主之桂枝三錢蜀漆去腳三錢龍骨四錢牡蠣粉五錢甘草炙二錢生薑三錢大棗二枚水煎蜀漆三沸取其逐飲次入群藥煎服去蜀漆名桂枝甘草龍骨牡蠣湯治火逆下之復煩躁者按桂枝解風邪以固表養心甘草和中氣以益陽瀉火牡蠣咸走腎而寧心龍骨澀收神而宅心生薑利氣和胃大棗通經健脾蜀漆辛以逐停飲飲去則心安故驚狂不安者乃水凌心火也此仲景不傳之秘也竹葉石膏湯陽明汗多而渴衄血渴欲飲水水入即吐及傷寒瘥後虛羸少氣氣逆欲吐並此方主之竹葉二錢石膏四錢麥冬去心二錢半夏二錢人參一錢甘草炙一錢生薑二錢粳米二錢水煎溫服本方去石膏半夏薑米加柴胡黃芩名人參竹葉湯治汗下後煩熱口渴虛羸少氣之證竹葉石膏之辛寒以止喘促散餘熱參草粳麥之甘平以益肺胃生津液生薑半夏之辛溫以豁痰飲去嘔逆此虛羸熱逆之良方也加味溫膽湯治汗下後不解嘔而痞悶或虛煩不眠肉瞤筋惕者人參甘草炙茯苓遠志去心酸棗仁炒研熟地枳實麩炒陳皮半夏薑汁炒各一錢五味子五分生薑一錢水煎溫服疏表湯治四時感冒風寒鼻塞聲重或流涕不已發熱惡寒頭痛身痛者淡豆豉三錢羌活二錢防風桔梗各一錢半前胡黃芩各一錢蘇葉川芎各八分細辛甘草各五分生薑二錢蔥白二莖水煎溫服微汗口渴加花粉麥冬各一錢滿悶加枳殼麩炒錢半熱甚加知母一錢桂枝附子湯傷寒七八日即傳裡之時也風濕相搏搏聚而為痹也身體煩痛風勝則煩濕勝則痛不能自轉側濕主重濁不嘔邪在表也不渴里無熱也脈浮虛而澀浮虛為風澀為濕也此方主之浮虛而澀知風濕但在經也與桂枝以解表風加附子以散寒濕若其人大便難小便自利者去桂枝加白朮湯主之去桂惡其走表而不和里加朮喜其益土而燥濕也桂枝三錢附子炮二錢甘草炙一錢半生薑三錢大棗二枚水煎溫服去桂枝加白朮三錢名去桂加朮湯人參固本湯治溫病虛極熱極循衣作空不下必死者下後神思稍蘇續得肢體振寒怔忡驚悸如人將捕之狀四肢厥逆眩運鬱冒項背強直此大虛之兆將危之候也此方救之人參二錢熟地三錢生地二錢當歸二錢杭芍一錢五分天冬去心麥冬去心五味陳皮知母甘草炙各一錢水煎溫冷服之服後虛回止後服蓋溫病乃火邪燥證人參固為補元氣之神丹但恐偏於益陽恣意投之有助火固邪之弊不可不知也按溫病乃天地雜氣之一也有邪不除淹纏日久必至虛羸庸工望之不問虛實久暫可否輒用人參殊不知無邪不病邪去而正氣自通何慮虛之不復也今妄投補劑邪氣益固正氣益郁轉郁轉熱轉熱轉瘦轉瘦轉補轉補轉郁循環不已乃至骨立而斃猶言服參幾許補之不及奈何余於乾隆甲戌乙亥丙子三年中眼見親友患溫病服參受害者不可枚舉病家止誤一人醫家終身不悟不知殺人無算特書之以為濫用人參之戒非禁之使不用也果如前證虛危之極非人參烏能回元氣於無何有之鄉哉當歸六黃湯治陰虛盜汗又方用蓮子七枚黑棗七枚浮麥七錢馬料豆七錢水煎治同當歸二錢熟地二錢生地黃連黃芩黃柏各一錢黃耆生三錢防風一錢麻黃根一錢浮麥一錢水煎溫服黃耆湯治陽虛自汗黃耆五味子各三錢撻碎核當歸白朮土炒甘草各一錢水煎溫服汗多不止加麻黃根一錢防風一錢或加麻黃根一錢牡蠣粉一錢浮麥一錢經疏曰凡服固表藥而汗不止者當用酸棗仁炒黑三錢白芍生地麥冬五味子元肉各二錢竹葉二十片煎服多效以汗為心液故也柴胡桂枝幹薑湯傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出三陽脈起於頭陽邪甚於上陰精衰於下故汗出也往來寒熱心煩者表未解也此方主之柴胡四錢花粉二錢黃芩桂枝牡蠣粉各一錢半乾薑甘草炙各一錢水煎初服微煩後服汗出愈按柴胡除少陽之寒熱桂枝解太陽之餘邪花粉徹陽明之渴熱乾薑去胸脅之煩滿甘草調汗下之誤傷此少陽陽明兩解之治法也厚朴生薑半夏甘草人參湯陽明病中寒不能食小便不利毛足濈然汗出者此欲作痼瘕大便必初硬後溏此胃中虛冷水穀不別故也痼瘕者寒氣結而積也此方主之並治汗解後腹脹滿此非裡實蓋脾胃為津液之主汗多則津液不足氣虛不能敷布諸氣壅滯停飲而為脹滿與此湯以和脾胃而降氣也一云瘕泄也蓋大便初硬後溏因成瘕泄瘕泄即溏泄久而不止則曰痼瘕也亦通厚朴姜炒生薑半夏薑汁炒各四錢甘草二錢人參一錢水煎溫服脹非苦不泄氣非溫不行飲非辛不散胃非甘不和虛非補不復五味之功用大矣大陷胸湯大黃三錢芒硝二錢甘遂末五分水煎大黃五六沸去渣再入芒硝煎一二沸調甘遂末服加葶藶子杏仁去皮炒黑與大黃芒硝四味等份為末煉蜜丸如彈子大取一丸入甘遂末三五分蜜三匙水煎並渣服之此名大陷胸丸結胸者項亦強如柔痙狀下之則和矣此方主之小半夏加茯苓湯心下滿頭汗出水結胸或心悸目眩此方主之去茯苓即小半夏生薑湯半夏姜炒五錢茯苓五錢生薑五錢水煎溫服健脾滲濕火因水下則痞渴消而悸眩止小陷胸湯小結胸病正在心下按之則痛脈浮滑者此方主之邪氣深入尚在半表半裡為熱為痰為飲病有淺深方有大小除熱下痰黃連薑汁微炒一錢五分半夏姜炒三錢瓜蔞搗爛一個水煎溫服黃連苦以瀉熱用代大黃半夏辛以逐痰用代甘遂瓜蔞潤以行滯用代芒硝不比大陷胸湯之峻厲也枳實理中丸枳實麩炒瓜蔞牡蠣粉白朮土炒甘草各一兩乾薑炒八錢人參黃連黃芩各三錢為末煉蜜丸如雞子黃大以熱湯化服一丸覺腹中熱則胸中豁然矣未熱則加丸再服海蛤散治血結胸揉而痛不可撫近者海蛤粉滑石甘草各等份芒硝減半元明粉更妙為末用蜜水入雞子清調服二錢桔梗枳殼湯治痞氣胸膈不痛噯氣吐酸或咳者桔梗枳殼麩炒各二錢水煎溫服此二味苦下氣而散痞滿寒消熱而除咳飲也大黃黃連瀉心湯心下痞按之濡按之不痛而軟其脈關上浮者關候心下浮主虛熱此方主之大黃二錢黃連一錢黃芩一錢搗碎麻沸湯漬之去渣服活人書曰湯液論有黃芩一錢今無者恐傳寫之訛也李時珍曰仲景治心下痞按之濡者用大黃黃連瀉心湯此亦瀉脾胃之濕熱非瀉心也病發於陰而下之太早則作痞滿乃寒傷榮血邪氣乘虛結於上焦胃之上脘在於心下故曰瀉心附子瀉心湯心下痞而復惡寒汗出者此方主之附子炮大黃各二錢黃連黃芩各一錢附子一味另煎取汁大黃芩連三味以麻沸湯漬之去渣入附子汁溫服心下痞故用三黃以瀉痞惡寒汗出故用附子以回陽無三黃則不能瀉痞熱無附子恐三黃益損其陽氣熱有三黃寒有附子寒熱互用斯為有制之兵矣仲景誠醫家之善將將者也俗醫用寒則不敢用熱用熱則不敢用寒何異於膠柱鼓瑟乎纘論曰瀉心湯諸方皆治汗下後表解里未和之證其半夏生薑甘草三瀉心湯是治痰飲濕熱結聚之痞方中用半夏生薑以滌痰飲黃連黃芩以除濕熱人參甘草以助胃氣乾薑炮黑以滲水濕若但用苦寒治熱則格拒不入必得辛熱為之嚮導是以半夏乾薑在所必需如痞極硬滿暫去人參氣壅上升勿用生薑此一方出入而有三用也其大黃黃連與附子二瀉心湯乃治陰陽偏勝之痞一以大黃芩連滌胸中素有之濕熱一加附子兼溫經中驟脫之虛寒也三黃用沸湯漬服者取寒藥之性不經火而力峻也附子煮汁者取性熱行經以復其陽耳仲景寒熱並用補瀉兼施立方之妙無出乎此以三黃滌胸中之邪熱以附子散凝結之陰寒一舉而寒熱交聚之邪盡解詎知後人目睹其方而心眩也按半夏生薑甘草三瀉心湯人尤易曉其大黃黃連與附子二瀉心湯具有妙用不可不透悟也夫大黃黃連瀉心湯孰不以為治心下之痞熱也竊詳傷寒論曰心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之成氏注曰心下痞按之痛關脈沉者實熱也按之濡關脈浮者虛熱也故大黃芩連不用煎煮而但以麻沸湯漬服者取其味薄而瀉心下之虛熱不欲其味厚而傷中氣也附子瀉心湯人亦知為寒熱之互用也竊詳傷寒論曰心下痞復惡寒汗出者附子瀉心湯主之成氏注曰心下痞者虛熱內伏也惡寒汗出者陽氣外虛也與大黃黃連瀉心湯以導痞熱加附子以回陽氣夫痞熱固須導除而陽虛更為可慮附子煮汁者回陽之重劑也三黃沸漬者導熱之輕劑也纘論謂取寒藥之性不經火而力峻豈其然乎今人以大黃熟煎則無力實纘論之說誤之也內經曰味屬陰味厚屬陰中之陰熟煎味厚安得無力須辨之半夏瀉心湯柴胡證具而誤下之但心下滿而不痛此為痞此方主之半夏薑製四錢人參一錢乾薑炮黑甘草炙黃芩各二錢黃連一錢大棗二枚水煎溫服少陽誤下變證有三等治法嘔而發熱柴胡證猶在者復與小柴胡湯必蒸蒸振汗而解若心下滿而硬痛此為結胸柴胡陷胸湯大陷胸湯量輕重用之但滿而不痛此為痞宜此湯否而不泰為痞瀉心者必以苦故用黃連黃芩散痞者必以辛故用半夏乾薑交陰陽通上下者必和其中故用人參甘草大棗也諸瀉心湯寒熱並用妙不可傳生薑瀉心湯傷寒汗解之後火邪乍退胃中不和正氣未復心下痞硬胃虛不運停飲致痞干噯為水所遏則噯食臭脾虛不運則臭脅下有水氣土弱不能制水腹內雷鳴水氣奔激下利者濕勝濡瀉此方主之生薑半夏薑製各三錢黃芩甘草炙各二錢乾薑炮黑人參黃連各一錢大棗二枚水煎溫服甘草瀉心湯傷寒中風反誤下之下利日數十行穀不化腹中雷鳴心下痞硬而滿嘔煩不安醫見心下痞硬復誤下之其證益甚此非結熱但以胃中虛客氣上逆故使滿硬此方主之甘草炙半夏薑製各三錢乾薑炮黑黃芩各二錢黃連一錢大棗二枚水煎溫服桂枝人參湯即理中湯加桂枝也太陽病表未除而下之早熱邪乘虛入里挾熱下利不止心下痞硬表裡不解者此方主之桂枝甘草炙各三錢乾薑二錢白朮土炒二錢人參一錢水煎溫服此湯以表未除故用桂枝以解之以里證虛故以理中以和之蓋取兩解表裡之義也旋覆花代赭石湯傷寒汗吐下解後胃氣弱也心下痞硬伏飲停膈噫氣未除者氣逆也此方主之噫音噯周揚俊用治噎膈反胃氣逆下降者累效旋覆花三錢代赭石二錢半夏薑製六錢人參一錢甘草炙二錢生薑五錢棗三枚水五盅煎取二盅去渣再煎取一盅溫服濃煎則不助飲旋覆之咸以軟堅赭石之重以鎮逆薑夏之辛以散痞參草大棗之甘以補脾此輔正匡邪蠲飲下氣之良方也桂枝加芍藥湯本太陽病反下之因腹滿時痛者此方主之桂枝三錢白芍六錢甘草二錢生薑三錢大棗二枚水煎溫服加大黃酒浸三錢名桂枝加大黃湯治前證大實痛者黃連湯胸中有熱欲嘔吐胃中有寒腹疼痛此方主之黃連三錢半夏四錢桂枝乾薑炒甘草炙各二錢人參一錢大棗二枚水煎溫服或冷服日三夜一治關格氣不能上下者與桂附八味丸相間服之即腎氣丸此傷寒邪氣傳裡而為下寒上熱也胃中有邪熱使陰陽不交陰不得升而獨滯於下為下寒腹脹痛陽不得降而獨鬱於上為上熱欲嘔吐故用黃連之苦以瀉上熱而降陽薑桂半夏之辛以散中寒而升陰參草大棗之甘以緩中急而益胃寒熱並用猶奇正之相倚耳此分理陰陽和解上下之正治也或丹田有熱胸中有寒者仲景亦用此湯治之臟結之證更宜以此湯調其陰陽柴胡桂枝湯傷寒六七日發熱微惡寒支節煩痛微嘔心下支結此外證未除不可攻裡以此方和解之並治發汗後亡陽譫語以此方和其榮衛以通津液後自愈柴胡四錢桂枝黃芩白芍半夏薑製甘草炙各二錢人參一錢生薑二錢大棗二枚水煎溫服此太陽少陰合病治方也柴胡養榮湯治溫病陰枯血燥邪熱不退柴胡三錢黃芩二錢陳皮一錢甘草一錢當歸二錢白芍一錢五分生地三錢知母二錢花粉二錢蟬蛻全十個白殭蠶酒炒三錢大棗二枚水煎溫服去當歸白芍生地名柴胡清燥湯數下後餘熱未盡邪與衛搏故熱不能頓除宜此湯和解之五福飲凡五臟氣血虧損者此方能兼治之足稱王道之最人參補心隨宜用熟地補腎三錢至一兩當歸補肝二錢至七錢白朮補肺泔浸土炒二錢甘草補脾蜜炙一錢水煎溫服或加生薑凡治氣血兩虛等證以此為主或宜散者加升柴荊防宜溫者加薑桂附子宜清者加梔子青蒿地骨皮之類左右逢源無不可也七福飲即五福飲加酸棗仁炒研二錢遠志甘草湯浸去心微炒一錢治氣血兩虛而心脾為甚者四君子湯一方去人參加蜜炙黃耆亦名四君子湯白朮土炒二錢白茯苓二錢人參甘草炙各一錢水煎溫服加半夏姜炒一錢陳皮一錢木香三分磨汁砂仁一錢名香砂六君子湯補脾養胃之要藥也四物湯當歸酒蒸三錢熟地三錢白芍酒炒一錢五分川芎一錢水煎溫服合四君子湯名八珍湯再加黃耆肉桂名十全大補湯補氣養血之要藥也二陳湯半夏薑汁製二錢陳皮一錢白茯苓一錢半甘草一錢生薑一錢水煎溫服順氣化痰之總方也犀角大青湯治斑出心煩大熱錯語呻吟不眠或咽喉不利者犀角鎊二錢為末或磨汁對湯服大青或以青黛代之元參各三錢升麻黃連黃芩黃柏梔子各一錢甘草五分水煎去渣入犀角汁童便冷服一方加白殭蠶酒炒三錢蟬蛻十個全更妙大便秘加大黃大建中湯中氣不足手足厥冷小腹攣急或腹滿不食陰縮多汗腹中寒痛唇乾精出寒熱煩冤四肢痠痛嘔吐下利及無根失守之火出於肌表而為斑點並此方主之人參甘草炙各五分黃耆蜜炙當歸白芍酒炒桂心各一錢附子炮半夏薑汁製各一錢二分五釐水煎溫服按此乃汗吐下後中氣虛乏則餘邪無所歸附隱隱見於肌表其色淡紅而不甚顯為辨也參耆所以補中夏草所以調中此皆脾胃藥也復有歸芍之和血則外溢之斑流而不滯又有桂附之溫中則失守之火引而歸原此中營之幟一端而失位之師各就其列也是方也以參耆桂附而治斑猶兵法之變者也語云治病如殺賊孫臏減灶滅龐涓虞詡增灶平朝歌臨機應敵豈有一定之法哉麻黃芍藥人參湯李東垣曰予治一寒士病脾胃弱與補劑愈繼而居曠室臥熱炕咳而吐血予謂此久虛弱外有寒形內有火熱上氣不足陽氣外虛當補表之陽氣瀉里之虛熱蓋冬居曠室衣服單薄是重虛其陽表有大寒壅遏裡熱火邪不得舒伸故血出於口因思仲景治傷寒脈浮緊當以麻黃湯發汗而不與之遂成衄血卻與麻黃湯立愈與此甚同因處此方本方去麻黃桂枝名麥冬飲子麻黃去外寒白芍安太陰甘草炙補三焦元氣而去外寒黃耆生各一錢實表益衛桂枝補表當歸酒蒸各五分和血養血人參益元氣而實表麥冬蒸去心各三分保肺清心五味子十五粒蜜蒸撻碎核收肺氣而安五臟水二盅半先煮麻黃去沫入群藥同煎一盅去渣乘熱臨臥一服愈觀此方足為萬世模範也蓋取仲景麻黃湯與補劑麥冬飲子各半服之但凡虛人合用仲景方者皆當以此為則也四逆散少陰病四逆陽邪傳入少陰手足厥冷或咳少陰脈絡肺或悸少陰脈絡心或小便不利少陰脈絡膀胱或腹中痛少陰脈入小腹或瀉利下重者此方加減主之柴胡白芍枳實麩炒甘草炙各等份為末白飲調下三錢日三服咳者加五味子乾薑並主下利肺與大腸相表裡上咳下利治則相同悸者加桂枝小便不利者加白茯苓腹中痛者加熟附子泄利下重者先以水煎薤白取汁二盅入此散一兩煎服此陽邪傳至少陰里有結熱則陽氣不能交接於四肢故逆而不溫柴胡所以升內陷之陽邪枳實所以破內滯之結熱白芍收失位之陰甘草和不調之氣是證也雖曰陽邪在裡慎不可下蓋傷寒以陽為主四逆有陰進之象若復用苦寒之藥下之則陽亦虧矣是在所忌傷寒論曰諸四逆不可下此之謂也然此原為冬月正傷寒言之若溫病四逆不在此例按此散本為邪熱自陽經傳入陰經而發厥傷寒論曰腹中痛者加附子清滌中又加溫補人未有不致疑者竊詳四逆散腹痛加附子與附子瀉心湯義同蓋傷寒以陽為主熱證固當用盪滌之法而熱證但兼虛寒又不可不急作救療如附子瀉心湯心下痞滿自宜大黃黃連瀉心湯以導除其熱若惡寒汗出則加附子以回陽又何可緩也故四逆散邪熱傳至陰經而四逆自宜柴胡枳實以清解其熱若兼虛寒遇邪而腹痛則加附子之溫經益陽又何可緩也寒熱各行其性此仲景制方之妙況傷寒始病熱中未傳寒中者極多四逆雖屬陽證已有陰進之象兼以腹痛則其加附子也不亦宜乎若溫病陽邪亢閉隔陰於外以致四逆非急下之不為功若執治傷寒之法則誤人矣桂苓甘術湯傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者此飲中留結外邪之證也此方主之白茯苓四錢桂枝三錢白朮土炒甘草炙各二錢水煎溫服按人身經脈賴津液以滋養吐下津液一傷更汗津液再傷坐令經脈失養身為振搖此湯滌飲散邪補中益氣則津液四布而經脈得以滋榮矣至久而成痿較此更甚仲景於此湯豈非早已用力乎甘草桔梗湯主治少陰病二三日咽痛此陰陽通用之藥也若風痰挾邪上壅咽痛半夏散及湯若咽中傷生瘡不能言聲不出者苦酒湯若下利咽痛胸滿心煩者獵膚湯三湯補後甘草三錢桔梗三錢水煎溫服此二味一借土氣以逐水一借金母以瀉水而少陰之邪自散矣黃芩加半夏生薑湯太陽少陽合病下利而嘔及膽腑發咳嘔苦水如膽汁胃氣逆則嘔苦膽液溢則口苦此方主之黃芩三錢白芍半夏甘草炙各二錢生薑二錢大棗二枚水煎溫服乾薑黃連黃芩人參湯傷寒論曰傷寒本自寒下格醫復吐下之寒格更逆吐下若食入即吐此方主之乾薑人參黃連黃芩原文各三兩水六升煎三升去渣分溫連服按傷寒論並無寒下之病亦並無寒下之文玩下文寒格更逆吐下句可知上文本自寒下句之下字當是格字文義始屬注家皆釋胃寒下利不但文義不屬亦與芩連之藥不合當改之成氏曰仲景之意以本自寒下醫復吐下之治之為逆故用乾薑以溫里人參以補正氣芩連反佐以通寒格與四逆湯白通湯加人尿豬膽汁義同原文四味各三兩恐傳寫之訛也此成氏之遵經註解也姑存以俟高明麻黃杏仁甘草石膏湯太陽病汗後喘表邪未解也此方主之麻黃四錢杏仁去皮甘草炙各二錢石膏八錢水煎麻黃去沫次入群藥煎服按太陽寒邪雖從汗解然肺邪未盡所以喘仍不止故用麻黃髮肺邪杏仁下肺氣甘草緩肺急石膏清肺熱即以治足太陽之藥通治手太陰也倘誤行桂枝湯以致壅塞肺氣而吐癰膿則桔梗杏仁煎可用也太陽傷寒誤下作喘亦用此方葛根黃連黃芩湯太陽病誤下利遂不止脈促者表未解也脈數而止曰促用葛根者專主陽明之表喘而汗出者此方主之葛根四錢黃連三錢黃芩甘草炙各二錢水煎溫服喘而汗出者因喘而汗出也即裡熱氣逆所致與此湯以葛根散表邪以芩連清裡熱則喘息汗停而利亦止矣五味子湯治喘而脈伏及寒熱而厥昏聵無脈者五味子十五粒撻碎核麥冬去心陳皮各二錢人參杏仁去皮尖各一錢生薑三錢大棗二枚劈水煎溫服蘇陳九寶湯治暴感風寒脈浮無汗而喘並老幼素有喘急遇寒暄不節發則連綿不已咳嗽哮吼夜不能臥者桑白皮蜜炙大腹皮制淨陳皮蘇葉薄荷麻黃杏仁泡去皮尖桂枝去粗皮甘草生各一錢烏梅一枚生薑二錢水煎溫服十棗湯太陽中風有頭痛發熱等證下不利大便小便皆不利也嘔逆水飲停蓄於內表解者乃可攻之先用桂枝解表而後攻裡其人漐漐汗出邪從汗出表解一驗發作熱有時此邪熱外溢也頭痛胃氣上逆此里未和者一心下痞硬滿引脅下痛留飲在膈溢於兩脅此里未和者二乾嘔短氣伏飲上逆射於肺中此里未和者三汗出不惡寒者表解二驗此表解里未和也此方主之此表邪已散而種種里證未平彰明較著如此然後用此湯以逐飲攻水也按雖有發熱頭痛心下痞硬滿引脅痛乾嘔短氣諸證乃內邪所結之本證里未和也不得以表證名之傷寒中亦有有表證無表邪者何況溫病甘遂麵包煨去心紫大戟出洪山者佳醋炒芫花醋炒三味等份為末聽用大棗十枚劈水二盅煎取湯一盅調上三味藥末強人一錢弱人五分溫服如未下明日加五分再調服利後糜粥自養按下利嘔逆句之下字當是不字若是下字豈有上嘔下利而用十棗湯峻劑攻之之理乎惟大便不利痞硬滿痛始屬裡病小便不利嘔逆短氣始屬飲病乃可峻攻發作有時句之作字當是熱字始與太陽陽邪熱飲相合若無熱汗出乃少陰陰邪寒飲真武湯證也皆當改之此湯與大陷胸湯相仿傷寒種種下法咸為胃實而設今證在胸脅而不在胃則盪滌腸胃之藥無所取矣故用芫花之辛以逐飲甘遂大戟之苦以泄水並賴大棗之甘以運脾而助諸藥祛水飲於膈脅之間乃下劑中之變法也愚按開後人濕熱生痰無窮之法門此方是也去芫花加白芥子等份為末薑汁煮棗肉為丸名控涎丹李時珍日痰涎為物隨氣升降無處不到入心則迷成癲癇入肺則塞竅為咳喘背冷入肝則脅痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽引隱痛入皮肉則瘰癧癰腫陳無擇並以控涎丹主之殊有奇效此乃治痰之本痰之本水也濕也得火與氣則結為痰甘遂能泄經絡水濕大戟能泄臟腑水濕白芥子能散皮裡膜外痰飲生薑大棗利氣通經健運脾土以固本惟善用者乃能收奇功也茯苓甘草湯水氣乘心振寒厥而心下悸者火畏水故心下動也先治其水卻治其厥及太陽傷寒表虛汗出而不渴者並此方主之此乃利水解表而兼和中之藥也如太陽傷寒汗出而渴者又宜五苓散白茯苓三錢桂枝三錢甘草炙錢半生薑三錢水煎溫服橘皮竹茹湯治傷寒胃虛有熱呃逆或因吐利之故並治久病虛熱或吐利後胃虛嘔逆不止橘皮二錢竹茹二錢人參甘草炙各一錢生薑二錢大棗二枚水煎溫服一方有半夏赤茯苓麥冬枇杷葉胃火上衝肝膽之火助之肺金之氣不得下降故呃逆嘔噦竹茹麥冬枇杷葉皆能清金和胃肺金清則肝木亦平矣二陳降痰逆赤苓降心火生薑嘔家聖藥久病虛羸故以參草大棗扶其胃氣而諸證自退也一方用硫黃乳香等份酒煎嗅之不論虛實寒熱皆效汪訒庵曰此證有因胃熱失下者有因火鬱者有因血瘀者有因氣滯者有因痰阻者皆屬實有因下後胃虛者有因中氣不足者有因下元虛損陰火上衝者皆屬虛寒熱虛實要在臨證活法耳不可造次呃在中焦穀氣不通其聲短小得食則發呃在下焦真氣不足其聲長大不食亦然此為辨也橘皮乾薑湯治胃寒呃逆脈微細者橘皮乾薑肉桂去粗通草甘草炙各一錢人參七分水煎溫服丁香柿蒂散治久病呃逆因下寒者古方以此湯治呃逆雖病本於寒然亦有火也丁香柿蒂各二錢人參一錢生薑三錢水煎溫服一方去人參加竹茹橘紅一方去人參合二陳湯加良薑俱治同此足陽明少陰藥也丁香泄肺溫胃而暖腎生薑去痰開鬱而散寒柿蒂苦澀降氣人參補助真元使得展布也滌痰湯治膈間痰閉呃逆者瓜簍搗爛五錢膽星半夏各二錢橘紅一錢五分茯苓枳實麩炒黃芩黃連石菖蒲竹茹各一錢甘草炙五分生薑三錢水煎溫服如痰閉呃甚者用白礬一兩水二盅煎一盅入蜜三匙少煎溫服即吐如不吐飲熱水一小盞未有不吐者吐後呃即止理中安蛔散治胃寒蛔厥人參一錢白朮土炒茯苓乾薑炒各一錢五分川椒十四粒烏梅三枚撻碎水煎溫服烏梅丸蛔厥者當吐蛔今病者靜而復時煩此非為臟寒時靜時煩非比臟寒無暫時安蛔上入膈故煩須臾即止得食而嘔又煩者蛔聞食臭出當自吐蛔此方主之按此為臟寒句之此字應是非字若是此字便是臟厥與辨蛔厥之義不屬當改之烏梅三十枚黃連一兩六錢乾薑一兩附子炮桂枝細辛黃柏鹽水炒人參各六錢當歸川椒炒去汗各四錢為末醋浸烏梅去核飯上蒸熟合藥末加煉蜜杵丸每服二錢白飲送下程郊倩曰名曰安蛔實是安胃故仲景云並主久痢痢本濕熱得苦則堅得酸則斂故亦通治若陽厥吐蛔入口即斃又何論溫病乎麻黃升麻湯傷寒六七日大下後邪傳厥陰誤下手足厥逆陽氣內陷寸脈沉遲遲為寒也尺脈不至尺伏誤下脫陰咽喉不利吐膿血肝脈循喉餘邪上壅又注肺金熱甚生癰泄利不止者為難治陰氣欲脫而不得回故曰難治此方主之散表寒清裡熱亦兩解之變方也麻黃去節三錢升麻一錢五分當歸一錢五分石膏二錢知母一錢黃芩一錢萎蕤一錢白朮五分茯苓五分白芍五分天冬五分桂枝五分乾薑五分甘草五分水煎麻黃沸去上沫再入群藥煎服連進二三劑覆取汗出則邪氣散而咽清利止矣赤石脂禹餘糧湯論曰自利不止下脫此利在下焦此方主之赤石脂禹餘糧各一兩水煎溫服如服後利仍不止當利其小便與豬苓湯是乃膀胱不滲一利小水而利自止矣傷寒論曰服瀉心湯已復以他藥下之利不止以理中湯與之利益甚蓋理中者理中焦此利在下焦也赤石脂禹餘糧湯主之長沙制方審於上下如此取效自易易耳薛氏曰一人以命門火衰而下利令服桂附五味吳茱肉蔻故紙之類不信服補中益氣湯而斃此正利在下焦止補中焦而致敗也噫後人之千方萬論孰有不出長沙者哉桂枝去桂芍加茯苓白朮湯太陽風寒服桂枝湯獨治風而寒固在而或下之表未除而誤攻裡仍頭項強痛表邪未去翕翕發熱風寒勝則熱無汗寒勝則干心下滿微痛邪氣乘虛入里挾涎飲作滿痛小便不利者水不下行此方主之按去桂應是去芍藥若去桂加苓術並無辛甘走榮衛之藥何以治仍頭痛發熱心下滿痛之表證乎當改之桂枝白茯苓白朮土炒各三錢甘草炙二錢生薑三錢大棗二枚白芍三兩長流水煎連服則裡氣實小水利外邪解矣玉泉散治陽明內熱煩渴頭痛牙痛二便閉結斑疹發黃熱痰喘嗽等證生石膏六兩粉甘草一兩為末新汲水或熱湯或人參湯調下三錢加硃砂三錢亦妙六一散治溫病及中暑身熱煩渴小便不利者桂府滑石研末水飛曬乾六兩粉甘草為末一兩合研勻每服三錢新汲水或冷飲調下三錢加硃砂三錢取其清心加青黛三錢取其涼肝加薄荷三錢取其散肺也直格曰此散是寒涼解散鬱熱設病不解多服無損但有益耳又曰傷寒當汗則不可下當下則不可汗且如誤服此散則汗自不出而裡熱亦自有效亦有裡熱便得宣通而愈者或邪在半表半裡可和解而不可汗下者若服此散多愈即不愈亦減按河間云六一散有益無損大抵是溫病耳其鬱熱自內而達於外故宜寒涼盪滌其熱至於正傷寒還須參之脈證不可輕投桂枝甘草湯太陽病發汗過多汗為心液多則心虛叉手自冒心動惕不寧怔仲無主心下悸欲得按者心虛故欲按也此方主之並治太陽病小便自利飲水多必心下悸如小便少者必苦裡急裡急者膀胱不行水故也宜五苓散桂枝三錢甘草炙一錢五分甘瀾水水揚萬遍而面有沸珠煎溫服桂枝加附桂湯太陽傷寒寸口脈浮而大右手關前一分為寸口主候五臟之氣浮則為風大為陰虛風則生微熱虛則兩脛攣其證自汗出小便數心煩微惡寒腳攣急此方主之桂枝三錢白芍三錢甘草炙二錢附子生肉桂去粗各一錢生薑三錢大棗二枚水煎溫服覆取微汗喻嘉言曰仲景之圓機活法即陽旦陰旦二湯已妙不可言陽旦者天日清明春夏溫暖之稱也陰旦者風雨晦冥秋冬寒涼之稱也桂枝湯加黃芩名曰陽旦加肉桂名曰陰旦後人不識此義耳即如此證傷寒論一曰與桂枝湯此誤也又曰證像陽旦按法治之而增劇即是按用桂枝湯加黃芩之法也所以病人得之便厥蓋寒邪在裡用桂枝湯以治其表則陽愈虛加黃芩以助其陰則陰愈無制故仲景即行陰旦湯之法以救其失觀增桂令汗出一語豈不昭昭耶恐陰旦不足更加附子以溫經即咽中干陽明內結譫語煩亂渾不為意且重飲甘草乾薑湯以俟夜半陽回足熱後果如其言豈非先有所試乎惟陽旦湯入口而便厥未幾即以桂附乾薑尾其後固知厥必不久所以可斷云夜半兩足當熱況咽乾譫語則津液亦為辛熱所耗故少與承氣以和胃而止其譫多則為下而非和矣若不知此證之不可汗而重發之復加燒針則陽之虛者必至於亡陰之無制者必至於犯上四逆湯以回其陽而恐不足況可兼陰以為治乎蓋傷寒以陽為主陰進則陽虧矣若溫病陽邪亢閉陰先受傷治法又當滋陰以瀉陽也豈可與傷寒並論哉甘草乾薑湯少陰病小便色白吐逆而渴動氣下之反劇身雖有熱反欲蜷臥此方主之甘草炙四錢乾薑炮二錢水煎溫服此即四逆湯去附子也辛甘合用專復胸中之陽氣其夾食夾飲面赤足厥發熱喘咳腹痛便滑內外合邪難於發散或寒冷傷胃不便參術者並宜服之真胃虛挾寒之聖藥也芍藥甘草湯婦人傷寒汗解表除熱入血室經水過多無實滿者與雜病木克脾土陰陽血氣不和而痛並此方主之白芍酒炒四錢甘草炙四錢或二錢水煎溫服虞天民曰白芍不惟治血虛大能行氣腹痛者榮氣不和逆於肉裡得白芍之酸苦行其榮氣又以甘草之甘緩和其逆氣此不治之治正所以深治之也本方加炮附子一錢五分名芍藥甘草附子湯治發汗病不解反惡寒者虛故也白芍斂陰於內附子復陽於外甘草和其陰陽而諸病自解矣發汗後不惡寒但惡熱者實也與調胃承氣湯和之按發汗病不解句之不字衍文也發汗病不解則當惡寒何謂反惟病解惡寒始可謂虛當刪之茯苓桂枝甘草大棗湯太陽病發汗過多臍下悸者欲發奔豚此方主之汗多心液耗散腎乘心虛上凌而克之故動惕於臍間白茯苓六錢桂枝三錢甘草炙一錢五分大棗三枚劈甘瀾水煎溫服茯苓淡滲伐腎以散水蓄甘草益氣和中以補陽虛桂枝走陰降腎御奔豚之未至大棗益脾助土製奔豚之上衝生地黃連湯治男婦血風證此去血過多因而燥涸循衣撮空錯誤失神脈弦浮而虛者加人參二錢更妙陽生陰長之意也生地酒浸當歸酒蒸白芍酒炒川芎各一錢五分黃連酒炒梔子薑汁炒黑黃芩酒炒各一錢防風酒潤二錢五分水煎溫服脈實加大黃酒浸陶氏曰大承氣湯氣藥也自外而之內者用之生地黃連湯血藥也自內而之外者用之氣血合病循衣摸床證同自氣之血血而復之氣者大承氣湯主之自血之氣氣而復之血者生地黃連湯主之二者俱不大便此是承氣湯對子又與三黃石膏湯相表裡皆三焦包絡虛火之用也病既危急只得以此降血中之伏火耳綱目曰四物湯與桂枝麻黃葛根柴胡青龍白虎涼膈承氣理中四逆吳茱萸附子等湯皆可做各半湯服之此易老用藥之大略也茯苓四逆湯汗下後煩躁不得眠此方主之白茯苓三錢人參乾薑附子生甘草炙各一錢水煎溫服去茯苓名四味回陽飲治元陽虛脫再加熟地當歸名六味回陽飲治陰陽虛脫按煩出於心用茯苓以養心躁發於腎用乾薑以潤腎固表生津用人參以益虛溫里散寒用附子以回陽和中緩急用甘草以安胃也導赤散生地黃木通各三錢淡竹葉甘草梢各一錢水煎溫服導赤瀉心各半湯治越經證脈浮沉俱有力者黃連酒洗黃芩酒洗梔子薑汁炒黑知母鹽酒拌炒犀角鎊磨汁另入人參麥冬茯神去木甘草生各二錢滑石二錢燈心三分生薑二錢大棗二枚水煎溫服知母麻黃湯治傷寒汗出不徹後證前論中已辨明知母二錢黃芩酒洗麻黃去節桂枝白芍甘草炙各一錢水煎溫服詳證加酒炒黃連一錢尤妙黃連犀角湯狐惑病咽乾聲嗄此方主之黃連酒炒二錢犀角鎊二錢磨汁另入烏梅三枚木香三分磨汁水煎黃連烏梅去渣入犀角汁木香汁和服雄黃銳丸治狐惑蟲蝕臟雄黃黃連苦參桃仁青葙子各等份為末以艾汁丸如棗核樣棉裹入穀道中百合地黃湯治百合病不經汗吐下病形如初者百合七個劈破以泉水浸洗去沫另用泉水五盅煎取一盅半生地黃二兩洗淨用泉水五盅煎取一盅半二汁合一處分二服大便下惡物如漆中病即止不中再作服三甲散主客交渾病詳論中鱉甲酥炙龜甲酥炙如無酥二味並用醋炙各一錢穿山甲土炒黃五分白殭蠶一錢生用切斷蟬蛻五個全牡蠣粉五分咽燥不用當歸五分白芍酒炒七分甘草五分䗪蟲三個搗爛入酒取汁聽用其渣與諸藥同煎水煎去渣入䗪蟲汁和服若素有老瘧或癉瘧者加何首烏一錢懷牛膝一錢胃弱欲作瀉宜九蒸九曬若素有郁痰者加川貝母去心一錢若素有老痰者加瓜蔞搗爛二錢嘔則勿用若咽乾作癢者加知母五分天花粉五分若素有內傷瘀血者倍䗪俗謂土鱉是也無此物用桃仁泥一錢乾漆炒煙盡研五分代之服後病減七八漸進調理法可也桂枝加附子紅花湯治婦女傷寒表虛自汗身涼四肢拘急經水適斷脈沉而遲者桂枝二錢白芍二錢甘草炙一錢附子炮八分紅花七分生薑二錢水煎溫服黑龍丹治瘀血沁於心脾經病百出危急惡疾諸藥不效者並治難產胞衣不下及一切瘀血不行之證全當歸生地黃川芎五靈脂去砂良薑各二兩上五味為粗末入砂罐內紙筋鹽泥封固炭火煅紅候冷取出研為細末再入後五味百草霜鄉外人家者佳五錢乳香花蕊石火煅醋淬七次生硫黃琥珀另研各二錢上五味各為細末同前五味合研勻用米醋煮麵糊為丸如彈子大每服一丸以炭火煅藥丸通紅投生薑自然汁中淬之或豆淋酒或童便化下準繩曰金華君產七日不食始言頭痛痛已心痛又作既而目睛又痛更作更止如刺如割相去無瞬息間每頭痛作欲取大石壓之良久漸定心痛作則以十指抓壁血流滿掌稍定目睛痛又作則以兩手指剜之如是十日不已眾醫無計偶進黑龍丹半丸痛苦稍間中夜再服半丸寢如平時至晨下一行約二升許如蝗子狀三疾減大半巳刻又下如前則頓愈矣麻仁丸趺陽脈在足趺之上浮而澀浮為陽盛澀為陰虛浮則胃氣強陽盛多熱則胃氣旺澀則小便難或數陰虛則便難或不禁則頻矣浮澀相搏相合為病大便則難熱傷津液之故其脾為約胃強則脾弱不能為胃行其津液以潤大便反若為胃所約束者此方主之大麻仁去皮杏仁泡去皮炒大黃厚朴薑汁炒各一兩枳實麩炒白芍各五錢為末煉蜜丸白飲下二錢連服漸加以和為度枳實梔子豉湯病差勞復者因勞煩熱此方主之若有宿食加大黃本方去豉加厚朴三錢名梔子厚朴湯加神麯六錢治食復效腹脹痛量加大黃枳實麩炒梔子生各三錢豆豉五錢清漿水二盅入梔實先煎後入豆豉煎服微汗愈勞熱以汗解牡蠣澤瀉散大病差後從腰以下有水氣者此方主之腰以上屬陽腰以下屬陰水陰物也上浸陽界則危矣牡蠣粉軟堅行水澤瀉瀉堅利水葶藶子炒研通水道消浮腫蜀漆散結行水海藻瀉腎下十二水腫商陸根疏通宿水栝樓根各等份撤胃熱而滋土以利水道為末白飲調下二錢日三進小便利漸愈不可過金匱曰腰以下腫當利小便此定法矣乃大病後脾土告困不能攝水以致水氣泛溢用此散峻攻何反不顧其虛耶抑知正因水勢未犯半身以上急驅其水所全甚大設用輕劑則陰水必襲入陽界驅之無及可見活人之事迂疏輩必不能動中機宜庸工遇大病後悉行溫補脾土自以為善孰知其為鹵莽滅裂哉大營煎治男子真陰精血虧損及婦人經遲血少或腰膝筋骨疼痛或虛寒心腹疼痛者熟地三五七錢當歸二三五錢枸杞二錢杜仲鹽炒二錢牛膝錢半肉桂一錢甘草炙二錢水煎溫服如寒滯在經氣血不能流通筋骨疼痛之甚必加製附子一二錢方妙中氣虛寒嘔惡者加乾薑炒一二錢營虛於上而為驚恐怔忡不眠多汗者加酸棗仁炒研茯神各二錢帶濁腹痛者加故紙鹽炒一錢氣虛有痛者加香附米二錢以行之陽衰氣虛者加人參二錢以補之五苓散太陽膀胱本熱小便不利發熱口渴脈浮者此方主之脈浮為表證仍在便秘熱渴為府證已急用此兩解表裡澤瀉二錢五分豬苓茯苓白朮土炒各一錢半桂枝一錢水煎溫服合小柴胡湯名柴苓湯汪訒庵曰豬苓湯瀉熱勝故用滑石五苓散瀉濕勝故用桂術但傷寒太陽宜五苓陽明宜豬苓傷寒論曰太陽病發汗後若脈浮小便不利微熱消渴者五苓散主之又曰多飲暖水汗出愈成氏注曰桂枝之辛甘以和肌表脈浮者表未解也微熱消渴者熱未成實上焦燥也與五苓散生津液和表裡乃兩解之藥也今之知用桂枝者少矣殊不知兼治表邪必用桂枝專用利水則宜肉桂以肉桂辛熱能引諸藥直達熱邪蓄結之處故澤瀉味鹹所以瀉腎止渴也二苓味淡所以滲水滌飲也白朮味甘所以補脾逐濕也兼以肉桂有化氣之功內經曰膀胱者州都之官津液藏焉氣化則能出矣濁陰既出下竅則清陽自出上竅又熱隨溺而泄發熱口渴之證不治自愈解毒承氣湯溫病三焦大熱痞滿燥實譫語狂亂不識人熱結旁流循衣摸床舌卷囊縮及瓜瓤疙瘩溫上為癰膿下血如豚肝等證厥逆脈沉伏者此方主之加瓜蔞一個半夏二錢名陷胸承氣湯治胸滿兼有上證者白殭蠶酒炒三錢蟬蛻全十個黃連一錢黃芩一錢黃柏一錢梔子一錢枳實麩炒二錢五分厚朴薑汁炒五錢大黃酒洗五錢芒硝三錢另入甚至痞滿燥實堅結非常大黃加至兩餘芒硝加至五七錢始動者又當知之按此乃溫病要藥也然非厥逆脈伏大熱大實及熱結旁流舌卷囊縮循衣摸床等證見之真而守之定不可輕投予用此方救壞證危證大證而愈者甚眾虛極加人參二錢五分如無參用熟地黃一兩歸身七錢山藥五錢煎湯入前藥煎服亦累有奇驗內經曰熱淫於內治以鹹寒佐之以苦此方是也加人參取陽生陰長所謂無陽則陰無以生加熟地等取血旺氣亦不陷所謂無陰則陽無以化其理一也豬苓湯陽明病發熱渴欲飲水小便不利少陰病下利咳而嘔渴心煩不眠並此方主之通治濕熱黃疸口渴便赤豬苓滲下焦蓄水茯苓引肺氣而右降澤瀉咸以助腎行水滑石滑以利竅通淋阿膠滋腎水乾枯各三錢水煎上四味去渣入阿膠烊化溫服桂枝加厚朴杏仁湯太陽病下之微喘者表未解也此方主之桂枝三錢白芍三錢甘草二錢厚朴二錢杏仁一錢生薑三錢大棗二個水煎溫服此太陽中風誤下作喘之治法也其太陽傷寒誤下作喘用麻黃杏仁甘草石膏湯乃天造地設兩不易之良方凡下後利不止而加上氣喘急者乃上爭下奪之象但驟病之人中氣足供上下之用邪盡而喘利自止若中氣素餒加以上下交徵立盡之數矣此證不云下利但云微喘表不解則是表邪因誤下上逆與虛證不同故仍用桂枝湯以解表加厚朴杏仁以利氣亦徹里之意也梔子柏皮湯傷寒身熱濕熱鬱於肌表發黃者此方主之梔子三錢黃柏三錢甘草茵陳蒿三錢水煎溫服按此方之甘草三錢無著應是茵陳蒿必傳寫之訛也當改之麻黃連軺赤小豆湯傷寒瘀熱在里表身必發黃此方主之按瘀熱在裡之裡字應是表字若是里字豈熱在裡而藥反治其表哉當改之麻黃三錢連軺三錢赤小豆五錢生梓白皮五錢杏仁一錢甘草炙一錢生薑二錢大棗二枚連軺乃連翹根也水煎麻黃去沫入群藥煎服全沸草散治感冒風寒咳嗽多痰頭目昏痛身熱鼻塞聲重風熱上壅故生痰作嗽荊芥解肌散風前胡消痰降氣半夏燥痰散逆甘草發散緩中細辛溫經茯苓利濕赤則入血分而瀉丙丁也金沸草去蒂二錢荊芥穗三錢前胡二錢半夏一錢赤茯苓一錢半細辛一錢甘草炙七分生薑二錢大棗二枚水煎溫服局方無細辛茯苓有麻黃赤芍熱加柴胡黃芩痞悶加桔梗枳殼頭痛加川芎白芷準繩曰人止知此散治風寒咳嗽及加杏仁五味子治諸咳嗽皆效獨未知用之治舌腫牙痛辛未有人舌腫滿塞粥藥不入危甚煎此散乘熱以紙籠熏之遂愈況服之乎三因亦云一婦人舌腫牙痛口頰皆腫以此散大劑煎湯熏漱而愈地榆散治傷寒溫病熱毒不解日晡壯熱腹痛便利膿血甚如爛瓜肉屋漏水者地榆二錢當歸四錢白芍四錢黃芩黃連梔子炒黑犀角鎊磨汁各二錢薤白四錢水煎去渣入犀汁冷服桃花湯少陰病二三日至四五日腹痛小便不利下利不止便膿血者及少陰下利便膿血腹不痛者並此方主之赤石脂煅二兩乾薑二錢四分粳米五錢水煎米熟去渣再調赤石脂末二錢溫服桂枝加桂湯即陰旦湯主太陽中風燒針令出其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂本方去桂加黃芩即陽旦湯桂枝二錢白芍二錢桂四錢去粗甘草一錢二分生薑二錢大棗二枚水煎溫服喻氏曰奔豚者腎邪也腎邪一動勢必自少腹上逆而衝心狀若豕突以北方亥位屬豬故也腎邪惟桂能伐之所以加桂一倍於桂枝湯中外解風邪內泄陰氣也當即此例推之凡傷寒發表誤入寒藥服後反加壯熱膚起赤塊畏寒腹痛氣逆而喘或出汗時覆蓋未周被風寒復侵紅腫喘逆其證同者用此方良驗一婦病風寒外感服表藥後忽面若妝赤散發叫喘雙手上揚予知其少腹作奔豚也服此方頃之即定麻黃附子甘草湯少陰病得之二三日但欲寐無里證者此方主之麻黃二錢附子一錢甘草炙二錢水煎麻黃去沫再入二味煎服微發汗則愈此少陰病無里證者知表邪未悉並陰也故以附子溫少陰之臟寒甘草和表裡之陰陽麻黃髮未盡之傳邪而病斯痊矣不然大汗淋漓則陽氣愈虛而陰邪愈盛故戒之曰微發汗白通加人尿豬膽汁湯少陰病下利臟寒不禁則下利水性趨下故也脈微者陽虛也與白通湯利不止用方切當若猶不止厥冷無脈脈微而至於絕乾嘔煩者陽為陰拒而不能入也此方主之反佐以和之也服湯後脈暴出者死陽欲燼而忽焰勢必成灰微續者生氣漸回而微續機有更生去人尿膽汁名白通湯蔥白二莖乾薑三錢附子生三錢人尿一小杯豬膽汁三茶匙水煎去渣入人尿膽汁和勻溫服如無膽汁亦可用蔥白通陽接陰有升發之能乾薑健脾暖胃有化谷之長附子溫中散寒有回陽之善人尿膽汁性寒而續真陰引薑附而為肝腎之嚮導起死回生之方造化神工之妙也桂枝二越婢一湯太陽病發熱惡寒熱多寒少風多寒少也脈微弱者微為陽虛弱為陰虛也此無陽也不可發汗此方主之風多用桂枝二以解之寒少用越婢一以發之桂枝白芍甘草麻黃各二錢五分石膏三錢三分生薑四錢三分大棗二枚劈水煎麻黃去沫入群藥煎服即此一方知仲景酌量脈證毫釐不差因風多寒少故用桂枝二以解之越婢一以發之也後世醫家那得窺其萬一八正散治濕熱下注口渴咽乾淋痛尿血小腹急滿者木通車前子炒研瞿麥梔子大黃滑石萹蓄甘草梢各等份燈心一團水煎溫服一方有木香通麥燈心降心火入小腸車前清肝火入膀胱梔子瀉三焦鬱火大黃滑石又瀉火和水之捷藥萹蓄利便通淋草梢入莖止痛雖治下焦而不專於治下必三焦通利水乃下行也太平圓酒溫病愈後元神未復腰腳無力渾身痠軟者此方主之糯米酒糟曬乾炒黃色為末二兩四錢主溫中消食除冷氣殺腥去草菜毒潤皮膚調臟腑和血行氣止痛紅曲陳久者佳炒黃黑為末二兩四錢主健脾消食養陰滋血六神麯陳久者佳炒黃黑為末四兩八錢主健脾養胃化消穀食小麥麩陳麥麩佳去淨麵筋曬乾炒黑色為末四兩八錢主天行溫毒熱極發狂發斑疹大渴者又主調中養氣健人生力助五臟除煩悶利小腸麥乃養心之谷屬火而麩則能退心熱與胸膈之熱蓋取同氣相求亦從治之意也白殭蠶白而直者黃酒炒黃褐色為末八錢全蟬蛻去土為末四錢二味前已註明加枳殼木通治食滯飽悶服散亦妙上六味合研勻水丸每服一兩以冷黃酒三兩調蜜一兩送下隔五日如法再服如是三次開胃進食健人生力只十餘日仍如無病一般因名其方為太平圓酒升麻鱉甲湯升麻甘草各一兩鱉甲酥炙當歸蜀椒炒去汗各五錢雄黃研二錢五分水六盅煎二盅分二次連服之老小再服取汗愈玉樞丹一名紫金錠專治暴中雜氣病昏暈欲倒如霍亂吐瀉攪腸痧青筋脹心腹痛脹諸般危證並一切山嵐瘴氣水上不服解諸毒療諸瘡利關竅通百病奇效不可殫述山慈菇洪山出者洗去毛皮焙二兩川文蛤一名五倍子制淨槌破焙二兩紅芽大戟去淨骨焙一兩五錢千金子一名續隨子用鮮者去殼去油一兩硃砂有神氣者研末三錢明雄黃鮮紅大塊者研末三錢麝揀淨皮毛乾者研末三錢上七味稱准合研勻於細石臼內漸加糯米濃飲調和燥濕得宜杵千餘以光潤為度每錠重一錢每服一錠病重者連服二錠取通利後以溫粥補之一治一切飲食藥毒蠱毒及吃自死牛馬豬羊等肉菌中毒並山嵐瘴氣煙霧惡毒等證昏亂猝倒或生異形之狀悉用涼水磨服一治陰陽二毒瘟疫痧脹或狂言亂語或胸腹腫痛並喉痹咽腫俱用薄荷湯待冷磨服一治癰疽發背對口天泡無名腫毒蛀節紅絲等疔諸惡等瘡諸風癮疹久痔紅腫及楊梅結毒俱用無灰酒磨服外用涼水磨塗日夜數次覺癢即消潰爛者亦可少減一治男婦急病癡邪奔走叫號失心狂亂羊兒豬癲等風俱用石菖蒲煎湯磨服一治心胃痛及諸般氣痛及諸般血痛並赤白痢泄瀉急痛霍亂絞腸之類俱用薑湯磨服一治中氣中風中痰口眼歪邪牙關緊急語言謇澀筋脈攣縮骨節風腫遍身疼痛行步艱難等證用酒磨頓熱服之一治風犬毒蛇澗溪諸蟲傷人及注遍身毒氣入里命在旦夕俱用酒磨服外以水磨塗之再服蔥湯汗出愈一治年深日久頭脹頭痛偏正頭風及溫病後毒氣攻注腦門作脹者俱用蔥酒磨服仍磨塗太陽穴上一治小兒急驚風五疳五痢黃疸俱用薄荷湯磨加蜜調服一治小兒遺毒生下百日內皮塌肉爛穀道眼眶損者涼水磨服並磨塗撥正散專治雜氣為病陰陽毒痧脹及一切無名惡證並食厥痰厥氣厥皆驗蓽茇雄黃精為上火硝各二錢冰片麝各五釐上為細末男左女右以筒吹入鼻中即蘇半夏散及湯半夏桂枝甘草炙各等份為末白飲調服一錢五分日三次如不能服散以水二盅煮五六沸入散一兩再煮四五沸冷徐咽之苦酒湯半夏為末一錢苦酒以雞子一個去黃入半夏苦酒於殼內置鐵環中安火上令三沸去渣少少嚥下不瘥再作三劑服之豬膚湯豬毛下附皮薄黑肉一斤以水四碗煮取二碗去渣入白蜜二兩白粉一兩熬香和相得溫分三服當歸導滯湯當歸一兩白芍一兩萊菔子四錢車前子炒研枳殼麩炒檳榔甘草炙各二錢水煎入蜜溫服看後加味最妙紅痢加桃仁此方之奇妙全在當歸白芍蓋泄瀉最忌當歸之滑而痢疾最喜其滑也白芍味酸入肝以和木使木不侵脾土枳殼檳榔消逐濕熱之邪車前分利其水濕而又不耗真陰之氣萊菔辛辣除熱去濕又能上下通達消食利氣使氣行於血分之中助歸芍以生新血而盪滌其瘀血也加甘草蜂蜜以和中則又無過烈之患奏功之神奇實有妙理耳熱加黃連二錢黃芩二錢日夜無度或裡急後重之甚者再加大黃木香溫病後痢疾加白殭蠶蟬蛻芳香飲溫病多頭痛身痛心痛脅痛嘔吐黃痰口流濁水涎如紅汁腹如圓箕手足搐溺身發斑疹頭腫舌爛咽喉痹塞等證此雖怪怪奇奇不可名狀皆因肺胃火毒不宣鬱而成之耳治法急宜大清大瀉之但有氣血損傷之人遽用大寒大苦之劑恐火轉閉塞而不達是害之也此方主之其名芳香者以古人元旦汲清泉以飲芳香之藥重滌穢也元參一兩白茯苓五錢石膏五錢蟬蛻全十二個白殭蠶酒炒三錢荊芥三錢天花粉三錢神麯炒三錢苦參三錢黃芩二錢陳皮一錢甘草一錢水煎去渣入蜜酒冷服三和湯加減生化小柴胡小清涼三方而一之治產後溫病大熱神昏四肢厥逆譫語或不語等證若發狂燥結量加大黃芒硝內經曰熱淫於內治以鹹寒佐之以苦又曰有病則病當之是也當歸八錢酒洗川芎三錢桃仁不去皮尖炒研一錢紅花一錢酒洗益母草去老梗五錢軟柴胡四錢黃芩三錢梔子三錢粉丹皮三錢白殭蠶酒炒三錢蟬蛻全十二個金銀花三錢澤蘭葉三錢生甘草一錢水煎去渣入蜜酒童便和勻服滾痰丸老痰積飲怪病百出此方主之準繩備言之川大黃八兩酒蒸一次黃芩酒洗八兩青礞石火硝煅如金色一兩沉香五錢為末水丸薑湯送下量虛實服準繩加百藥煎五錢尤妙礞石性慓悍能攻陳積伏匿之痰為君大黃蕩熱實以開下行之路為臣黃芩涼心肺以平僭上之火為佐沉香能升降諸氣以導諸藥為使也文蛤散文蛤鹹寒走腎專於行水一兩為末沸湯調服二錢白散桔梗開胸下氣三錢川貝母寬郁利痰三錢巴豆散寒逐結炒黑去油為霜一錢二味為末入巴豆霜再研勻白飲和服強人五六分弱人減半在上吐在下利不利進熱粥一杯過利不止進冷粥一杯加味茵陳蒿湯通治黃疸茵陳梔子大黃各三錢山藥二錢甘草白朮豬苓茯苓木通黃芩黃柏生薑各一錢水煎溫服
