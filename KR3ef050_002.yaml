body:
  text: 卷二陽證凡治傷寒溫病最要辨明陰陽若陰陽莫辨則寒熱紊亂而曰不誤於人者未之有也如發熱惡寒頭痛身痛目痛鼻乾不眠脅痛寒熱而嘔潮熱譫語詈罵不認親疏面紅光彩唇燥舌黃胸腹滿痛能飲冷水身輕易動常欲開目見人喜言語聲響亮口鼻之氣往來自如小便或黃或赤或溷濁或短數大便或燥祕或膠閉或挾熱下利或熱結旁流手足自溫暖爪甲自紅活此陽證之大略也傷寒陽證有表有里隨證治之方論詳後用宜分清溫病陽證有表證無表邪一於清熱導滯而已尤要辨明是傷寒是溫病斷不可溷而一之傷寒得天地之常氣由氣分傳人血分溫病得天地之雜氣由血分發出氣分傷寒溫病是緊要關隘先要分清路分眉批但其中證候相參從來混淆倘分別一有不清則用藥死生立判矣今人不辨寒溫好用熱藥而不知涼藥之妙且難也陰證凡傷寒末傳寒中而為陰證與陰寒直中三陰而為陰證或惡寒戰栗面時青黑或虛陽泛上面雖赤而不紅活光彩身重難以轉側或喜向壁臥或蜷臥欲寐或閉目不欲見人懶言語或氣微難以布息或口鼻之氣自冷聲不響亮或時躁擾煩渴不能飲冷或唇青或苔黑而滑手足厥逆爪甲青紫血不紅活小便青白或淡黃大便下利或寒結或熱在肌肉之分以手按之殊無大熱陰勝則冰透手也雖是發熱與陽證不同不可以面赤煩渴誤作陽證須要辨別明白其用藥自是理中四逆白通一派溫病無陰證然或四損之人亦有虛弱之人但其根源原是溫病即溫補藥中亦宜兼用滋陰之味若峻用辛熱恐真陰立涸矣仲景傷寒少陰病於附子湯真武湯中用白芍即此義也景嶽理陰煎大溫中飲自謂云騰致雨之妙自我創始其實亦本仲景此義而為之者也後人之千方萬論未有見出乎範圍之外者陽證似陰陽證似陰乃火極似水真陽證也蓋傷寒溫病熱極失於汗下陽氣亢閉鬱於內反見勝己之化於外故凡陽厥輕則手足逆冷涼過時膝劇則通身冰冷如石血凝青紫成片脈沉伏澀甚則閉絶以上脈證悉見純陰猶以為陽證何也及察內證氣噴如火譫語煩渴咽乾唇裂舌苔黃黑或生芒刺心腹痞滿脹痛舌卷囊縮小便短赤涓滴作痛大便燥結或膠閉或挾熱下利或熱結旁流或下血如豚肝再審有屁極臭者是也粗工不察但見表證脈體純陰便投溫補禍不旋踵大抵陽證似陰乃假陰也實則內熱而外寒在傷寒以大承氣湯下之有潮熱者六一順氣湯熱甚合黃連解毒湯在溫病雙解涼膈加味六一解毒承氣之類斟酌輕重消息治之以助其陰而清其火使內熱既除則外寒自伏易所謂水流濕者即此義也此與陽勝格陰例同王太僕所謂病人身寒厥冷其脈滑數按之鼓擊指下者非寒也余謂溫病火閉而伏多見脈沉欲絶不盡滑數鼓擊也要在詳證辨之陰證似陽陰證似陽乃水極似火真陰證也似陰似陽二證分析不清死生立判溫病無陰證眉批蓋傷寒傳變三陰而為陰證或陰寒直中三陰而為陰證陰勝於內逼其浮遊之火發於外其脈沉微而遲或沉細而疾一息七八至或尺衰寸盛其證面赤煩躁身有潮熱渴欲飲水或咽痛或短氣或嘔逆大便陰結小便淡黃驚惶不定時常鄭聲狀類陽證實陰證也粗工不察但見面赤煩渴咽痛便祕妄投寒涼下咽立斃大抵陰證似陽乃假陽也實則內寒而外熱急以白通附子通脈四逆湯之類加人參填補真陽以引人歸源但使元氣漸復則熱必退藏易所謂火就燥者即此義也此與陰勝格陽例同王太僕所謂身熱脈數按之不鼓擊者非熱也但陽證似陰與陽證傷寒溫病家通有之而陰證似陽與陰證此值正傷寒家事溫病無陰證古人未曾言及後人多不知此吳又可其先覺乎按寒熱有真假者陽證似陰陰證似陽是也蓋熱極反能寒厥乃內熱而外寒即真陽假陰也寒極反能燥熱乃內寒而外熱即真陰假陽也假陰者最忌溫補假陽者最忌寒涼察此之法當以脈之虛實強弱為主然洪長滑數強實有力真陽脈固多而沉伏細澀六脈如絶假陰脈亦不少假陰脈最足誤人宜細心辨之眉批可知不唯證之陰陽有真有假即脈之陰陽爽有真有假死生關頭全在此分噫醫道豈易易哉吳又可曰陰陽二證古方書皆對待言之以明其理世醫以陰陽二證世間均等臨診之際泥於胸次往來躊躇最易牽入誤揣甚有不辨脈證但窺其人多蓄少艾或適在娼家或房事後得病或病適至行房問及於此便疑為陰證殊不知病之將至雖童男室女曠夫寡妻僧尼閹宦勢不可遏與房欲何涉焉即使素多少艾頻宿娼家房事後適病病適至行房此際偶值病邪氣壅火鬱未免發熱到底終是陽證與陰證何涉焉況又不知陰證實乃世間非常有之證而陽證似陰者何日無之究其所以然者不論傷寒溫病邪在胃家陽氣內郁不能外布即便四逆所謂陽厥是也仲景云厥微熱亦微厥深熱亦深其厥深者輕則冷過時膝脈沉而微重則通身冰冷脈微欲絶雖有輕重之分總之為陽厥因其觸目皆是苟不得其要領於是誤認者良多況且溫病每類傷寒再不得其要領最易混淆夫溫病雜氣直行中焦分布上下內外大熱陰證自何而來余治溫病數百人僅遇一二正傷寒即令正傷寒數百人亦不過一二真陰證又何必才見傷寒便疑為陰證況多溫病又非傷寒者乎人亦可以憬然思翻然悟矣按吳氏溫病無陰證一語開萬古之屯蒙救無窮之夭枉按仲景曰陽證見陰脈者死類經注云證之陽者假實也脈之陰者真虛也陽證陰脈即陰證也夫證之陽而曰假實自是假陽證矣假陽證自是真陰證可知矣脈之陰而曰真虛自是真陰脈矣真陰脈自是真陰證更可知矣此真陰假陽所謂陰證似陽是也即王太僕所謂陰盛格陽是也宜用溫補之藥無疑矣今人一遇壯熱煩渴譫語狂亂登高棄衣而聲音嘹亮神色不敗別無敗壞陽德之狀但厥逆脈伏沉澀如絶便以為陽證見陰脈而用溫補之藥禍不旋踵殊不知證現內熱外寒之象脈見沉伏微細之形火鬱亢極陽氣不能交接於四肢故體厥脈厥狀類陰寒此真陽假陰所謂陽證似陰是也即王太僕所謂陽盛格陰是也乾隆甲戍乙亥吾邑連間數年溫毒盛行眼見親友病多陽證似陰用附子理中湯而死者若而入用八味丸料及六味丸合生脈散而死者又若而入病家醫家皆以為死證難以挽回卒未有知其所以誤者余深憫焉因古人格陰似陰體厥脈厥之説精心研究頗悟此理溫病無陰證傷寒陰證百中一二庸工好用熱藥且多誤補其虛故患陰證似陽者少壞事亦不若陽證似陰者之多也每參酌古訓又兼屢經閲歷實驗得陽證似陰乃火極似水陽邪閉脈非仲景所謂陽證陰脈也輒用升降涼膈加味六一解毒承氣之屬隨證治之無不獲效不必疑也特書之以為誤認陽證陰脈之戒可知仲景云陽證見陰脈者所謂戴陽是也所謂孤陽飛越是也所謂內真陰而外現假陽之象是也非真陽證也夫天之所以生物人之所以有生者陽氣耳脈證俱無真陽之氣故曰死豈若陰證見陽脈者之尚有生機乎如陽證陽脈即不藥亦元害生理惟陽證似陰乃火鬱於內反見勝己之化於外脈自亢閉實非陰脈此群龍無首之象證亦危矣引證確切千古疑案可釋然矣眉批然猶在可死可不死之間若早為清瀉之脈自復而愈至若貧賤人飢飽勞傷富貴家酒色耗竭此則四損不可正治之輩又當別論甚至臟腑久虛痰火久郁一著溫病正不勝邪水不勝火暴發競起一二日即死者其脈或浮洪而散狀若釜沸或沉微而澀狀若屋漏每遇此等脈證徒為悼嘆而已陽毒陰毒傷寒論曰陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之傷寒論曰陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯主之按陰陽和正氣也陰陽偏異氣也正氣者四時錯行之氣也異氣者四時不節之氣也而雜氣非其種也雜氣者兵凶旱潦疵癘煙瘴一切惡穢不正之氣也此氣適中人之陽分則為陽毒適中人之陰分則為陰毒觀其所主之藥二證一方並不用大寒大熱之劑可知長沙所謂陽毒陰毒乃天地之雜氣非風寒暑濕燥火之六氣也豈若後人之所謂陽毒陰毒乎要之後人所謂陽熱極盛固是陽毒陰寒極盛固是陰毒終非長沙所以立名之本義此二證者即所稱溫病是也即大頭溫蛤蟆溫瓜瓤溫以及痧脹之類是也吳又可溫病無陰證之論實本長沙陽毒陰毒中於雜氣之説受毒有淺深為病有重輕一而二二而一者也王太僕曰此陽勝格陰而致之非寒也凡中此雜氣之人不止咽喉痛身痛甚至心腹絞痛大滿大脹通身脈絡青紫手足指甲色如靛葉口噤牙緊心中忙亂一二日即死者此類是也但刺尺澤委中十指出血即令服玉樞丹最妙撥正散尤為奇方男左女右吹人鼻中雖危必蘇以增損雙解散主之表證發熱惡寒惡風頭痛身痛項背強痛目痛鼻乾不眠胸脅痛耳聾目眩往來寒熱嘔而口苦脈浮而洪或緊而緩或長而弦皆表證也在傷寒風寒外人但有一毫表證自當發汗解肌消散而愈其用藥不過麻黃桂枝葛根柴胡之類在溫病邪熱內攻凡見表證皆里證鬱結浮越於外也雖有表證實無表邪斷無正發汗之理故傷寒以發表為先溫病以清裡為主此一著最為緊要關隘所謂前一節治法大有天淵之別者此也俗醫何曾夢見此論前人未到引證諦當眉批今人一遇溫病便以為傷寒遂引經論先解其表乃攻其里之説此大謬也總因古今醫家俱將溫病與傷寒看成一證不分兩治如王字泰張景嶽曠代名手也其論傷寒證治妙矣至矣蔑以加矣至説到溫病猶是老生常談他何足道人每以大劑麻黃葛根等湯強發其汗此邪原不在經汗之徒損經氣熱亦不減轉見狂躁蓋發汗之理自內由中以達外今裡熱結滯陽氣不能敷布於外即四末未免厥逆又安能氣液蒸蒸以透表如縛足之鳥焉能飛升又如水注之器閉其後竅前竅焉能涓滴惟用升降雙解裡熱一清表氣自透不待發散多有自能汗解者此中玄妙王劉二公其先覺乎表裡兼證表裡俱見之證疑似之間最宜詳析蓋在表者宜汗在裡者宜下今既兩證相兼如欲汗之則里證已急欲下之則表證尚在在傷寒自表傳裡通宜大柴胡湯兩解之在溫病自里達表輕則增損大柴胡湯重則加味六一順氣湯主之里證不惡寒反惡熱掌心並腋下濈濈汗出腹中硬滿脹痛大便燥結或膠閉或熱結旁流或協熱下利譫語發狂口渴咽乾舌黃或黑舌卷或裂煩滿囊縮而厥脈洪而滑或沉實或伏數此里證之大略也溫病與傷寒表證實不同里證無大異亦須辨明治之按傷寒有表證自當汗之然脈有忌汗者七條證有忌汗者十一條有里證自當下之然脈有忌下者十四條證有忌下者二十二條此尤不可不知也傷寒論三百九十七法一百一十三方詳且盡矣兼以諸家闡發元余觀之自明何須余贅是集特辨溫病根源脈證治方與傷寒大異令業醫者分別清楚不以傷寒混治溫病是則余之志也已又按訒庵云汗吐下和古人治病之四法景嶽云若無邪氣在上不可輕吐亦無多法梔子豉湯吐無形之虛煩瓜蒂散吐有形之實邪一法以萊蔔子為末溫水調服一錢良久即吐和解小柴胡湯加減足矣二法之外最切於病無過汗下正傷寒之當汗當下者已逐條分析矣溫病無正發汗之理惟下證最多特為指明莫厭其煩面黃身黃以下共計溫病溫下證五十二條黃者土色也脾胃於五行屬上陽明之脈榮於面黃則濕熱鬱於脾胃之中熏灼上蒸於面甚則身黃如橘子色此大熱之象並宜茵陳蒿湯合升降散再酌病情合三承氣湯下之下後熱退汗自出黃自消矣或以溫酒洗之內經曰能合脈色可以萬全難經曰望而知之謂之神故看病者先要察色然後審證切脈參合以決吉凶也如肝熱則左頰先赤肺熱則右頰先赤心熱則額先赤腎熱則頤先赤脾胃熱則滿面通赤也又面色黃為溫為熱白為氣不調青為風寒黑為陰寒也自準頭年壽命宮法令人中皆有氣色可驗又若傷寒陰寒內盛逼其浮陽之火行於面亦發赤色非熱證也此為戴陽四逆湯加蔥白夫陽已戴於頭面不知者更用表藥則孤陽飛越危殆立見可不慎哉溫病無陰證目暗不明目赤目黃目瞑目直視目反折目者至陰也五臟六腑精華之所繫水足則明察秋毫如常而了了者里元邪也至於目暗不明乃邪熱居內焚灼腎水枯涸不能朗照若赤若黃若瞑若直視若反折邪俱在裡也若不急下則邪愈熾矣並宜加味涼嗝散加龍膽草薛氏曰凡開目而欲見人者陽證也閉目而不欲見人者陰證也目中不了了目睛不和色赤熱甚於內也目瞑者必將衄也目睛黃者將發身黃也或瞪目直視或戴跟反折或目胞陷下內多虛證或睛暗而不知人者亦有虛證皆難治也舌白苔黃苔黑苔凡傷寒邪在表者工舌無苔邪在半表半裡白苔而滑肺主氣而色白故凡白苔猶帶表證止宜和解禁用攻下有尖白根黃尖黃根白或尖白根黑及半邊黃白前苔滑者雖證不同皆屬半表半裡若傳裡則乾燥熱深則黃甚則黑也然黑苔止有二種有火極似水者為熱極有水極似火者為寒極細辨之黑色亦自不同熱極者色黑而苔燥或如芒刺再驗必小便赤澀大承氣湯下之寒極者色青灰而苔滑再驗必小便清白或淡黃理中湯加附子溫之又溫病與傷寒舌色不同傷寒自表傳裡舌苔必由白滑而變黃變黑不似溫病熱毒由里達表一發即是白黃黑諸苔也故傷寒白苔不可下黃則下之溫病稍見黃白苔無論燥潤即以升降散加味涼膈散下之黑則以解毒承氣湯急下之下後間有三二日裡證去舌尚黑者苔皮未落也不可再下務在有下證方可下有一種舌俱黑而無苔此經氣非下證也妖娠多有此陰證亦有此又有一種舌屢經汗下消導二便已通而舌上青灰色未退或濕潤或雖不濕潤亦不幹燥不可因其濕潤妄投薑附亦不可因其不濕潤而誤與硝黃此困汗下過傷津液其脈必虛微無力急宜救陰為主炙甘草湯左歸丸料或六味地黃九料合生脈散滋其化源又有一種舌真陰虧損火勝津枯乾燥涸極唇裂鼻煤舌黑宜以涼水梨漿治其標左歸六味滋其本庶或可生若執用平氣涼膈則殆矣實熱火盛而焦虛熱水虧而枯分辨不清彼此無一生矣仔細勘驗脈證畢竟不同眉批杜清碧三十六舌法三十五舌屬熱惟一舌屬寒大抵熱多寒少三十六法已覺其煩後廣之一百有餘真屬蛇足大鵝梨削薄片於新汲水中去渣飲汁即梨漿是也舌白砂苔舌紫赤色舌上白苔乾硬如砂皮一名水晶舌乃自白苔之時津液乾燥邪雖在胃不能變黃急下之紫赤亦胃熱也亦宜下之舌芒刺熱傷津液此熱毒之最重者急下之舌裂日久失下血液枯涸多有此證又熱結旁流日久不治在下則津液消亡在上則邪火毒熾故有此證急下之裂自滿舌短舌卷舌硬此皆邪氣勝真氣虧急下之舌自舒唇燥裂唇焦色口臭鼻孔如煙煤此胃家實多有此證急下之鼻孔煤黑溫毒在胃更甚急下之口燥咽乾氣噴如火揚手擲足小便極臭小便赤黑小便涓滴作痛此皆內熱之極急下之潮熱邪熱在胃宜下之善太息此胃家實呼吸不利胸膈痞悶每欲引氣下行故然宜下之心下滿心下痛心下滿痛心下高起如塊腹脹滿痛腹痛按之愈痛小腹滿痛此皆胃家邪實內結氣閉急下之氣通則已頭脹頭脹痛頭汗頭痛如破此皆胃有邪實氣不下降急下之脹痛立止頭汗亦宜下之則熱越而遍身汗出矣譫語發狂蓄血如狂此胃家實陽邪勝也急下之有氣血兩虛躁煩如狂者不可下須辨之溫疹治法不外清散增損雙解散加紫萍小便閉此大便祕氣結不舒因而小便不通也急下之大便行小便立解大便燥結轉屎氣極臭此下之無辭但有血液枯竭者無表裡證虛燥不可下宜六味地黃丸料加麥冬五味煎成入人乳減半飲之一方用白菜自然汁大麻仁汁生芝麻汁等份入蜜和服自通或用蜜煎導法大便膠閉其人平日大便不實一遇溫邪便蒸作極臭狀如黏膠愈蒸愈黏愈黏愈閉以致胃氣不能下行溫毒無自而出不下即死若得黏膠一去無不愈者協熱下利其人大便素或不調邪熱乘胃便作煩渴一如素日泄瀉稀糞而色不敗其敗色但焦黃而已午後潮熱便作瀉泄子後熱退泄瀉亦減次日不作潮熱利亦止為病愈若潮熱復作利不止者以增損大柴胡湯撤其餘邪而利自止熱結旁流此胃家實邪熱壅閉續得下利純臭水全然無糞日三五度或十數度急以加味六一順氣湯下之得結糞而利自止服藥後不得結糞仍稀水旁流及所進湯藥因大腸邪勝失其傳送之職知邪猶在也病必不減仍以前湯更下之或用解毒承氣湯如虛並加入參無參以熟地一兩歸身七錢山藥五錢煎湯入前藥煎服纍效蓋血不亡氣亦不散耳脈厥體厥脈厥沉伏欲絶體厥四肢逆冷涼過肘膝半死半生通身如冰九死一生此邪火壅閉陽氣不能四布於外胃家實也急以解毒承氣湯大清大下之下後而鬱熱已解脈和體溫此為病愈若下後而鬱熱已盡反見厥者為虛脫宜補若下後鬱熱未盡仍見厥者更下之厥不回者死按溫病厥逆皆下證傷寒厥逆多兼下利則陽熱變為陰寒者十之五蓋木盛則胃土受克水穀奔迫胃陽發露能食則為除中木盛則腎水暗虧汲取無休腎陽發露面赤則為戴陽戴陽尚多可救除中十不救一所以溫之灸之以回其陽仍不出少陰之成法也但厥而下利陰陽之機甚微不可不辨也下後脈反浮里證下後宜脈靜身涼今脈浮身微熱口渴神思或不爽此邪熱溢於肌表里無大留滯也雖無汗宜白虎湯若大下後或數下後脈空浮而虛按之豁然如無宜玉女煎加人參覆杯則汗解以其人或自利經久或他病先虧或本病日久不痊或反復數下以致周身血液枯涸石膏知母麥冬辛涼除肌表散漫之熱邪人參熟地牛膝滋陰以助周身之血液於是經絡潤澤元氣鼓舞腠理開發此邪從榮解汗化於液之義也下後脈復沉下證脈沉而數下後脈浮當得汗解以熱邪溢於氣分也今下後二三日脈復沉者餘邪復瘀到胃也宜更下之更下後脈再浮者仍得汗解宜白虎湯以白虎發汗亦裡熱除而表邪自解之義非比麻黃桂枝發散風寒也下後脈反數應下失下口燥咽乾而渴身反熱減四肢時厥欲得近火壅被此陽氣伏也下後厥回身復熱脈大而反數舌上生津不甚飲水此里邪漸去郁陽暴伸也柴胡清燥湯以和解之此證類近白虎但熱渴既除又非白虎所宜也下後身反熱應下之證下後當脈靜身涼今僅發熱者此內結開正氣通郁陽暴伸也即如爐中伏火撥開雖焰不久自息與下後脈反數義同下後反痞邪氣留於心胸令人痞滿下之痞應去今反痞者以其人或因他病先虧或因稟賦嬌怯氣血兩虛下之益虛失其健運邪氣留止故致痞滿今愈下而痞愈甚若用行氣破氣之劑轉成壞病矣宜參歸養榮湯中病即止下後邪氣復聚里證下後脈不浮洪煩渴減身熱退三五日後復發熱者亦無傷食勞役乃餘邪尚有隱伏因而復發此必然之理不知者每歸咎於醫家誤也再酌前方下之慎勿過劑以邪熱微也急證急攻傷寒無此證治雜氣流毒怫鬱三焦其病不可測識一發舌上白苔如積粉譬如早服涼膈承氣等方下之至午舌變黃色煩滿更甚再急下之至晚舌變黑刺或鼻如煙煤仍加硝黃大下之所謂邪微病微邪甚病甚非藥之過也此一日之間而有三變幾日之法一日行之稍緩則不及救矣若下後熱渴除苔不生方愈更有熱除苔脫日後熱復發苔復生者更酌前方下之不必疑二也嘗見溫病有一二日即死者乃其類也丁亥五月監生李廉臣女年十八患溫體厥脈厥內熱外寒痞滿燥實譫語狂亂罵詈不避親疏煩躁渴飲不食不寐惡人與火晝夜無刻豫自端陽日診其病至七月初三始識人熱退七八而思食自始至終以解毒承氣湯一方雪水熬石膏湯煎服約下三百餘行黑白稠黏等物愈下愈多不可測識此真奇證怪證也廉臣曰若非世兄見真守定通權達變小女何以再生戊子秋舉人李煦南長公約年十五患溫脈沉伏妄見妄言如醉如癡渴飲無度以加味涼膈散連下一月而蘇又豫甥年二十一患溫初病便煩滿囊縮登高棄衣渴飲不食日吐血數十口用犀角地黃湯加柴芩連梔元參荊芥穗灰十劑間服瀉心承氣湯七劑諸證退而飲食進越五日小便不通脹痛欲死豫細診問脈仍沉臍間按之徑疼豫思此土實氣閉不舒因而小水不利也以大承氣湯下黑血塊數枚而病始痊此皆證之罕見者也可見凡下不以數計有是證即投是藥但恐見理不明認證不透反致耽擱而輕重緩急之際有應連日有應間日下者如何應多如何應少其間不能如法亦足誤事此非可以言傳臨時酌斷可也此等證治亦少姑存以備參考發熱凡治傷寒溫病當發熱之初最為緊要關隘即宜詳辨脈證治療此時用藥稍不確當必變證百出而成壞病矣如溫病發熱雜氣怫鬱三焦由血分發出氣分斷無正發汗之理而發熱頭痛身痛而渴為熱之輕者神解散小清涼散之類如發熱氣噴如火目赤舌黃譫語喘息為熱之重者加味涼膈散增損三黃石膏湯之類如發熱厥逆舌見黑苔則熱之極矣加味六一順氣湯解毒承氣湯大清大下之若正傷寒自當詳發熱之表裡虛實以施治如翕翕而熱者表熱也謂若合羽所覆明其熱在外也桂枝麻黃各半湯桂枝二越婢一湯葛根湯選用蒸蒸而熱者裡熱也謂若熏蒸之蒸明其熱在內也白虎湯黃連解毒湯瀉心湯選用太陽經以表為標膀胱為本凡發熱頭項痛腰脊強脈浮緊無汗此寒在標也麻黃湯汗之發熱脈浮緩自汗此風在標也桂枝湯和之發熱脈緊而兼緩此風寒並在標也大青龍湯發之若脈浮發熱煩渴小便不利此熱在本也五苓散兩解之陽明經以肌肉為標胃為本凡發熱目痛鼻乾不眠無汗葛根湯熱甚加黃芩知母主之者乃熱在標也若表裡俱熱渴飲水漿汗出脈洪數白虎湯主之者乃熱在標本也若不惡寒反惡熱或蒸蒸而熱內實不大便脈洪數有力調胃承氣湯下之者乃熱在本也少陽經主半表半裡從乎中治脈弦發熱頭痛口苦耳聾胸滿脅痛往來寒熱心煩喜嘔默默不欲食者小柴胡湯主之若標病止宜小柴胡加減若本病因邪深入不能傳散多以柴胡加芒硝湯或大柴胡湯大抵熱在太陽忌下熱在陽明忌利小便熱在少陽忌汗忌下忌利小便至傳入三陰則不發熱唯少陰經能發熱然少陰發熱有二證初病即見少陰證脈沉反發熱麻黃附子細辛湯若下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒此陰盛格陽內寒而外熱也理中湯加附子或通脈四逆湯蓋陽邪傳陰經而下利者乃是熱利陽陷入陰外所以無熱自是白頭翁湯黃連阿膠湯一派如陰邪入陰經而下利者乃是裡寒自利寒既在裡為主則陽氣必客於外外所以反熱非理中四逆何以御之內陽而外無熱內陰而外反熱辨之不明用藥死生立判眉批要知雖皆發熱畢竟不同發於陽而發熱者頭必痛發於陰而發熱者頭不痛此為辨也又太陽以惡寒發熱為病進恐邪氣傳裡也厥陰以厥少熱多為病退喜陰盡陽復也然熱氣有餘則又為內癰便血之兆矣發熱多端不可不詳辨也按傷寒論之論內癰止於三句中即以三證辨內癰為極確文法精練不可不細玩之第一句諸脈浮數當發熱而反灑淅惡寒謂脈浮數本當發熱而反多灑淅惡寒者內癰也第二句若有痛處謂浮數之脈主邪在經當一身盡痛而痛偏著一處者內癰也第三句飲食如常謂病傷寒當不欲飲食而飲食如常者內癰也讀仲景書可不於一字一句深求其義哉景嶽治肺癰有桔梗杏仁煎治腸癰有腸癰祕方通治有連翹金貝煎外又有蠟礬丸皆神方也謹採以備用外科之法門亦仲景熱盛內癰之説有以開之惡寒傷寒惡寒者不見風亦惡寒身雖發熱不欲去衣被也惡寒屬表證而有虛實之分以有汗者為虛無汗者為實也但有惡寒為表不解若欲攻其熱當先解其表麻黃桂枝之屬是也必不惡寒反惡熱此為表解乃可清裡白虎承氣之屬是也然又有少陰之惡寒者則蜷臥足冷脈沉細四逆湯溫之不可發汗必振寒脈微細者內外俱虛也真武湯主之又有止稱背惡寒者蓋人背為陽腹為陰陽氣不足陰寒氣盛則背為之惡寒陽微陰盛之機已露一斑傷寒論云少陰病一二日口中和背惡寒者當灸之處以附之湯者是也又有陽氣內陷入陰中表陽新虛有背微惡寒者傷寒論云傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之者是也蓋微不甚也若少陰則寒甚也二者一為陰寒氣盛一為陽氣內陷蓋陰寒為病不能消耗津液故於少陰病則曰口中和及陽氣內陷則熱灼津液為干故於陽明病則曰口燥渴也二者均為背惡寒要辨陰陽寒熱不同亦於口中潤燥可知不可不仔細審之也又有傷寒惡寒全不發熱六脈緊細乃素稟虛怯而不能發熱此太陽寒傷榮證但極虛感寒無正發汗之理宜理陰煎大溫中飲以滋其陰而云騰致雨之妙則景嶽有心得矣若溫病惡寒口燥咽乾舌黃唇焦乃陽盛格陰內熱則外寒非惡寒也蓋惡寒表證也得就暖處便解外寒重證也雖近火烈不除輕則神解散甚則升降散增損雙解散豈可與正傷寒惡寒同日語哉惡風惡風者見風則惡密室中則無所惡也雖屬表證而發散又自不同若無汗惡風則為傷寒當發其汗麻黃湯有汗惡風則為中風當解其肌桂枝湯里證雖具而惡風未罷者皆當先解其表也又有汗多亡陽與風濕皆有惡風之證蓋汗出漏不止則亡陽外不固是以惡風也以桂枝加附子湯溫其經而固其衛風濕相搏骨節煩痛濕盛自汗而皮腠不密是以惡風也以甘草附子湯散其濕而實其衛若溫病惡風等於惡寒陽伏於內陰格於外不過初病一二日後則惡熱不惡風寒矣要之邪熱內郁輕則發越於外而手足溫重則內外格拒而通身涼死生關頭惟在識與不識耳神解芳香升降涼膈等方斟酌得宜萬無一失頭痛太陰少陰有身熱而無頭痛蓋二經皆不上頭故也厥陰有頭痛而無身熱蓋厥陰與太陽會於巔也若身熱又頭痛皆屬三陽經也傷寒太陽頭痛發熱惡寒無汗麻黃湯頭痛發熱惡寒有汗桂枝湯陽明頭痛不惡寒反惡熱白虎湯不大便調胃承氣湯頭痛甚者必衄葛根湯去大棗加蔥白少陽頭痛頭角痛或耳中痛或口苦發熱或往來寒熱脈弦數並宜小柴胡湯厥陰頭痛嘔而吐沫吳茱萸湯又厥陰頭痛脈微浮為欲愈如不愈小建中湯若溫病頭痛或頭脹痛乃邪熱鬱結於內上攻頭面三陽斷不可發表溫病頭痛禁用風藥恐邪氣上升也清瀉裡熱表證自退眉批輕則神解散清化湯治之重則增損雙解散升降散合內外而治之裡氣一通頭痛自止不可拘傷寒頭痛當解表不可攻裡之例也身痛凡傷寒太陽病身體痛骨節痛若惡寒無汗脈浮緊者麻黃湯汗之若脈浮緩惡風自汗者桂枝湯和之若風寒並中脈浮緊而緩者大青龍湯發之少陰病身體痛骨節痛手足厥脈沉者附子湯主之然此陰陽二證一般身痛用藥則相去云壤浮沉之脈要在指下辨識若誤發少陰經汗必動其血或從口鼻出或從目出少陰脈入肺絡心太陽脈起目內眥則為下厥上竭而死或可以當歸四逆湯救之凡一身盡痛發熱發黃頭上汗出背強小便不利者濕也茵陳蒿湯凡發汗後身疼痛脈沉遲者桂枝新加湯凡身痛下利清穀者表裡俱寒也原文先救里四逆湯次救表桂枝湯若溫病雜氣熱鬱三焦表裡阻隔陰陽不通身體痛骨節痛以及頭痛項強發熱惡寒惡風目痛鼻乾不眠脅痛耳聾寒熱而嘔一切表證狀類傷寒實非風寒外感之邪通宜清熱解鬱以疏利之如神解散芳香散升降散加味涼膈散增損雙解散之類隨其輕重酌量用之裡氣一清表氣自透而外證悉平矣故溫病凡見表證皆里證鬱滯浮越於外也不知者一見身痛頭痛發熱惡寒等證便以為傷寒而用麻黃青龍以發其汗則壞病蜂起矣此即前一節治法大有天淵之別也王劉兩公其先覺乎表證皆里證浮越於外是不可正發汗之所以然處前輩名公知此者除王劉吳喻無多人焉習俗之舊染難以驟更耳言之可勝嗚咽眉批不眠陽盛陰虛則晝夜不得臥陰盛陽虛則嗜臥不欲起蓋夜以陰為主陰氣盛則目閉而臥安若陰為陽擾故煩躁而不眠也溫病熱鬱三焦陰不敵陽大渴引飲煩躁不眠輕則增損大柴胡湯重則增損雙解散兩解表裡之熱毒以治之若太陽傷寒脈浮數身痛無汗煩躁不眠大青龍湯或桂枝麻黃各半湯若發汗後不眠脈浮數微熱煩渴小便不利五苓散若大汗後胃中乾燥不眠煩渴欲飲水者少少與之愈脈數大者白虎湯或竹葉石膏湯不用五苓又太陽傷寒脈浮以火劫汗亡陽驚狂起臥不安桂枝去芍藥加蜀漆牡蠣龍骨救逆湯陽明經病目痛鼻乾不眠葛根湯內熱多加黃芩知母若自汗脈洪數經腑俱熱煩渴舌燥不眠白虎湯若大熱錯語呻吟乾嘔不眠黃連解毒湯少陽病往來寒熱口苦心煩不眠脈弦數小柴胡湯加黃連梔子若虛弱人津液不足加酸棗仁五味子麥冬少陰病得之二三日以上心煩不眠黃連阿膠湯凡汗吐下後煩渴不眠劇者懊憹不眠此邪熱乘虛客於胸中煩熱鬱悶而不得散也梔子豉湯凡下後虛煩不眠參胡溫膽湯加味溫膽湯多眠凡病者多不得眠傷寒反多眠者以衛氣晝則行陽夜則行陰行陽則寤行陰則寐陽氣虛陰氣盛則目瞑故多眠乃邪氣傳於陰而不在陽也昏昏閉目者陰司闔也默默不言者陰主靜也凡傷寒頭痛發熱神昏多眠者表證也宜解表為先疏表湯若得汗後脈浮細身涼嗜臥者此陽邪去而陰氣復可不藥而愈設胸滿脅痛風熱內攻而喜眠者邪傳少陽也小柴胡湯加桔梗枳殼少陰病得之二三日表邪未悉並陰但欲寐脈微細無里證者麻黃附子甘草湯以微發其汗則愈少陰病欲吐不吐心煩多眠自利而渴小便色白者真武湯凡脈微細欲絶或蜷臥惡寒向壁或身重逆冷皆屬少陰附子湯若溫病多眠三陽合病目合則汗小清涼散合白虎譫語有熱者增損三黃石膏湯加大黃蓋凡胃中有熱者亦欲多眠但神昏氣粗而大熱絶不似少陰之明辨是蜷臥足冷也自汗自汗者不因發散而自然汗出也然有表裡之別虛實之異焉凡傷寒太陽病汗出惡風反微惡寒者表未解也宜桂枝湯或小建中湯或黃耆建中湯隨證用之陽明病發熱汗多者急下之大承氣湯陽明病脈遲雖汗出不惡寒表證罷里證實者急下之大承氣湯夫脈遲乃熱鬱陽明火邪閉脈也傷寒熱鬱陽明尚且閉脈何況溫病眉批裡實乃身重短氣腹滿而喘濈濈汗出也非若邪氣在表而汗出之可緩也漏風亡陽者桂枝加附子湯凡陰證四逆額上及手背冷汗出者與自利厥逆大汗出者急以四逆湯溫之凡自汗出小便難脈沉者桂枝附子湯加茯苓若溫病邪熱內結誤服表藥大汗亡陽煩渴不解大復蘇飲不因誤表而自汗者增損三黃石膏湯裡實者加大黃愈後每飲食及驚動即自汗出此表裡虛怯也人參固本湯加黃耆牡蠣麻黃根以固之若發熱而利自汗不止者死若大汗出熱反盛狂言不止者死若汗出發潤喘不休者死若汗出如珠不流者死此又不可不知也盜汗盜汗者睡著而汗出也是由邪在半表半裡何者若邪氣一切在表與衛則自然汗出也此則邪氣侵行於里外連於表及睡則衛氣行於里乘表中陽氣不致津液得泄故但睡而汗出覺則氣散於表而止矣雜病盜汗者或陽虛血熱補中益氣湯加防風麻黃根生地黃牡丹皮或陰虛火動當歸六黃湯加浮麥麻黃根傷寒盜汗責於半表半里知其膽有熱也傷寒論曰微盜汗出反惡寒者表未解也小柴胡湯主之傷寒論曰陽明病脈浮而緊必潮熱發作有時但浮者必盜自汗出按盜汗是少陽證自汗是陽明證但浮者必盜汗出句之盜字應是自字當改之可與白虎湯病愈脈靜身涼數日後忽得盜汗及自汗者此屬表虛並宜黃耆湯加防風麻黃根若溫病盜汗邪熱內郁外侵於表升降散或增損大柴胡湯加牡蠣龍膽或龍膽末二錢豬膽汁同溫酒調服頭汗風熱邪內蓄蒸發腠理遍身汗出者謂之熱越若身無汗則熱不得越上蒸於陽故但頭汗出也熱不得越陽氣上騰頭汗出譫語者在傷寒大柴胡湯涼膈散在溫病增損大柴胡湯加味涼膈散頭汗出齊頸而還渴飲水漿小便不利此為熱鬱在裡身必發黃在傷寒茵陳蒿湯在溫病加味涼膈散加茵陳蒿心下滿頭汗出水結胸也並宜柴胡陷胸湯陽明病下血譫語此為熱入血室此證兼男子言不僅婦女也但頭汗出者在傷寒小柴胡湯加歸尾桃仁穿山甲丹皮梔子在溫病柴胡清燥湯加穿山甲桃仁黃連大黃芒硝又傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔往來寒熱心煩但頭汗出者柴胡桂枝幹薑湯又傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便難脈沉細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊細不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解柴胡加芒硝湯若中濕誤下之頭汗出小便利者死又下後額上汗出而喘小便反祕者亦死二者乃頭汗之逆以陰陽上下俱脫也關格不通不得尿頭無汗者生有汗者死若元氣下脫額上汗如貫珠者死脈經曰陽氣上出汗見於頭五內枯乾胸中空虛醫反下之此為重虛也蓋頭汗有生死之分須詳辨之按脈細者應是脈沉細者觀下文脈沉亦在裡也之亦字自知當補之脈雖沉緊之緊字當是細字若是緊字與上下文義不屬當改之手足心腋下汗凡潮熱手足濈濈汗出為陽明胃實也腋下濈濈汗出為兼少陽膽實也在傷寒大柴胡湯在溫病增損大柴胡湯若大便祕硬者在傷寒大柴胡湯加芒硝在溫病加味六一順氣湯若手足心濈濈汗出大便難而譫語者此有燥糞為熱聚於胃也在傷寒調胃承氣湯在溫病加味涼膈散傷寒論曰陽明病中寒不能食小便不利手足心濈濈汗出此欲作痼瘕大便必初硬後溏胃中虛水穀不別故也痼瘕者寒氣結而為積也厚朴生薑甘草半夏人參湯或理中湯加木香檳榔不可下也若額上及手背濈濈冷汗出者此屬陰證傷寒通脈四逆湯溫之此皆不可不辨也結胸痞氣傷寒論曰病發於陽而反下之熱入里作結胸謂表證當汗也而醫反下之則外邪乘虛內陷結於心膈乃為結胸也傷寒論曰太陽病脈浮動數浮則為風動則為痛數則為熱眉批頭痛發熱微盜汗出反惡寒者表未解也而反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃梔子豉湯主之又曰太陽病重發汗而復下之不大便舌上燥而渴日晡潮熱從心下至小腹硬滿而痛不可近者大陷胸湯主之又曰傷寒嘔而發熱柴胡證具而以他藥下之其柴胡證仍在者復與小柴胡湯必蒸蒸振汗而解若心下滿而硬痛者此為結胸也大陷胸湯主之又曰傷寒六七日結胸實熱脈沉而緊心下硬痛者大陷胸湯主之又曰結胸無大熱此為水結在胸脅也但頭汗出者大陷胸湯主之活人云宜逐其水小半夏茯苓湯小柴胡湯去棗加牡蠣亦可又曰小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之又曰病應汗解反以冷水噀之或灌之其熱被卻不出彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥與五苓散寒實結胸寒飲結於胸中無熱證者與小陷胸湯白散亦可服崔行功曰傷寒誤下結胸欲絶心胸高起手不可近用大陷胸湯恐不得瘥此下後虛逆氣已不理當以枳實理中丸先理其氣次療諸疾古今用之如神且誤下之初未成結胸者急宜頻服理中湯加枳殼桔梗自得解散更不作結胸也又有衄血不盡血結胸中手不可近漱水不欲咽身熱喜忘如狂腹脅脹滿大便黑小便利犀角地黃湯加大黃主之婦人血結胸脅揉而痛不可撫近海蛤散主之凡結胸脈沉緊沉滑沉實或數大有力者乃可攻之若脈微沉細手足冷者為難治若欲救之宜四逆湯凡結胸有兼發黃或發斑或厥逆者皆為最重之證又結胸證悉具煩躁者死又結胸脈浮大者不可下下之則死須詳辨之張景嶽曰結胸治法仲景俱以大陷胸湯主之然以余之見惟本病不因誤下而實邪結胸下連小腹燥渴譫妄脈來沉實者正大陷胸湯所宜用也至於太陽少陽表邪未解因下早結胸而復用大陷胸湯是既因誤下而又下之恐不得瘥不若用枳實理中丸柴胡陷胸湯以緩治之為妙余按崔張皆謂不得瘥者恐復下之過也不知仲景大有所見蓋誤下結胸危證也緩則死矣結胸而用陷胸者有病則病受之觀大病瘥後從腰以下有水氣者用牡蠣澤瀉散峻攻何反不顧其虛耶蓋病勢危急設用緩劑陰水襲入陽界驅之無及可見活人之事迂闊者無劑也傷寒論曰病發於陰而反下之因作痞以下之太早故也謂內挾痰食外感風寒里之陰虛已受邪熱中氣先傷也或熱微下證未全不任轉瀉也而醫反下之則里之微熱雖除表之邪熱又至表邪乘虛內陷結於心下但硬滿而不痛雖不結胸亦成痞氣也若不因下早而為痞氣者或痰或食或氣或血為之結也各有寒熱之不同要在辨而治之大約輕者通用枳殼桔梗湯若實熱而為痞者內實熱盛不大便手足溫其脈關上浮大黃黃連瀉心湯如寒熱偏勝者上有濕熱下有陳寒也心下痞而復惡寒汗出者附子瀉心湯如寒多熱少胸滿脈濡者半夏瀉心湯如胃不和心下痞硬乾嘔脅下有水氣者生薑瀉心湯如下利腹鳴者非熱結也但以胃中虛客氣上逆故心下痞硬甘草瀉心湯要之瀉心非瀉心火之熱乃瀉心下之痞滿也如痞滿胃寒咳逆理中湯如外證未除而數下之為重虛其里邪熱乘入遂挾熱而利心下痞硬表裡不解者桂枝人參湯即理中湯加桂枝而易其名為治虛痞下利之的方也如汗吐下後胃虛停飲痞硬噫氣不除旋覆花代赭石湯此輔正匡邪蠲飲下氣之妙方也如本以下之故心下痞與諸瀉心湯不解其人渴而煩躁小便不利五苓散邪在上而治在下使濁氣出下竅而清陽之在上焦者自能宣化乃臟實而瀉其腑也蓋五苓有兩解之功潤津滋燥導飲蕩熱亦消痞滿之良方也如發熱汗出不解心下痞硬或吐或下利脈滑數或關脈沉緊大柴胡湯蓋外邪不解轉入於裡以下痞硬嘔吐下利攻之則礙表不攻則里證又迫計惟有大柴胡湯合表裡而兩解之余按大凡結胸痞氣未經攻下而成者此或痰或食或氣或血凝滯而然先須柴胡陷胸湯柴胡枳桔湯以開之開之不愈則攻下之曾經下後此為外邪陷入而為結胸痞氣時其輕重當下則下緩則誤矣若不分曾下未下但見心下脹滿便以為結胸痞氣輒用攻下之劑反成真結痞矣又按結言胸痞言心下結言按之石硬痞言按之濡結言寸脈浮關脈沉痞不言寸而但言關上浮可以知其病之分治之異矣然此皆為正傷寒言之也若溫病鬱熱內攻火性上炎一發即心胸結痞脈洪滑數或伏沉自是熱實結胸痞氣特患下之不早耳非大小陷胸或陷胸承氣加味涼膈等方下之不為功凡結胸不問寒熱虛實遲早便用罨法生薑蔥白等份生蘿蔔加倍無以子代之三味共搗一處炒熱白布包作餅罨胸前結痛處此法須分二包冷則輪換無不即時開通但不宜太熱恐炮烙難受也更以溫手順下揉之自無不愈並治一切痞滿脹痛真妙法也張氏發明曰成注云無熱而惡寒者發於陰也既無熱而又惡寒其為陰證明矣安有下之之理下之豈止作痞而已哉夫仲景所謂陰陽者指表裡而言也非此之謂也病在表則當汗而反下之因作結胸病雖在裡尚未入腑而輒下之因成痞所以成結胸者誤下之故也所以成痞氣者下之太早故也經曰脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮又曰脈浮而緊復下之緊反入里則作痞由此言之風邪入里則結胸寒邪入里則為痞然此亦皆太陽病之所致非陰證之謂也又曰病在陽應以汗解陽指表證而言明矣況痞證諸條未有因無熱惡寒下之而成者此成注之誤也按此説深合經義故録之腹滿腹滿者腹中脹滿也腹滿不減者為實時滿時減者為虛以手按之堅硬而痛不可按者為實可揉可按而軟者為虛傷寒論曰凡傷寒太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結痛自利益甚宜理中湯加藿香厚朴陳皮半夏甚則四逆湯腹滿時減復如故此虛寒從下而上也理中湯加厚朴木香病人自言腹滿他人以手按之不滿此屬陰證切不可攻宜四逆湯溫之凡汗解後腹滿厚朴生薑半夏甘草人參湯本太陽證而反下之因而腹滿時痛者桂枝加芍藥湯大實痛者桂枝加大黃湯少陰病六七日腹脹不大便者大承氣湯凡發汗後不解腹脹滿痛者大承氣湯凡潮熱腹滿短氣而喘內實者大柴胡湯加厚朴檳榔胸中有熱欲嘔吐胃中有寒作滿痛者黃連湯溫病無陰證熱鬱失下邪火久羈腹脹滿痛者升降散加味涼膈散加枳實厚朴大抵陽熱為邪則腹滿而咽乾便祕譫語陰寒為邪則腹滿而吐利食不下與夫曾經汗吐下後腹滿治各不同故為醫者要知邪氣所起所在審其所起知邪氣之由來觀其所在知邪氣之虛實汗下之不差清補之適當則十全之功可得也按自利益甚四字當在必胸下結痛句之下不應在吐食不下句之下若在此句下則是已吐食不下而自利益甚矣仲景復曰若下之三字無所謂也當移之小腹滿小腹滿者臍下脹滿也胸膈滿為邪氣小腹滿為有物物者何尿與血耳小腹滿小便不利者尿澀也在傷寒自氣分傳入血分宜五苓散豬苓湯在溫病自血分發出氣分宜神解散升降散小腹滿小便自利者蓄血也在傷寒桃仁承氣湯代抵當湯丸在溫病解毒承氣湯加夜明砂桃仁丹皮穿山甲又傷寒小腹滿厥逆真武湯小腹滿不結胸按之痛厥逆脈沉遲冷結關元也四逆湯加吳茱萸外灸關元穴溫病無陰證腹痛凡腹中痛按而痛甚為實按而痛減為虛陽邪痛者痛不常久陰邪痛者痛無休歇傷寒腹痛須明部分中脘痛屬太陰脾經分脈沉遲而寒者理中湯甚加附子陽脈澀陰脈弦脈三陽急為瘕三陰急為疝此傷寒瘕疝發於內故腹中急痛小建中湯散結安瘕治在陽明太陰不瘥小柴胡湯和中定疝治在少陽厥陰臍腹痛屬少陰腎經分脈沉者真武湯小腹痛屬厥陰肝經分陽郁厥逆者當歸四逆湯加吳茱萸生薑陰寒厥逆者四逆湯加吳茱萸若太陽病下之早因而腹痛者屬太陰也桂枝加芍藥湯若內實腹痛繞臍刺痛煩躁發作有時此有燥糞也調胃承氣湯大實腹滿而痛脈實者大承氣湯若脈弦口苦發熱腹中痛者小柴胡湯去人參加炒白芍寒熱交作腹中痛者小柴胡湯加肉桂白芍寒多去黃芩大抵傷寒腹痛有虛有實有寒有熱要在辨脈證而治之溫病腹痛乃雜氣潛入邪火鬱滯陽明也以升降散加味涼膈散消息治之溫病無陰證實與熱自不屑言即有虛者亦當先去其急而後理其緩也張子和曰良工先治其實後治其虛今之庸工不敢治其實惟誤補其虛舉世不知其非奈何煩熱煩熱者因發熱而煩躁不安也惟溫病為特甚此蓋雜氣伏郁三焦邪火亢閉怫熱燔灼故心神無定耳增損雙解增損三黃石膏之屬消息治之若傷寒有表邪不得汗出而煩躁者其脈浮緩而緊數大青龍湯若煩而渴脈弦數者乃半表半裡證也小柴胡湯加知母天花粉若煩渴舌燥大汗出飲水脈洪數有力者陽明經腑證也白虎湯甚則調胃承氣湯若手足厥下利而煩脈沉細而軟者此則陰證之類煩也急以人參附子溫之若手足厥陽氣受於胸中四肢為諸陽之本邪結胸寒飲伏停陽氣隔塞心中滿而煩飲作煩悶此非少陰之臟寒也急以瓜蒂散吐之若內傷勞役陰虛火動而煩者身倦自汗尺脈浮虛者補陰益氣煎加白芍滋之凡傷寒五七日兩手六部脈皆至六脈同等大煩邪欲外散故作煩熱而口噤不能言其人躁擾者邪正相爭欲作汗解也若脈和大煩邪欲外向大有作汗之機目腫瞼內際黃者太陽主目上綱陽明主目下綱目腫而內際黃者土旺而邪欲散也此亦欲作汗解也所以言大煩者以肌表大熱則是邪熱欲泄達於外也故為欲解間有大戰者然必以脈為主若脈不至而大煩不能言反解上條脈不和而瞼黃大煩反解次條其病為進又不可執一而論也潮熱潮熱者如潮水之潮其來不失其時蓋陽明屬土應時則旺於四季應日則旺於未申故必日晡發者為潮熱陽明內實也宜下之若一日三五發者乃是發熱非潮熱也又須切脈之滑大沉實再審其人臍腹脹滿以手按之則硬而痛手足心並腋下濈濈然有汗此內實有燥糞也在傷寒大柴胡湯或調胃承氣湯在溫病增損大柴胡湯或加味涼膈散加龍膽草務要酌度適中病情不可太過不及若傷寒發在寅卯辰巳時分且未可下宜小柴胡湯加減與之若少陽邪並陽明發潮熱大便溏小便自可胸脅痛不去者主以小柴胡湯又脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯則上下通和濈濈然汗出而解至於溫病邪郁胃中但有潮熱悉以增損大柴胡湯甚則加味六一順氣湯凡傷寒潮熱者先以小柴胡湯如熱不除內實可下者以大柴胡湯此大略也往來寒熱傷寒往來寒熱邪正分爭也蓋寒為陰熱為陽里為陰表為陽邪客於表與陽相爭則發寒矣邪客於裡與陰相爭則發熱矣表邪多則寒多而熱少里邪多則熱多而寒少邪在半表半裡之間外與陽爭而為寒內與陰爭而為熱表裡之不拘內外之無定由是寒熱往來而無常也故以小柴胡湯立諸加減法以和之又往來寒熱與寒熱如瘧似是而實非也寒熱如瘧者作止有時正氣與邪爭則作分則止矣往來寒熱則發作無時往來無常日三五發或十數發此其與瘧異也雖治往來寒熱屬半表半裡當和解之又有病至十餘日熱結在裡復往來寒熱自宜大柴胡湯下之凡少陽證往來寒熱必先與小柴胡湯和之服後不解其脈反浮者與柴胡桂枝湯使邪從表而散其脈如數者與大柴胡湯使邪從里而出也溫病伏邪內郁往來寒熱多屬熱結在裡陰陽不和增損大柴胡湯主之如升降散乃此證妙藥也蓋升清可以解表降濁可以清裡則陰陽和而內外俱徹矣若施之傷寒則又不可譫語譫語者語言訛謬而氣盛也經曰實則譫語蓋邪熱深入蓄於胸中則昏其神氣遂語言無次而妄説也邪熱輕者惟睡中譫語醒則無矣邪熱重者即不睡亦譫語如熱極者詈罵不避親疏不識人此神明之亂也譫語蓋非一端傷寒發汗多亡陽譫語以胃為水穀之海津液之主汗多津液亡胃中燥必發譫語此非實熱故不可下以柴胡桂枝湯和其榮衛以通津液後自愈譫語不惡寒反惡熱白虎湯腹滿身重難以轉側口不仁不知味也面垢譫語遺尿自汗脈滑實者白虎湯潮熱手足腋下濈濈汗出其脈沉實或滑數有力大便難而譫語者大承氣湯溫病熱鬱三焦神昏氣亂譫語不識人時其輕重以升降涼膈六一解毒承氣之類消息治之若誤服表藥譫語悶亂者增損三黃石膏湯加大黃若蓄血譫語大便黑小便利在傷寒桃仁承氣湯在溫病解毒承氣湯加夜明砂桃仁穿山甲丹皮下利譫語脈滑而數有宿食也在傷寒六一順氣湯加黃連在溫病加味六一順氣湯此非內寒而利乃燥糞結實胃中稀水旁流之物也必須能辨滑數之脈乃可下之此證最難酌度溫病多有體厥脈厥者更須下之此內經通因通用之法也若下後下證悉除三五日後譫語不止者此邪氣已去元氣未復宜柴胡養榮湯加辰砂一錢大抵譫語脈短則死脈自和則愈或氣上逆而喘滿或氣下奪而自利皆為逆也鄭聲鄭聲者鄭重頻繁謬語諄諄不已而氣微也經曰虛則鄭聲如老人遇事誶語不休成氏以為聲轉其本音二理並通故兩存之蓋鄭聲乃因內虛正氣將脫而言皆不足之狀如手足厥脈沉細口鼻氣息短少所説語言輕微無力氣少難以應息者皆陽氣微也若神昏氣促不知人事者死如氣不促手足頗溫其脈沉細而微者附子湯或內熱不可用附子者人參三白湯五福飲七福飲之類隨證加減治之所謂傷寒溫病四損不可正治者此類是也樓氏曰譫語氣虛獨言也此出素問豫用參耆歸術治之屢驗按此即所謂鄭聲也大抵譫語鄭聲態度無二但有虛實之分須詳辨之發狂凡發狂本屬陽明實熱之證蓋陽明為多氣多血之經或傷寒陽邪傳入胃腑或溫病陽邪起自胃腑熱結不解因而發狂內經脈解篇曰胃者土也故聞木音而驚者土畏木也其惡火者熱甚則畏火也其惡人者以陽明厥則喘而惋惋則惡人也其病甚則棄衣而走登高而歌或數日不食或逾垣上屋者以四肢為諸陽之本陽盛則四肢實實則能登高也其棄衣而走者以熱盛於身也其妄言罵詈不避親疏而歌者以陽盛為邪也又曰陰不勝其陽則脈流薄疾乃狂又曰邪入於陽則狂是皆以陽明熱邪上乘心肺故令神志昏亂若此此陽狂也傷寒溫病雖根源不同至於發狂皆邪熱已極使非峻逐火邪則不能已故但察其大便硬結或腹滿而堅或濕滯膠閉或熱下利或熱結旁流有可攻之證酌用大小承氣涼膈六一解毒承氣之類下之如無脹滿結實等證而惟胃火使然者但以白虎解毒三黃石膏大小清涼之屬清其火邪其病自愈外有傷寒如狂發狂二證以太陽邪熱不解隨經入腑重則發狂輕則如狂此熱搏血分蓄血下焦故宜桃仁承氣與代抵當下之溫病多蓄血陽明以黃連解毒湯送下代抵當湯丸去桂加牛膝丹皮近見別有一種如狂之證或由失志而病其病在心或由悲憂而病其病在肺或由失精而病其病在腎或由鬱怒思慮飢餓勞碌而病其病在肝脾此其本病已傷於內而邪氣復侵於外則本病必隨邪而起矣其證所謂虛狂是也外無黃赤之色剛暴之氣內無胸腹之結滑實之脈或不時躁擾而禁之則止或口多妄誕而聲息不壯或眼見虛空或驚惶不定察其上口無燥渴察其下便無硬結是皆精氣受傷神魂不守其證與陽極發狂者反若冰炭而時醫不察但見錯亂便謂陽狂妄行攻下必致殺人凡治此者須辨氣血陰陽四損何在其有虛而挾邪者邪在陽與氣分宜補中益氣湯大溫中飲邪在陰與血分宜補陰益氣煎理陰煎設有邪氣閉結勢不能下者必以黃龍湯或大柴胡湯加人參其虛而無邪者在陽與氣分宜八珍十全腎氣丸料右歸丸料在陰與血分宜六味丸料左歸丸料其虛而挾寒者宜四逆湯加人參右歸丸料其虛而挾火者宜六味丸料左歸丸料此主之宜大略如此若夫潤澤之則在醫者活法耳發斑疹發斑者輕如蚊迹重如錦紋其致此之由總因熱毒不解或當汗不汗則表邪不解當下不下則里邪不解當清不清則火盛不解陽證誤用溫補則陽亢不解必須察脈之浮沉人之虛實熱毒之輕重而治之斷不可執成氏不可汗不可下之説凡邪氣自外而入深入不解則又自內而出表裡相乘勢所必至原非表虛證也但使內外通達則邪由表裡而解矣即如犀角地黃湯乃治斑之要藥人知此湯但能涼血解毒而不知此湯尤善解表散邪若用之得宜裡氣一清必通身大汗熱邪頓解何為不可汗耶發斑大熱狂躁引飲又何為不可下耶凡斑出赤紅者為胃熱紫紅者為熱甚黑色者為胃爛也鱗紅起發者吉最忌稠密成片如熱甚脈洪數煩渴者以白虎湯合犀角地黃湯加殭蠶蟬蛻青黛如熱毒內蘊煩心不得眠錯語呻吟者犀角大青湯加殭蠶蟬蛻或增損三黃石膏湯加青黛犀角熱燥便結者俱加酒大黃如斑發已盡外熱稍退內實便祕譫語者以加味涼隔散微下之胃熱乾燥榮氣不舒得涼藥以滋其陰則胃中和而大汗出矣眉批溫病與傷寒治法同蓋殭蠶蟬蛻尤斑疹要藥也至於陰證亦時有發斑者狀如蚊迹多出胸背手足間但稀少而淡紅身雖熱而安靜以其人元氣素弱或因欲事傷腎當補不補則陰凝不解或誤服涼藥太過以致變成陰證寒伏於下逼其無根失守之火聚於胸中熏灼肺胃傳於皮膚而發斑點補陰益氣煎加乾薑附子寒甚脈微大建中湯通脈四逆湯則真陽回陰火降而證乃痊此治本不治標也溫病無陰證若夫疹與斑等乃溫病中之重證也治同溫病傷寒百不出一總緣雜氣之毒鬱於胃中無所施瀉發於皮膚而為疹增損雙解散主之加紫背浮萍五七錢或重加石膏大黃芒硝清散得宜未有不出者如身出而頭面不出此毒氣內歸危候也急以大蟾蜍一個搗和新汲水去渣痛飲之自出屢驗若溫病有久而甚者煩躁昏沉只用蟾蜍心三兩個和水飲一二次定心安神而病去矣勿以為微而忽之凡斑疹脈洪長滑數易治脈沉伏弦微難治黑如果實靨者死不可不知發黃凡傷寒溫病皆發黃多由陽明濕熱與合曲相似如發熱汗出者為熱越不得發黃也但頭汗出身無汗劑頸而還或心中懊憹或渴飲水漿小便不利或赤或黃或溷濁肚腹脹滿或痛或不痛或燥結脈來沉實有力此皆瘀熱在裡熏蒸於皮膚之上身黃如橘子色者在傷寒茵陳蒿湯在溫病加味涼膈散加茵陳蒿古方治里證有三承氣湯便於三承氣中合茵陳蒿湯或加味茵陳蒿湯隨證施治方為盡善外用黑豆一升黃蒿四兩煮滾湯一鍋傾銅盆內攪稍冷入雞子清七八個以手指攪起白沫敷身黃處黃散溫覆汗出而愈又傷寒有身黃髮熱者梔子柏皮湯傷寒有瘀熱在裡表者麻黃連軺赤小豆湯此瘀熱在表而發黃故用表藥設泥里字豈有邪在裡而反治其表之理哉夫傷寒溫病至於發黃為疾已甚多有不治之證形體如煙燻直視頭搖是為心絶環口黧黑柔汗發黃是為脾絶當辨之蓄血蓄血者瘀血蓄結於內也身黃如狂屎黑善忘皆蓄血之證許學士云血在上則喜忘血在下則發狂蓋傷寒病在太陽則當發汗或不汗或汗遲或脈盛汗微邪無從出故隨經入腑結於膀胱乃為蓄血溫病起無表證而惟胃實陽明熱鬱失下邪火久羈故腸胃蓄血多膀胱蓄血少亦有血為熱搏下注膀胱者雖腐為黑血溢於腸間結糞得瘀而潤下然真元已憊矣醫者必察人胸臍旁小腹但有硬滿處以手按則痛者便為蓄血若蓄血陽明不必問其小便若小腹硬滿而小便自利則膀胱之氣化行而與尿澀氣不化不同也允為有形之蓄血矣溫病與傷寒治法亦無大異保命集分三焦上焦胸脅手不可近在傷寒犀角地黃湯加大黃在溫病再合黃連解毒湯中脘臍間手不可近在傷寒桃仁承氣湯加丹皮枳殼在溫病去肉桂再合黃連解毒湯臍下小腹手不可近在傷寒代抵當湯丸在溫病以黃連解毒湯送下此丸去肉桂加丹皮牛膝夫傷寒溫病至於蓄血實病證之奇異治法之精微能審諸此垂手取效可為妙也然而難矣實者可救虛者多危衄血經絡熱盛迫血妄行出於鼻者為衄傷寒責其血熱在表也溫病責其血熱在裡浮越於表也犀角地黃湯加芩連柴梔元參殭蠶蟬蛻甚加大黃入蜜酒小便冷服凡傷寒陽明病口乾鼻燥能食者知邪不在裡而在經故必衄也葛根湯去大棗加蔥白黃芩不止黃芩湯去棗加生茅根生艾生藕生荷葉生側柏葉小便煎太陽病脈浮緊發熱無汗而衄者愈太陽病衄血及服桂枝湯後衄者為欲解亦可服犀角地黃湯加茅花如無以根代之脈浮大發熱下利衄血乾嘔者黃芩去大棗加生地汁童便衄血煩而渴欲飲水水入即吐者先服五苓散後服竹葉石膏湯不止茅花湯即茅花五錢小便煎服是也或於涼血藥中磨京墨三茶匙亦妙汗後熱退衄血不止用草紙折數層浸於新汲水中貼頂門上及項脊溫則易之必止少陰病但厥無汗而強發之必動其血或從口鼻出或從目出是為下厥上竭為難治可與當歸四逆湯仲景曰衄家不可發汗汗出必額上陷脈急緊直視不能瞬不能眠又曰亡血家不可發表汗出即寒栗而振二説皆為久衄亡血已多故不可汗若熱毒蘊結成衄脈浮緊者麻黃湯脈浮緩者桂枝湯若脈已微二藥必不可用脈細者黃芩湯去大棗加生地童便脈滑者犀角地黃湯大抵衄血吐血下血脈微小者生脈實大者死或衄後吐後下後脈微小易治若熱反盛脈反洪數者死也若衄而頭汗出或身上有汗不至足者皆難治也吐血傷寒諸陽受邪其邪在表當汗不汗熱毒深入故吐血也麻黃湯汗之內有瘀血者桃仁承氣湯利之服桂枝湯後吐血者犀角地黃湯加茅花凡久病虛弱外有寒形內有火邪風寒閉塞壅遏裡熱以致吐血者麻黃芍藥人參湯主之凡吐血鮮紅色者皆熱也犀角地黃湯以涼之凡吐血紫黑成塊脈沉遲細口不渴小便清為瘀血寒凝也宜理中湯加丹皮肉桂之辛溫以散之若脈洪數仍屬熱宜桃仁承氣湯以行之溫病吐血與衄血皆屬熱毒內郁經絡火盛火載血液而妄行大清涼散或犀角地黃湯合瀉心湯有瘀血紫黑成塊者加桃仁大黃以利之按麻黃芍藥人參湯證出自準繩傷寒論無此證因東垣治一寒士感寒吐血用麥冬飲子合仲景麻黃湯各半服之甚善故並載之以為後學津梁乾隆乙巳季冬科試先君六旬有六冒雪歸家風寒鬱熱以致頭痛發熱惡寒吐血諸醫不效余甚驚惶斟酌東垣此湯一服而愈前因吾父中風留心醫道三年內未敢處方自是而悟認真脈證方未有不效者噫醫道之難在此矣辨中有發經論所未發者實千古不易正理後學宗之自不覆晉人轍矣畏齋
