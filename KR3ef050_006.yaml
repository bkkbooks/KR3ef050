body:
  text: 卷六本草類辨夫藥之為類多矣治病不要求奇神明存乎其人下記一百八十八種一種連及者又四十四味分為十二劑人參之外非常不用平易之物用須辨明俗云多不如少少不如好今人趨利若鶩以贋物欺人者皆是也當局者不可不慎再如苦菜用苗五兩水十盅煎三盅分三次連服治産後腹痛如錐刺並腰腳刺痛者茅根蘆根苧根艾葉柳葉蔭葉柏葉茶葉竹葉竹茹槐花榆皮大青小薊小鹽化水洗乳岩及瘰癧極驗地錦草紫地丁蓼實旱蓮草蒺藜雞內金蝸牛地龍搗爛入井水攪清飲之治溫病大熱狂言大腹黃疸隨宜用並治腎風腳氣伏龍肝石灰百草霜黑墨蔥韭薤蒜生薑大茴花椒紅曲米醋粳米糯米白扁豆黑豆赤豆緑豆薏苡仁金匱方薏苡仁附子敗醬湯敗醬即苦菜也眉批治腹癰有膿薏苡仁五錢附子一錢敗醬一錢五分水煎日三服脂麻萆麻子浮麥麥芽穀芽西瓜甘蔗荸薺荔核元肉橄欖棐子四物雖非北地土産亦居家常有之物白果棗梨桑堪烏梅柿干柿霜柿蒂發灰尿鹼人中黃五穀蟲官粉鐵鏽銅緑驢溲馬勃敗鼓之皮附記七十四味隨地皆有取之甚便察之甚明用如其證效如響應世多舍近而圖遠舍易而求難豈非貴耳賤目乎陳茶芽煎治多年偏正頭風疼茶芽五錢黑豆五十粒燈心五十寸金銀花三錢元參蔓荊子防風天麻各一錢川芎辛夷花各五分外用土茯苓四兩煎湯取三盅煎服滓再取二盅煎服重者不過二劑通淋膏治五淋澀疼並小便不通地龍一條蝸牛一個搗敷臍上即愈來復丹旱蓮草二斤地錦草二斤煮濃汁去滓入黑豆四斤青鹽四兩汁沒豆一二指細火攪煮以汁盡為度曬乾長服滋腎益肝烏須明目卻病延年以上數方至平至易之藥屢試屢驗可見治病全不在貴且異者補劑類人參反藜蘆味甘微苦陽中微陰入手太陰肺升也陽氣虛竭者回之於暫敗之初陰血崩潰者障之於決裂之後獨參湯主之惟其氣輕而不辛所以能固氣惟其味甘而純正所以能補血故凡虛而發熱虛而自汗虛而眩暈虛而困倦虛而短氣虛而驚懼虛而遺泄虛而瀉痢虛而頭疼虛而腹痛虛而飲食不運虛而痰涎壅滯虛而吐血衄血虛而淋瀝便閉虛而嘔逆煩躁虛而下血失氣等證是皆不可不用者第以氣血相較則人參氣味頗輕而屬陽者多所以得氣分者十之八得血分者十之二總之為氣分之物而血分亦必不可少未有氣不生而血能自生者也生脈散人參五分麥冬一錢五味子十粒治夏月火旺爍金暑淫少氣汗多口渴病危脈絶蓋心生脈肺朝百脈補肺清心則氣充脈復轉危為安矣故扁鵲曰損其肺者益其氣須用人參以益之肺氣既旺他臟之氣皆旺矣凡臟腑之有氣者皆能補之然其性溫積溫亦能成熱雖東垣云參耆為退火之聖藥丹溪云虛火可補參術之類是也此皆言虛火也而虛火二字最有關係最有分解若內真寒而外現假熱之象是為真正虛火非放膽用之不可也參附湯主之附減半於參是也然有一等元陰虧乏而邪火燔爍於表裡神魂躁動內外乾枯真正陰虛一證誰為其非虛火如過用人參實能助熱若節庵雲陽旺則陰愈消節要云陰虛火動者不用又云肺熱還傷肺等説固有此理不可謂其盡非而李月池輩皆極不然之恐亦未必然也夫虛火二字當分實中有虛虛中有實陽中有陰陰中有陽就證論證勿以成心而執偏見斯可矣若龍雷之火原屬虛火如巴蜀有火井投以水則燔投以火則滅是即假熱之火故補陽即消矣至於亢旱塵飛赤地千里得非陽旺陰虛而可以補陽生陰乎或曰此正實火也得寒則已余曰不然夫炎暑酷烈熱令大行此為實火非寒莫解而乾枯燥旱泉源斷流是為陰虛非水莫濟此實火與陰虛亦自判然可別是以陰虛而火不盛者自可用參為君若陰虛而火稍盛者但可用參為佐若陰虛而火太盛者則誠有暫避人參而惟甘寒壯水之劑庶可收功六味地黃湯大劑濃煎或人參固本丸熟地乾地各二兩天冬麥冬青蒿枸杞各一兩人參五錢為末煉蜜丸蓋天下之理原有至是謂之曰陰虛必當忌參固不可謂之曰陰虛必當用參亦不可要在斟酌病原適其可求其當而已言聞曰人參惡皂角東垣理脾胃瀉陰火人參皂角同用是惡而不惡也人參畏五靈脂古方療月閉四物湯加人參五靈是畏而不畏也又吐痰在胸膈人參藜蘆同用而取其湧越是急其怒性也此非洞達經權者不能知熟地黃北方純陰土肥力大懷慶者佳味甘微溫陰中微陽氣薄味厚降也本草言手足少陰厥陰經藥大補心血滋培腎水兼益藏血之經此論蓋得其大略而未盡其奧妙夫地黃産於中州沃土之鄉得土氣之最厚者其色黃土之色也其味甘土之味也得土之氣味與色而曰非太陰陽明之藥吾不信也惟是生用性寒脾胃喜溫固所宜慎至於熟則性平稟至陰之德氣味純靜故能補五臟之真陰而於統血多血之臟為至要豈非脾胃經藥耶仲景八味丸以熟地黃為君脾腎兼補也經云飲食生化而輸於腎夫人之所以有生者氣與血耳氣主陽而動血主陰而靜補氣以人參為君而耆術為之佐補血以熟地為君而芎歸為之佐然在耆朮芎歸則又有所當避而人參熟地無有出其右者故諸經之陽氣大虛非人參不可諸經之陰血大虛非熟地不可凡陰血虧損有為發熱為頭痛為焦思為喉痹為嗽痰為喘氣或腎寒上衝為嘔吐或虛火載血於口鼻或水濕泛溢於皮膚或腎枯而泄利或陰脫而跌僕或陰虛而狂亂或陰虛而神散或陰虛而火升或陰虛而躁動或陰虛而剛急或陰虛而水泛為痰或陰虛而真氣散失等證舍熟地何以填精補髓滴滴歸源使先天后天之陰血大旺而陽有以化乎然而陽性速故人參少用暫用可以成功陰性緩故熟地非多用常用難以奏效而今人有畏其滯膩者則崔氏何以用腎氣丸而治痰浮有畏其滑濕者則仲景何以用八味丸而治腎泄有自蒸而用者則帶鮮而蒸者熟既干而蒸者生地頭之甑大氣足而火候到家常之甑小氣薄而火候微此生熟之有殊而功力之有間也有謂陽能生陰陰不能生陽者蓋亦偏説夫陰陽之理原自互根無陽則陰無以生無陰則陽無以化內經曰精化為氣得非陰亦能生陽乎又若制用之法有用薑汁炒者則必中寒兼嘔而後可有用砂仁制者則必脹滿不行而後可有用酒拌蒸者則必經絡滯壅而後可使無此三證而妄用此製法是不知用熟地者正欲其靜重而反為動散以逆其性是蛇足也余意總不如用黑豆煮湯肉黃皮黑補脾補腎鮮者洗淨乾者泡透循環津潤九蒸九曬九露以熟為度耳今人即欲用之補陰而必兼以滲利則焉知補陰不利水利水不補陰而補陰之法不宜滲即欲用之補血而復疑其滯膩則焉知血虛非燥土旱極望雲霓而枯竭之腸極喜滋潤設不明此乃少用之尚欲兼之以利又孰敢單用之而任之以多單用而多且不敢又孰敢再助以甘而盡其所長是又何異噎而廢食也悲夫生地黃甘苦大寒氣薄味厚沉也陰也入心包肝腎瀉丙丁導赤散清燥金消瘀通經平諸血逆治吐衄崩中淋瀝尿血骨蒸煩躁及傷寒溫病陽強痘疹大熱乾地黃性味功用與生地略同而稍緩滋陰退陽涼血活血而生血潤燥除煩而止渴治一切陰虛發熱之證烏龍丸治兩目昏而復明則他證可知乾地熟地川椒等份為末煉蜜丸溫酒送下生地熟地歸身白芍丹皮四錢元參沙參雲苓牛膝荊芥二錢柴芩犀一錢熱逆嘔血驗此加味犀角地黃湯血熱嘔吐男女皆宜犀角磨汁另入荊芥穗炒黑用眉批甘草反甘遂大戟芫花海藻大忌無鱗魚味甘氣平性緩生用補脾胃不足而瀉心火蜜炙補三焦元氣而散表寒可升可降無毒而善於解毒得中和之性有調補之功仲景有炙甘草湯故毒藥得之解其毒剛藥得之和其性表藥得之助其升下藥得之緩其行助參耆成陽虛之功人所知也助地萸療陰虛之危誰其曉之健脾胃堅筋骨長肌肉祛邪熱隨氣藥入氣隨血藥入血無往不可故稱國老余每用人參熟地甘草大劑濃煎治氣血兩虛陰陽將脫證屢收奇功惟中滿勿加恐其作脹欲速下勿入恐其緩功噁心惡甘嘔吐亦忌純寒純熱之藥必用之以緩其力金匱方飲饌中毒未審何物煎甘草薺苨湯入口便活千金方陰頭生瘡蜜煎甘草末頻頻敷之梢達腎莖止疼小薊飲子用之小薊藕節當歸黑蒲黃黑梔子生地木通滑石甘草梢竹葉等份水煎服治尿血血淋效黃耆生涼炙溫味甘氣平氣味俱輕升也陽也專於氣分而達表故能補元陽壯脾胃充腠理長肌肉治虛勞除虛熱氣虛難汗可發表虛多汗可止其所以止血崩血淋者以氣固而血自止也故經曰血脫補氣其所以除帶濁泄痢者以氣升而陷自起也故經曰陷者舉之然而氣味俱浮專於氣分性不純良表實者不宜用裡虛者宜少用恐升氣於表而里愈虛也氣實誤用則致喘急脹滿關格血虛過用則致吐衄痰壅咳嗽仲景有黃耆建中湯升陽益胃湯黃耆二錢人參甘草半夏一錢陳皮白朮白芍白茯苓澤瀉羌活獨活柴胡防風五分黃連三分生薑七分大棗二枚水煎訒庵曰東垣首重脾胃而益胃又以升陽為先故每用補中上升下滲之藥此湯補中有散發中有收脾胃諸方多從此昉也白朮味甘澀氣溫氣味俱厚可升可降陽中微陰乳制潤其燥土炒竊其氣氣溫燥故實脾胃驅嘔逆止瀉泄祛勞倦進飲食除濕運痰津液自生味澀滯故止汗實表癰疽得之反多膿奔豚遇之反增氣上焦燥熱氣多壅塞者不可用佐黃芩以安胎君枳實以消痞白朮三兩枳實三兩水煎分三服治心下水積堅大如盤在氣主氣在血主血四肢困倦目不欲開怠惰嗜臥不思飲食當加用之無汗則能發有汗則能止茯苓雲南者佳味甘淡氣平性降而滲陽中陰也上達肺氣而下通膀胱本草言白行壬癸赤瀉丙丁故能利竅滲濕仲景有茯苓甘草湯利竅則開心益志導濁生津滲濕則逐水燥脾補中健胃祛驚癇厚腸臟治痰之本助藥之降以其味甘故曰補陽但補少利多耳皮專行水蓋以皮行皮之義治水腫膚脹脾不能為胃行其津液故腫脹淡寮五皮飲茯苓皮五加皮桑白皮大腹皮陳皮等份加生薑皮煎此於消腫之中仍寓補脾之意茯神附根而生專理心經補心氣健忘止恍惚驚悸然總不外滲利與茯苓不相遠也茯苓皮非補劑類也一種而性味不同者甚多觀者勿以連及而誤之余仿此芍藥反藜蘆味微苦微甘微酸氣微寒氣薄於味斂降多而升散少陰中陽也白補赤瀉生用氣微涼酒炒氣極平其性降故入血補肝虛瀉肝實固腠理消癰腫止泄瀉利小便除眼疼緩三消斂血虛之發熱驅血虛之腹痛白者安胎熱不寧赤者能通經破瘀按芍藥特補藥中之微寒者非若極苦大寒之比乃産後補血和氣之要藥也若謂其色白屬金寒伐生髮産後當忌則凡白過芍藥寒過芍藥者又將何如丹溪之言不可泥也仲景芍藥甘草湯治榮氣不足腹疼甚驗當歸味甘辛氣溫味重氣輕可升可降其味甘而重故補血其氣輕而辛故行血補中有動陰中有陽血中氣藥也頭止血上行身養血中守尾破血下流全和血不走佐以補藥則潤故能養榮佐以攻藥則通故能止疼榮虛而表不解佐以葛根等劑亦能散表衛熱而表不斂佐以六黃之類亦能固表惟其氣辛而動欲其靜者當避之惟其性滑而行大便溏者當避之若血滯為痢者正所當用也當歸導滯湯治痢神效其要在動滑二字入心生血入脾統血入肝藏血凡血分受病必用之血壅而不流則疼須當歸辛溫以散之使血氣各有所歸諸頭疼與心腹兩脅疼俱屬肝木故以血藥主之耳當歸養血湯黃耆一兩當歸四錢陽生陰長之義也遠志甘草湯浸去心炒味辛苦氣溫升也陽也功專心腎故可鎮心定神祛邪安夢壯陽益精強志助力增益智慧不忘和悅顏色耐老治小兒驚癇客忤療婦人口噤失音因其氣升同參草棗仁能舉陷攝精交接水火但可佐不可多小草其苗葉也除胸痹心疼氣逆禁虛損夢遺精滑古方定志丸遠志茯神石菖蒲人參為末蜜丸山藥味甘淡性澀健脾補肺堅骨益心治諸虛百損療五勞七傷健忘滑精瀉痢癰腫但其氣味輕緩難勝專任故補心肺必主參術滋腎水必主地萸澀帶濁須故紙同煎固精滑仗茯菟相濟止瀉痢必借扁豆蓮子與芡實生搗敷毒能消腫硬耳諸凡固本丸藥並可煮搗為糊安道曰仲景八味丸用之以強陰杜仲鹽水拌炒斷絲味甘氣溫色紫入肝潤燥補虛子能令母實故又滋腎肝充則筋健腎足則骨強益精祕氣除陰囊濕癢止小水夢遺暖子宮固胎氣堅筋骨壯腰膝及足弱難行孫琳曰一少年新娶得腳軟病且疼甚作腳氣治不效豫思此腎虛也用杜仲一兩水酒各半煎服六日全愈牛膝川出者佳懷次之味甘苦氣微涼性降而滑陰也酒蒸補髓填精益陰和血療腰膝痠疼滋鬚髮枯白酒漬走十二經絡助一身元氣主手足痿痹血燥拘攣通膀胱祕澀大腸乾結生用其性下走如奔破血癥通血閉引諸藥下行治心腹諸疼淋瀝尿血墮胎極速滑泄勿設古方地髓湯治尿血血淋牛膝一兩水煎服訒庵曰熱蓄膀胱尿澀而疼曰淋氣淋便澀余淋勞淋房勞即發冷淋寒戰後溲膏淋便出如膏石淋肝經移熱於胞中日久熬煎精結成石非腎與小腸病也色鮮心與小腸實熱色瘀腎與膀胱濕熱宜通氣清心平火利濕不宜用補恐濕熱得補增劇也牛膝諸淋要藥血淋尤宜又有中氣不足致小便淋瀝者宜補中益氣經雲氣化則能出是也忌用淋藥李時珍曰虎杖根尤通五淋破宿血本事方虎杖根二兩水煎去渣入乳香麝香少許服一婦人沙石淋已十三年每旋痛楚不可忍偶得此方服之一夕而愈此豫眼見者又聖惠方治月經不通癥瘕腹大如甕虛脹雷鳴四肢沉重氣短欲死虎杖根一斤銼碎水十碗浸一宿煎取二碗再入茜根汁二碗牛膝汁兩碗同煎如餳每用三錢酒化沖服日二夜一宿血當下男積亦治何首烏味苦甘澀氣溫夜則交藤有陰陽交合之象堅腎補肝養血祛風消瘰癧散癰腫療五痔止腸風驅惡瘧烏鬚髮明耳目添精神長肌肉補虛勞強筋骨益精髓壯腰膝治婦人經胎産崩漏等證老弱尤為要藥久服生子延年應節處方嘉靖驗之此七寶美髯丹之所以傳也赤白合用氣血兼補黑豆拌蒸勿犯鐵器七寶美髯丹赤白首烏二斤黑豆湯浸蒸曬九次牛膝酒浸蒸曬三次白茯苓乳蒸歸身枸杞子菟絲子酒蒸八兩故紙四兩黑脂麻拌炒為末煉蜜丸鹽水送下山茱萸酒蒸去核味辛酸澀收斂氣平微溫陰中陽也入肝腎益精祕氣助水臟以暖腰膝充精氣以利九竅壯陽道節小便澀帶濁斂汗止渴調經收血主心下邪氣除一切風逐一切冷所云滑則氣脫澀劑所以收之也仲景八味丸用之其性味可知或云畏酸者暫已之古方草還丹益元陽補元氣固元精滋元血續嗣延年之要藥也山茱萸酒蒸去核一斤破故紙酒炒八兩當歸酒蒸四兩麝一錢為末煉蜜丸如桐子大每服八十一丸酒下胡桃仁味甘氣平肉潤皮澀其汁青黑入肺肝腎命門三焦溫肺潤腸固精祕氣養血滋陰佐故紙減半治腎虛腰疼有木火相生之妙上而虛勞喘嗽中而遺精滑泄下而腰腳痿躄內而心腹之痛外而癰瘍之毒皆可除也加味青娥丸治腎虛腰疼並外邪所侵腰腿筋骨疼胡桃仁八兩破故紙鹽水炒杜仲薑汁炒牛膝酒炒黃柏鹽水炒四兩知母鹽水炒三兩萆薢四兩分四份鹽酒童便米泔各浸炒一份曬乾為末春夏米粥為丸秋冬煉蜜為丸任下女貞子味甘微苦氣平其樹似桂少陰之精益肝腎安五臟養精神強腰膝補風虛烏髮須療百病聰耳明目久服延年古方罕用何哉女貞子酒蒸二十兩椹干十兩旱蓮草十兩煉蜜丸補腎益肝強陰壯陽治虛損百病如四月搗桑椹汁七月搗旱蓮汁不必用蜜因其樹隆冬不凋故又謂之冬青子亦女貞之義也非兩種也枸杞子味甘微辛氣平可升可降潤肺滋腎養肝以其味重而純故能補陰以其陰中有陽故能補氣陰滋則血盛氣足則陽旺諺云去家千里勿食枸杞謂其能壯陽也實則壯陽而無動性故用以佐熟地最妙其功聰耳明目杞菊丸等份煉蜜丸益神魂添精髓強筋骨補虛勞止消渴真陰虛而臍腹疼不止者多用神效地骨皮即枸杞根皮也味甘辛微苦性寒走血分入肝腎三焦膽經退陰虛而熱療有汗骨蒸凡不因風寒而熱在陰分骨髓者最宜此物涼而不峻可理虛勞氣輕而平故亦清肺時珍曰枸杞骨皮佐以青蒿甘寒退大熱不比芩連苦寒之傷胃也菟絲子先以甜水洗淨浸脹次酒浸蒸熟杵爛捏餅曬乾炒味甘辛氣溫性固入肝脾腎補髓添精助陽起痿千金方菟絲餅五兩雄雞肝三具雀卵和丸如小豆大溫酒每下六十丸日二次服暖腰膝冷疼壯氣力筋骨開胃進食肥肌尤安夢寐局方茯菟丸治精滑淋濁及強中消渴菟絲餅十兩五味子八兩白茯苓石蓮肉三兩山藥六兩酒煮山藥糊為丸精滑淡鹽水下赤濁燈心湯下白濁白茯苓湯下強中元參湯下消渴米飲下此方於補正氣中瀉腎邪也覆盆子淘淨酒蒸味甘氣溫入肝腎主腎傷精滑陽痿不起小便頻數補虛續絶調氣溫中安和五臟益腎強陰補肝明目澤肌膚烏鬚髮亦療中風成驚古方五子衍宗丸覆盆子菟絲子枸杞子五味子沙苑蒺藜子等份為末煉蜜丸余意加車前子減半強陰益精利水不走氣亦猶仲景八味丸用澤瀉之義五味子皮甘肉酸性平而斂核味辛苦性溫而緩兼有鹹味故名五味入肺腎南治風寒咳嗽北主虛損勞傷整者用其甘酸生津解渴止瀉除煩收耗散之金滋不足之水斂虛汗解酒毒敲碎用其辛溫斂氣強陰補虛明目固元陽千金方治陽痿不起為末溫酒調二錢日三服一月見功壯筋骨除喘滿五味子湯治喘而脈伏及寒熱而厥昏冒無脈者肝旺吞酸助木剋土衛生方治久嗽肺脹五味子二兩罌粟殼五錢餳炒為末餳丸彈子大每水煎一丸服又丹溪方治久嗽不已五味子一兩五倍子風化硝四錢甘草三錢為末蜜丸噙化五加皮味苦辛氣溫順氣化痰勝濕祛風堅筋健步強志益精去婦女陰癢難當扶男子陽痿不舉小便遺淋可止腰膝足痹能除五加皮二兩牛膝一兩酒浸木瓜一兩為末米飲入酒一茶匙調服二錢尤治小兒三四歲不能行者逐四肢因氣不遂祛肌膚瘀血多年芬香五葉者佳按五加皮乃五車星之精也才應五湖人應五德位應五方物應五車故青精入莖有東方之液白氣入節有西方之津赤氣入花有南方之光玄精入根有北方之飴黃煙入皮有戊己之靈五神鎮住相轉育成餌之延年服者反嬰千金方四月五采莖七月七採葉九月九採根合為末治五緩虛羸胡蘆巴味苦氣溫純陽本草云番國蘿蔔子也入右腎暖丹田壯元陽驅脹滿腹脅中退清黃面頰上同硫黃黑附子療腎臟虛冷佳三味等份為末煉蜜丸溫酒下合桃仁大茴香治膀胱疝氣效三味等份麩炒為末半以酒糊丸鹽湯下半以散米飲調下丸散相間早晚服長服補火滋水健脾和胃延年桃仁胡桃仁也鎖陽酥炙味甘鹹性溫入腎補精壯陽滋燥養筋療微弱潤大便因其固精故有鎖陽之名老人枯祕煮粥彌佳最為要藥鎖陽三錢肉蓯蓉三錢蘇子一錢升麻五分水煎入蜜服肉蓯蓉味甘鹹辛酸氣溫味重沉也陰也以其味重甘溫故壯元陽補精髓並絶陰不生暖腰膝堅筋骨除下焦冷疼以其補陰助陽故禁虛寒遺漏泄精止淋瀝帶濁崩中以其味酸性滑故驟服立通大便必需酒蒸五錢性與鎖陽相近便滑溏瀉勿摻骨碎補去毛蜜炙味苦氣溫入腎破血有功止血甚驗主折傷補精髓療耳鳴治周痹固牙齒去濕熱疼痛及腎虛久瀉研末入豬腎中煨熟食之蓋腎主二便久利多屬腎虛不專責脾胃也六味丸料加骨碎補治腎虛牙疼效阿膠味甘辛氣平而厚能升能降陽中陰也入肺肝腎其性溫和故潤肺療癰痿益氣定喘嗽其味甘辛故除吐衄淋痢扶勞傷羸瘦其味甘緩故安胎固漏下血酒煎服理帶止崩補肝血滋腎水利大小腸並治瘀濁及逆上之痰也楊士瀛曰小兒驚風后瞳人不正阿膠倍人參服最良以阿膠育神人參益氣也仲景膠艾湯治胎動血漏腹疼並月水不調淋瀝不斷阿膠艾葉川芎二錢當歸生地黃三錢白芍四錢水酒煎服熱加黃芩龜板膠河水洗淨捶碎入水桑柴火熬成膏味甘氣平屬金與水純陰無陽補心益腎養陰資智主骨蒸勞熱腰腳痿軟一切陰虛血弱之證板酥炙或豬油炙與膠功同而力微鹿角膠寸斷河水浸刮桑柴火熬入醋少許再熬成膏取角搗霜味甘鹹氣平純陽無陰填精益氣大補陰中之陽手足腰腿肩臂骨節疼痛酒化服立效頭旋眼黑遺濁崩帶大有殊功敲碎炒珠安胎亦神入丸亦同此制霜與膠功同而力微鹿茸甘溫純陽補命火壯元陽養血生精壯骨強筋其力更峻於膠主一切虛勞危急之證相火旺者並忌醫余曰一人有臁瘡赤腫而疼用黃柏久不愈加霜灰發灰乳香之類則愈此陰陽寒暑往來之理也備要曰龜鹿皆靈而有壽龜首常藏向腹能通任脈故取以補心補腎補血以養陰也鹿鼻常反向尾能通督脈故取以補命門補精補氣以養陽也此物理之玄微神功之能事觀其一主陰虛血弱一主陽虛氣弱之病可悟矣龜板鹿角合熬去粗入人參熬成名龜鹿二仙膏大益氣血兼理陰陽丹砂味甘微寒色赤屬火體陽性陰離中虛有陰也鎮心安神益氣明目發汗定驚祛風解毒通血脈除煩熱止消渴療百病多服久服令人癡呆煉熟大熱有毒丹砂安神丸黃連元參雲苓一兩歸身生地七錢五分遠志黑棗仁五錢琥珀犀角甘草二錢五分丹砂三錢為衣為末竹葉燈心湯丸滾水送下治一切神短煩躁不安夜臥不寧驚悸怔忡恍惚健忘甚驗磁石色黑吸鐵者真火煅醋淬諸石皆毒獨磁石沖和無猛氣味辛鹹沉也色黑屬水引肺入腎補精益氣通耳明目除煩祛熱療虛羸周痹骨節痛治驚癇腫核吞針鐵時珍曰千金磁辰丸但云明目而未發出微義磁石二兩鎮養腎陰使神水不外溢辰砂二兩鎮養心血使邪火不上侵佐以炒熟神麯一兩以斂其暴氣生神麯三兩以生髮脾胃之氣為末煉蜜丸熟水送下乃黃婆媒合嬰奼之理也玉竹一名萎蕤味甘氣平性溫陽中之陰潤肺補中主心腹結氣腰腳冷疼止眥爛雙眸逐風淫四末澤容顏調氣血全體康健但性緩力微本草言用代人參若遇虛危證縱加斤許曾何益於毫末哉惟多用常用所主風濕虛勞之緩證耳潤劑類天門冬去心酒蒸味甘苦氣寒沉也陰也上達肺氣清金降火益水之上源下通少陰滋腎潤燥治肺痿肺癰吐血痿為正虛素感風寒咳嗽短氣鼻塞胸脹久而成痿癰為邪實熱毒蘊結咳嗽膿血胸中隱痛治痿宜養血補氣保肺清火治癰宜瀉熱清痰開提升散痿重而癰輕也療虛勞內熱定喘除骨蒸解煩渴清痰嗽並足下熱疼及骨痿難行三才封髓丹降心火益腎水潤而不燥滋陰養血治心火旺盛腎精易於施泄天冬二兩熟地二兩人參一兩黃柏三兩砂仁一兩五錢炙甘草七錢五分為末煉蜜丸肉蓯蓉五錢酒浸煎湯送下麥門冬酒浸去心味甘苦氣寒降也陽中陰也以其甘多苦少故能清心潤肺肺中伏火非此不除補上焦津液解胸膈煩渴止胃火嘔吐胃火上衝則嘔吐宜麥冬又有因虛因寒因痰因食之不同隨證治之不可執一也療手足痿躄手足緩縱曰痿躄陽明濕熱上蒸於肺肺熱葉焦發為此證經云治痿獨取陽明經疏曰麥冬實足陽明胃經之正藥益精強陰澤肌潤結肺痿肺癰咳唾衄血經枯乳汁不行肺燥痰嗽不絶午前嗽多屬胃火宜芩連梔柏知母石膏午後嗽及日輕夜重多屬陰虛宜麥冬五味子元參知母六味降火清心消痰補怯金受火囚生脈散須加人參便滑瀉利胃寒二冬勿設古方麥冬飲子治勞嗽虛熱咳喘痰血麥冬二錢五味子人參七分黃耆二錢歸身白芍炙甘草一錢水煎服款冬花甘草湯浸味甘辛性溫陽也入心肺主中風喉痹治肺癰膿血腥臭療肺咳痰唾稠黏潤肺瀉火邪下氣定喘促驅久嗽凡陰虛勞嗽用款冬花紫菀百合沙參生地麥冬五味知柏芩芍如內熱骨蒸加丹皮地骨皮青蒿皆宜如嗽而復瀉為臟腑俱病嗽而發熱不止為陰虛火炎皆難治紫菀蜜炙味苦辛性溫入心肺主咳逆上氣喘嗽膿血補虛調中消痰瀉熱開喉痹之惡涎療小兒之驚癇散結下氣善利小便專治血痰為血勞聖藥海藏紫菀湯治肺傷氣極勞熱久嗽吐痰吐血肺癰肺痿紫菀二錢阿膠知母貝母一錢人參雲苓甘草桔梗五分五味子十二粒便溏加蓮子一錢一方有款冬酸棗仁味甘氣平性潤其肉味酸故名酸棗而入肝其仁居中故主收斂而入心不眠炒用多眠生用寧心志止虛汗解煩渴養血安神益肝補中收斂魂魄祛心腹寒熱能安和五臟潤劑上品也按棗仁味酸本入肝經而心則其所生者也脾則其所制者也膽又其所依之府也並宜入之聖惠方云膽虛不眠寒也炒熟為末竹葉湯下蓋以肝膽相為表裡血虛則肝虛肝虛則膽亦虛得熟棗仁之酸溫以助肝氣則木乘土位又主困倦所以令人多睡又濟衆方云膽實多眠熱也生研為末薑湯調下蓋以棗仁秋成者也生則得兌金之全氣而能制木肝木有制則脾不受侮而運行不睡矣此皆自然之理也歸脾湯用之柏子仁鮮者味辛甘性潤氣香透心腎而悅脾養心氣潤腎燥助脾滋肝資智寧神聰耳明目益血止汗除風濕愈癇驚通關竅澤皮膚潤劑上品也訒庵曰補脾藥多燥此潤而香能舒脾燥脾藥中兼用最良柏子仁丸柏子仁二兩人參白朮半夏五味子牡蠣粉麻黃根一兩麥麩五錢為末煮棗肉丸米飲下此養心寧神補陽斂汗之要藥也陰虛多汗加熟地黃杜仲大麻仁即作布之麻去皮用味甘氣平性潤入脾胃大腸緩脾潤燥療胃熱汗多而便難三者皆燥也汗多則津枯而便燥仲景有麻仁丸麻仁蘇子粥酌量與服破積血通乳而利水又木谷也亦能治風百合白花入藥紅花者不可用味甘淡氣平故益氣補血安心定魄調中潤肺逐驚悸止涕淚緩風濕咳嗽散乳癰喉痹解蠱毒潤大小便祕仲景用治百合病有百合地黃湯蓋借其平緩不峻收失散之緩功耳並治肺傷勞嗽喘咳痰血蕺庵百合固金湯百合生地二錢熟地三錢麥冬錢半元參當歸白芍貝母桔梗甘草一錢此以甘寒培本不以苦寒傷生髮之氣也枳椇子味甘氣平潤五臟解酒毒除煩渴趙以德治酒毒房勞而病熱者於補氣血藥中加葛根反汗出懈怠不禁葛根之散也得枳椇子加入即愈牛乳味甘微寒潤腸胃解熱毒主噎膈反胃按東垣云上膈由氣治在和中降氣中膈由積治在行氣消積下膈由寒治在溫中散寒氣血不足其本也痰涎停滯其標也非胃枯則胃寒服香燥藥取快一時破血散氣是速其死也韭汁牛乳飲主之張氏隨宜加薑汁藕汁梨汁名五汁安中飲或酌加竹瀝萊蔔汁蘆根汁陳米酒佐以理中湯八味丸加減用之無不愈者此其大略也潤澤存乎一心鄭奠一治噤口痢服牛乳即瘥可想其性味功用耳凡用牛乳十分諸汁只二分竹瀝味甘氣平療陰虛發熱理中風噤牙小兒天吊驚搐入口便定婦人胎産悶暈下咽即蘇衍義云胎前不損子産後不礙虛卻老痰除涎飲止驚悸祛癲癇痰在手足四末非此不達痰在皮裡膜外有此可驅竹瀝達痰丸酌用六君子湯合滾痰丸為末以竹瀝三浸三曬竹瀝打麵糊為丸每服二錢竹瀝入薑汁送下前證皆驗世人反以為寒疑置不用殊不知竹之有瀝猶人之有血也氣味甘平經火煅出何寒之有蜂蜜七月勿食生蜜令人霍亂暴下味甘性平入脾肺經益氣補中潤燥解毒除心煩通便閉止瀉痢悅顏色潤臟腑和百藥卻重病蜜酥等份熔化一處或湯或酒日數調服不拘時治久病血枯並潤燥止渴蠟味淡滲去陳積主下痢古方蠟匱巴豆丸治一切寒澼宿食積滯瘧痢巴豆去心膜油杏仁炒各四十九粒為末熔蠟和丸緑豆大水下三五丸灸瘡固膜蠟礬丸護膜托裡解毒成膿心煩加雄黃寒劑類元參反藜蘆味甘苦鹹甘能滋陰苦能清火因其味甘故降性亦緩本草言惟鹹入腎經不知其尤走肺臟故退無根浮遊虛火散周身經絡熱壅逐頸項喉咽痹毒驅男子傳尸骨蒸解溫病潮熱晚來及煩躁懊憹發斑療婦人産乳余疾並腸中血瘕蒸堅補腎水滋陰明目祛勞嗽痰血渴煩腎脈貫肝膈循喉嚨系舌本腎虛則真陰失守孤陽飛越此喉痹咽腫痰嗽吐衄之所由來也骨蒸潮熱亦本於此元參壯水以制火故並治之元參麥冬生地白芍丹皮大劑煎湯磨犀角汁兌飲治熱嗽痰血甚驗沙參反藜蘆味甘苦氣薄體輕性微寒除邪熱專清肺兼益脾腎滋養肝血散遊風瘙癢消癰瘍瘡腫療胸痹止頻驚除疝疼心腹疼但性緩力微難勝專任易老曰人參補五臟之陽沙參補五臟之陰特以其甘涼而和補中益氣故有是論若言對待人參相去天淵沙參一兩阿膠五錢大劑煎飲治虛勞久嗽肺痿局方沙參五錢水煎治肺熱咳嗽苦參反藜蘆味苦性寒沉也陰也入胃大腸肝腎主腸風下血及熱痢刮疼難當療溫病狂亂致心燥結胸垂死酒煎一兩能吐天行溫毒赤癩眉脫驅風除濕有力訒庵云鄭奠一用苦參蒺藜倍胡麻治大風癩疥屢有愈者黃疸食勞失飢過飽所致苦參龍膽草等份為末牛膽汁和丸如桐子大漸服五七九丸日三次生大麥芽汁送下甚驗並一切癰瘍風熱斑疹皂角四兩水揉濾汁入苦參末二兩和丸溫水送下錢余治通身風疹痹疼不可忍即近隱處皆然者亦多痰涎夜不能臥甚驗黃連川出味苦大寒味厚氣薄諸涼藥皆潤而此獨燥降中微升陰中微陽專瀉諸火古方有黃連解毒湯火在上米酒炒火在下童便炒火而嘔者薑汁炒火而伏者鹽水炒吳茱萸炒止疼陳壁土炒止瀉同大黃治溫病邪熱同枳實除宿食火脹同花粉消痰熱煩渴同廣木香治滯下瀉利腹疼同吳茱萸治肝熱吞吐酸水黃連六兩吳茱萸一兩名左金丸清肝涼血和胃厚腸涼膽止驚癇瀉心除痞滿散陰戶腫疼驅食積熱疳去惡瘡癰腫除濕熱鬱煩善消痔漏亦治火眼解烏附巴豆毒瀉血氣痰食火若虛火犯之反從火化助熱仲景諸瀉心湯用之胡黃連味苦性寒入肝膽心胃與黃連同功治溫病痎瘧骨蒸勞嗽三消五痔五心煩熱火毒血痢同烏梅伏龍肝等份為末茶清調服明耳目益顏色療胎蒸虛驚除五疳蟲熱胡黃連黃連等份丹砂減半入豬膽內煮熟取出加蘆薈同連數麝少許糯米粥丸服黃芩味苦氣寒氣輕於味降而能升陰中微陽枯者入肺條者入大腸欲其上酒炒欲其下生用枯者清上焦之火消痰利水定喘止嗽解溫疫熱毒退往來寒熱清咽利膈尤祛肌表之熱故治赤眼斑疹鼠漏瘡瘍條者涼下焦之熱能除赤痢熱蓄膀胱大腸祕結便血漏血胎因火動不安酌佐砂仁白朮腸因火滯為疼可加黃連厚朴仲景黃芩湯治太陽少陽合病下利黃柏味苦微辛大寒陰中微陽善降三焦之火但其性多沉專入足少陰本經為足太陽厥陰之引經也清胃火嘔噦蛔蟲除伏火骨蒸煩渴去腸風熱痢下血逐二便邪火結淋上可解熱渴口瘡喉痹癰瘍下可去足膝濕熱疼痛痿躄黃柏蒼朮名二炒散治下焦濕熱總之寒潤降火最速本草言其制伏龍火補腎強陰然吾謂龍火豈沉寒可制水枯豈苦劣可補陰枯水涸得降愈亡撲滅元陽莫此為甚水未枯而火盛者用以抽薪則可水既枯而發熱者用以補陰實難當局者勿泥陳言認為補劑瀉膀胱邪火利小便熱結降下焦濕腫治痢疾便血但脾虛胃弱者宜慎用之脈滑大有力鹽水炒用知母酒鹽水炒味苦辛氣寒氣味俱薄性沉而降陰也上清肺金而瀉火下潤腎燥而益氣漏無根之浮火退有汗之骨蒸潤肺解渴消痰止嗽治傷寒煩躁療溫病大熱利二便清浮腫按本草言其滋陰又言滋化源者正因苦寒滅火以救腎水不致於涸耳與黃柏略同非真補腎也時珍曰知母佐黃柏有金水相生之義但黃柏入血分知母入氣分各一兩肉桂二錢為末煉蜜丸名滋腎丸治下焦積熱小便不通此東垣治王善夫方也梔子味苦性寒味厚氣浮輕飄像肺色赤入心瀉心肺邪熱屈曲下行而三焦之鬱火以解則熱厥心疼以平吐衄痢血以息及心煩懊憹不眠五疸五淋津枯口渴目赤紫癜疱皶瘡瘍悉除留皮除熱在肌表去皮卻熱在心腹仲景因氣浮而苦極易動吐合淡豆豉用為吐藥以去上焦之滯痰本經謂其治大小腸及胃中熱丹溪謂其解鬱熱行結氣其性屈曲下行大能降火從小便泄出非利小便乃清肺也肺清而化膀胱為津液之府故小便得以出也余謂助以佐使治各不同加茵陳除濕熱黃疸加豆豉除煩躁不眠加厚朴枳實除煩滿加陳皮生薑除嘔噦加生薑汁除心胃久疼加延胡索除疼因血結又止霍亂轉筋去目赤癰癤炒黑尤清肝胃之火解鬱止血服末治吐吹鼻治衄連翹去心味苦辛氣寒氣味俱薄輕清升浮陽中有陰入手少陰手足少陽陽明瀉心經客熱殊功降脾胃濕熱神效去寸白蛔蟲通月水五淋以其味苦輕故達肌表散癰毒斑疹瘡家號為聖藥以其氣辛散故走經絡通血凝氣滯結聚所不可無河間雙解涼膈俱用之青黛波斯者良次則福青味甘苦性寒入肝脾除鬱火解熱毒散腫硬同馬齒莧搗敷一切濕熱瘡止血痢療傷寒溫病發斑面黃鼻赤耳聾目直視治小兒疳瘡蟲瘦驚癇狂邪稠痰唇焦渴青黛散治發頤及兩腮腫硬青黛一錢甘草蒲公英二錢銀花五錢瓜簍半個酒煎白頭翁近根有白茸得酒良味苦性寒堅骨涼血入陽明血分主火毒血痢仲景白頭翁湯溫瘧發狂癥瘕積聚瘰癧吐衄齒骨疼痛男子偏疝小兒禿膻石蓮子去殼味苦性寒入心胃膀胱主噤口痢濃煎石蓮湯磨入沉香汁及濕熱滲入膀胱而為遺濁淋瀝清心除煩開胃進食按噤口痢由元氣虛脫大便頻數心氣與胃不安故也得石蓮以通心氣而胃氣自開矣川楝子漿水煮去核味苦氣寒有小毒舒筋治臟毒下血炒末蜜丸大米飲下療腎消膏淋同茴香炒等份為末溫酒調下尤導小腸膀胱之熱引心包相火下行通利小便為疝氣主藥按疝氣初起未有不因內虛外襲留而不行其病則實然必先疏泄其氣所謂通則不滯不疼矣若驟加補益入腹攻心變成危證古人用五苓散加楝子橘核茴香少加木通檳榔立方之工穩極矣兼治傷寒溫病熱厥熱狂心疼腹疼療瘍疥殺三蟲夷堅志曰楝根白皮濃煎入麝少許治消渴有蟲耗其津液者下其蟲而渴自止合烏梅生薑使君子或煎或丸服諸蟲皆下牛蒡子酒蒸味苦氣平性寒入十二經絡主風濕癮疹盈肌退風熱咽喉不利散瘰癧瘡瘍諸腫之毒利手足腰膝凝滯之氣潤肺止嗽降氣消痰其性通散溫酒調末每服二錢祛齒牙蟲疼消面目浮腫青蒿味微苦性微寒氣清香童便熬膏退骨蒸勞嗽治虛勞之聖藥也世以茵陳蒿代之大混鼻中息肉用青蒿灰石灰等份淋汁熬膏點之甚效茵陳蒿味苦性寒入脾胃膀胱利濕清熱專治疸黃佐用梔子黃而濕多腫再加滲利黃而燥乾澀再加涼潤惟陰黃一證不治黃疸谷疸酒疽黃汗疸女勞疸亦有蓄血發黃不盡脾胃濕熱女勞疸必屬腎虛酌用四物茜紫六味知柏壯其水四君培其氣隨證加利濕清熱藥自效痰火濕熱瀉痢固宜寒熱痎瘧發黃尤效仲景茵陳蒿湯山豆根廣出者佳味苦寒瀉心火以保肺金而大腸之風熱亦清主喉癰喉風齦疼齒疼熱咳喘滿下痢腹疼療人馬之急黃治蛇狗之咬傷桔梗甘草湯加山豆根元參荊芥穗防風治咽喉齦齒腫疼甚驗防己車前草對蒸曬乾以心花黃色為佳味辛苦氣寒入十二經尤善腰以下至足濕熱腫盛療風濕手腳攣疼拘急口眼喎斜止嗽清痰利大小便惟十二經真有濕熱壅閉及膀胱積熱下注腳氣誠為要藥但臭味拂人妄用令人減食木漢二種木主風漢主水為不同腳氣乃寒濕鬱而為熱治以防己為主藥濕加蒼朮木瓜熱加芩柏風加羌活萆薢痰加竹瀝南星活血加四物大便祕加桃仁紅花小便祕加牛膝澤瀉疼連脅加龍膽疼連臂加桂枝靈仙衝心加檳榔不可驟補石膏味辛甘氣大寒氣味薄體沉重生用速煅用緩降而能升陰中有陽以其寒散清肅故祛肺胃三焦之火辛能清肺解肌最逐溫熱暑濕而除頭疼甘能緩脾益氣極善生津止渴而卻煩熱邪火盛不食胃火盛多食皆其所長陽明熱牙疼太陰火痰喘尤當速效仲景有白虎湯景嶽玉女煎滋少陰之水瀉陽明之火良方也香薷味苦辛香散氣輕有徹上徹下之功療霍亂中脘絞疼治傷暑小便澀難清肺熱撥濁四陰降胃火鬱滯潛解去口臭水腫亦消除煩熱麻黃為冬月發汗要藥香薷為夏天散暑良劑局方香薷飲香薷白扁豆厚朴黃連等份水煎治中暑熱盛口渴心煩濕加茯苓木瓜虛加人參白朮陳皮炙甘草名十味香薷飲栝樓實反烏頭連皮子瓤搗用單用子誤也味甘氣寒味厚氣薄性沉降陰也降胸膈結滯痰涎開脾胃熱鬱氣閉解消渴定喘脹滑大便療胸痹仲景有瓜蔞薤白白酒湯本草言其又能補氣治虛勞恐未必然天花粉即栝樓根也酸能生津甘不傷胃微苦微寒降火清金陰中陽也大宜虛熱人最涼心肺渴熱大降膈上熱痰消癰腫排膿散跌僕瘀血除狂熱雜疾雜疾者雜氣之疾也即所謂溫病也去胃熱黃疸潤枯燥利水道止小便數尤滌胸中鬱熱垢膩為消渴之聖藥古人治消渴多用之小柴胡湯以天花粉易半夏仲景治少陽證口渴者馬兜鈴味苦性寒陰中之陽入肺經主清肺除咳痰氣喘療血痔久瘻按兜鈴主肺金何以治痔瘻蓋肺與大腸相表裡肺移熱於大腸故有此證清其里而表自清矣馬兜鈴散治肺熱咳喘痰血兜鈴錢半阿膠元參生地麥冬二錢五味子桔梗甘草一錢水煎服根名青木香下氣甚速散氣最捷枇杷葉去毛蜜炙味苦性平清金和胃而下氣氣下則火降痰消而熱咳嘔逆煩渴之證悉平訒庵曰一婦肺熱久嗽身如火炙肌瘦成癆用枇杷葉款冬紫菀桑白皮杏仁木通等份大黃減半煉蜜丸早晚噙化一丸未終劑而愈金銀花味甘氣寒白入肺黃入脾大益氣血久服輕身延年補虛止渴療水瀉腸澼血痢濃煎湯入蜜服佐他藥兼用最良兼理風氣除濕氣尤主化毒專治癰疽銀花五兩甘草一兩酒煎日三服盡至大小腸通利則藥力到毒自消矣未成則散拔毒功深已成則潰回生力大此有益無損之藥也世多忽之蒲公英味甘苦性寒入脾胃腎擦牙烏髭發通淋稱妙品潰堅腫消結核屢著奇功解食毒散滯氣每臻神效蒲公英五兩同金銀花或藤取汁入酒日三服盡治乳癰按蒲公英花黃屬土質脆斷之有白津塗狐尿剌莖如蔥管而細四時常花花罷飛絮絮中有子落處即生稟天地中和之性故善解毒又名地丁者以其消疔毒也白汁點之龍膽草甘草湯浸曬乾味苦性大寒入肝膽膀胱胃止瀉痢去腸中小蟲卻驚癇益肝膽二氣退胃中伏火及溫病發黃除下焦濕熱並酒疸黃胖驅客忤疳氣療癰疽口瘡酒浸輔佐柴胡上治眼目赤疼胬肉必加醫瘴通用局方龍膽瀉肝湯龍膽黃芩梔子生地俱酒炒木通車前子澤瀉柴胡當歸甘草等份煎服利濕清熱瀉肝膽諸方之準繩也龍膽為末以豬膽汁點溫酒每調服一錢治傷寒後盜汗夏枯草味苦辛性微寒入肝經主瘰癧癭瘤療濕痹腳腫肝虛目珠夜疼夏枯草香附等份甘草減半水煎服兩眼冷淚羞明散血破瘕生肌解毒按夏枯草冬至生苗三月開花正厥陰風木主令其為肝經之劑無疑矣丹溪云夏至即枯者蓋稟純陽之氣得陰氣則枯也益母草紫紅花者佳白花不堪入藥去老杆味辛苦氣寒性滑利調婦人經胎産諸證故有益母之名安生胎落死胎生新血行瘀血消乳癰散熱毒除小兒疳痢水煎五錢入蜜和服男婦下血癮疹作癢堪作浴湯且善下水又能消脹本草又云能益精輕身按血有瘀滯則胎不安瘀去新生胎自安矣故用其滑利之性則可求其補益之功則未也益精輕身之説殆不足信惟其氣輕不甚消耗故宜於胎産若虛寒者宜忌子名茺蔚益精明目行氣消瘀療血脹血逆心煩頭疼但行中有補較勝於草益母草花子一斤柔桑枝三斤寸斷慢火同煎濃汁去粗熬膏溫酒和服益血明目潤皮膚活筋脈去攣疼瘙癢男婦皆宜並治紫白癜風牡丹皮味辛苦氣寒味薄氣輕陰中陽也入心腎心包肝瀉血中伏火退無汗骨蒸除産後滯血寒熱祛腸胃蓄血堅癥和血涼血而生血定神志通月經止吐衄療瘡癰治驚癇搐溺皆因陰虛血熱風火相搏痰隨火湧所致下胎胞住疼本草言其善補而實無補性但氣味和緩辛涼善行血滯滯去則瘀熱解勞蒸退雖行滯而不峻也心藏神腎藏志心腎不足則神馳而志衰仲景八味丸用丹皮定神志也桑白皮蜜炙味甘辛氣寒入肺升中有降陽中有陰辛瀉肺中伏火甘故緩而不峻止喘嗽唾血解煩渴除痰又水出高源清肺亦能利水古方瀉白散桑白皮地骨皮甘草粳米水煎服此瀉肺諸方之準繩也桑葉甘寒入陽明經燥濕涼血去風明目帶露炒末米飲下止盜汗經霜水煎早洗眼去風淚代茶治消渴扶桑丸桑葉黑芝麻等份為末煉蜜丸長服補腎養肝去風勝濕烏須明目效桑枝除風濕潤臟腑壯筋骨明耳目桑枝煎採桑條柔嫩者寸斷五兩炒香水煎日三服盡治手臂攣疼散腳氣潤枯稿去渴癢許叔微曰豫病手臂疼數年諸藥不效服此數劑尋愈代赭石火煅醋淬味苦辛寒沉也陰中陽也入心包肝養血氣平血熱療小兒慢驚風冬瓜仁煎湯調赭石末一錢服自愈與急驚實熱不同若急驚風則升降涼膈證須辨之並吐衄崩帶産難胎動及心下痞硬噯氣仲景代赭旋覆湯取其重以鎮虛逆赤以養陰血也後人用治噎膈因痰氣阻塞故羚羊角磨汁味苦鹹性寒入肝併入心肺療風寒熱在肌膚溫毒伏在骨間驚夢狂越魂魄不安男女猝熱搐溺産婦敗血攻衝清心涼肝舒筋明目磨汁消怒菀於上燒灰主食噎不通本事方羚羊角散治妊娠中風涎潮僵仆口噤搐掣名子癇羚羊角磨汁入當歸茯神黑棗仁薏仁一錢杏仁防風獨活川芎六分木香磨汁入甘草三分薑煎犀角磨汁味苦辛氣寒氣味俱輕陽中陰也其性走散而升色黑功力在尖涼心清肝除胃中大熱辟邪解毒祛風利痰時珍曰五臟六腑皆稟氣於胃風邪熱毒必先干之飲食藥物必先入之犀角之精華所聚直入胃中能解一切毒療一切血並治傷寒溫病發狂發斑發黃驚悸瞤惕譫妄之證故傷寒熱毒表閉而非汗不解者磨尖攙入發散藥中取汗速如響應今人止知犀角能解心胃熱而不知其涼而升散尤速於升麻也活人書治吐衄血用犀角地黃湯無犀角代以升麻蓋亦有理朱二允非之殊不盡然但升麻純陽氣浮有升無降犀能分水陽中有陰升而能降代治大小便下血則得矣若吐衄恐血隨氣升湧出不止如氣平火不上炎者亦可代孕婦切忌之童便味鹹氣寒沉也陰也咸走血寒涼血故善清諸血妄行吐衄能止陰火自退定喘促降痰氣解煩渴利大小便要之非用童便也實則用本人小便耳不然內經何以謂之還原湯綱目何以謂之輪回酒乎以自己之小便治自己之病痛入口下咽引火下降甚速也其如愚夫愚婦執而不用何哉煉為秋石反失其性熱劑類附子反半夏瓜蔞貝母白及白蘞中其毒者以犀角黃連甘草黑豆煮湯解之是其所畏者也生者味辛甘醃者味辛鹹性大熱有大毒陽中之陽其性浮中有沉走而不守除表裡沉寒厥逆口噤仲景有四逆湯且能引火歸原制伏龍火仲景有白通加人尿豬膽汁湯善助參耆成功尤贊地萸建效無論表裡但虛寒脈細無神者皆當急用仲景有附子湯孕婦切忌之川烏頭即春間所採附子之嫩小者主中風灑灑出汗烏頭梔子等份鹽水煎服治疝氣內鬱熱而外束寒者側子即附子旁出小顆其性輕揚主發散為風疹及四肢發散要藥反惡性味相類辨附子製法稽之古人有單用童便煮者有用薑汁鹽水煮者有用黃連甘草湯煮者有數味兼用制之者其中宜否最要詳辨夫附子之性熱而剛急走而不守土人以鹽醃之故其味鹹而性降今人所以用之者正欲用其熱性以固元陽以補脾胃以行參耆地萸等功若制以黃連則何以助其回陽若制以鹽水則更以助其降性若制以童便則非唯更助其降而脾胃大虛者尿臭一入極易動嘔是藥未入口而先受其害且令沉降尤速何以達脾唯薑汁一制直中陰寒者用之最良若常用而欲得其補性者又不必用此余意總不如用甘草酌附子之多少對用煮極濃湯先浸三二日剝去皮臍切為四塊再易甘草濃湯浸三二日捻之軟透切為薄片入鍋文火炒至將干口嚼尚有辣味是其度也若炒太乾則過熟而無辣味其熱性全失而無用矣其所以必用甘草者蓋以附子之性急得甘草而後緩附子之性毒得甘草而後解附子之性走得甘草而後益心脾附子之性散得甘草而後調榮衛此無他不過濟之以仁而成其勇耳若急用則以麵裹而火炮者亦可直中陰寒厥逆將危緩不及待則單用炮附不必更用他法夫天下之製毒者莫如火火之製毒者以能革物之性故以氣遇火則失其氣以味遇火則失其味剛者革其剛柔者革其柔如但煮之極熟全失辣味狀若蘿蔔之可食矣尚何補益之有今人只知附子之畏而不知過熟之無用也肉桂味辛甘性大熱陽中之陽氣味沉重專補命火引火歸原桂為木中王故平肝味甘故補脾生血凡木勝剋土而無大熱者用之極良與參附地萸同用最降虛火治元陽虧乏陰虛發熱黃耆湯加肉桂為虛勞聖藥二味加人參甘草是也但善於動血墜胎觀仲景治蓄血證桃仁承氣湯用肉桂可知矣桂枝味辛甘氣輕故能走表調和榮衛故能發汗又能止汗四肢有寒疾非此不能達仲景桂枝湯治冬月中風頭疼發熱汗出脈緩者此千古良方也治病多多矣乾薑味辛大熱生用發汗炮熟溫中調脾通神明去穢惡凡脾寒而為嘔吐者鮮者煨熟用之凡虛冷而為腹疼瀉泄者乾者炒黃色用之仲景理中湯皆治之産後虛熱者炒黃黑色用之虛火盛而吐血痢血者炒黑灰用之按乾薑炒為黑灰已將失其性矣其亦可以止血者取血色屬火黑色屬水之義亦取薑灰性澀之義耳若陰盛格陽火不歸原而上見血者仍留性為妙汗多者忌之丁香純陽泄肺溫胃療腎虛壯陽暖陰去胃冷脹嘔厄忒益智子鹽炒味辛氣溫入心腎主君相二火以補脾胃之不足治遺精崩漏泄瀉小便餘瀝同烏藥酒煮山藥丸名縮泉丸開鬱散寒建中攝涎合六君子湯按益智辛溫善逐脾胃之寒邪而土得所勝則腎水無冷克之虞矣破故紙鹽炒味苦辛氣大熱性燥而降壯元陽暖水臟治命火不足而精流帶濁脾腎虛冷而溏瀉滑痢以其補陽故暖腰膝痠疼以其性降故能納氣定喘然氣微宜避之古方補骨脂丸益元氣壯筋骨治下元虛敗手足沉重夜多盜汗此恣欲所致也破故紙四兩菟絲餅四兩胡桃仁一兩沉香一錢五分為末煉蜜丸如桐子大每服三十丸鹽水溫酒按時令送下自夏至起冬至止唐張壽知廣州得方於南番詩云三年時節向邊隅人信方知藥力殊奪得春光來在手青娥休笑白髭鬚淫羊藿辛香甘溫入肝腎命門治絶陽不生絶陰不成石硫黃番舶者良味酸性大熱陽中之陽有毒與大黃並號將軍補命門真火桂附不如也性雖熱而能疏利大腸與燥澀者不同如元陽暴絶脾胃虛冷久患泄瀉寒澼遺漏精滑者用之大有起死回生之功古謂熱劑兼補此類是也古方玉真丸石硫黃二兩硫黃入豬大腸頭內爛煮三時取出曬乾為末蒸餅和丸名來復丹補命門真火大有功效眉批半夏石膏硝石一兩為末薑汁糊丸治寒厥頭疼與仲景白通湯加人尿豬膽汁義同古方花蕊石散石硫黃五錢花蕊石二兩為末服下胞衣惡血米酒味甘辛苦大冰凝海唯酒不凍陽中之陽過則傷人少則養氣和血大有補益入口下咽上至天下至泉內臟腑外皮毛無處不到能引諸涼藥至熱所驅逐邪氣外散尤為溫病聖藥易曰火就燥是也燥劑類白附子新羅者佳泡用味甘辛純陽大熱有毒入肝脾去頭面遊風可作面脂主血痹心疼且行藥勢驅諸風冷氣解中風失音磨醋擦身背汗斑尤去疥癬用茄蒂裹邊捻藥擦三日愈忌澡洗研末收陰囊濕癢並滅斑痕牽正散治中風口眼喎斜白附子白殭蠶酒炒全蠍炙等份溫酒調末服脾胃燥熱者忌之蛇床子味辛苦氣溫腎命三焦氣分之藥強陽益陰補精散寒祛風燥濕主男子陽痿囊濕女子陰疼濕癢同吳茱萸煎湯熏洗或同白礬煎洗子臟虛寒産門不閉及腰痠體痹帶下脫肛濕癢惡瘡一切風濕之證吳茱萸湯泡味辛苦氣溫性燥氣味俱厚升少降多有小毒雖入脾腎實肝家主藥胸膈停滯而為嘔逆吞酸同白茯苓為末煉蜜丸名吳仙丹吞酸醋心為嚮導腸胃陰寒而為臍腹脹疼及小腸膀胱寒疝寒疼少陰下利厥陰頭疼皆其所長仲景有吳茱萸湯東垣曰濁陰不降厥氣上逆膈塞脹滿非吳茱不可治也其性雖熱而能引熱下行古方導氣湯吳茱萸錢半小茴二錢木香三錢川楝子四錢荔核二個長流水煎治小腸膀胱寒疝寒疼根殺寸白三蟲煎服即出枝療二便關格入口立通並向東南方取之方獲實效本草曰凡用樹根樹皮宜採向東南方者凡採根皮出土上者殺人肉豆蔻麵包煨熟去油切片酒炒味辛氣香理脾燥濕行氣調中逐冷祛痰澀腸止瀉治積冷腹內脹疼噁心吐沫療小兒胃寒吐瀉乳食不下因其固腸則元氣不走故曰能健脾胃非真補益也性尤善於下降得中則和平過用則泄氣耳古方四神丸治元陽衰憊脾瀉腎瀉肉蔻二兩五味三兩故紙四兩吳茱萸一兩準繩加木香五錢為末生薑四兩大棗百枚同煮以棗肉丸任下白豆蔻味辛氣溫味薄氣厚升也陽也流行三焦溫暖脾胃實肺家本藥別有清爽之氣散胸中冷滯溫胃口止疼除嘔逆反胃祛宿食脹膨退目眥紅筋去白睛翳膜消痰氣解酒毒欲其速效嚼咽甚良草豆蔻味辛氣燥升也陽也入脾胃消痰食除脹滿祛寒濕止霍亂瀉痢闢山嵐瘴氣但其性燥急不如白蔻有清爽之氣而辛溫發散又與草果相似同砂仁溫中佐常山截瘧胃燥發熱三蔻並忌蒼朮茅山者佳米泔浸炒辛溫燥烈氣味俱暴可升可降陽也然性不純良能溫散故發汗寬中卻心腹脹滿散風眩頭疼消痰癖氣結能燥濕故強脾勝濕止吐瀉消腫驅足痿帶濁去水飲澼囊蒼朮一斤茯苓四兩為末以薑煮棗用肉入脂麻汁搗丸任下又能總解六郁有燥熱者大忌澀劑類蓮子福建者佳味甘澀氣平益十二經脈氣血澀精氣厚腸胃除濕熱治脾瀉久痢白濁夢遺血淋吐衄崩漏蓮子茯苓等份入雄豬肚內煮爛搗丸蓮葉湯下治前證悉效此脾之果也交水火而媾心腎安靜上下君相二火猶黃婆媒合嬰兒奼女之理也蓮藕生甘寒涼血散瘀止渴除煩熟甘溫益胃補心止瀉平怒蓮鬚清心滋腎益血固精蓮葉色青中空形仰像震補脾胃而升陽散瘀血而生新主一切血證洗腎囊風濕療夢遺泄精奠一云蓮葉為末酒調服三錢龍骨牡蠣不若也治濁固本丸蓮鬚豬苓黃連二兩黃柏砂仁益智仁半夏茯苓一兩甘草五錢為末煉蜜丸蓮葉湯下此固本之中兼利濕清熱解鬱調氣而除痰也余丙子夏在亳一少年張姓咳血遺精已經二年狼狽之甚診其脈沉細而數用紅蓮花十八片蓮子蓮鬚蓮房蓮葉藕節俱二錢水煎七服而吐遺止後用六味丸加蓮子芡實子金櫻子蓮葉湯下服百日康健如故因名愛蓮湯芡實子嬰兒多食能令形體矮小慎之味甘氣平入脾腎經能健脾養陰故治腰膝疼痛強志益精能補腎益髓故令延壽耐老目明耳聰且收脫住瀉祕氣澀精但其性和緩難收速功芡實散芡實粉金銀花干藕蒸熟曬等份為末冬湯夏水調下久服卻病延年木瓜味酸澀氣溫斂肺平肝理脾和胃化食止渴氣脫能收氣滯能散調榮衛利筋骨去風濕治霍亂轉筋腳氣瀉痢肩臂腰足無力之證木瓜酒方治肩臂腰疼並風濕痰氣手足腿膝麻木疼木瓜川續斷威靈仙鉤藤鉤防風三錢鑽地風金銀花歸身五錢紅花桂枝升麻一錢煮黑紅谷酒四斤早晚服若腰以下疼木去升麻加杜仲牛膝三錢此和榮衛利筋骨之要藥也愚意腰腿疼屬腎虛加熟地黃為妙眉批秦皮漬水碧色書紙不脫味苦氣寒色青性澀補肝膽而益腎以其平木故治目疾驚癇以其收澀而寒故治崩帶血痢仲景白頭翁湯用之加阿膠三錢炙甘草三錢治産後痢虛極者以其澀而祕氣故益精有子時珍曰天道貴澀惟收澀故能補川續斷酒浸川出者佳味苦而澀氣微涼入肝腎他産者味甘辛苦少澀少不效其味苦而重故調血脈續筋骨療跌僕折傷消腫毒生肌膚理金瘡癰瘍乳結瘰癧殊功腸風痔漏立效其味澀而收故治腰疼暖子宮止胎漏崩中調血痢縮小便固夢遺精滑佐以人參甘草熟地山藥之屬其效尤捷訒庵曰慣墮胎者受孕一兩月川續斷酒浸曬乾二兩杜仲糯泔浸炒斷絲八兩山藥六兩煮糊丸米飲送下大補腎氣托住胎元何墮之有血熱者又當別論沙苑蒺藜辛溫瀉肺氣而散肝氣苦溫補腎治三經虛勞之證訶子去核味甘酸澀苦重酸輕性急善降陰也入肺肝脾胃大腸生用清肺煨熟固腸消宿食去腹脹通津液破結氣逐滯開胃驅風降痰因有收斂降火之功故定喘止嗽下氣除滿若上焦元氣虛陷者煨熟少用雖欲固下而苦降之性在所當避蓋能澀腸又能泄氣故也丹溪曰文只有六路為真東垣訶子散治久瀉久痢虛脫訶子煨乾薑炮罌粟殼蜜炙等份橘紅減半調末服即訶黎勒罌粟殼泡去筋膜醋拌浸炒味微甘性多澀入肺大腸久痢滑泄必用須加甘補同煎久虛咳嗽劫藥欲用要當知慎三元湯治虛痢久痢久瀉滑脫不禁罌粟殼蜜炙三錢蓮子十枚元肉十枚小棗十枚竹葉三十片燈心三十寸水煎入蜜服椿樗白皮去粗蜜炙苦燥濕寒勝熱澀收斂椿入血分樗入氣分去肺胃陳痰主濕熱為病久痢滑瀉遺精便數腸風崩帶合滑石為末粥丸米飲下治白帶效大有斷下之功時珍曰一婦久痢年餘素耽飲好食魚蟹積毒在臟便與膿血雜下肛門疼甚諸藥不效用人參樗皮等份為末溫酒或米飲調下二錢數服尋愈樗根白皮半斤搗汁入水少許用小棗四兩煮三炷香去棗量調蜜數匙露一宿早服治大便下血年久者五倍子炒味鹹酸其性澀斂肺其氣寒降火生津化痰止嗽黃昏咳嗽乃火浮肺中宜五倍五味斂而降之斂汗以自己漱口水調末敷臍上效療瀉痢五痔下血脫肛膿水濕爛子腸墜下色黑烏須醫學綱目云王元圭虛而滑精諸藥不效後用五倍子一兩白茯苓二兩為末丸服遂愈訒庵曰凡用祕澀藥必能通而後能祕此方茯苓倍於五倍一瀉一收是以能盡其妙也世罕知此地榆味苦酸澀性寒氣味俱薄陰中陽也入肝與大腸雖理血病惟治下焦禁腸風下血塞痔瘻來紅療月信不調並帶下崩中卻疳熱瀉痢及積瘀時行綱目曰地榆三兩醋煎日三服盡治下血痢血不止並婦人漏下赤白帶下加鼠尾草三兩水煎如前法服治下血二十餘年者驗又曰地榆三錢炙甘草三錢砂仁一錢水煎治結血下血腹疼赤石脂味甘溫酸澀性平色赤入心養血甘溫益氣生肌而調中酸澀收濕止血而固下療久痢腸澼仲景有桃花湯崩帶遺精癰痔脫肛合伏龍肝白礬等份為末敷之催生下胞東垣曰固腸胃有收斂之能下胞衣無推蕩之峻牡蠣煅粉味鹹澀入腎澀收斂咸軟堅同熟地山萸肉固精祕氣同杜仲麻黃根補陰止汗柴胡為引療脅下硬疼茶芽為引消頸下結核禁夢交淋瀝止精滑崩帶牡蠣粉兩半苦參二兩雄豬肝煮爛搗末和丸酒下二錢治婦女赤白帶下龍骨五色者佳味甘性澀入心肝腎大腸收斂浮越之正氣治驚癇風熱祛崩中帶下止腸風下血療瀉痢便滑斂虛汗縮小便皆澀以止脫之義龍齒澀涼鎮心安魂主驚癇痙癲狂熱寶鑑所謂虎屬金定魄龍屬木安魂是也仲景柴胡牡蠣龍骨湯治少陽病誤下胸滿煩驚譫語身重小便澀消劑類縮砂仁味辛溫氣香竄入肺脾胃大小腸膀胱腎補肺益腎和胃醒脾行氣消食醒酒逐寒祛痰嗽逆咳立止療霍亂大除惡心消脹滿安氣滯之胎同枳殼服卻腹疼驅臟寒之瀉同乾薑五味服治瀉痢嘔吐膈噎散咽喉口齒浮熱欲其溫散薑汁炒研益智人參為使入脾胃白蔻檀香為使入肺茯苓黃柏為使入膀胱腎赤石脂為使入大小腸總之砂仁為行散之藥故能引入七經性溫而不傷於熱行氣而不傷於克尤為太陰脾之要藥常嚼最妙尊生書曰漫言水穀消融且化骨鯁銅鐵因收入消劑安胎散治跌墜損傷凡因所觸致胎不安痛不可忍者砂仁炒熟去皮為末溫酒調服二錢覺腹內胎動極熱則安矣又方砂仁威靈仙砂糖醋煎服治諸骨鯁沉香忌火味苦辛氣溫可升可降有陽有陰其性緩故抑陰扶陽補助相火其氣香故通天徹地條達諸氣談野翁試驗方沉香五錢芫花三錢月季花頭二錢銼碎入大鯽魚腹中就以魚腸封固水酒各半煮熟食之即愈所用之魚須安糞水內遊死者方效原文曰此家傳方治瘰癧未破者活人多矣行氣不傷氣溫中不助火除心腹疼痛治噤口毒痢墜痰涎平怒調翻胃嘔逆古方攝生飲治中風中痰中氣中食上壅垂危沉香五分磨汁入木香半夏南星錢半枳實細辛石菖蒲一錢痰盛加全蠍二枚生薑水煎一方有蒼朮廣木香忌火味苦辛微甘氣味俱厚降也陽中陰也行肺肝脾氣滯如神去心腹脅氣疼甚捷和胃氣止嘔瀉散逆氣除脹滿氣順癥癖自散氣調胎孕亦安佐黃連治暴痢固大腸本草言其性補或以滯去食進而脾自健耳非真能補也子和木香檳榔丸推蕩一切實積瀉痢食瘧咸宜木香檳榔青皮陳皮枳實黃連黃柏三稜莪朮五錢香附大黃一兩牽牛二兩為末芒硝水丸量虛實服清火利氣破滯為摧堅峻品濕熱積聚去則二便調而三焦通泰矣蓋宿垢不淨清陽終不能升也枳實枳殼麩炒時珍曰實殼上世未分至魏晉始分用乃一物也小如指頂而實者為實長成而空者為殼枳實味苦酸微寒氣味俱厚陰中微陽性沉急於枳殼除脹滿消宿食削堅積化稠痰逐瘀血破滯氣療結胸胸痹仲景枳實薤白湯治胸痹結胸其證心下痞堅留氣結聚脅下逆氣搶心枳實五錢厚朴五錢薤白一兩肉桂一錢栝樓實一枚連皮子瓤搗爛水煎分二服連進熱加黃連佐白朮能健脾佐大黃能推蕩但損真氣虛者忌之下氣瀉痰滑竅有推牆倒壁之功故心下痞脾血積也東垣有枳實白朮湯若胸中痞肺氣結也活人有枳殼桔梗湯皆取其疏通快泄破結散滯之義枳殼其氣略薄味亦稍輕性亦稍緩功亦相類但枳實性重多主下行心腹削堅而枳殼氣輕多主上行胸膈破氣因其性緩故用以束胎虛者亦忌治胸中痞塞泄肺氣凡刺疼皆宜用破滯氣亦用看何經分以引經藥導之青陳皮皆橘子皮也陳皮味苦氣辛氣實痰滯必用留白味甘緩去白味辛速瀉脾胃濁痰散心腹滯氣飽逆脹滿堪除嘔吐噁心皆效解酒除煩利水破積通達上下統治百病皆理脾燥濕之功丹溪曰二陳湯能使大便潤而小便長豈獨治痰一節乎橘核治疝氣橘葉散乳癰橘葉七片青皮二錢石膏八錢甘草節一錢八分栝樓實一枚酒煎服一方加蒲公英三錢金銀花三錢連翹二錢川芎錢半並治吹乳寒熱交錯者青皮即橘之嫩小者苦能去滯辛能散氣酸能入肝又入三焦膽消堅癖除脅疼驅惡瘧散乳癰解鬱怒劫疝疏肝破滯氣寬胸消痰肝虛者忌之蓋有滯氣則破滯氣無滯氣則損真氣也厚朴薑炒味苦辛氣溫氣味俱厚可升可降有陽有陰有小毒治霍亂轉筋消膨脹下氣止嘔逆吐酸除腹疼瀉痢能緩脾善走氣與蒼陳甘草同用謂之平胃能除濕滿與枳實大黃同用謂之承氣能瀉實滿孕婦忌之按脹滿證治各不同氣虛血虛宜補濕熱宜清利痰食宜消導寒鬱散寒怒郁行氣蓄血消瘀清補貴得其宜不可專用行散藥亦不可概作脾虛腎虛治也臨病宜致詳焉藿香葉廣出味辛甘氣溫氣味俱薄香甜不峻快脾順氣開胃進食除口臭水腫止霍亂吐瀉藿香五錢陳皮五錢黃土澄水煎服理脾滯同烏沉等劑健脾土入六君同煎桔梗味甘辛氣微涼氣輕於味陽中陰也載藥上浮有舟楫之名入心肺胸膈上焦載散藥清理風寒頭目載寒藥冷利齒牙咽喉載肺藥解肺熱療癰痿唾膿咳嗽載痰藥消痰涎止喘嘔利膈寬胸引大黃可使上升引青皮平肝止疼仲景桔梗甘草湯治咽喉腫疼陰陽通用檳榔海南子佳今所用者皆大腹子味辛澀微苦氣微溫味厚氣薄降也陰中陽也攻堅去脹逐水除痰消食醒酒溫中快氣療瘴癘瘧痢腳氣衝心童便薑汁溫酒調檳榔末二錢連服殺三蟲開停滯止心疼墜胸中至高之氣至於下極按本草言治後重如奔馬夫後重乃毒聚大腸而氣陷所致此物性降氣必愈降味澀毒必不散恐非後重所宜本草又言泄氣極速較枳殼青皮尤甚而廣南之人終年朝夕啖噬似非泄氣極速者兩説極言其效皆未盡其妙蓋此物辛溫而燥故能解毒利氣逐脹導滯然其味澀故行中有留氣薄故降中有升雖泄氣散毒而不傷氣故治後重長啖噬皆無妨也林玉露曰飽能使之飢飢能使之飽醉能使之醒醒能使之醉詳味斯言可得其性味矣大腹皮大腹子皮也捶碎黑豆湯洗辛瀉肺溫和脾下氣行水通大小腸治瘴瘧霍亂痞脹痰膈水腫腳氣氣虛者忌烏藥味苦辛性溫入胃腎諸冷能除凡氣堪順止翻胃消食積作脹縮小便逐氣衝致疼闢瘴癘時作解蠱毒卒中攻婦人凝滯血氣去小兒積聚蛔蟲又療癰癤疥癩貓犬病磨汁灌效嚴氏四磨湯烏藥沉香枳殼檳榔等份磨汁煎服治七情氣逆虛加人參磨若暴怒氣厥加枳實木香白酒磨服香附海南者佳味苦辛性溫氣味俱厚陽中有陰氣中血藥也童便炒下行醋炒理血滯酒炒散氣疼行氣開結和血解鬱去皮膚瘙癢消腹脅脹疼治經胎産諸證號為婦女聖藥若陰虛燥熱汗出血妄者忌紺珠正氣天香散香附四錢烏藥蘇葉陳皮一錢乾薑五分水煎服平肝行氣則氣順血和而經自調疼自止矣滑石桂府者佳味甘淡氣寒性滑降也陰也入膀胱大腸利六腑之澀結六一散滑石六兩甘草一兩為末服分水道逐凝血行津液利九竅實大腸清熱降火墜胎亦捷煉石丹治痧脹屢效滑石三錢琥珀三錢陳石灰一兩為末水丸茶清送下二錢煩躁青黛為衣心悶亂丹砂為衣豬苓味淡而苦氣平降也陽中陰也入膀胱腎通淋消腫滿除濕利小便因其苦故瀉滯因其淡故滑竅仲景有豬苓湯利濕兼清熱治疸黃便閉渴嘔衍義云行水之功居多仲景五苓散用之按五苓為治水之總劑訒庵謂曾世榮治驚風亦用五苓蓋以茯苓安心神豬澤導小水水利則火降金得木而旺木得桂而枯抑木則風熄風火寧而驚自定曾可謂善用五苓者矣可知仲景制一方即可通百病人特不善體會耳澤瀉味苦淡微咸氣寒氣味頗厚沉而降陰中微陽入膀胱膽滲水去濕利小便瀉伏火收陰汗引藥下行經云除濕止渴聖藥通淋利水仙丹若濕熱壅閉而目不明非本草久服昏目之説也澤瀉三兩白朮二兩水煎分三服治心下有水久服澤瀉未有不與熟地山萸同用者古人制方有補必有瀉此仲景八味丸用澤瀉之微義也後人處方多填塞補藥何益之有當局者悟之木通味苦氣寒沉也降也瀉小腸火鬱利膀胱熱淋導痰濕嘔噦消腹疼壅塞木通二兩水煎服通則不壅下疼矣利血脈九竅通達上下以其利水故也小水利則心火降故導赤散用之古謂消劑兼通此類是也通靈散治血瘀繞臍腹疼甚驗木通五靈脂赤芍三錢水煎服車前子味苦氣寒入膀胱與肝祛風濕目赤翳膜通尿管熱淋澀疼炒末米飲調服二錢並治水瀉皆效利水除濕痹性滑善催生涼血止吐衄強陰能益精莖葉治淋瀝癃閉並尿血衄痢生搗汁頻服更妙不走腎氣子葉性味無異古方三奇丸治目內障車前子麥冬熟地等份為末煉蜜丸服燈草味淡性寒入心小腸通陰竅利小水除癃閉成淋消水濕作腫燒灰敷金瘡止血療小兒夜啼少加冰片吹喉中治急喉痹再加珠子煅研其效更捷鉢擂乳香少入油潤全無罐藏冰片多加分兩不耗山楂味甘酸性消導然其氣輕故不耗真氣解宿食化痰滯去瘀血克肉積除㿗疝祛膨脹發痘疹潤腸胃健脾土保和丸山楂三兩神麯麥芽半夏茯苓一兩陳皮萊蔔子連翹五錢蜜丸此內傷氣未病者但以平和之味消而化之不必攻補也加白朮二兩名大安丸則兼補矣六神麯味甘氣平生髮脾氣熟斂暴氣走脾胃二經助中焦土氣逐痰消積化滯調中運化水穀開胃破癥其氣腐故除食熱其性澀故止瀉痢療婦人胎動因滯治小兒腹堅因積化生丹神麯半生半炒五兩香附三兩陳香櫞二兩卜子半生半炒三稜莪朮橘紅茯苓澤瀉一兩山楂青皮五錢為末蜜丸米飲下治氣蠱血蠱食蠱水蠱附造神麯法白麵五斤杏仁炒研五兩赤小豆四兩煮熟搗爛外用蒼耳草野蓼青蒿俱取自然汁及河水各一小碗於六月六日合一拌勻乾溼得所握團以苘葉裹之懸風處經年用使君子忌茶味甘氣溫健脾胃除虛熱殺臟蟲治五疳瀉痢同蘆薈為末米飲下白濁瘡癬渾身頭面陰囊虛腫蜜炙為末米飲調服小兒尤宜上證皆由脾胃虛弱因而乳停食滯濕熱瘀塞而成脾胃健則諸證悉平消癖丸治小兒痞塊腹大面黃肌瘦漸成疳疾使君子仁三錢炒木鱉子仁炒五錢為末水丸龍眼大雞子一個破頂入藥一丸封固蒸熟食之肥兒丸治小兒脾弱疳積諸大證使君子肉炒芡實粉黃連神麯麥芽青皮五錢陳皮一兩胡黃連白茯苓蘆薈三錢木香人參二錢五分為末飴丸如芡實大米飲化下一丸冬薑湯化下加五穀蟲山楂枳實各五錢更妙瀉加建蓮子五錢蜜丸萊蔔子味大辛氣溫氣味俱厚可升可降入脾肺下氣消痰食有推牆倒壁之功搗汁攙薄荷汁服立吐痰食磨墨服止血凡胃有氣食痰飲停滯致成膨脹者非此不除合皂角燒去皮子弦等份為末薑汁入煉蜜丸白水下二錢治一切痰氣生升氣炒降氣升則散風寒吐痰食寬胸膈降則定痰喘止咳嗽卻內疼除後重皆利氣之功萊蔔即蘿蔔也生搗汁調蜜服治噤口痢重者用黑膻羊肝一葉以箸戳數十孔入甘草末四兩煮熟續吃效止消渴塗跌傷燙火傷炒熟用寬中降氣化痰消瘀治吐衄咳喘吞酸利便制面毒豆腐積服何首烏熟地忌之恐白鬚發以多食滲血故也古方滋補丸萊蔔汁藕汁梨汁人乳各一碗熬成膏入煉蜜一斤用小黑藥豆炒焦為末同蜜膏和令得所每丸重一錢五分丹砂為衣細嚼滾水送日三服白芥子味大辛氣溫調五臟消痰癖除脹滿平喘急寬中利膈開結散滯闢除冷氣然味厚氣輕故開導雖速而不甚耗氣能去脅肋皮膜之痰則他處可知過煎則無力三子養親湯白芥子紫蘇子萊蔔子合二陳湯更妙旋覆花即金沸草味甘鹹性溫入肺肝大腸膀胱主結氣風氣脅下氣膈上痰如膠漆下氣利大腸逐水濕丹溪曰走散之藥虛者少服金沸草散加杏仁五味子下氣降痰治諸咳嗽皆驗前胡味苦氣寒性降下痰氣如神開結滯亦速去胸中喘滿消風熱霍亂除肝膽風痰解嬰兒熱疳己卯歲試商邑庠生宋知年四五十歲一子其子內得疳熱已經三歲骨蒸肌瘦危迫極矣余用前胡柴胡秦艽青蒿黃芩梔子龍膽草膽星生地黃一錢人參甘草五分生梨生藕二片一服熱退神清而愈快哉半夏反烏頭生嚼戟喉閉氣生薑制味大辛氣溫能走能散可升可降陽中陰也體滑性燥和胃健脾補肝潤腎發表開鬱下逆氣止煩嘔發聲音利水道除痰涎脅疼嘔惡氣結消痰核腫突脾濕泄瀉祛痰結頭疼眉稜骨疼經云半夏和胃而通陰陽若嘔吐不止加薑汁微妙即孕婦服之亦無妨也二陳湯加枇杷葉去毛蜜炙三錢治孕婦惡阻古有三禁血家汗家渴家然間有用之者按局方半硫丸半夏硫黃等份薑汁糊丸服治老人虛祕取其潤滑也內經云胃不和則睡不安治之以半夏湯半夏二升秫米一升水煎服是果性燥者乎不知濕去則土燥痰涎不生非半夏之性燥也世徒以性燥而治濕痰則半夏之功用不彰矣川貝母反烏頭味辛氣寒氣味俱輕用須加倍解肝經鬱怒散心中逆氣祛肺癰痰膿喘嗽降胸中因熱結胸足生人面瘡燒灰油調頻敷産難胞不下研末用酒和吞亦除瘕疝喉痹亦止消渴煩熱赤眼翳膜堪點脾郁黃疸能驅但貝母治肺燥之痰嗽與半夏治脾濕之痰嗽為不同耳須辨之膽星九套者佳味苦性沉而平降痰涎因火動如神療急驚有痰搐必用總之有實痰實火壅閉上焦而氣喘煩躁焦渴脹滿者非此不除古方金星散治大人小兒犯咸哮吼者膽星一錢紫蘇葉一錢甘草五分水煎調雞內金末七分服南星祛風散血勝濕除痰下氣破癥攻積拔腫性更烈於半夏鬱金楚産蟬肚者佳味辛苦性寒純陰之品入心肺主順氣破血開鬱治尿血吐衄驅血氣作疼消血積歸經經不下行上為吐衄鬱金二錢和韭汁薑汁童便服血自下行有痰涎入竹瀝且善治蠱毒同升麻煎服不吐則下矣其性輕揚上浮故散郁遏有功入血分兼入氣分行滯氣不損正氣破瘀血亦生新血白金丸治産後敗血攻心癲狂失心者鬱金七兩白礬三兩為末米粥丸服蓋鬱金入心散惡血白礬化頑痰故也薑黃廣産性味與鬱金相似然較烈下氣最捷破血立通調月信消瘴腫升降散用為佐但稍損真氣用宜慎之丹參反藜蘆味苦性微寒入心定神破瘀除癥消癰散腫生肌排膿治風邪留熱眼赤狂悶驅骨節疼痛四肢不遂破宿血生新血落死胎安生胎理婦女經脈不調血崩帶下鄭奠一曰養神定志通利血脈實有神驗一味丹參散功同四物溫酒調末三錢治婦人經胎産諸證五靈脂去砂味甘性溫入心肝主心腹冷氣疼痛腸風産後血暈去疳蛔疳熟有蟲肚脹同胡黃連為末丸服散目翳解蛇毒酒浸行血醋炒止血其功最捷失笑散散瘀結甚驗延胡索味辛苦氣溫入肺脾心包肝行血中氣滯氣中血滯止腹疼通經調月水淋閉除跌僕凝血散癥瘕疝氣一切因血作疼之症悉治之生用破血炒用調血酒炒行血醋炒止血但其力迅墮胎血枯勿加延胡索當歸肉桂等份為末溫酒調服三錢治肢體拘疼並冷氣腰疼皆氣血凝滯所致也紅花酒炒味甘微苦氣微寒陰中微陽唯入血脈尤宜女科少則和血行經多則破血通瘀瘀行則血活熱結於中吐紫黑血者吐出為妙吐未盡加桃仁紅花以行之大抵鮮血宜止瘀血宜行也能下死胎亦療血暈達痘瘡血熱難出散斑疹血滯不清金匱紅藍花酒云治婦人三十二種風子能解消渴與麥門冬同煎更炒澤蘭葉味甘苦性微溫入小腸通肝脾之血治經胎産百病通九竅利關節散頭風目疼療吐血鼻紅消癰癤排膿按澤蘭葉通利小腸則脾肝無壅瘀之患故透竅以理血脈行血無推蕩之苦養血無滯膩之虞女科為聖藥有自來矣癰疽由血熱故亦治之澤蘭葉湯治産後陰戶燥熱成翻花名曰陰翻先以澤蘭葉四兩煎湯熏洗三次再加桔礬五錢煎洗之即安又方治産後水腫澤蘭葉防己等份為末酒醋調服二錢紫草茸味甘鹹氣寒茸初得陽氣和血涼血利九竅通二便治溫病邪熱小清涼散用之蓄血黃疸痘疹血熱惡瘡瘑癬皆血分濕熱所致也桃仁味甘苦氣平陰中有陽入心包肝甘緩肝氣而生新血苦瀉血滯而破瘀血生研用行血治血瘀血閉血結通血隔破血癥逐血疼皮膚血熱燥癢蓄血發熱如狂仲景桃仁承氣湯悉治之炒研用和血治熱入血室小柴胡湯加生地丹皮紅花桃仁潤祕結大腸血枯不可妄用雙仁有毒難當尊生書曰桃仁不可去皮尖以皮紅取其入血尖取利氣而行瘀也花治陽狂杏仁炒研味苦甘辛氣溫平味厚於氣降也陰中陽也有小毒入肺胃大腸其味苦降故定氣逆氣喘上衝通大腸氣閉乾結其味辛甘故瀉肺中滯氣逐隔上痰涎佐以半夏生薑尤散風寒咳嗽仲景麻黃湯大青龍湯俱用之按桃仁杏仁俱治大便祕但當以血氣分之脈沉在血分桃仁陳皮治之脈浮在氣分杏仁陳皮治之賁門上主往來魄門下主收閉故言肺與大腸為通道茜根味鹹氣寒陰中微陽血中要藥或云茜草藘茹一物也非也破瘀同內經藘茹合烏賊骨等份為末雀卵為丸鮑魚湯下治婦女血枯甚驗味鹹故能通經閉氣寒故能止動血惟能通故能止治勞傷吐衄時來除血虛崩漏不止散跌僕血凝瘀聚解蓄血疸黃燥肝有胎須忌之凡血閉酒煎服一兩效血枯血熱血動並建奇功八珍湯加茜根五錢治脾虛而吐衄崩漏尿血便血者雄黃味辛性溫得正陽之氣搜肝強脾殺百毒治驚癇痰涎暑濕瘧利化瘀血為水散百節大風除勞疳瘡疥破結滯殺蟲孕婦佩之生男姑存此説解毒丸治纏喉急痹雄黃一兩鬱金二錢巴豆七粒為末麵糊丸津咽三五丸如不能咽先吹末喉中後自下散劑類白殭蠶去絲酒炒味辛鹹性平氣味俱薄升也陽中之陽也三眠三起生於甲木成於丙火胎於午土僵得金水之化色白而不腐喜燥惡濕食桑葉而不飲有大便無小便余因其不飲而用之不飲之病邪熱渴飲非正味之飲也因其有大便而用治大便不通之病火瀉無度亦治之蓋以天地清化之氣滌疵癘旱潦之氣於溫病尤宜可見溫病乃天地之雜氣為病非四時風寒暑濕燥火之六氣為病也熱病即溫病特以春夏分別言之耳所以世人多誤以為時氣知此者稀矣陶宏景曰人家養蠶時有合簿皆僵者余因合簿皆僵之蠶而用治閣家皆病之疫李時珍曰蠶病風其色白死不腐故曰僵余因病風之蠶而用治病風之人古謂因其氣相感而以意治之者也又曰散風痰頭疼風熱齒疼咽喉痹疼皮膚斑疹風瘡丹毒風癢一切風熱腫毒觀此則殭蠶之升陽散火祛風勝濕清熱解毒可知普濟方誇其善於治腹內之疼余謂腹內之風熱火毒可知聖惠方稱其長於去頭上之風余謂大頭溫蛤蟆溫用升降散加味涼膈散立消以方有殭蠶蟬蛻也張元素曰此物氣味俱薄輕浮而升陽中之陽故能去皮膚諸風如蟲行余謂升其清陽之氣而濁陰之氣自降也故止渴除煩並驗朱丹溪曰此物屬火兼木與土老得金氣僵而不化上治咽喉取其清化之氣從治相火散濁逆結滯之痰也余謂春夏多溫病勢如火炎土燥焚木灼金一得秋分之金氣而炎熱自退故殭蠶為溫病之聖藥時珍又曰蠶屬火喜燥祛風勝濕主療溫病風濕之證余謂若溫病而誤用麻黃桂枝羌活獨活細辛白芷蒼朮等味辛溫發汗以散風濕則煩躁益甚而熱毒愈熾此麻黃湯桂枝湯沖和湯人參敗毒散治溫病之所以壞事也千年長夜萬古遺憾世人何曾夢見余經閲歷而悟此蟬蛻味甘鹹性寒土木餘氣所化升也陽中之陽也夫蛻者退也脫然無恙也豈獨能療驚癇除失音止夜啼發痘疹殺疳蟲為小兒要藥已哉又豈獨退翳膜侵睛祛胬肉滿眵為眼科要藥已哉吸風飲露而不食有小便無大便余謂人一日不再食則飢七日不食則死肺氣不下降膀胱不氣化則死腎虛膀胱不約則遺尿亦死因其不食而用治不食之病因其有小便而用治小便不通之病短赤淋遺亦治之以意治病其義深其理微與蠶之食而不飲有大便無小便彼此相資化育流行天然配偶此造物神功之妙皆溫病之聖藥也宗奭曰蟬性善脫胎前禁用余謂有病則病當之內經云有故無殞亦無殞也孕婦患溫病余屢用之每收奇功未見動胎此閲歷之言不必致疑于禁用二字矣時珍曰主治頭風眩暈皮膚壯熱斑疹作癢余謂溫病有頭目眩暈者有皮膚髮熱斑疹雜出作癢者總是熱毒攻衝所以用之大驗又曰主治驚癇狂亂瘛瘲心悸余謂風熱生驚驚則瘛瘲心動去其風熱則肝氣和心神安驚搐自定瞤惕自止發狂奔叫自息矣又曰主治頭風疼痛又曰去壯熱治腸中幽幽作聲余謂蟬乃清虛之品處極高之上與肺相似肺熱移於大腸肺熱去而大腸之熱自去而聲亦無矣頭疼目眩風熱上攻故並治之衛生方中有清膈散治胃熱吐食用蟬蛻蜂蜜余謂嘔噦吐食皆胃熱也故亦用蟬蛻蜂蜜古人有先得我心者非余之杜撰也淡豆豉味苦辛形腐類腎性寒瀉肺雖理瘴氣專治傷寒佐蔥白散寒熱頭疼助梔子除煩躁懊憹足疼酒浸速嘗痢疾薤白同煎盜汗炒漬酒飲按豆豉之入肺內經所云肺苦氣上逆急食苦以泄之之意也毒丹臭霧山嵐瘴氣以及雜氣流行風寒暑濕皆肺先受之喘吸燥悶亦肺氣有餘耳何弗治之耶附造豆豉法黑豆水浸透淘蒸攤勻蒿覆候生黃衣取曬簸淨水拌得所築甕中桑葉厚蓋泥封曬七日取出再曬即水拌入甕如前法七次再蒸收用石菖蒲九節者佳米汁浸蒸味辛微苦性溫入心肺膀胱主手足濕痹可使屈伸開心氣洞達能出聲音通九竅明耳目益智慧除健忘溫心腹堅齒牙療惡瘡疥癬驅上氣咳逆本草又言常服成仙此醫家誇張之説殆不可信菖蒲補心丸石菖蒲茯苓茯神遠志酸棗仁柏子仁地骨皮熟黃精山藥枸杞子預知子等份人參硃砂減半為末煉蜜丸如芡實子大每嚼一丸人參湯下治心氣不足精神恍惚語言錯妄忪悸煩郁健忘少睡憂喜慘淒夜多異夢寐即驚魘或發狂眩暴不知人等證甘菊花味甘性平可升可降陰中陽也入肺脾肝腎以其味甘補陰血故驅頭風眩暈清腦第一收眼淚翳膜明目無雙利一身血氣逐四肢遊風冬芽秋花多得金水之化冬春採根夏秋採葉疔腫垂死取汁頓服立活甘菊丸治腎水枯竭肺肝侵傷五臟俱損瞳人倒背者甘菊花四兩枸杞子二兩五味子二兩肉蓯蓉一兩五錢巴戟天一兩五錢為末煉蜜丸服余謂加車前子七錢五分更妙威靈仙忌茶辛泄氣咸泄水氣溫屬木其性善走能宣疏五臟通行十二經絡中風痛風頑痹癥瘕積聚膈噎靈仙一兩生薑一兩水煎去渣入砂糖一兩再煎數沸溫服痰水瘧疾黃疸浮腫大小便祕一切風濕痰氣之證性極快利積疴不痊者服之有捷效然疏泄真氣虛人慎用按頑痹由濕熱流於肢節之間腫屬濕疼屬熱汗多屬風麻屬氣虛木屬濕痰死血四肢麻木亦是胃中有濕痰死血以脾主四肢故也痛風當分新久新疼屬寒宜辛溫久疼屬熱宜清涼河間所云暴病非熱久病非寒是也威靈仙傳曰一人手足不遂數十年遇一人令服威靈仙而愈鉤藤用有鉤者過煎無力味甘苦性微寒入十二經主肝風相火療瘛瘲驚癇胎風客忤熱壅痰喘中風失音煎湯頻服夜啼不眠舒筋活血頭旋目眩蓋風靜火自熄矣荊芥穗味辛氣散浮而升陽也其味辛散血中之風故解肌表消頭目發痘疹通血脈療疼癢諸瘡去皮毛諸風其性升故提血崩眩暈其氣散故行五臟瘀血華他愈風散荊芥穗醋炒燥為末豆淋酒調服三錢治産後血暈不省並中風危篤及妊娠腰疼且能發表千金曰一以去風一以消血結後人加芎歸煎並驗薄荷蘇出者佳味辛微苦升也陽也涼散透竅入肺肝清六陽會首散一切毒風其氣辛香通竅發汗引諸藥入榮衛開風涎透利關節下氣消脹薄荷煎湯調服蟬蛻末一錢治小兒久疳天柱骨倒辛夷花辛溫入肺胃助胃中清陽上升通於頭腦主九竅風熱之證柴胡南出者佳味辛氣溫升也陽中之陰也辛者金之味故平肝溫者春之氣故就之以入膽專主往來寒熱肌表潮熱肝膽火炎胸脅疼結又主升散火鬱傷寒邪熱溫瘧寒熱少陽頭疼肝風鬱結尤善理熱入血室月經不調雖引清氣上升中氣虛寒宜避仲景有小柴胡湯大柴胡湯柴胡芒硝湯酌定前證皆驗川芎味大辛氣溫升也陽也專入膽併入心包肝氣中血藥也助清陽而開諸郁四物湯用以宣血氣之滯耳行氣和血而通陰陽散風寒頭疼破瘀血經閉解氣結逐腹疼補肝虛脅風排癰膿消腫同艾葉服驗胎孕有無合細辛煎治金瘡作疼然升散太過故風寒頭疼極宜若三陽火壅於上而頭疼者得升反甚今人不明升降一概用之誤矣多服久服致暴亡極言其辛散太甚也天麻煨熟酒炒味辛氣平入肝療風熱眩暈治驚悸瘛瘲祛風濕𤸷痹不仁主癱瘓語言不遂和血脈疏痰氣強筋骨利九竅內經曰諸風眩掉皆屬肝木是也易老曰頭旋眼黑非天麻不能定是也古方天麻丸天麻川芎等份為末煉蜜丸茶酒任下主消氣散痰清利頭目寬胸快膈治心忪煩悶頭暈欲倒項急肩背拘卷神昏多睡肢節煩疼皮膚瘙癢偏正頭疼鼻齆面目浮腫並驗河間曰中風非外來之風良由將息失宜心火暴甚腎水衰敗不能制之故猝倒無知也莫如地黃飲子補水火和臟腑養氣血通經絡其證自愈熟地四錢肉桂附子蓯蓉巴戟山萸茯苓遠志石斛石菖蒲麥冬五味子一錢薄荷七分水煎服亦可煉蜜丸服此口噤身冷四肢不收之良劑也古人云治風先活血血活風自滅非此之謂乎秦艽味辛苦散風勝濕去腸胃之熱益肝膽之氣養血榮筋主風寒濕痹周身攣拘虛勞骨蒸和血便利去下牙疼直指秦艽扶羸湯治肺痿骨蒸勞嗽聲嗄體倦自汗秦艽鱉甲當歸地骨皮錢半柴胡二錢半夏紫菀人參甘草一錢生薑一錢二分棗二枚水煎此肺勞蒸嗽之劑也升麻味苦辛氣味俱薄浮而升陽也入肺脾胃大腸升清陽之氣於濁陰之下提胃氣之下陷舉大腸之滑脫散皮膚肌熱斑疹解腹內下痢後重引石膏驅齒牙熱腫使蔥白除陽明頭疼內經曰地氣上為云天氣下為雨天地不交則萬物不通也升麻葛根湯升麻葛根白芍二錢甘草一錢蔥白水煎服此錢仲陽治陽明傷寒發熱頭疼無汗升發表邪之劑也葛根味甘寒氣輕浮而升陽中微陰以其涼散故雖達諸陽而陽明為最以其涼甘故雖主發表而瀉熱獨良仲景有葛根湯發痘疹解肌祛酒毒熱痢仲景有葛根黃連黃芩湯古謂散劑發汗此類是也白芷味辛氣溫味薄氣浮升也陽也以其溫散祛毒故逐陽明寒邪以止頭疼去肺經風熱以發斑疹以其辛香達表放消癰瘍排膿止癢定疼托腸痔久瘻生肌長肉炒黑提婦人漏下赤白血閉陰腫欲去面斑仍須生用為末煉蜜丸彈子大煎荊芥湯點臘茶嚼下治諸風頭疼羌活味微苦氣辛微溫氣味俱輕升也陽也以其溫散定疼雖入諸經而太陽為最散肌表之邪熱利周身之疼痛逐新久之風濕排太陽之癰疽氣雄力健大有撥亂反正之功虛者禁用羌活勝濕湯治濕氣在表頭腰疼且重者羌活獨活錢半藁本川芎蔓荊子防風甘草八分寒濕加炮附子防己六分水煎溫服獨活味苦氣香性降微涼入腎與膀胱理下焦風濕除兩足疼痹因風濕而頭眩齒疼亦以此降之文顏博方生地二兩獨活二錢治牙疼甚驗細辛遼出者佳味大辛氣溫氣味俱厚升也陽也有小毒入肝腎散陰分寒邪逐本經頭疼仲景有麻黃附子細辛湯辛散利竅除諸風濕痹驅風淚眼疼口臭牙疼煎含多服大散真氣按此物辛甚故能大散陰分之寒邪陰分且然陽分可知亦豈有辛甚而不入陽分者但陽證忌熱當慎用耳蔓荊子辛苦入肝胃通利九竅主頭面風熱之證防風味甘辛微溫氣平升也陽也雖脾胃膀胱經藥然隨諸藥各經皆至為風藥卒徒發脾中伏火於土中瀉木氣味俱輕故散風邪治周身之疼痹性能勝濕故去濕熱除遍體之濕瘡雖云風藥中潤劑亦能散上焦元氣瀉黃散防風一兩甘草五錢梔子二錢五分石膏藿香二錢為末炒香蜜酒調服三錢發脾胃鬱火治口爛唇焦甚驗汗劑類麻黃味辛氣溫氣味俱薄輕清而浮升也陽也入心與大腸膀胱實肺家專藥發汗解表治冬月正傷寒果勝瀉衛實去榮寒利血脈通九竅開毛孔除身熱頭疼療咳逆氣喘春夏溫病最忌秋燥瘧疾切減或醋泡或蜜炙陳久者良根止汗固虛按麻黃專主冬月傷寒發汗解表春夏秋不可妄用即傷寒六脈不浮緊者亦不可輕投蓋汗乃心之液若不可汗而汗與可汗而過汗則心血為之動矣或至亡陽或至口鼻目出血而成大患丹溪以麻黃人參同用亦攻補兼施法也當局者宜悟仲景有麻黃湯又麻黃升麻湯紫蘇葉味辛入氣分色紫入血分以其辛香氣烈故發汗解肌祛風寒甚捷開胃益脾療脹滿亦佳和血下氣寬中消痰止疼安胎去風定喘利腸宜加口臭能闢嚴氏紫蘇飲子治子懸紫蘇葉錢半大腹皮三錢當歸川芎白芍陳皮人參甘草一錢青蔥五葉水煎服子降滯氣消痰喘潤大便梗性緩而和順氣安胎虛人最宜局方有蘇子降氣湯氣降則痰行蘇子前胡橘紅半夏厚朴二錢當歸甘草一錢沉香五分虛極加五味蒼耳子去刺酒蒸味甘苦氣溫善發汗散風濕通腦頂行足膝達皮毛治頭疼目暗鼻淵肢攣乳癰瘰癧瘙癢之證蒼耳散治鼻淵蒼耳子二錢薄荷四錢辛夷四錢白芷八錢為末任調下內經云中氣不足九竅為之不利治以補中為主專用行散藥恐不可救斗門方云一婦人血風攻腦頭旋悶絶倒地不省人事用喝起草為末溫酒調服錢許其功甚捷此物善通頂門連腦蓋即蒼耳也水萍紫背者佳青色者不堪用辛散輕浮入肺達皮毛通脈利竅其發汗甚於麻黃止消渴搗汁服浴瘙癢煮汁又能下水氣利小便治一切風濕癱瘓為末煉蜜丸酒服治三十六種風高供俸採萍歌云不在山不在岸採我之時七月半選甚癱風與緩風些小微風都不算豆淋酒下三五丸鐵撲頭兒也出汗下劑類大黃川産者良味辛氣大寒氣味俱厚陰中之陰降也推陳致新走而不守酒浸上下通行清臟腑蓄熱奪土鬱壅滯逐堅癖滌痰食導瘀血療吐衄仲景有大黃黃連瀉心湯通月閉消癰腫因其峻烈威風號為將軍故積聚能蕩之頃刻水漬便飲生瀉心下痞氣仲景瀉心湯類入湯煎服熟除腸胃熱瘀仲景承氣湯類氣虛同人參名黃龍湯承氣湯加人參減大黃之半蓄血同四物名玉燭散四物湯合調胃承氣湯佐甘草桔梗可緩其行佐枳朴芒硝益助其鋭多寡量人虛實誤用與鴆為類按陽藥用氣陰藥用味大黃味厚屬陰中之陰水漬生用為心下痞恐味厚傷中氣也煎熟無力之説纘論錯悟一唱百和之失誰其辨之或問心氣不足而吐衄何不補心而反瀉心丹溪曰少陰不足亢陽無輔致陰血妄行故以大黃瀉其亢甚之火又心本不足肺肝各受火邪而病作故以黃芩救肺黃連救肝肺者陰之主肝者心之母血之舍也肺肝火退則血歸經而自安矣李士材所謂濁陰不降則清陽不升瘀血不去則新血不生是也古人精義入神豈後人所能及乎本草匯曰治實火之血順氣為先氣降血自歸經治虛火之血養正為先氣壯自能攝血此虛實所由分而治法之不同也臨證者宜詳之千金方治婦人嫁痛即陰戶腫痛也大黃一兩酒三盅煎二三沸頓服芒硝味辛苦鹹氣大寒降也陰中之陰也有毒性峻速柔金化石咸能軟堅推逐陳積去臟腑壅滯破瘀血癥瘕治傷寒溫病瘧疾脹閉熱積譫妄凡屬各經實邪悉可瀉除內經曰熱淫於內治以鹹寒芒硝是也佐之以苦大黃是也二味合枳實厚朴即大承氣湯合甘草即調胃承氣湯孕婦忌之然有故無殞亦無殞也巴豆不去心作嘔不去膜傷胃燒存性去油為霜中其毒者以大黃黃連或黑豆甘草或涼水解之皆其所畏者也味辛熱有大毒可升可降能行能止生猛熟緩峻用大可卻病緩用亦可和中通經墜胎主開竅宣滯去臟腑陳寒為斬關奪門之將破痰食癥癖血瘕聚積生冷硬物治癲癇瀉痢口喎眼斜耳聾喉痹但屬峻劑不可輕投按大黃巴豆同為峻下之劑但大黃性寒腑病多熱者宜之巴豆性熱臟病多寒者宜之故仲景治傷寒傳裡用大黃東垣治五積屬臟用巴豆各有所宜也甘遂反甘草麵裹煨味苦氣寒有小毒瀉腎及隧道水濕直達水氣所結之處以攻決為用為下水之聖藥主十二經水凡大腹水腫邪熱結胸留飲宿食痰迷癲癇之證仲景大陷胸湯治之孕婦切忌丹溪曰治水腫健脾為主脾實氣運則水自行以四君子湯視所挾證加減之不可徒恃利水藥仲景方治婦女血結小腹滿如敦狀小便微難不渴此為水與血俱結在血室也甘遂一兩阿膠一兩大黃二兩水碗半煮半碗頓服其血當下紫大戟反甘草杭産麵裹煨味苦性寒有小毒入十二經主水腫蠱毒癥結腹滿腹疼利小便通月經苗名澤漆退皮膚邪熱卻面目浮腫大腹水氣立遣孕婦並忌芫花反甘草醋煮味苦辛氣溫有小毒去水飲痰癖散皮膚五臟水腫消胸膈痰沫善唾咳逆上氣能除咽腫短氣可驅仲景十棗湯芫花大戟甘遂等份為末十棗湯調服一錢經云潔淨府去陳莝是也葶藶子糯米泔炒再酒浸味辛氣大寒屬火性急大能下氣行膀胱水腫中有水氣奔急者非此不除所謂大黃瀉血分葶藶瀉氣分是也仲景葶藶大棗瀉肺湯治肺氣喘急不得臥葶藶為末用大棗十枚煎湯調服一錢輔以大棗補土所以制水與十棗湯義同牽牛子白屬金黑屬水炒取頭末味辛性寒有小毒達右腎走精隧入肺與大小腸主下氣通二便祛壅滯氣急退水腫消風毒療膀胱疼痛有孕婦忌殺寸白蟲肉湯調末二錢按牽牛自宋以後劉河間張子和始倡為通利下藥漢以前未入本草此仲景所以無用法也如順氣丸治一切積氣宿食不消黑牽牛頭末四兩蘿蔔剜空安末於內蓋定蒸熟入白蔻末二錢搗丸白湯送下錢許古方牛郎散牽牛末一兩檳榔末五錢紫蘇葉湯調服二錢治氣築奔沖疼不可忍並能追蟲取積煉蜜丸陳皮生薑湯送下治五枳神效再輔以補脾之劑時珍曰豫甥素多酒色二便不通脹疼呻吟七晝夜通利之不效豫恩此濕熱之邪在精道壅隧路病在二陰之間前阻小便後阻大便不在膀胱大腸經也用川楝子大茴香穿山甲一線牽牛子二錢水煎一服減三服平亦可丸服攻劑類穿山甲土炒或油煎色宜黃味甘鹹微寒有小毒入肝胃以其穴山寓水故能出入陰陽貫穿經絡直達榮衛至於病所以破邪結治風濕冷痹通經下乳消癰排膿和傷發痘克血積攻痰癖瘡家瘧家須為上劑又治痔漏蟻瘻山甲燒存性敷之立愈去皮風復元和血湯治跌墜損傷停滯瘀血痛疼至不敢喘咳唾者穿山甲當歸桃仁紅花茜根天花粉香附甘草一錢柴胡二錢川大黃三錢酒煎連進效鱉甲忌馬齒莧酥炙醋炙味鹹性屬金與土色青入肝併入肺脾主骨蒸勞嗽化積聚癥瘕除息肉陰蝕痔疽血瘀且愈腸癰消腫並治溫瘧寒熱及婦人五色漏下催生墜胎時珍曰介蟲陰類故皆補陰謙甫鱉甲秦艽散鱉甲歸身柴胡地骨皮二錢牡丹皮知母秦艽元參青蒿一錢烏梅一枚汗多加黃耆此勞嗽骨蒸退熱斂汗之劑也乾漆炒令煙盡味辛鹹氣溫入胃大小腸追積殺三蟲補中安五臟療男子風寒濕痹時作癢疼治婦人癥瘕堅結和脈通經痞積腰疼可驅血風心疼能除丹溪曰漆性急而飛補用之中節瘀去新生人所不知也指南萬應丸治月經瘀閉繞臍疝氣疼徹及産後血氣不調痞積癥瘕乾漆炒透牛膝酒浸等份為末生地黃取汁熬膏入藥和丸如桐子大初服三丸漸加五七九丸溫酒或米飲下京三稜味苦辛入脾肺主行氣行血多年癖癥如石能化為水為血中氣藥蓋氣隨血行氣聚則不流故生癖癥之患非此不能治也然有斬關之勢欲先入血醋炒欲先入氣火炮與莪朮同虛人並忌之莪朮味苦辛性溫開胃進食療心腹疼行瘀血破積聚利月水除奔豚定霍亂下小兒食積性亦猛厲大能開氣不能益氣耳古方三稜莪朮散治渾身燎泡如棠梨狀每個出水有石如片如指甲蓋大其泡復生抽盡肌肉即不可治三稜醋炒莪朮醋炒等份為末每服一兩日三夜一溫酒調連進以愈為度一方加穿山甲減半青礞石硝石礞石等份打碎拌勻煅至硝盡礞色如金為度味甘鹹有小毒體重沉墜色青入肝併入肺大腸胃主蕩滌宿食消磨陳積平肝下氣為治驚利痰之聖藥王隱君滾痰丸千古良方也碭邑監生劉效郭年近六旬因驚氣裹痰致怪病百出百藥不效七年不能起於床自分必死丁亥秋余診之脈沉滑枯瘦而聲宏令服滾痰丸錢半竹瀝入薑汁送下大便下惡物傾盆兩服而足能行病如掃快哉按攻積諸藥如萊蔔子麥芽攻面積六神麯穀芽攻米積山楂阿魏攻肉積陳皮蘇葉攻魚蟹積枳椇子攻酒積當門子攻酒果積甘遂大戟攻水積雄黃膩粉攻涎積礞石蛤粉攻痰積木香檳榔枳殼攻氣積肉桂乾漆桃仁攻血積三稜莪朮穿山甲雞內金攻癥瘕巴豆攻冷積大黃芒硝攻熱積認證施藥各從其類也又按內經云諸疼為實此實字要參酌不必虛實之實為實也凡有痰水寒熱酒食氣血之實邪皆可言實內經又曰疼隨利減則滌痰逐水瀉熱祛寒解酒消食破氣攻血皆可言利邪氣去正氣復何虛之有若真虛疼而無實邪獨參湯可矣有寒加附子有熱加黃連大便不通加酒炒大黃總當斟酌輕重隨證攻補自得之矣吐劑類瓜蒂味苦有毒入口即吐實熱痰涎多用之類編曰一女子病齁喘不止遇一人令取瓜蒂七枚為末調服其汁吐痰如膠之黏三進而病如掃仲景有瓜蒂散子和用瓜蒂藜蘆防風等份為末名三聖散荸薺汁調末一錢吐風痰白礬味酸鹹寒性澀而收燥濕追涎化痰墜濁解毒生津止血定疼通大小便主疳疾生好肉蝕惡肉除痼熱在骨髓時珍曰能吐風熱痰涎取其酸苦湧瀉也白礬茶芽為末冷水調服吐一切毒古方白礬滑石湯治熱毒怪證目赤鼻脹大喘渾身生斑毛髮如鐵此熱毒氣結於中下焦也白礬二兩滑石二兩水三碗煎減半不住飲之飲盡再作鶴頂丹治結胸胸痹痰火聲嘶白礬三錢銀硃一錢五分同研入瓦盞置炭火上熔化去火候乾為末每服一錢五分薑茶煎湯調下聽其心上隱隱微聲結者自散白礬化痰解毒銀硃破積消滯也鐵化湯洗一切眼疾痘後翳膜侵睛赤爛云點尤妙生白礬枯白礬膽礬青鹽五味子二錢川椒五分烏梅二枚杏仁七粒新針七個無根水泡七晝夜針亦化為水矣一日三洗效牙皂味辛鹹性溫有小毒入肝腎主風痹死肌頭風目淚通關竅理癰疽婦人吹乳及乳癰牙皂燒灰同蛤粉研末調服二錢消脹滿化水穀除咳嗽療骨蒸搐鼻噴嚏立至敷腫疼痛即除和白礬可吐風痰拌蜜煎名為導箭刺主厲風鼻梁崩倒眉發自脫又主癰疽未潰者能發空竅已潰者引藥排膿直透達膿處成功諸般惡瘡咸不可缺千金方治二便關格皂莢燒末米飲調服三錢立通宣明酒打麵糊丸如桐子大溫酒下二錢又方鐵角散治痰喘咳逆及哮吼神驗長皂角三條一條入半夏十粒一條入杏仁十粒一條入巴豆十粒用蜜炙入半夏條薑汁炙入杏仁條麻油炙入巴豆條俱黃色為度去皮子研為末每服二三分安手心以薑汁調之舌餂咽下常山味辛苦微寒有小毒能引吐行水祛老痰積飲痰有六風痰寒痰濕痰熱痰氣痰食痰飲有五流於肺為支飲於肝為懸飲於心為伏飲於經絡為溢飲於腸胃為痰飲常山力能吐之下之同甘草用則吐同大黃用則下多用生用亦必吐若酒浸炒透但用錢許能起沉疴每見奇功未見其或吐也勿泥雷公久病忌服之説訒庵曰常山吐瘧痰藜蘆吐風痰瓜蒂吐熱痰附子尖吐濕痰寒痰萊蔔子吐氣痰食痰若體虛人湧吐痰涎惟人參蘆為最藜蘆反細辛芍藥諸參取根去頭味辛苦性寒有大毒入口即吐善通頂令人嚏風癇證多用之藜蘆一錢鬱金五分為末溫漿水和服探吐通頂散治諸風頭痛藜蘆一錢黃連一分為末搐鼻子和曰一婦病癇數年採食百草狀若蔥苗誤蒸食之覺不安吐膠涎數日昏困汗出後輕健如常以所食訪人即藜蘆也人參蘆味苦氣輕以逆流水煎服五錢或入竹瀝湧出痰涎虛人無損千金方燒鹽熟湯調服以指探吐凡病皆宜亦無損也按內經云其高者因而越之在上者湧之木鬱奪之越以瓜蒂豆豉之苦湧以赤小豆之酸奪去上焦有形之物而木得舒暢則是天地交而萬物通也丹溪曰吐中就有發散之義以吐發汗人所不知也訒庵曰汗吐下和治療之四法仲景瓜蒂散梔豉湯並是吐法子和治病用吐尤多丹溪治許白雲大吐二十餘日小便不通亦用吐法甚至四君四物以引吐成法具在今人惟知以和為上汗下次之而吐法絶置不用遇邪在上焦當吐不吐致結塞而成壞病背棄古法枉人性命可痛也夫
